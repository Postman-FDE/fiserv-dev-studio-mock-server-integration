components:
  schemas:
    AddIplanV1ReqModel:
      required:
      - accountId
      - authorizationCode
      - transactionAmount
      type: object
      properties:
        accountId:
          maxLength: 19
          type: string
          description: Unique identification number for cardholder billing account.
          example: '0006000011000000103'
        authorizationCode:
          maxLength: 6
          type: string
          description: Field indicates the authorization code for transaction variant
            posting.
          example: '998271'
        businessUnit:
          maximum: 999
          maxLength: 3
          type: integer
          description: Unique identification number associated with the organization.
            Valid values from 1-998.
          example: '600'
        configurationTemplate:
          maxLength: 10
          type: string
          description: BNPL configuration template, set of controls that govern how
            each unique iPlan (BNPL Instalment Plan) is billed, what the payment frequency
            is, what fees are supplied etc.
          example: TMPL10
        transactionAmount:
          maxLength: 17
          type: string
          description: Transaction amount to be converted into instalment.
          example: '1000.00'
    AddIplanV1ResponseModel:
      type: object
      properties:
        accountId:
          maxLength: 19
          type: string
          description: Unique identification number for cardholder billing account.
          example: '0006000011000000103'
        businessUnit:
          maximum: 999
          maxLength: 3
          type: integer
          description: Unique identification number associated with the organization.
            Valid values from 1-998.
          example: '600'
        sequenceNumber:
          maximum: 99999
          maxLength: 5
          type: integer
          description: This is the iPlan sequence number, each time a new iPlan is
            created, system will refer to this new account level field to increment
            for the next iPlan record number.
          example: '2'
    InquireBNPLControlV1ResponseModel:
      type: object
      properties:
        accountId:
          maxLength: 19
          type: string
          description: Unique identification number for cardholder billing account.
          example: '0006000011000000103'
        bookingAlertChannelIndicator:
          maximum: 9
          maxLength: 1
          type: integer
          description: Communication channel through which the BNPL booking alerts
            are sent to the cardholder. <br/>The values are:<br/>&nbsp; '0' - No Booking
            Alert <br/>&nbsp; '1' - SMS Booking Alert <br/>&nbsp; '2' - Email Booking
            Alert <br/>&nbsp; '3' - SMS & Email Booking Alert <br/>&nbsp; '9' - Logo
            Level Booking Alert
          example: '0'
        businessUnit:
          maximum: 999
          maxLength: 3
          type: integer
          description: Unique identification number associated with the organization.
            Valid values from 1-998.
          example: '600'
        configurationTemplate:
          maxLength: 10
          type: string
          description: BNPL configuration template. Set of controls that govern how
            each unique iPlan ( BNPL Instalment Plan) is billed, what is the payment
            frequency and what fees are supplied etc.
          example: BNPLTMPL10
        defaultRepaymentReferenceIndicator:
          maximum: 9
          maxLength: 1
