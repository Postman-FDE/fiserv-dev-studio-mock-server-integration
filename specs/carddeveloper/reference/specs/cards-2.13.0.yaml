    FilterCriteria:
      type: object
      properties:
        filterBy:
          maxLength: 4
          type: string
          description: "This field contains the combination of the transaction message type code and its corresponding description. It is used to identify and interpret the nature of the transaction message during processing and reporting. This field applies to both debit and credit cards.  \n- MERCHANT_NAME - Merchant Name.  \n- AMOUNT_FROM - Minimum amount. Valid format is 0.00. \n- AMOUNT_TO - Maximum amount. Valid format is 0.00.  \n- FROM_DATE - Start date. Valid Format is YYYY-MM-DD.  \n- TO_DATE - End date. Valid format is YYYY-MM-DD.  \n- STATUS - For debit transactions valid status are APPROVED, REVERSED and DECLINED. For credit transactions valid status are  POSTED/DECLINED/PENDING.  \n- TRANSACTION_CODE - Describes the type of transaction done on card. For values refer field transactionType.  \n- MESSAGE_TYPE - Message based on activity done on the transaction. For values refer field MessageType.  Applies only to debit cards.  \n- SYSTEM_RECORD_ID - The ID that uniquely identifies the transaction. Mapped to the lifecycle key.  \n- SEQUENCE_NUMBER - Chronological numeric identifier for the transaction.  \n- RETRIEVAL_REF_NUMBER - Transaction identifier typically assigned by the acquirer or transaction originator.  \n"
          example: MERCHANT_NAME
          enum:
          - MERCHANT_NAME
          - AMOUNT_FROM
          - AMOUNT_TO
          - FROM_DATE
          - TO_DATE
          - STATUS
          - TRANSACTION_CODE
          - MESSAGE_TYPE
          - SYSTEM_RECORD_ID
          - SEQUENCE_NUMBER
          - RETRIEVAL_REF_NUMBER
        filterValue:
          type: string
          description: "This field contains the value corresponding to the selected filter criteria. For example, if the filterBy field is set to MERCHANT_NAME, this field should include the merchant’s name, such as “ExampleCo”. The value must align with the filter type specified in filterBy. Refer to the filterBy field for additional details on supported filter options."
          example: Store1
    Transaction:
      type: object
      properties:
        systemRecordId:
          type: string
          description: "This field contains the unique system-generated identifier associated with the record. It may include lifecycle key, duID, or active key values that support internal tracking and state management of the card record. This field applies to debit cards only."
          example: 011103LMFI4F4321377761184|12080251120230113|0120
        cardNumber:
          type: string
          description: "Card number used in transaction, identified in request. Masked in the response. Applies to debit and credit cards."
          example: 400020XXXXXX4000
        memberNumber:
          type: string
          description: "Member Number associated with the card. This field is only used if the user is selecting member number for a given cardholder, not used when searching all transactions. Applies to debit cards only."
          example: "0"
        cardType:
          type: string
          description: Card type. Applies to debit and credit cards.
          example: CREDIT
          enum:
          - CREDIT
          - DEBIT
          - CREDIT_GATEWAY
        sequenceNumber:
          type: string
          description: "Chronological numeric identifier for the transaction, assigned by the terminal. Applies to debit cards only."
          example: "000031"
        retrievalRefNumber:
          maxLength: 12
          type: string
          description: |
            This field contains the reference number supplied and retained by the message originator. It serves as an identifier used to track or correlate the transaction throughout processing. The value may be up to 12 characters in length.Applies to debit cards only.
          format: numeric
          example: "222815000031"
        subResponseCode:
          type: string
          description: |
            This field contains an optional one‑character value that provides additional detail for specific denial codes. It is case‑sensitive, and its meaning varies based on the combination of the authorization response code and the response sub‑code. This field is used to further refine the reason for a denial when applicable. Applies to debit cards only.
          example: M
        subResponseCodeDescription:
          type: string
          description: Description for sub response code. Applies to debit cards only.
          example: 96-M Error processing PIN
        preAuthAmt:
          type: string
          description: |
            This field contains the transaction amount returned in specific processing scenarios. For a preauthorization response (110) or an authorization response (210), it represents the amount associated with the response. In the case of a partially approved transaction, this value reflects the amount that was approved. For a denied transaction, it contains the originally requested amount. The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees. For a forced post preauthorization (120) or a forced post clearing transaction (220), the clearing amount shown in Amount 2 is duplicated in Amount 1. During a reversal, Amount 1 represents the amount to be reversed. Applies to debit cards only.
          example: "2000"
        amtCharged:
          type: string
          description: "Contains the transaction amount on a forced authorization (120) or on a forced post clearing transaction (220). For a partially approved transaction, this is the amount approved. The amount includes surcharges but does not include switch, cardholder, or interchange fees. On a preauthorization response (110) or an authorization response (210), an amount displayed is a balance returned in the response. This could be the ledger or available balance. On a partial reversal, Amount 2 is the new amount that replaces the amount displayed in Amount 1. Applies to debit cards only."
          example: "1299.00"
        authorizationCode:
          type: string
          description: "Authorization approval code, generated for approved transactions only. Applies to debit and credit cards."
          example: "050821"
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field contains the identifier for the terminal where the transaction was performed. It is used to uniquely distinguish the originating terminal for processing, tracking, and audit purposes. Applies to debit cards only.
          format: alphanumeric
          example: VMDIEOS1
        merchantCategoryCode:
          type: string
          description: "Merchant category code (MCC) associated with the transaction. National code that classifies the card acceptor’s type of business, product, or service. Applies to debit and credit cards."
          example: "6011"
        merchantCity:
          maxLength: 16
          type: string
          description: |
            This field contains the Regulation E location details, specifically the city and state where the terminal involved in the transaction is located. It is used for compliance and reporting purposes under Regulation E requirements. This field applies to both debit and credit cards.
          example: Newark
        merchantState:
          maxLength: 3
          minLength: 2
          type: string
          description: "This field contains the state where the merchant associated with the transaction is located. It is used for identifying the merchant’s geographic location for processing, reporting, and compliance purposes.  \nAL Alabama | AK Alaska | AS American Samoa (US Territory) | AZ Arizona | AR Arkansas  \nCA California | CO Colorado | CT Connecticut | DE Delaware | DC District of Columbia  \nFM Federated States of Micronesia (US Territory) | FSM Federated States of Micronesia (US Territory)  \nFL Florida | GA Georgia | GU Guam (US Territory) | GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada | NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina | SD South Dakota | TN Tennessee | TX Texas | UT Utah  \nVT Vermont | VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin | WY Wyoming  \n"
          example: NJ
        eciMastercard:
          type: string
          description: "Electronic commerce indicator (ECI) provides information regarding the security level and authentication method used for an electronic commerce Debit Mastercard® transaction. Applies to debit cards only.  \nPossible Positions 1 and 2 values  \n- 21  -  Channel encryption; cardholder certificate not used  \n- 22  -  Masterpass-generated transaction  \n- 24  -  Digital Secure Remote Payment (DSRP) transaction  \n- 91  -  No security protocol; cardholder certificate not used.  \nPossible Position 3 values  \n- 0  -  Universal cardholder authentication field (UCAF) data collection – Is not supported by the merchant an Identity Check merchant has chosen not to undertake Identity Check on this transaction or identity Check failed authentication and merchant desires to proceed with transaction  \n- 1  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains an attempts AAV  \n- 2  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains a fully authenticated AAV)  \n- 3  -  UCAF data collection is supported by the merchant and UCAF (Mastercard assigned static AAV) must be present  \n- 4  -  Merchant has chosen to share authentication data within authorization; UCAF collection not supported  \n- 5  -  Reserved for future use  \n- 6  -  Merchant Risk-Based Decisioning  \n- 7  -  Partial Shipment or recurring payment; liability depends on the original UCAF values provided and matching with the original transaction  \n"
          example: "21"
        eciVisa:
          type: string
          description: "Electronic commerce indicator (ECI)—Visa. Provides information regarding the security level and authentication method used for an electronic commerce Visa Check transaction.  Applies to debit cards only.  \nPosition 4 - Mail/Phone/Electronic Commerce and Payment Indicator  \n- Space - POS Customer Present (POS Check Service Only)  \n- 1 - Single transaction of a mail/phone order  \n- 2 - Recurring transaction  \n- 3 - Installment payment  \n- 4 - Unknown classification/Other mail order  \n- 5 - Secure electronic commerce transaction  \n- 6 - Non-authenticated security transaction at a 3-D Secure-capable merchant, and merchant attempted to authenticate the cardholder using 3-D Secure  \n- 7 - Non-authenticated security transaction  \n- 8 - Non-secure transaction  \n"
          example: "3"
        pinTransaction:
          type: string
          description: "This field indicates whether a Personal Identification Number (PIN) was used to authenticate the transaction. Valid values are “Yes” or “No,” specifying the presence or absence of PIN-based verification. Valid values Yes or No. Applies to debit cards only."
          example: 1 - Yes
        networkID:
          type: string
          description: |
            This field specifies the payment network to be used for transmitting the transaction message. The selected network determines the applicable program rules and processing guidelines for the transaction. Applies to debit cards only.
          example: 773002 - Maestro
        acquirerRefNum:
          maxLength: 23
          type: string
          description: This field contains the Acquirer Reference Number (ARN) assigned by the payment network based on information provided by the acquirer. It is primarily used for network-level corrections and transaction tracking. The ARN ensures accurate identification of transactions within the network. This field applies specifically to debit cards.
          example: "1055556060"
        posDataInputCapability:
          maxLength: 1
          type: string
          description: "This field indicates the capability of the terminal to manually enter the card number and expiration date into the system. It reflects whether the terminal supports key‑entry functionality as part of the card data capture process. This field applies specifically to debit cards. Valid values are- 0  Unknown / Not specified 1  Manual entry only 2  Magnetic stripe read 3  Manual + Magnetic stripe 4  Chip (ICC) capable 5  Manual + Chip 6  Magnetic stripe + Chip 7  Manual + Magnetic stripe + Chip 8  Contactless capable 9  All capabilities (Manual, Magstripe, Chip, Contactless) Some APIs (like CyberSource or Fiserv) use a two-digit numeric or bit-mapped representation to indicate multiple capabilities. Applies to debit cards only."
          example: "2"
        posDataInputMode:
          type: string
          description: |
            This field indicates the method used to capture card information at the terminal. It identifies how the card data—such as card number and expiration date—was entered, whether through swipe, dip, tap, manual key entry, or another input method supported by the terminal. This field applies specifically to debit cards.
            Valid values:
              00  Unspecified
              01  Manual
              02  Swipe
              03  Barcode
              04  OCR
              05  Chip
              06  Key Entered
              07  Contactless Chip
              81  Credential on file / e-commerce transaction
              90  Contactless Magstripe
              Applies to debit cards only.
          example: 2 - Swipe
        unmatchedCompletionFlag:
          type: string
          description: |
            This field indicates whether the transaction is marked with an unmatched completion flag, used to identify transactions where the completion record does not correspond to a previously authorized transaction.Applies to debit cards only.
          example: "N"
        expirationDateMismatch:
          type: string
          description: Indicates if an expiration date mismatch exists. Applies to debit cards only.
          example: "N"
        effectiveDate:
          type: string
          description: |
            This field contains the date when the transaction became effective. It represents the official effective date for the transaction and is used for settlement and reporting purposes. The value should accurately reflect the date the transaction was finalized. Applies to credit cards only.
          format: date
          example: 0010-04-14
        transactionDateTime:
          type: string
          description: |
            This field captures the date and time at which the transaction was created. It records the precise timestamp used for transaction logging, auditing, and reporting. Applies to debit and credit cards.
          format: date-time
          example: 2021-10-15T17:13:14Z
        transactedCardNumber:
          type: string
          description: "CardNumber given for monetary(posted) transactions if available, otherwise blank. Applies to credit cards only."
          example: 400020XXXXXX4000
        statusDescription:
          type: string
          description: Combination of status code and description for transaction status. Applies to debit and credit cards.
          example: 64-PI LOST
        merchantName:
          maxLength: 25
          type: string
          description: |
            This field contains the name of the merchant associated with the transaction. It is used for identifying the card acceptor during processing, reporting, and reconciliation. Applies to debit and credit cards.
          example: Store1
        transactionAmount:
          type: string
          description: Amount on a particular transaction. Valid format is 0.00. Applies to debit and credit cards.
          example: "1299.00"
        transactionType:
          type: string
          description: "Indicates the type of transaction made on the card. This contains the transactionCode description of status Posted transactions.  \nValid values for Debit -\n- Account Inquiry  \n- Balance Inquiry  \n- Check Cashing  \n- Credit  \n- Debit  \n- Deposit  \n- Deposit Cash Back  \n- Loan to Prepaid  \n- Member Verification  \n- Message  \n- Money Transfer Credit  \n- Money Transfer Dispense  \n- Money Transfer Funding  \n- Money Transfer Initiate  \n- Money Transfer Refund  \n- Payment  \n- Payment Enclosed  \n- Payment to Merchant  \n- PIN Select  \n- Refund from Merchant  \n- Special Purchase  \n- Statement Print  \n- Third Party Bill Payment Return  \n- Transfer  \n- Withdrawal  \nValid Values for Credit when transaction status is Posted - \n- Account Balance Details for MULTRAN Accounts  \n- Account Level Processing Strategy Change Message  \n- Account Transfer  \n- Airline Itinerary  \n- Backdated Cash Advance Finance Charge  \n- Backdated Cash Advance and Sales Adjustment  \n- Backdated Payment Adjustment  \n- Backdated Payment or Cash Advance Adjustment  \n- Backdated Payment Interest Adjustment  \n- Cash Advance  \n- Cash Advance Amount Adjustment  \n- Cash Advance Finance Charge  \n- Cash Advance Finance Charge Refund  \n- Cash Advance Item Charge  \n- Cash Advance Item Charge Refund  \n- Cash Advance Reversal  \n- Charge Off All Finance Charges  \n- Charge Off Billed Cash Advance Item Charges  \n- Charge Off Billed Merchandise Item Charges  \n- Charge Off Billed Late Charges \n- Charge Off Billed Overlimit Fees  \n- Charge Off Cash Advance Interest  \n- Charge Off Credit Life Insurance  \n- Charge Off All Current Cash Advance Interest  \n- Charge Off All Current Merchandise Interest  \n- Charge Off Cycle-to-Date Cash Advance Item Charges  \n- Charge Off Cycle-to-Date Late Charges  \n- Charge Off Cycle-to-Date Merchandise Item Charges  \n- Charge Off Cycle-to-Date Overlimit Fees  \n- Charge Off Merchandise Interest and Service Charges  \n- Charge Off Total Account  \n- Credit Life Insurance Fee Refund  \n- Credit Life Insurance Charge  \n- Fee or Finance Charge Rebate  \n- Finance Charge (item charge)  \n- Interest Earned or Credit Interest  \n- Late Charge  \n- Late Charge Refund  \n- Merchandise Finance Charge  \n- Merchandise Finance Charge Refund  \n- Merchandise Item Charge  \n- Merchandise Item Charge Refund  \n- Merchandise Sale Amount Adjustment  \n- Merchandise Sale Reversal  \n- Overlimit Account Message  \n- Overlimit Charge  \n- Overlimit Charge Refund  \n- Payment  \n- Payment Amount Adjustment  \n- Payment Reversal  \n- Retail Special Details  \n- Return  \n- Return Amount Adjustment  \n- Return Reversal  \n- Reserved for restricted use  \n- Sale  \n- Skip Payment Certificate Message  \n- Service Charge or Statement Charge  \n- Small Balance Charge-off  \n- Special Details  \n- Specific Credit Amount Adjustment  \nTransaction status Pending or Declined for CREDIT -  \n- Account status inquiry service or payment account status inquiry  \n- Account status check via a token provisioning request resulted in an approved response  \n- Account status inquiry service or payment account status inquiry  \n- Activation code notification message for token provisioning via step-up authentication processing  \n- Authorization adjustment  \n- Balance inquiry approved  \n- Cash advance authorization approved  \n- Cash advance authorization approved by expansion  \n- Cash advance authorization approved by name  \n- Cash advance authorization approved by positive identification  \n- Cash advance authorization declined  \n- Cash advance authorization manually declined  \n- Cash authorization approved without issuer contact  \n- Cash referral  \n- Check authorization approved  \n- Check authorization declined  \n- Check system error - declined  \n- Duplicate authorization  \n- In-store return  \n- Issuer’s adjustment  \n- Manual override cash advance authorization  \n- Manual override merchandise authorization  \n- Merchandise authorization approved  \n- Merchandise authorization approved by expansion  \n- Merchandise authorization approved by name  \n- Merchandise authorization approved by positive identification  \n- Merchandise authorization approved without issuer contact  \n- Merchandise authorization declined  \n- Merchandise authorization manually declined  \n- Merchandise referral  \n- Merchandise return adjustment  \n- Merchandise return adjustment declined  \n- Merchandise return approved  \n- Merchandise return declined  \n- Override declined cash advance  \n- Override declined merchandise authorization  \n- Pay unposted check  \n- Permanent authorization adjustment  \n- Permanent authorization request  \n- Preauthorization request approved  \n- Preauthorization request denied  \n- Private label ETC return posted at the time of return  \n- Reserved for restricted use  \n- Return posted check  \n- Return unposted check  \n- Right-time payment  \n- Right-time pay/reversal  \n- Token has been granted, linked to the cardholder account and provisioned  \n- Token maintenance such as activation, deactivation, suspension, exception, or replacement  \n- Token provision decision  \n- Visa and Mastercard person-to-person payment transaction reversal  \n- Visa and Mastercard person-to-person payment transaction decline  \n"
          example: WITHDRAWAL
        messageType:
          maxLength: 4
          type: string
          description: "This field contains the combination of the transaction message type code and its corresponding description. It is used to identify and interpret the nature of the transaction message during processing and reporting. Applies to debit cards only.  \n- 100- Pre-Auth Request  \n- 102- Pre-Auth Reversal  \n- 110- Preauthorization  \n- 120- Pre-Auth Stand In  \n- 121- Pre-Auth Adv Repeat  \n- 130- Auth Advice Resp  \n- 200- Request  \n- 202- Auth Reversal  \n- 210- Auth/Completion  \n- 220- Forced Completion  \n- 221- Advice Repeat  \n- 230- Advice Response  \n- 320- Batch Upload  \n- 330- Batch Upload Resp  \n- 420- Reversal  \n- 421- Advice Rev Repeat  \n- 430- Reversal Response  \n- 500- Batch Settl Request  \n- 510- Batch Settl Resp  \n- 800- Network Mgmt Req  \n- 810- Network Mgmt Resp  \n- 820- Network Mgmt Advice  \n"
          example: 420- Reversal
        transactionStatus:
          type: string
          description: |
            This field indicates the current status of the transaction. It reflects the processing outcome or state assigned by the issuer, network, or system—such as approved, declined, reversed, pending, or completed. The value enables accurate tracking, reconciliation, and reporting of transaction activity throughout its lifecycle.
          example: APPROVED
        responseCode:
          type: string
          description: Authorization response approval or denial code.  Applies to debit and credit cards.
          example: "003"
        responseCodeDescription:
          type: string
          description: This field provide description for response code. Applies to debit and credit cards.
          example: APPROVED - WITH BALANCES
        transactionCode:
          type: string
          description: "Code assigned to particular transaction. This field is not populated in response when transaction status is Posted, instead description is populated in transaction type field. Applies to credit cards only.  \n- 253 - Sale  \n- 254 - Cash Advance  \n- 255 - Return  \n- 256 - Merchandise Sale Reversal  \n- 257 - Cash Advance Reversal  \n- 258 - ReturnReversal  \n- 259 - Merchandise Sale Amount Adjustment  \n- 260 - Cash Advance Amount Adjustment  \n- 261 - Return Amount Adjustment  \n- 271 - Payment  \n- 272 - Payment Reversal  \n- 273 - Payment Amount Adjustment  \n- 280 - Specific Credit Amount Adjustment  \n- 281 - Cash Advance Item Charge Refund  \n- 282 - Late Charge Refund  \n- 283 - Merchandise Finance Charge Refund  \n- 284 - Cash Advance Finance Charge Refund  \n- 285 - Backdated Payment Adjustment  \n- 286 - Merchandise Item Charge Refund  \n- 287 - Overlimit Charge Refund  \n- 288 - Credit Life Insurance Fee Refund  \n- 290 - Backdate Cash Advance and Sales Adjustment  \n- 370 - Small Balance Charge-off  \n- 371 - Charge Off Total Account  \n- 372 - Charge Off Cash Advance Interest  \n- 373 - Charge Off Billed Late Charges  \n- 374 - Charge Off Merchandise Interest and Service Charges  \n- 375 - Charge Off Credit Life Insurance  \n- 376 - Charge Off All Finance Charges  \n- 377 - Charge Off All Current Cash Advance Interest  \n- 378 - Charge Off All Current Merchandise Interest  \n- 379 - Charge Off Cycle-to-Date Late Charges  \n- 380 - Charge Off Billed Cash Advance Item Charges  \n- 381 - Charge Off Billed Merchandise Item Charges  \n- 382 - Charge Off Billed Overlimit Fees  \n- 383 - Charge Off Cycle-to-Date Cash Advance Item Charges  \n- 384 - Charge Off Cycle-to-Date Merchandise Item Charges  \n- 385 - Charge Off Cycle-to-Date Overlimit Fees  \n- 400 - Account Transfer  \n- 900 - Finance Charge (item charge)  \n- 959 - Reserved for restricted use  \n- 960 - Reserved for restricted use  \n- 961 - Late Charge  \n- 962 - Credit Life Insurance Charge  \n- 963 - Cash Advance Finance Charge  \n- 964 - Merchandise Finance Charge  \n- 965 - Overlimit Account Message  \n- 966 - Reserved for restricted use  \n- 967 - Account Level Processing Strategy Change Message  \n- 976 - Reserved for restricted use  \n- 978 - Reserved for restricted use  \n- 979 - Reserved for restricted use  \n- 981 - Account Balance Details for MULTRAN Accounts  \n- 984 - Backdated Cash Advance Finance Charge  \n- 985 - Backdated Payment Interest Adjustment  \n- 986 - Cash Advance Item Charge  \n- 987 - Merchandise Item Charge  \n- 988 - Overlimit Charge  \n- 989 - Interest Earned or Credit Interest  \n- 990 - Service Charge or Statement Charge  \n- 991 - Cash Advance Item Charge  \n- 992 - Fee or Finance Charge Rebate  \n- 993 - Backdated Payment or Cash Advance Adjustment  \n- 994 - Skip Payment Certificate Message  \n- 997 - Retail Special Details  \n- 998 - Airline Itinerary Special Details  \n- 999 - First Data use only.  \nBelow transaction codes and description are for the transaction status Pending or Declined.  \n- AA - Authorization adjustment  \n- AC - Activation code notification message for token provisioning via step-up authentication processing  \n- AK - Check authorization approved.  \n- AP - Preauthorization request approved  \n- AS - Account status inquiry service or payment account status inquiry  \n- CA - Cash advance authorization approved  \n- CD - Cash advance authorization declined  \n- CE - Cash advance authorization approved by expansion  \n- CO - Override declined cash advance  \n- CP - Cash advance authorization approved by positive identification  \n- CS - Cash referral  \n- CT - Cash advance authorization approved by name  \n- CX - Cash advance authorization manually declined  \n- DA - Duplicate authorization  \n- DC - Cash authorization approved without issuer contact  \n- DK - Check authorization declined  \n- DM - Merchandise authorization approved without issuer contact  \n- DP - Preauthorization request denied  \n- EC - Balance inquiry approved  \n- IA - Issuer’s adjustment  \n- IV - Reserved for restricted use  \n- KE - Check system error - declined  \n- KR - Return posted check  \n- MA - Merchandise authorization approved  \n- MC - In-store return  \n- MD - Merchandise authorization declined  \n- ME - Merchandise authorization approved by expansion  \n- MI - Right-time payment  \n- MO - Override declined merchandise authorization  \n- MP - Merchandise authorization approved by positive identification  \n- MR - Right-time pay/reversal  \n- MS - Merchandise referral  \n- MT - Merchandise authorization approved by name  \n- MX - Merchandise authorization manually declined  \n- PA - Permanent authorization request  \n- PK - Pay unposted check  \n- PR - Visa and Mastercard person-to-person payment transaction reversal  \n- PX - Visa and Mastercard person-to-person payment transaction decline  \n- PZ - Permanent authorization adjustment  \n- QA - Merchandise return adjustment  \n- QD - Merchandise return declined  \n- QQ - Reserved for restricted use  \n- QR - Merchandise return approved  \n- QZ - Merchandise return adjustment declined  \n- RK - Return unposted check  \n- TA - Account status check via a token provisioning request resulted in an approved response  \n- TD - Token provision decision  \n- TM - Token maintenance, such as activation, deactivation, suspension, exception, or replacement  \n- TN - Token has been granted, linked to the cardholder account, and provisioned  \n- VA - Private label ETC return posted at the time of return  \n- XC - Manual override cash advance authorization  \n- XM - Manual override merchandise authorization.  \n"
          example: "961"
        declinedTransactionDetails:
          $ref: "#/components/schemas/DeclinedTransactionDetails"
        pendingTransactionDetails:
          $ref: "#/components/schemas/PendingTransactionDetails"
        postedTransactionDetails:
          $ref: "#/components/schemas/PostedTransactionDetails"
        transactionDetails:
          $ref: "#/components/schemas/TransactionDetails"
    TransactionV2:
      type: object
      properties:
        acquirerRefNum:
          maxLength: 23
          type: string
          description: "This field contains the Acquirer Reference Number (ARN) assigned by the payment network based on information provided by the acquirer. It is primarily used for network-level corrections and transaction tracking. The ARN ensures accurate identification of transactions within the network. This field applies specifically to debit cards.   \n"
          example: "222815000031"
        amtCharged:
          type: string
          description: |
            This field contains the transaction amount associated with specific processing scenarios. For
            forced authorization (120) or a forced post-clearing transaction (220), it represents the
            transaction amount. In the case of a partially approved transaction, this is the approved amount.
            The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees.
            For a preauthorization response (110) or an authorization response (210), the amount displayed
            reflects the balance returned in the response, which may be either the ledger balance or the
            available balance. During a partial reversal, Amount 2 indicates the new amount that replaces the
            amount displayed in Amount 1. This field applies specifically to debit cards.
          example: "0.00"
        authorizationCode:
          maxLength: 6
          minLength: 2
          type: string
          description: |
            This field contains the authorization approval code generated for transactions that have been successfully approved. It serves as a unique identifier for the approval and is used for transaction validation and reference in subsequent processing steps. This field applies to both debit and credit cards.
          example: "000000"
        cardType:
          type: string
          description: "This field specifies the type of card associated with the transaction or account, such as debit or credit. It is used to identify the card category for processing and reporting purposes. This field applies to both debit and credit cards."
          example: DEBIT
          enum:
          - CREDIT
          - DEBIT
          - CREDIT_GATEWAY
        eciMastercard:
          maxLength: 35
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI), which provides information about the security level and authentication method used for an electronic commerce transaction. For Debit Mastercard® transactions, the ECI indicates whether the transaction was authenticated and the level of security applied during processing. This field applies specifically to debit cards.  \nPossible Positions 1 and 2 values  \n- 21  -  Channel encryption; cardholder certificate not used  \n- 22  -  Masterpass-generated transaction  \n- 24  -  Digital Secure Remote Payment (DSRP) transaction  \n- 91  -  No security protocol; cardholder certificate not used.  \nPossible Position 3 values  \n- 0  -  Universal cardholder authentication field (UCAF) data collection – Is not supported by the merchant an Identity Check merchant has chosen not to undertake Identity Check on this transaction or identity Check failed authentication and merchant desires to proceed with transaction  \n- 1  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains an attempts AAV  \n- 2  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains a fully authenticated AAV)  \n- 3  -  UCAF data collection is supported by the merchant and UCAF (Mastercard assigned static AAV) must be present  \n- 4  -  Merchant has chosen to share authentication data within authorization; UCAF collection not supported  \n- 5  -  Reserved for future use  \n- 6  -  Merchant Risk-Based Decisioning  \n- 7  -  Partial Shipment or recurring payment; liability depends on the original UCAF values provided and matching with the original transaction  \n"
          example: "3"
        eciVisa:
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI) for Visa transactions, which provides information about the security level and authentication method used during an electronic commerce Visa Check transaction. The ECI helps determine whether the transaction was authenticated and the level of security applied. This field applies specifically to debit cards.  \nPosition 4 - Mail/Phone/Electronic Commerce and Payment Indicator  \n- Space - POS Customer Present (POS Check Service Only)  \n- 1 - Single transaction of a mail/phone order  \n- 2 - Recurring transaction  \n- 3 - Installment payment  \n- 4 - Unknown classification/Other mail order  \n- 5 - Secure electronic commerce transaction  \n- 6 - Non-authenticated security transaction at a 3-D Secure-capable merchant, and merchant attempted to authenticate the cardholder using 3-D Secure  \n- 7 - Non-authenticated security transaction  \n- 8 - Non-secure transaction  \n"
          example: "3"
        effectiveDate:
          type: string
          description: |
            This field contains the date when the transaction became effective. It represents the official effective date for the transaction and is used for settlement and reporting purposes. The value should accurately reflect the date the transaction was finalized. This field applies specifically to credit cards.
          format: date
          example: 0010-04-14
        expirationDateMismatch:
          type: string
          description: |
            This field indicates whether an expiration date mismatch exists between the provided card details and the issuer’s records. It is used for validation during transaction processing to ensure card data accuracy. This field applies specifically to debit cards.
          example: "N"
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing. Applies to debit cards."
          format: numeric
          example: "0"
          default: "0"
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: |
            This field contains the Merchant Category Code (MCC) associated with the transaction. The MCC is a nationally recognized code that classifies the card acceptor’s type of business, product, or service for reporting and processing purposes. This field applies to both debit and credit cards.
          example: "0000"
        merchantCity:
          maxLength: 16
          type: string
          description: |
            This field contains the Regulation E location details, specifically the city and state where the terminal involved in the transaction is located. It is used for compliance and reporting purposes under Regulation E requirements. This field applies to both debit and credit cards.
          example: MORRIS PLAINS
        merchantName:
          maxLength: 25
          type: string
          description: |
            This field contains the name of the merchant associated with the transaction. It is used for identifying the card acceptor during processing, reporting, and reconciliation. This field applies to both debit and credit cards.
          example: STORE1
        merchantState:
          maxLength: 3
          minLength: 2
          type: string
          description: "This field contains the state where the merchant associated with the transaction is located. It is used for identifying the merchant’s geographic location for processing, reporting, and compliance purposes. This field applies to both debit and credit cards.  \nAL Alabama | AK Alaska | AS American Samoa (US Territory) | AZ Arizona | AR Arkansas  \nCA California | CO Colorado | CT Connecticut | DE Delaware | DC District of Columbia  \nFM Federated States of Micronesia (US Territory) | FSM Federated States of Micronesia (US Territory)  \nFL Florida | GA Georgia | GU Guam (US Territory) | GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada | NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina | SD South Dakota | TN Tennessee | TX Texas | UT Utah  \nVT Vermont | VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin | WY Wyoming  \n"
          example: NJ
        messageType:
          maxLength: 4
          type: string
          description: "This field contains the combination of the transaction message type code and its corresponding description. It is used to identify and interpret the nature of the transaction message during processing and reporting. This field applies specifically to debit cards.  \n- 100- Pre-Auth Request  \n- 102- Pre-Auth Reversal  \n- 110- Preauthorization  \n- 120- Pre-Auth Stand In  \n- 121- Pre-Auth Adv Repeat  \n- 130- Auth Advice Resp  \n- 200- Request  \n- 202- Auth Reversal  \n- 210- Auth/Completion  \n- 220- Forced Completion  \n- 221- Advice Repeat  \n- 230- Advice Response  \n- 320- Batch Upload  \n- 330- Batch Upload Resp  \n- 420- Reversal  \n- 421- Advice Rev Repeat  \n- 430- Reversal Response  \n- 500- Batch Settl Request  \n- 510- Batch Settl Resp  \n- 800- Network Mgmt Req  \n- 810- Network Mgmt Resp  \n- 820- Network Mgmt Advice  \n"
          example: 210- Auth/Completion
        networkID:
          type: string
          description: |
            This field specifies the payment network to be used for transmitting the transaction message. The selected network determines the applicable program rules and processing guidelines for the transaction. This field applies specifically to debit cards.
          example: 773002 - Maestro
        pinTransaction:
          type: string
          description: |
            This field indicates whether a Personal Identification Number (PIN) was used during the transaction. Valid values are “Yes” or “No”, reflecting whether PIN authentication occurred at the time of purchase or authorization. This field applies specifically to debit cards.
          example: 1 - Yes
        posDataInputCapability:
          maxLength: 1
          type: string
          description: "This field indicates the capability of the terminal to manually enter the card number and expiration date into the system. It reflects whether the terminal supports key‑entry functionality as part of the card data capture process. This field applies specifically to debit cards. Valid values are- 0  Unknown / Not specified 1  Manual entry only 2  Magnetic stripe read 3  Manual + Magnetic stripe 4  Chip (ICC) capable 5  Manual + Chip 6  Magnetic stripe + Chip 7  Manual + Magnetic stripe + Chip 8  Contactless capable 9  All capabilities (Manual, Magstripe, Chip, Contactless) Some APIs (like CyberSource or Fiserv) use a two-digit numeric or bit-mapped representation to indicate multiple capabilities."
          example: "2"
        posDataInputMode:
          type: string
          description: |
            This field indicates the method used to capture card information at the terminal. It identifies how the card data—such as card number and expiration date—was entered, whether through swipe, dip, tap, manual key entry, or another input method supported by the terminal. This field applies specifically to debit cards.
            Valid values:
              00  Unspecified
              01  Manual
              02  Swipe
              03  Barcode
              04  OCR
              05  Chip
              06  Key Entered
              07  Contactless Chip
              81  Credential on file / e-commerce transaction
              90  Contactless Magstripe
          example: 2 - Swipe
        preAuthAmt:
          type: string
          description: |
            This field contains the transaction amount returned in specific processing scenarios. For a preauthorization response (110) or an authorization response (210), it represents the amount associated with the response. In the case of a partially approved transaction, this value reflects the amount that was approved. For a denied transaction, it contains the originally requested amount. The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees. For a forced post preauthorization (120) or a forced post clearing transaction (220), the clearing amount shown in Amount 2 is duplicated in Amount 1. During a reversal, Amount 1 represents the amount to be reversed. This field applies specifically to debit cards.
          example: "1.00"
        responseCode:
          type: string
          description: "This field contains the authorization response code indicating whether the transaction was approved or denied. It is used to identify the outcome of the authorization request and assist in subsequent processing, reconciliation, and issuer decisioning. This field applies to both debit and credit cards. Some of the common codes are as below. For detailed list please refer ISO8583 document.\nCodes and Values: \n\n0  Approved / Completed successfully\n5  Do not honor\n12  Invalid transaction\n14  Invalid card number\n51  Insufficient funds\n54  Expired card\n91  Issuer or switch inoperative\n96  System malfunction\n"
          example: "000"
        responseCodeDescription:
          type: string
          description: |
            This field provides the descriptive text corresponding to the authorization response code. It explains the meaning of the response returned by the issuer or network, helping to identify the reason for an approval, denial, or other authorization outcome. This field applies to both debit and credit cards.
          example: APPROVED - NO BALANCES
        retrievalRefNumber:
          maxLength: 12
          type: string
          description: |
            This field contains the reference number supplied and retained by the message originator. It serves as an identifier used to track or correlate the transaction throughout processing. The value may be up to 12 characters in length. This field applies specifically to debit cards.
          format: numeric
          example: "222815000031"
        sequenceNumber:
          maxLength: 6
          type: string
          description: |
            This field contains the chronological numeric identifier assigned to the transaction by the terminal. It is used to uniquely identify the transaction within the terminal’s sequence of processed messages and supports tracking, reconciliation, and audit functions. This field applies specifically to debit cards.
          format: numeric
          example: "000031"
        statusDescription:
          type: string
          description: |
            This field contains the combination of the transaction status code and its corresponding description. It is used to identify and interpret the final status of the transaction for processing, reporting, and reconciliation purposes. This field applies to both debit and credit cards.
          example: 64-PI LOST
        subResponseCode:
          type: string
          description: |
            This field contains an optional one‑character value that provides additional detail for specific denial codes. It is case‑sensitive, and its meaning varies based on the combination of the authorization response code and the response sub‑code. This field is used to further refine the reason for a denial when applicable. This field applies specifically to debit cards.
          example: M
        subResponseCodeDescription:
          type: string
          description: |
            This field provides the descriptive text associated with the sub‑response code. It explains the meaning of the sub‑code returned during authorization processing and helps further clarify the reason behind an approval, denial, or other response outcome. This field applies specifically to debit cards.
          example: 96-M Error processing PIN
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field contains the identifier for the terminal where the transaction was performed. It is used to uniquely distinguish the originating terminal for processing, tracking, and audit purposes. This field applies specifically to debit cards.
          format: alphanumeric
          example: VMDHDB03
        transactedCardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field contains the card number associated with a monetary (posted) transaction, if available. If the card number is not provided for the transaction, the field remains blank. It is used to identify the card tied to the posted transaction for processing and reporting purposes. This field applies specifically to credit cards.
          example: 400020XXXXXX4000
        transactionAmount:
          type: string
          description: |
            This field specifies the monetary amount associated with the transaction, represented in the 0.00 decimal format. It captures the exact value processed for the card operation and is required to ensure accurate authorization, posting, and reconciliation. This field applies to both debit and credit cards.
          example: "20.00"
        transactionCode:
          type: string
          description: "This field contains the code assigned to the specific transaction for identification and processing purposes. When the transaction status is Posted, this field is not returned in the response; instead, the corresponding description is provided in the transactionType field. This field applies to credit cards only.  \n- 253 - Sale  \n- 254 - Cash Advance  \n- 255 - Return  \n- 256 - Merchandise Sale Reversal  \n- 257 - Cash Advance Reversal  \n- 258 - ReturnReversal  \n- 259 - Merchandise Sale Amount Adjustment  \n- 260 - Cash Advance Amount Adjustment  \n- 261 - Return Amount Adjustment  \n- 271 - Payment  \n- 272 - Payment Reversal  \n- 273 - Payment Amount Adjustment  \n- 280 - Specific Credit Amount Adjustment  \n- 281 - Cash Advance Item Charge Refund  \n- 282 - Late Charge Refund  \n- 283 - Merchandise Finance Charge Refund  \n- 284 - Cash Advance Finance Charge Refund  \n- 285 - Backdated Payment Adjustment  \n- 286 - Merchandise Item Charge Refund  \n- 287 - Overlimit Charge Refund  \n- 288 - Credit Life Insurance Fee Refund  \n- 290 - Backdate Cash Advance and Sales Adjustment  \n- 370 - Small Balance Charge-off  \n- 371 - Charge Off Total Account  \n- 372 - Charge Off Cash Advance Interest  \n- 373 - Charge Off Billed Late Charges  \n- 374 - Charge Off Merchandise Interest and Service Charges  \n- 375 - Charge Off Credit Life Insurance  \n- 376 - Charge Off All Finance Charges  \n- 377 - Charge Off All Current Cash Advance Interest  \n- 378 - Charge Off All Current Merchandise Interest  \n- 379 - Charge Off Cycle-to-Date Late Charges  \n- 380 - Charge Off Billed Cash Advance Item Charges  \n- 381 - Charge Off Billed Merchandise Item Charges  \n- 382 - Charge Off Billed Overlimit Fees  \n- 383 - Charge Off Cycle-to-Date Cash Advance Item Charges  \n- 384 - Charge Off Cycle-to-Date Merchandise Item Charges  \n- 385 - Charge Off Cycle-to-Date Overlimit Fees  \n- 400 - Account Transfer  \n- 900 - Finance Charge (item charge)  \n- 959 - Reserved for restricted use  \n- 960 - Reserved for restricted use  \n- 961 - Late Charge  \n- 962 - Credit Life Insurance Charge  \n- 963 - Cash Advance Finance Charge  \n- 964 - Merchandise Finance Charge  \n- 965 - Overlimit Account Message  \n- 966 - Reserved for restricted use  \n- 967 - Account Level Processing Strategy Change Message  \n- 976 - Reserved for restricted use  \n- 978 - Reserved for restricted use  \n- 979 - Reserved for restricted use  \n- 981 - Account Balance Details for MULTRAN Accounts  \n- 984 - Backdated Cash Advance Finance Charge  \n- 985 - Backdated Payment Interest Adjustment  \n- 986 - Cash Advance Item Charge  \n- 987 - Merchandise Item Charge  \n- 988 - Overlimit Charge  \n- 989 - Interest Earned or Credit Interest  \n- 990 - Service Charge or Statement Charge  \n- 991 - Cash Advance Item Charge  \n- 992 - Fee or Finance Charge Rebate  \n- 993 - Backdated Payment or Cash Advance Adjustment  \n- 994 - Skip Payment Certificate Message  \n- 997 - Retail Special Details  \n- 998 - Airline Itinerary Special Details  \n- 999 - First Data use only.  \nBelow transaction codes and description are for the transaction status Pending or Declined.  \n- AA - Authorization adjustment  \n- AC - Activation code notification message for token provisioning via step-up authentication processing  \n- AK - Check authorization approved.  \n- AP - Preauthorization request approved  \n- AS - Account status inquiry service or payment account status inquiry  \n- CA - Cash advance authorization approved  \n- CD - Cash advance authorization declined  \n- CE - Cash advance authorization approved by expansion  \n- CO - Override declined cash advance  \n- CP - Cash advance authorization approved by positive identification  \n- CS - Cash referral  \n- CT - Cash advance authorization approved by name  \n- CX - Cash advance authorization manually declined  \n- DA - Duplicate authorization  \n- DC - Cash authorization approved without issuer contact  \n- DK - Check authorization declined  \n- DM - Merchandise authorization approved without issuer contact  \n- DP - Preauthorization request denied  \n- EC - Balance inquiry approved  \n- IA - Issuer’s adjustment  \n- IV - Reserved for restricted use  \n- KE - Check system error - declined  \n- KR - Return posted check  \n- MA - Merchandise authorization approved  \n- MC - In-store return  \n- MD - Merchandise authorization declined  \n- ME - Merchandise authorization approved by expansion  \n- MI - Right-time payment  \n- MO - Override declined merchandise authorization  \n- MP - Merchandise authorization approved by positive identification  \n- MR - Right-time pay/reversal  \n- MS - Merchandise referral  \n- MT - Merchandise authorization approved by name  \n- MX - Merchandise authorization manually declined  \n- PA - Permanent authorization request  \n- PK - Pay unposted check  \n- PR - Visa and Mastercard person-to-person payment transaction reversal  \n- PX - Visa and Mastercard person-to-person payment transaction decline  \n- PZ - Permanent authorization adjustment  \n- QA - Merchandise return adjustment  \n- QD - Merchandise return declined  \n- QQ - Reserved for restricted use  \n- QR - Merchandise return approved  \n- QZ - Merchandise return adjustment declined  \n- RK - Return unposted check  \n- TA - Account status check via a token provisioning request resulted in an approved response  \n- TD - Token provision decision  \n- TM - Token maintenance, such as activation, deactivation, suspension, exception, or replacement  \n- TN - Token has been granted, linked to the cardholder account, and provisioned  \n- VA - Private label ETC return posted at the time of return  \n- XC - Manual override cash advance authorization  \n- XM - Manual override merchandise authorization.\n"
          example: "961"
        transactionDateTime:
          type: string
          description: |
            This field captures the date and time at which the transaction was created. It records the precise timestamp used for transaction logging, auditing, and reporting. This field applies to both debit and credit cards.
          format: date-time
          example: 2021-10-15T17:13:14Z
        transactionId:
          type: string
          description: |
            This field represents the unique system‑generated identifier associated with the record. It is used to track, reference, and retrieve the specific card record within internal systems for processing and audit purposes. This field applies to debit cards only. It is combination of lifecyclekey, active key and DUID.
          example: "{\"lifeCycleKey\":\"12323301232312331\",\"activeKey\":\"0210\",\"duID\":\"11348539120200526\"}"
        transactionStatus:
          type: string
          description: |
            This field indicates the current status of the transaction, representing the outcome or processing stage of the card activity. For debit card transactions, valid values include APPROVED, REVERSED, and DECLINED. For credit card transactions, valid values include POSTED, PENDING, DECLINED, APPROVED, and REVERSED.
          example: APPROVED
        transactionType:
          type: string
          description: "This field specifies the type of transaction performed on the card, describing the nature of the card activity for reporting and processing purposes. For transactions with a status of Posted, this field contains the descriptive value corresponding to the transactionCode returned for other statuses.  \nValid values for Debit -\n- Account Inquiry  \n- Balance Inquiry  \n- Check Cashing  \n- Credit  \n- Debit  \n- Deposit  \n- Deposit Cash Back  \n- Loan to Prepaid  \n- Member Verification  \n- Message  \n- Money Transfer Credit  \n- Money Transfer Dispense  \n- Money Transfer Funding  \n- Money Transfer Initiate  \n- Money Transfer Refund  \n- Payment  \n- Payment Enclosed  \n- Payment to Merchant  \n- PIN Select  \n- Refund from Merchant  \n- Special Purchase  \n- Statement Print  \n- Third Party Bill Payment Return  \n- Transfer  \n- Withdrawal  \nValid Values for Credit when transaction status is Posted - \n- Account Balance Details for MULTRAN Accounts  \n- Account Level Processing Strategy Change Message  \n- Account Transfer  \n- Airline Itinerary  \n- Backdated Cash Advance Finance Charge  \n- Backdated Cash Advance and Sales Adjustment  \n- Backdated Payment Adjustment  \n- Backdated Payment or Cash Advance Adjustment  \n- Backdated Payment Interest Adjustment  \n- Cash Advance  \n- Cash Advance Amount Adjustment  \n- Cash Advance Finance Charge  \n- Cash Advance Finance Charge Refund  \n- Cash Advance Item Charge  \n- Cash Advance Item Charge Refund  \n- Cash Advance Reversal  \n- Charge Off All Finance Charges  \n- Charge Off Billed Cash Advance Item Charges  \n- Charge Off Billed Merchandise Item Charges  \n- Charge Off Billed Late Charges \n- Charge Off Billed Overlimit Fees  \n- Charge Off Cash Advance Interest  \n- Charge Off Credit Life Insurance  \n- Charge Off All Current Cash Advance Interest  \n- Charge Off All Current Merchandise Interest  \n- Charge Off Cycle-to-Date Cash Advance Item Charges  \n- Charge Off Cycle-to-Date Late Charges  \n- Charge Off Cycle-to-Date Merchandise Item Charges  \n- Charge Off Cycle-to-Date Overlimit Fees  \n- Charge Off Merchandise Interest and Service Charges  \n- Charge Off Total Account  \n- Credit Life Insurance Fee Refund  \n- Credit Life Insurance Charge  \n- Fee or Finance Charge Rebate  \n- Finance Charge (item charge)  \n- Interest Earned or Credit Interest  \n- Late Charge  \n- Late Charge Refund  \n- Merchandise Finance Charge  \n- Merchandise Finance Charge Refund  \n- Merchandise Item Charge  \n- Merchandise Item Charge Refund  \n- Merchandise Sale Amount Adjustment  \n- Merchandise Sale Reversal  \n- Overlimit Account Message  \n- Overlimit Charge  \n- Overlimit Charge Refund  \n- Payment  \n- Payment Amount Adjustment  \n- Payment Reversal  \n- Retail Special Details  \n- Return  \n- Return Amount Adjustment  \n- Return Reversal  \n- Reserved for restricted use  \n- Sale  \n- Skip Payment Certificate Message  \n- Service Charge or Statement Charge  \n- Small Balance Charge-off  \n- Special Details  \n- Specific Credit Amount Adjustment  \nTransaction status Pending or Declined for CREDIT -  \n- Account status inquiry service or payment account status inquiry  \n- Account status check via a token provisioning request resulted in an approved response  \n- Account status inquiry service or payment account status inquiry  \n- Activation code notification message for token provisioning via step-up authentication processing  \n- Authorization adjustment  \n- Balance inquiry approved  \n- Cash advance authorization approved  \n- Cash advance authorization approved by expansion  \n- Cash advance authorization approved by name  \n- Cash advance authorization approved by positive identification  \n- Cash advance authorization declined  \n- Cash advance authorization manually declined  \n- Cash authorization approved without issuer contact  \n- Cash referral  \n- Check authorization approved  \n- Check authorization declined  \n- Check system error - declined  \n- Duplicate authorization  \n- In-store return  \n- Issuer’s adjustment  \n- Manual override cash advance authorization  \n- Manual override merchandise authorization  \n- Merchandise authorization approved  \n- Merchandise authorization approved by expansion  \n- Merchandise authorization approved by name  \n- Merchandise authorization approved by positive identification  \n- Merchandise authorization approved without issuer contact  \n- Merchandise authorization declined  \n- Merchandise authorization manually declined  \n- Merchandise referral  \n- Merchandise return adjustment  \n- Merchandise return adjustment declined  \n- Merchandise return approved  \n- Merchandise return declined  \n- Override declined cash advance  \n- Override declined merchandise authorization  \n- Pay unposted check  \n- Permanent authorization adjustment  \n- Permanent authorization request  \n- Preauthorization request approved  \n- Preauthorization request denied  \n- Private label ETC return posted at the time of return  \n- Reserved for restricted use  \n- Return posted check  \n- Return unposted check  \n- Right-time payment  \n- Right-time pay/reversal  \n- Token has been granted, linked to the cardholder account and provisioned  \n- Token maintenance such as activation, deactivation, suspension, exception, or replacement  \n- Token provision decision  \n- Visa and Mastercard person-to-person payment transaction reversal  \n- Visa and Mastercard person-to-person payment transaction decline  \n"
          example: WITHDRAWAL
        unmatchedCompletionFlag:
          type: string
          description: |
            This field indicates whether the transaction is marked with an unmatched completion flag, used to identify transactions where the completion record does not correspond to a previously authorized transaction. This field applies to debit cards only.
          example: "N"
        debitOnly:
          $ref: "#/components/schemas/debitOnlyTransactionV2"
        creditOnly:
          $ref: "#/components/schemas/creditOnlyTransactionV2"
    TransactionV3:
      type: object
      properties:
        transactionSummary:
          $ref: "#/components/schemas/TransactionSummaryV3"
        transactionDetails:
          $ref: "#/components/schemas/TransactionDetailsV3"
    TransactionV4:
      type: object
      properties:
        transactionSummary:
          $ref: "#/components/schemas/TransactionSummaryV4"
        transactionDetails:
          $ref: "#/components/schemas/TransactionDetailsV4"
    DeclinedTransactionDetails:
      type: object
      properties:
        transactionAccountNumber:
          type: string
          description: "In case of Credit, this field value differs. This is card used for Auth and account number/card number in case of Posted transactions."
        transactionDescription:
          type: string
          description: Description of the transaction.
        merchantCategoryCode:
          type: string
          description: "Merchant category code (MCC) associated with the transaction. National code that classifies the card acceptor’s type of business, product, or service"
          example: "6011"
        merchantNumber:
          type: string
          description: Identifies the merchant where the transaction originated.
        transactionCode:
          type: string
          description: Specific code provided for each transaction.
          example: ME
        declinedReasonCode:
          type: string
          description: Reason code and description for declined transactions.
          example: 64-PI LOST
        expandedReasonCode:
          type: string
          description: Code for expanded reason.
        authorizationResponseDescription:
          type: string
          description: Description of the authorization response.
      description: Tag applies to credit cards only.
    PendingTransactionDetails:
      type: object
      properties:
        transactionAccountNumber:
          type: string
          description: "In case of Credit, this field value differs. This is card used for Auth and account number/card number in case of Posted transactions."
        transactionDescription:
          type: string
          description: Describes the transaction.
        merchantCategoryCode:
          type: string
          description: "Merchant category code (MCC) associated with the transaction. National code that classifies the card acceptor’s type of business, product, or service"
        merchantNumber:
          type: string
          description: Identifies the merchant where the transaction originated.
        posEntryModeCode:
          type: string
          description: Point of Sale (POS) entry mode code
        enteredExpirationDate:
          type: string
          description: Entered expiration date.
        authorizationCode:
          type: string
          description: Authorization approval code for the transaction.
        transactionCode:
          type: string
          description: Code associated with particular transaction.
        declinedReasonCode:
          type: string
          description: Reason code for declined transaction.
        expandedReasonCode:
          type: string
          description: The expanded reason code.
        originalAuthAdjustmentAmount:
          type: string
          description: "Any adjustment done on original authorized amount. For an example, if authorized amount is 100 and transaction amount is 60, 40 is the adjustment amount."
      description: Tag applies to credit cards only.
    PostedTransactionDetails:
      type: object
      properties:
        transactionAccountNumber:
          type: string
          description: "In case of Credit, this field value differs. This is card used for Auth and account number/card number in case of Posted transactions."
        cardholderAccountNumber:
          type: string
          description: The cardholderAccountNumber is used as control account number in case of consolidated billing on subordinate account transaction.
        transactionDescription:
          type: string
          description: Description of transaction
        promotionId:
          type: string
          description: Identifies the promotion to which the transaction was posted.
        authorizationCode:
          type: string
          description: 5- or 6-digit code provided by the issuer or its agent to indicate approval of the transaction.
        postingDate:
          type: string
          description: Posting date of the transaction.
          format: date
        detailTransactionIdentifier:
          type: string
          description: Detail about transaction id
        referenceNumber:
          type: string
          description: Reference number assigned to the transaction.
        originalAuthAdjustmentAmount:
          type: string
          description: "Any adjustment done on original authorized amount. For an example if authorized amount is 100 and transaction is 60, 40 is the adjustment amount."
        merchantCategoryCode:
          type: string
          description: "Merchant category code (MCC) associated with the transaction. National code that classifies the card acceptor’s type of business, product, or service"
        merchantNumber:
          type: string
          description: Identifies the merchant where the transaction originated.
        transactionCode:
          type: string
          description: Specific code provided for each transaction.
      description: Tag applies to credit cards only.
    TransactionDetails:
      type: object
      properties:
        entryMode:
          type: string
          description: Method used to input the information from the card to the terminal.
          example: 2 - Swipe
        enteredExpirationDate:
          type: string
          description: Expiration date entered for the transaction.
          format: MMYY
          example: "1122"
        pinTransaction:
          type: string
          description: "This field indicates whether a Personal Identification Number (PIN) was used to authenticate the transaction. Valid values are “Yes” or “No,” specifying the presence or absence of PIN-based verification."
          example: 1 - Yes
        terminalPinCapable:
          type: string
          description: Indicates the ability of the terminal to accept PIN.
          example: "No"
        international:
          type: string
          description: Indicates if the transaction was international.
          example: "No"
        eCommerce:
          type: string
          description: Indicates if the transaction was eCommerce.
        avsResult:
          type: string
          description: "Address verification service result.Applies to debit cards only. \nValid Values-\nA  Address matches, ZIP/postal code does not\nB  Street address matches, postal code in wrong format\nC  Street address and postal code in wrong format\nD  Street address and postal code match (international issuer)\nE  Error response for Merchant Category Code\nF  Cardholder name incorrect, address matches\nG  Card issued by a non-US issuer that does not participate in AVS\nI  Address information not verified by international issuer\nM  Street address and postal code match (international issuer)\nN  No match on address or ZIP/postal code\nO  Cardholder name and billing address match\nP  Postal code matches, street address not verified due to incompatible formats\nR  Retry – system timed out or unavailable\nS  Service not supported by issuer\nU  Address information is unavailable\nW  Nine-digit ZIP code matches, address does not\nX  Exact AVS match – address and nine-digit ZIP code match\nY  Address and five-digit ZIP code match\nZ  Five-digit ZIP code matches, address does not\n"
          example: A
        avsAddress:
          type: string
          description: Address provided for address verification.
        settlementAmount:
          type: string
          description: Amount paid to merchant.
          example: "1100.00"
          x-encrypted: "N"
        transactionfeeAmount:
          type: string
          description: Fee amount charged on transaction.
          example: "20.00"
        transactionCurrencyCode:
          type: string
          description: Currency code for transaction amount.
        settlementCurrencyCode:
          type: string
          description: "This field specifies the currency code associated with the settlement amount. It identifies the currency in which the transaction is settled between the issuer, acquirer, and payment network, and is used for clearing, settlement, and reconciliation processes."
          example: "840"
        settlementConversionRate:
          type: string
          description: Conversion Rate applied on settlement amount.
        reversalreason:
          type: string
          description: Reason for reversal transaction.
        referenceNumber:
          type: string
          description: Reference number assigned to the transaction.
        cardSequenceNumber:
          type: string
          description: Card Sequence Number distinguishes among separate cards having the same PAN.
        authorizationCode:
          type: string
          description: Authorization approval code for the transaction.
        detailTransactionIdentifier:
          type: string
          description: Detail about transaction identifier of particular transactions.
        pinVerified:
          type: string
          description: Indicates if PIN verification took place on the client platform.
        availableUsage:
          type: string
          description: Amount of available credit on the account.
        transactionAmtoriginal:
          type: string
          description: Original amount of funds requested by the cardholder in the transaction currency (US Dollars). This amount includes cashback and surcharge fees and is exclusive of ISA and CCA fees.
        systemAudit:
          type: string
          description: Number a message initiator assigns to uniquely identify a transaction.
        messageId:
          type: string
          description: Identifier for the ISO message type used for this transaction.
        fraudDecision:
          type: string
          description: Decision returned by the third-party fraud interface.
        falconScore:
          type: string
          description: Score assigned by third-party fraud interface for authorization sent online.
        merchantCode:
          maxLength: 4
          type: string
          description: "This field indicates the Merchant Category Code (MCC) associated with the transaction. The MCC identifies the type of goods or services provided by the merchant and is used for authorization processing, fraud‑risk assessment, rewards eligibility, and reporting across card networks."
          format: numeric
          example: "6011"
        acquiringCountryCode:
          type: string
          description: Code of the country where the acquiring institution is located.
        posMode:
          type: string
          description: Numeric codes to indicate the method by which the PAN was entered into the interchange system and to indicate the POS terminal PIN entry capabilities.
        posCode:
          type: string
          description: Identifies the Point of Service   condition code. It describes the condition under which the transaction took place at POS.
        acquiringId:
          maxLength: 11
          minLength: 5
          type: string
          description: "This field specifies the Acquiring Institution Identification Code, which uniquely identifies the acquiring institution or merchant bank responsible for processing the transaction. The valid length ranges vary by network- MasterCard requires 5 to 11 digits, while Visa requires 6 to 11 digits. Applies to both Debit and Credit cards."
          example: "10111111119"
        cardAcceptorTermId:
          type: string
          description: Identifies a terminal at the card acceptor location of acquiring institutions or merchant POS systems. The terminal ID should be printed on all transaction receipts in ATM and POS transactions where the terminal is capable of generating customer receipts.
        cardAcceptorIdCode:
          type: string
          description: "This field specifies the identification number assigned to the establishment where the transaction was acquired. It uniquely identifies the merchant location for processing, settlement, and reporting purposes."
          example: "123456"
        cardAcceptorName:
          type: string
          description: Indicates the name of the establishment where the transaction was acquired.
        cardAcceptorCity:
          type: string
          description: Indicates the city where the call originated.
        cavvResult:
          type: string
          description: "Indicates the Cardholder Authentication Verification Value (CAVV) results code that identifies the outcome of CAVV validation. The value in field also indicates who performed the authentication, either Visa or the issuer, and the classification of the transaction."
        cvvResult:
          type: string
          description: "This field specifies the outcome of the Card Verification Value (CVV) validation, indicating whether the CVV provided during the transaction matched the issuer’s records. It is used to confirm card authenticity and support fraud‑prevention checks during authorization."
          example: "false"
        originalResponseCode:
          type: string
          description: "Original response code from the original transaction. For an instance, when V.I.P. encounters a duplicate transaction, this field contains the field 39 response code from the original transaction."
        additionalData1:
          type: string
          description: Any optional data received on the response.
        additionalData2:
          type: string
          description: Any optional data received on the response.
        avsOptionCode:
          type: string
          description: Address Verification Service (AVS) Request indicates that verification of the cardholder billing address is requested in the authorization message.
        cvcResultCode:
          type: string
          description: The result code of CVC (Card Verification Code).
        tagData:
          type: string
          description: Identifies the electronic commerce indicators representing the security level and cardholder authentication associated with the transaction.
        tagCode:
          type: string
          description: Indicates whether the merchant terminal supports a specific program or service.
        tagSvcRsn:
          type: string
          description: "Notifies the issuer of the On-behalf Service performed on the transaction and the results. Sub element,71 will support up to ten services for a transaction."
        terminalIndicator:
          type: string
          description: This field maps to Field 55 Tag 95— Terminal Verification Results.This Tag maps to Field 131—Terminal Verification Results (TVR).Field 131 is carried in VSDC transactions and contains indicators from a terminal perspective.  The terminal records the results of offline and online processing by setting a series of indicators in this field.   These indicators are available to clients in the online message and clearing transaction.
        riskCodeOne:
          type: string
          description: "Field 62.22, positions 1-2 is a Visa private-use field that contains additional Advanced Authorization online risk assessment information to assist issuers in the authorization decision-making process. The condition codes provide descriptive information for high-risk assessments.These positions may contain a Compromised Account Risk Condition Code (CARCC) related to a high-risk even in the Compromised Account Management System (CAMS)."
        riskCodeTwo:
          type: string
          description: "Field 62.22, positions 3-4 is a Visa private-use field that contains additional Advanced Authorization online risk assessment information to assist issuers in the authorization decision-making process. The condition codes provide descriptive information for high-risk assessments.These positions may contain a Compromised Event Reference (CER) ID related to a high-risk CAMS event."
        riskCodeThree:
          type: string
          description: "Field 62.22, positions 5-6 is a Visa private-use field that contains additional Advanced Authorization online risk assessment information to assist issuers in the authorization decision-making process. The condition codes provide descriptive information for high-risk assessments."
        riskReasonCodeOne:
          type: string
          description: "Field 62.21, position 3 is.an alphanumeric combination that will act as a key to explain the risk score model."
        riskReasonCodeTwo:
          type: string
          description: "Field 62.21, position 4 is an alphanumeric combination that will act as a key to explain the risk score model."
        riskScore:
          type: string
          description: "Field 62.21, positions 1-2 is a Visa private-use field that contains online risk assessment information from Advanced Authorization. This information assists issuers in the authorization decision-making process.This value indicates the degree of risk associated with a transaction. This two-byte transaction risk score is represented by a numeric value from 01–99."
        messageReasonCode:
          type: string
          description: "Code explaining the reason for an online acquirer advice, reversal, or partial reversal."
        networkID:
          type: string
          description: |
            This field specifies the payment network to be used for transmitting the transaction message. The selected network determines the applicable program rules and processing guidelines for the transaction.
        mcOriginalTypeId:
          type: string
          description: Original type id
        mcOriginalRef:
          type: string
          description: Original reference with the merchant.
        avsPostalCode:
          type: string
          description: Identifies the cardholder postal code and street address that is used for certain types of verification.
        cvvCVVtwo:
          type: string
          description: The CVV2/CVC2 value that is printed on the signature panel of Visa and Mastercard plastics. This value is made available for issuers that want to validate the CVV2/CVC2 value themselves. The value will only be passed to an issuer if provided by the acquirer.  Provided transactions in which the debit card is not present.
        applicationTranCounter:
          type: string
          description: |
            This field contains a count of the transactions performed within the card application. The count is incremented by one each time a transaction is initiated.
            Multiple authorization requests for the same transaction will have the same ATC; for example, when online PIN fails and the next authorization represents a different PIN try for the same transaction, the ATC will be the same. For reversals and advices, the ATC is the value from the original message.
            This field maps to Field 55, Tag 9F36—Applicaton Transaction Counter. Applies to both Debit and Credit cards.
          example: "01"
        appInterchangeProfile:
          type: string
          description: "Field 138 is carried in VSDC transactions and provides a series of indicators that reflect the specific functions supported by the chip card account, for example, whether cardholder verification is supported.This field maps to Field 55, Tag 82—Application Interchange Profile."
        terminalCountryCode:
          type: string
          description: "This field is carried in VISA SMART DEBIT SMART CREDIT (VSDC) transactions and identifies the country where the merchant terminal is located. A leading zero is required to pad the first unused half-byte of this field. The zero is filler and is not part of the code.This field maps to Field 55, Tag 9F1A—Terminal Country Code."
        stateCode:
          type: string
          description: Originating Center State Postal Code
        generalDetails:
          $ref: "#/components/schemas/GeneralDetails"
        amountDetails:
          $ref: "#/components/schemas/AmountDetails"
        networkInfo:
          $ref: "#/components/schemas/NetworkInfo"
        tokenAndEmvInfo:
          $ref: "#/components/schemas/TokenAndEmvInfo"
        riskInfo:
          $ref: "#/components/schemas/RiskInfo"
        acquirerInfo:
          $ref: "#/components/schemas/AcquirerInfo"
      description: Applies to debit cards only.
    debitOnlyTransactionV2:
      type: object
      properties:
        transactionDetails:
          $ref: "#/components/schemas/TransactionDetailsV2"
    creditOnlyTransactionV2:
      type: object
      properties:
        declinedTransactionDetails:
          $ref: "#/components/schemas/DeclinedTransactionDetailsV2"
        pendingTransactionDetails:
          $ref: "#/components/schemas/PendingTransactionDetailsV2"
        postedTransactionDetails:
          $ref: "#/components/schemas/PostedTransactionDetailsV2"
    TransactionSummaryV3:
      type: object
      properties:
        authorizationCode:
          maxLength: 6
          minLength: 2
          type: string
          description: |
            This field contains the authorization approval code generated for transactions that have been successfully approved. It serves as a unique identifier for the approval and is used for transaction validation and reference in subsequent processing steps. This field applies to both debit and credit cards.
          example: "000000"
        responseCode:
          type: string
          description: "This field contains the authorization response code indicating whether the transaction was approved or denied. It is used to identify the outcome of the authorization request and assist in subsequent processing, reconciliation, and issuer decisioning. This field applies to both debit and credit cards. Some of the common codes are as below. For detailed list please refer ISO8583 document.\nCodes and Values: \n\n0  Approved / Completed successfully\n5  Do not honor\n12  Invalid transaction\n14  Invalid card number\n51  Insufficient funds\n54  Expired card\n91  Issuer or switch inoperative\n96  System malfunction\n"
          example: "000"
        responseCodeDescription:
          type: string
          description: |
            This field provides the descriptive text corresponding to the authorization response code. It explains the meaning of the response returned by the issuer or network, helping to identify the reason for an approval, denial, or other authorization outcome. This field applies to both debit and credit cards.
          example: APPROVED - NO BALANCES
        responseDetails:
          type: string
          description: |
            his field provides details regarding the response returned for the transaction. It captures the outcome generated during transaction processing, including approval, decline, or any additional status information supplied by the issuer, network, or processing system. The value supports accurate interpretation of processing results and assists with reconciliation, reporting, and troubleshooting.
          example: 96-M Error processing PIN
        status:
          type: string
          description: |
            This field indicates the current state of the transaction within the processing lifecycle. It reflects whether the transaction has been initiated, authorized, declined, completed, reversed, or is pending further action. The value helps downstream systems determine the appropriate operational flow, reconciliation steps, and handling logic.
          example: 64-PI LOST
        tranCode:
          type: string
          description: |
            This field identifies the specific transaction being performed, including the action taken and the movement of funds between accounts. It provides the operation type along with the associated From‑account and To‑account details, enabling accurate interpretation of the transaction flow for processing, posting, and audit purposes.
          example: "253"
        transactionId:
          type: string
          description: |
            This field represents the unique system‑generated identifier associated with the record. It is used to track, reference, and retrieve the specific card record within internal systems for processing and audit purposes. This field applies to debit cards only. It is combination of lifecyclekey, active key and DUID.
          example: "{\"lifeCycleKey\":\"12323301232312331\",\"activeKey\":\"0210\",\"duID\":\"11348539120200526\"}"
        transactionStatus:
          type: string
          description: |
            This field indicates the current status of the transaction. It reflects the processing outcome or state assigned by the issuer, network, or system—such as approved, declined, reversed, pending, or completed. The value enables accurate tracking, reconciliation, and reporting of transaction activity throughout its lifecycle.
          example: APPROVED
        transactionType:
          type: string
          description: |
            This field specifies the type of transaction being performed. It identifies the nature of the cardholder activity—such as purchase, withdrawal, deposit, transfer, payment, balance inquiry, or adjustment—and is used to determine the appropriate processing rules, posting logic, and reporting treatment associated with the transaction.
            Valid values:
            27  LOAD TO PREPAID CARD
            02  PROGRAM DEBIT
            22  PROGRAM CREDIT
            01  WITHDRAWAL
            11  CASH CHECK
            12  DEPOSIT WITH CASHBACK
            17  MONEY TRANSFER DISPENSE
            18  MONEY TRANSFER INITIATE
            20  DEPOSIT
            25  MESSAGE TO BANK
            28  MONEY TRANSFER REFUND
            30  BALANCE INQUIRY
            31  PIN SELECT
            37  STATEMENT PRINT
            38  MEMBER VERIFICATION
            39  ACCOUNT INQUIRY
            40  TRANSFER
            42  PAYMENT ELECTRONIC
            43  PAYMENT ENCLOSED
            44  PAYMENT TO MERCHANT
            45  REFUND FROM MERCHANT
            99  SPECIAL PURCHASE
            10  MT FUNDING
            26  MT CREDIT
          example: WITHDRAWAL
        debitOnly:
          $ref: "#/components/schemas/DebitOnlyTransactionSummaryV3"
        creditOnly:
          $ref: "#/components/schemas/CreditOnlyTransactionSummaryV3"
    DebitOnlyTransactionSummaryV3:
      type: object
      properties:
        acquirerRefNum:
          maxLength: 23
          type: string
          description: This field contains the Acquirer Reference Number (ARN) assigned by the payment network based on information provided by the acquirer. It is primarily used for network-level corrections and transaction tracking. The ARN ensures accurate identification of transactions within the network. This field applies specifically to debit cards.
          example: "1055556060"
        amtCharged:
          type: string
          description: |
            This field contains the transaction amount associated with specific processing scenarios. For
            forced authorization (120) or a forced post-clearing transaction (220), it represents the
            transaction amount. In the case of a partially approved transaction, this is the approved amount.
            The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees.
            For a preauthorization response (110) or an authorization response (210), the amount displayed
            reflects the balance returned in the response, which may be either the ledger balance or the
            available balance. During a partial reversal, Amount 2 indicates the new amount that replaces the
            amount displayed in Amount 1. This field applies specifically to debit cards.
          example: "1299.00"
        eciMastercard:
          maxLength: 35
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI), which provides information about the security level and authentication method used for an electronic commerce transaction. For Debit Mastercard® transactions, the ECI indicates whether the transaction was authenticated and the level of security applied during processing. This field applies specifically to debit cards.  \nPossible Positions 1 and 2 values  \n- 21  -  Channel encryption; cardholder certificate not used  \n- 22  -  Masterpass-generated transaction  \n- 24  -  Digital Secure Remote Payment (DSRP) transaction  \n- 91  -  No security protocol; cardholder certificate not used.  \nPossible Position 3 values  \n- 0  -  Universal cardholder authentication field (UCAF) data collection – Is not supported by the merchant an Identity Check merchant has chosen not to undertake Identity Check on this transaction or identity Check failed authentication and merchant desires to proceed with transaction  \n- 1  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains an attempts AAV  \n- 2  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains a fully authenticated AAV)  \n- 3  -  UCAF data collection is supported by the merchant and UCAF (Mastercard assigned static AAV) must be present  \n- 4  -  Merchant has chosen to share authentication data within authorization; UCAF collection not supported  \n- 5  -  Reserved for future use  \n- 6  -  Merchant Risk-Based Decisioning  \n- 7  -  Partial Shipment or recurring payment; liability depends on the original UCAF values provided and matching with the original transaction  \n"
          example: "3"
        eciVisa:
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI) for Visa transactions, which provides information about the security level and authentication method used during an electronic commerce Visa Check transaction. The ECI helps determine whether the transaction was authenticated and the level of security applied. This field applies specifically to debit cards.  \nPosition 4 - Mail/Phone/Electronic Commerce and Payment Indicator  \n- Space - POS Customer Present (POS Check Service Only)  \n- 1 - Single transaction of a mail/phone order  \n- 2 - Recurring transaction  \n- 3 - Installment payment  \n- 4 - Unknown classification/Other mail order  \n- 5 - Secure electronic commerce transaction  \n- 6 - Non-authenticated security transaction at a 3-D Secure-capable merchant, and merchant attempted to authenticate the cardholder using 3-D Secure  \n- 7 - Non-authenticated security transaction  \n- 8 - Non-secure transaction  \n"
          example: "3"
        expirationDateMismatch:
          type: boolean
          description: |
            This field indicates whether an expiration date mismatch exists between the provided card details and the issuer’s records. It is used for validation during transaction processing to ensure card data accuracy. This field applies specifically to debit cards.
          example: false
        journalDateTime:
          type: string
          description: |
            This field provides the system‑generated timestamp recorded at the time of transaction processing. The value is expressed in Eastern Time (ET) and represents the precise date and time at which the system logged the event. It is used for audit tracking, reconciliation, and sequencing of transaction activity across systems.
          format: date-time
          example: 2023-07-20T13:38:53Z
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing. This field applies to debit cards."
          format: numeric
          example: "0"
          default: "0"
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: "This field specifies the Merchant Category Code (MCC) associated with the transaction. The MCC is a nationally recognized four‑digit code used to classify the type of business, product, or service offered by the card acceptor. It helps determine transaction category, routing rules, reporting classifications, and compliance requirements. \n"
          format: numeric
          example: "6011"
        merchantCity:
          maxLength: 16
          type: string
          description: |
            This field contains the Regulation E location details, specifically the city and state where the terminal involved in the transaction is located. It is used for compliance and reporting purposes under Regulation E requirements. This field applies to both debit and credit cards.
          example: Newark
        merchantName:
          maxLength: 25
          type: string
          description: |
            This field contains the name of the merchant associated with the transaction. It is used for identifying the card acceptor during processing, reporting, and reconciliation. Applies to debit and credit cards.
          example: Store1
        merchantState:
          maxLength: 3
          minLength: 2
          type: string
          description: "This field contains the state where the merchant associated with the transaction is located. It is used for identifying the merchant’s geographic location for processing, reporting, and compliance purposes.  \nAL Alabama | AK Alaska | AS American Samoa (US Territory) | AZ Arizona | AR Arkansas  \nCA California | CO Colorado | CT Connecticut | DE Delaware | DC District of Columbia  \nFM Federated States of Micronesia (US Territory) | FSM Federated States of Micronesia (US Territory)  \nFL Florida | GA Georgia | GU Guam (US Territory) | GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada | NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina | SD South Dakota | TN Tennessee | TX Texas | UT Utah  \nVT Vermont | VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin | WY Wyoming  \n"
          example: NJ
        messageType:
          maxLength: 4
          type: string
          description: "This field contains the combination of the transaction message type code and its corresponding description. It is used to identify and interpret the nature of the transaction message during processing and reporting. Applies to debit cards only.  \n- 100- Pre-Auth Request  \n- 102- Pre-Auth Reversal  \n- 110- Preauthorization  \n- 120- Pre-Auth Stand In  \n- 121- Pre-Auth Adv Repeat  \n- 130- Auth Advice Resp  \n- 200- Request  \n- 202- Auth Reversal  \n- 210- Auth/Completion  \n- 220- Forced Completion  \n- 221- Advice Repeat  \n- 230- Advice Response  \n- 320- Batch Upload  \n- 330- Batch Upload Resp  \n- 420- Reversal  \n- 421- Advice Rev Repeat  \n- 430- Reversal Response  \n- 500- Batch Settl Request  \n- 510- Batch Settl Resp  \n- 800- Network Mgmt Req  \n- 810- Network Mgmt Resp  \n- 820- Network Mgmt Advice  \n"
          example: 420- Reversal
        network:
          type: string
          description: |
            This field identifies the payment network responsible for routing the transaction from the merchant to the financial institution (FI). It indicates which network carried the authorization message during transaction processing and is used for network-specific reporting, reconciliation, and fee assessment.
          example: 655100 - Mastercard Credit - Affiliate Member
        pinTransaction:
          type: boolean
          description: |
            This field indicates whether a Personal Identification Number (PIN) was used to authenticate the transaction. Valid values are “Yes” or “No,” specifying the presence or absence of PIN-based verification. Applies to debit cards only.
          example: true
        posDataInputCapability:
          maxLength: 1
          type: string
          description: "This field indicates the capability of the terminal to manually enter the card number and expiration date into the system. It reflects whether the terminal supports key‑entry functionality as part of the card data capture process. This field applies specifically to debit cards. Valid values are- 0  Unknown / Not specified 1  Manual entry only 2  Magnetic stripe read 3  Manual + Magnetic stripe 4  Chip (ICC) capable 5  Manual + Chip 6  Magnetic stripe + Chip 7  Manual + Magnetic stripe + Chip 8  Contactless capable 9  All capabilities (Manual, Magstripe, Chip, Contactless) Some APIs (like CyberSource or Fiserv) use a two-digit numeric or bit-mapped representation to indicate multiple capabilities."
          example: "2"
        posDataInputMode:
          type: string
          description: |
            This field indicates the method used to capture card information at the terminal. It identifies how the card data—such as card number and expiration date—was entered, whether through swipe, dip, tap, manual key entry, or another input method supported by the terminal. This field applies specifically to debit cards.
            Valid values:
              00  Unspecified
              01  Manual
              02  Swipe
              03  Barcode
              04  OCR
              05  Chip
              06  Key Entered
              07  Contactless Chip
              81  Credential on file / e-commerce transaction
              90  Contactless Magstripe
              Applies to debit cards only.
          example: 2 - Swipe
        preAuthAmt:
          type: string
          description: |
            This field contains the transaction amount returned in specific processing scenarios. For a preauthorization response (110) or an authorization response (210), it represents the amount associated with the response. In the case of a partially approved transaction, this value reflects the amount that was approved. For a denied transaction, it contains the originally requested amount. The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees. For a forced post preauthorization (120) or a forced post clearing transaction (220), the clearing amount shown in Amount 2 is duplicated in Amount 1. During a reversal, Amount 1 represents the amount to be reversed. Applies to debit cards only.
          example: "1.00"
        retrievalRefNumber:
          maxLength: 12
          type: string
          description: |
            This field contains the reference number supplied and retained by the message originator. It serves as an identifier used to track or correlate the transaction throughout processing. The value may be up to 12 characters in length.
          format: numeric
          example: "222815000031"
        subResponseCode:
          type: string
          description: |
            This field contains an optional one‑character value that provides additional detail for specific denial codes. It is case‑sensitive, and its meaning varies based on the combination of the authorization response code and the response sub‑code. This field is used to further refine the reason for a denial when applicable. Applies to debit cards only.
          example: M
        systemRecordId:
          type: string
          description: "This field contains the unique system-generated identifier associated with the record. It may include lifecycle key, duID, or active key values that support internal tracking and state management of the card record."
          example: 377761184|12080251120230113|0120
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field contains the identifier for the terminal where the transaction was performed. It is used to uniquely distinguish the originating terminal for processing, tracking, and audit purposes. Applies to debit cards only.
          format: alphanumeric
          example: VMDIEOS1
        transactionAmount:
          type: string
          description: |
            Amount on a particular transaction. Valid format is 0.00. Applies to debit and credit cards.
          example: "1299.00"
        transactionDateTime:
          type: string
          description: |
            This field captures the date and time at which the transaction was created. It records the precise timestamp used for transaction logging, auditing, and reporting. Applies to debit and credit cards.
          format: date-time
          example: 2021-10-15T17:13:14Z
        unmatchedCompletionFlag:
          type: boolean
          description: |
            This field indicates whether the transaction is marked with an unmatched completion flag, used to identify transactions where the completion record does not correspond to a previously authorized transaction. Applies to debit cards only.
          example: false
    CreditOnlyTransactionSummaryV3:
      type: object
      properties:
        effectiveDate:
          type: string
          description: |
            This field contains the date when the transaction became effective. It represents the official effective date for the transaction and is used for settlement and reporting purposes. The value should accurately reflect the date the transaction was finalized. Applies to credit cards only.
          format: date
          example: 0010-04-14
        merchantCode:
          maxLength: 4
          type: string
          description: "This field indicates the Merchant Category Code (MCC) associated with the transaction. The MCC identifies the type of goods or services provided by the merchant and is used for authorization processing, fraud‑risk assessment, rewards eligibility, and reporting across card networks."
          format: numeric
          example: "6011"
        messageId:
          type: string
          description: "This field specifies the ISO message type identifier associated with the transaction. It represents the ISO 8583 message class and function—for example, authorization request, advice, or reversal—and is used by payment networks and issuer systems to route, interpret, and process the transaction correctly."
          example: "9926"
        networkID:
          type: string
          description: |
            Specifies the network to be used for transmission of the message and determines the program rules that apply to the transaction. Applies to debit cards only.
          example: 773002 - Maestro
    DebitOnlyTransactionDetailV3:
      type: object
      properties:
        acqPostDate:
          type: string
          description: "This field specifies the date on which the acquirer posted the transaction. For interchange transactions, the value depends on the settlement process- If Card Services performs settlement, the field reflects the actual acquirer posting date. If Card Services does not perform settlement, the field reflects the network settlement date.  \n"
          example: 2024-12-23
        atcResult:
          type: string
          description: "Application Transaction Counter Result. Indicates if the ATC passed or failed authentication or was not processed or checked. \n"
          example: PASSED
        avsResult:
          type: string
          description: "Address verification service result.Applies to debit cards only. \nValid Values-\nA  Address matches, ZIP/postal code does not\nB  Street address matches, postal code in wrong format\nC  Street address and postal code in wrong format\nD  Street address and postal code match (international issuer)\nE  Error response for Merchant Category Code\nF  Cardholder name incorrect, address matches\nG  Card issued by a non-US issuer that does not participate in AVS\nI  Address information not verified by international issuer\nM  Street address and postal code match (international issuer)\nN  No match on address or ZIP/postal code\nO  Cardholder name and billing address match\nP  Postal code matches, street address not verified due to incompatible formats\nR  Retry – system timed out or unavailable\nS  Service not supported by issuer\nU  Address information is unavailable\nW  Nine-digit ZIP code matches, address does not\nX  Exact AVS match – address and nine-digit ZIP code match\nY  Address and five-digit ZIP code match\nZ  Five-digit ZIP code matches, address does not\n"
          example: A
        camResult:
          type: string
          description: "Card Authentication Method Result. Indicates if the application request cryptogram (ARQC) passed or failed authentication, or was not processed or checked. \n"
          example: "04"
        cardCountry:
          maxLength: 4
          minLength: 2
          type: string
          description: |
            This field identifies the country in which the card issuer is located. It represents the issuer’s geographic origin and is used for regulatory, routing, and reporting purposes.
          example: USA
        cardCounty:
          type: string
          description: |
            This field specifies the county in which the card issuer is located. It identifies the issuer’s local geographic jurisdiction and may be used for regulatory, compliance, or region‑specific reporting purposes.
          example: "000"
        cardholderAddress:
          type: string
          description: |
            This field contains the address information supplied for Address Verification Service (AVS) checks. It is used to validate the cardholder’s billing address during transaction processing. This field applies to debit cards only.
          example: '12345    1010 Kharadi Pune   '
        cardLogo:
          maxLength: 4
          type: string
          description: |
            Represents the card issuer’s 4‑character alphanumeric client identifier. This field uniquely identifies the issuing institution within card‑processing systems and is used for routing, processing, and institution‑level configuration.
          example: ABCD
        cashbackAmount:
          type: string
          description: |
            Represents the amount of cash returned to the cardholder during a transaction. This field identifies the cash‑back portion provided as part of a purchase or withdrawal transaction, supporting accurate posting, reconciliation, and reporting of cash‑back activity.
          example: "0.00"
        cvrResult:
          type: string
          description: |
            Represents the Card Verification Result (CVR) provided by the EMV chip during the transaction request. This field contains EMV‑generated cryptographic and risk‑assessment indicators used to validate the authenticity of the card, assess transaction conditions, and support authorization decisioning.
          example: "2"
        cvrResultStat:
          type: string
          description: |
            Represents the Card Verification Results outcome, indicating whether the CVR passed authentication, failed authentication, or was not processed or checked. This field reflects the EMV validation result returned during the transaction and supports authorization decisioning, fraud detection, and risk assessment.
          example: PASS
        cvv2Cvc2Result:
          type: string
          description: "Represents the result of verifying the Card Verification Value (CVV2) or Card Validation Code (CVC2) taken from the card’s signature panel. This field indicates whether the CV2 authentication passed, failed, or returned another applicable verification status, supporting fraud‑prevention, card‑not‑present validation, and authorization decisioning."
          example: "false"
        depositType:
          type: string
          description: |
            Indicates the type of deposit made—whether it is a check deposit, cash deposit, or a mixed deposit containing both. This field identifies the composition of the deposit to support accurate processing, posting, and reporting of deposit transactions.
          example: Cash
        eCommerce:
          type: string
          description: |
            Indicates whether the transaction was an eCommerce transaction. This field identifies card‑not‑present activity initiated through online channels, supporting transaction classification, fraud‑prevention controls, and authorization decisioning.
          example: "false"
        emvApplicationID:
          type: string
          description: |
            EMV application identifier. EMV application ID (AID) is used to uniquely identify each EMV application that a terminal supports. Every application identifier has an associated card scheme and parameters relating to how the application needs to be processed. A terminal may contain any number of such applications.
          example: A0000000031010
        emvCard:
          type: string
          description: |
            Indicates whether the card used in the transaction is an EMV‑enabled card. Possible values are “Yes” or “No.” This field identifies whether the transaction was performed using a chip‑based EMV card, supporting enhanced security validation, risk assessment, and authorization processing..
          example: "Yes"
        emvCardSequence:
          type: string
          description: |
            Distinguishes among separate cards having the same PAN. Issuers may encode chip cards with Card Sequence Numbers. Acquirers with chip-reading capability may pass this information encoded on the chip.
          example: "1"
        emvFallback:
          type: boolean
          description: |
            Indicates whether the transaction was processed as an EMV fallback. Possible values are “Yes” or “No.” This field identifies situations where the chip could not be read and the transaction reverted to a magstripe or alternative fallback method, supporting fraud‑prevention, risk assessment, and authorization decisioning.
          example: true
        emvTerminal:
          type: boolean
          description: |
            Indicates whether the terminal used for the transaction is EMV‑capable. Possible values are “Yes” or “No.” This field identifies whether the terminal supports EMV chip processing, enabling enhanced security, chip‑read validation, and proper handling of EMV‑compliant transactions.
          example: true
        emvTransaction:
          type: boolean
          description: |
            Indicates whether the transaction is an EMV transaction. Possible values are “Yes” or “No.” This field identifies if the transaction was processed using EMV chip technology, supporting enhanced security validation, fraud‑prevention controls, and accurate authorization processing.
          example: true
        entryMode:
          type: string
          description: |
            Indicates the method used to input the card information into the terminal. This field identifies how the card data was captured—such as by chip read, magstripe swipe, contactless tap, manual key entry, or other supported input methods—to assist with transaction processing, security validation, and risk assessment.
          example: 2 - Swipe
        fromAccount:
          type: string
          description: |
            Represents the number of the account impacted by a cardholder transaction. This field identifies which account was affected during the transaction, supporting accurate posting, reconciliation, reporting, and account‑level tracking.
          example: "123456789"
        fromAccountType:
          type: string
          description: |
            Represents the type of account impacted by a cardholder transaction. This field identifies the specific account category—such as checking, savings, credit, loan, or other supported account types—affected during the transaction, supporting accurate posting, reconciliation, reporting, and transaction classification.
          example: Checking
        international:
          type: boolean
          description: |
            Indicates whether the transaction was an international transaction. This field identifies transactions initiated outside the issuer’s home country, supporting appropriate fee assessment, cross‑border processing, risk evaluation, and regulatory reporting.
          example: false
        locAmt1:
          type: string
          description: |
            Represents the Amount 1 value in the acquirer’s local currency. This field contains the same value as Amount 1 when the acquirer’s currency is U.S. dollars. It reflects the transaction amount as interpreted by the acquiring institution for processing, settlement, and reporting.
          example: "6.55"
        locAmt2:
          type: string
          description: |
            Represents the Amount 2 value in the acquirer’s local currency. This field contains the same value as Amount 2 when the acquirer’s currency is U.S. dollars. It reflects the transaction amount as interpreted by the acquiring institution for settlement, processing, and reporting purposes.
          example: "89.50"
        merchantAdviceCode:
          type: string
          description: |
            Represents the Merchant Advice Code (MAC) associated with the transaction. This field indicates the merchant‑provided instruction or condition related to the transaction—for example, retry guidance, referral requirements, or other processing advice—used to support authorization decisions, risk assessment, and follow‑up actions.
          example: "01"
        merchantCountry:
          maxLength: 3
          type: string
          description: |
            This field specifies the country in which the merchant is physically located. It identifies the merchant’s geographic location for authorization decisioning, fraud‑risk assessment, cross‑border determination, and regulatory or compliance reporting.
          example: USA
        merchantId:
          type: string
          description: "This field specifies the merchant identification number (MID) associated with the merchant where the transaction originated. The MID uniquely identifies the merchant within the acquiring network and is used for routing, settlement, reporting, fraud monitoring, and merchant‑level analysis.    \n"
          example: STARBUCKS STORE
        mobileDenial:
          type: string
          description: |
            Indicates the control policy selected by the cardholder through CardValet/CardHub which denied the transaction. Applies to debit cards only.
          example: "05"
        offline:
          type: string
          description: |
            Offline EMV processing indicates the card and terminal authorized a transaction without the transaction being routed to the host for processing
            Card Services EMV solution does not presently support offline processing capabilities so this field will display No. For cards not issued by Fiserv, this may display Yes.
            Values
            Y = Offline EMV transaction
            N = Online EMV transaction
          example: "Y"
        pinPresent:
          type: string
          description: "Personal identification number present. Indicates if PIN was used or not, and whether the transaction routed through a standard PIN’d network or a typical Signature network.\n- 0 = Undetermined\n- 1 = Signature Network with PIN \n- 2 = Signature Network without PIN \n- 3 = Debit Network without PIN\n- 4 = Debit Network with PIN\n"
          example: "1"
        pointOfService:
          type: string
          description: "Indicates the type of device used to acquire the transaction or the purpose of the transaction.  \n- 002 - ON-PREMISE  \n- 004 - ELECTRONIC CASH REGISTER  \n- 006 - PRE-AUTHORIZED REQUEST  \n- 007 - PRE-AUTHORIZED REQUEST-NO PIN  \n- 014 - GENERIC  \n- 051 - VERIFICATION OF FUNDS  \n- 054 - GAS PUMP  \n- 062 - OFF-PREMISE  \n- 064 - SCRIP DISPENSE  \n- 072 - RETAIL  \n- 074 - ADMINISTRATIVE  \n- 081 - PAYIT OR BANKIT TRANSACTION (ITP)  \n- 086 - PIN, NO TRACK2  \n- 087 - MERCHANT AUTHORIZED TRANSACTION  \n- 088 - PAPER CAPTURE  \n- 089 - TRACK READ (PAN AND EXP), NO PIN  \n- 090 - NO PIN, NO TRACK2  \n- 091 - NO PIN, TRACK2  \n- 092 - INTERNATIONAL  \n- 094 - SHARED BRANCH STAND ALONE  \n- 096 - SHARED BRANCH FRANCHISE  \n- 097 - SHARED BRANCH OUTLET  \n"
          example: 002 - ON-PREMISE
        posDataCode:
          type: string
          description: |
            12-digit code indicating specific conditions present at the time of the transaction at the POS identifying terminal capability, terminal environment, and security data.
          example: 52010120300C
        posEntryMode:
          type: string
          description: |
            This field specifies the method used to capture the card details at the point of sale. It indicates whether the transaction was processed through magnetic stripe swipe, EMV chip insertion, contactless tap, manual key entry, or card‑not‑present channels such as e‑commerce. The POS entry mode helps determine the transaction’s risk profile and processing logic used by the issuer and network.
          example: "620"
        productType:
          type: string
          description: |
            This field identifies the type of transaction channel used to initiate the request. It indicates whether the transaction originated from an Automated Teller Machine (ATM) or a Point of Sale (POS) terminal. ATM transactions typically involve cash withdrawals, balance inquiries, deposits, and PIN‑based operations, while POS transactions involve merchant purchases, cash‑backs, and other card‑present or card‑not‑present purchase interactions. The product type helps determine the applicable processing rules, limits, and risk controls.
          example: ATM
        recurringPaymentInd:
          type: string
          description: |
            This field represents the fraud‑risk score assigned by the card network’s real‑time authorization risk engine. For Mastercard transactions, it reflects the Expert Monitoring (EM) System Score, and for Visa transactions, it reflects the Advanced Authorization (VAA) Score. These scores use network‑level behavioral analytics, historical patterns, merchant characteristics, device intelligence, and global fraud indicators to estimate the likelihood that the transaction may be fraudulent.
          example: R
        reversalCode:
          type: string
          description: |
            This field specifies the underlying reason a previously authorized or posted transaction is being reversed. It identifies whether the reversal is due to technical issues, timeouts, customer cancellation, duplicate processing, merchant errors, or issuer‑initiated actions. The reversal reason helps acquirers, networks, and issuers determine the appropriate processing logic, dispute handling, and reconciliation steps for the reversed transaction.
          example: 00 - NON REVERSAL
        secureEci:
          type: string
          description: "Electronic commerce indicator (ECI) provides network information regarding the security level and authentication method used for an electronic commerce transaction.  \n"
          example: 02 - 3-D Secure authentication attempt no resp
        sequenceNumber:
          type: string
          description: |
            Chronological numeric identifier for the transaction, assigned by the terminal. Applies to debit cards only.
          example: "000031"
        surchargeAmount:
          type: string
          description: |
            This field indicates the surcharge amount imposed by the ATM owner or operator for processing the transaction. It represents the additional fee displayed to the cardholder at the terminal and agreed to before completing the withdrawal or inquiry. The surcharge is determined by the ATM acquirer and is added on top of the transaction amount for settlement and posting. This value helps issuers, processors, and networks correctly account for cardholder billing, fee disclosures, and reconciliation of ATM transactions.
          example: "3.95"
        surchargeReservalAmount:
          type: string
          description: |
            This field specifies the surcharge amount included in the settlement of the original transaction that did not undergo a reversal. It represents the fee assessed by the ATM owner or acquirer and added to the transaction amount during clearing and settlement. This surcharge is part of the final posted amount and is used for accurate issuer billing, network settlement processing, and reconciliation of ATM transactions where the surcharge applies.
          example: "2.50"
        terminalLogo:
          type: string
          description: |
            This field identifies the client or institution that owns or operates the terminal where the transaction was initiated. It represents a unique identifier assigned to the terminal owner—typically the acquiring institution, independent ATM deployer, or merchant entity. This value is used for routing, settlement, fee attribution, and reconciliation, ensuring transactions are correctly associated with the responsible terminal owner within the payment network.
          example: DSH4
        terminalPinCapable:
          type: string
          description: |
            This field specifies whether the terminal is capable of accepting and processing a Personal Identification Number (PIN) entry from the cardholder. It identifies the terminal’s PIN‑input capability—such as supporting online PIN, offline PIN, or not supporting PIN entry at all. This information is used during authorization to determine authentication methods, apply network rules, and validate issuer risk‑management requirements.
          example: "No"
        terminalState:
          type: string
          description: "This field indicates the state or geographic location where the terminal is physically installed. It is typically derived from the terminal owner’s registration details and is used to support transaction routing, regulatory reporting, surcharge rules, tax logic, and issuer risk evaluation. The terminal state helps acquirers, networks, and issuers accurately determine jurisdiction‑specific processing requirements and compliance obligations for ATM or POS transactions. \n"
        terminalStreet:
          type: string
          description: |
            This field specifies the full street address of the physical location where the terminal is installed. It typically includes details such as the building number, street name, and other address elements provided by the terminal owner or acquirer. The street address is used for accurate transaction routing, cardholder receipt information, surcharge disclosure, regulatory reporting, and issuer risk assessment. It ensures that the terminal’s precise physical location can be identified for operational, compliance, and reconciliation purposes.
          example: PARAGON APPLICAT
        toAccount:
          type: string
          description: "This field identifies the account number that is directly affected by the cardholder’s transaction. It represents the specific deposit, savings, credit, or loan account to which the transaction amount is applied—such as for withdrawals, purchases, payments, refunds, or adjustments. The account number allows issuers, processors, and core banking systems to correctly post, reconcile, and track the financial impact of the transaction on the cardholder’s account. \n"
          example: "0000000000000000000"
        toAccountType:
          type: string
          description: |
            This field specifies the type of account affected by the cardholder’s transaction. It identifies whether the impacted account is a savings account, checking/current account, credit card account, loan account, or any other account category supported by the issuer. The account type helps ensure that the transaction is posted correctly, routed to the appropriate ledger, and processed according to product‑level rules, regulatory requirements, and issuer‑defined transaction controls.
          example: Checking
        tokenRequestorId:
          type: string
          description: |
            This field identifies the Token Requestor ID associated with a tokenized payment transaction. The Token Requestor ID is a unique identifier assigned to the entity—such as a digital wallet provider, merchant, or device manufacturer—that requests the creation of a payment token. It is used to determine wallet type, apply token domain restrictions, support risk decisions, and manage token lifecycle activities within the tokenization ecosystem.
          example: "50148904210"
        tokenTransaction:
          type: string
          description: |
            Token Transaction. A tokenized payment transaction uses a token PAN that is an alternate 13- to 19-digit value provisioned for the real or true PAN. The real PAN is the card number assigned by the FI. For token provisioning transactions, this field is not applicable and the value is always N.
          example: "No"
        tokenType:
          type: string
          description: "This field specifies the Token Requestor ID associated with a tokenized transaction. The Token Requestor ID uniquely identifies the entity—such as a digital wallet provider, merchant, or device manufacturer—that requested issuance of the payment token. It is used to determine wallet type, token domain controls, risk parameters, and routing behavior within the tokenization ecosystem. \n"
          example: "5"
        transactionNetAmount:
          type: string
          description: |
            This field represents the total amount presented to the financial institution (FI) for authorization. If the transaction receives a partial approval, this field reflects the amount that was ultimately approved. It captures the final requested or approved amount regardless of subsequent adjustments.
          example: "20.00"
        transactionSource:
          type: string
          description: |
            This field identifies the source from which the transaction originated. It indicates the channel, system, or platform that initiated or submitted the transaction for processing. This information is used for routing, audit tracing, reporting, and determining transaction‑handling rules based on the originating source.
          example: E-COMMERCE
        tvrResult:
          type: string
          description: |
            This field contains the Terminal Verification Result (TVR), a five‑byte EMV data element generated by the terminal during an EMV‑chip transaction. The TVR records the outcome of various terminal‑level checks—such as offline data authentication, cardholder verification, risk management, and terminal/card compatibility. It represents a bit‑mapped status that indicates which checks passed, failed, or were not performed. The issuer uses the TVR to assess transaction risk, validate EMV processing integrity, and determine the appropriate authorization response.
          example: "0400040001"
        tvrResultStat:
          type: string
          description: |
            Terminal Verification Results Status Result. Indicates if the TVR passed or failed authentication or was not processed or checked.
          example: Fail
    CreditOnlyTransactionDetailV3:
      type: object
      properties:
        acquiringCountryCode:
          maxLength: 3
          type: string
          description: "This field specifies the country code of the acquiring institution responsible for processing the transaction. It represents the ISO-defined numeric or alphanumeric country identifier associated with the acquirer’s registered location. The country code is used for transaction routing, applying regional interchange rules, surcharge and compliance requirements, and determining the jurisdiction under which the acquirer operates. This information ensures accurate network processing, regulatory reporting, and settlement handling across international transactions. \n"
          example: "840"
        additionalData1:
          type: string
          description: |
            This field contains any additional, non‑mandatory data elements returned in the transaction response. These values are supplied by the issuer, acquirer, or network based on processing rules, optional services, or system‑specific configurations. Optional response data may include supplemental authorization information, advisory flags, enhanced risk indicators, network messages, or issuer-defined fields. The content of this field is not required for transaction completion but may support reconciliation, analytics, customer messaging, or operational reporting.
          example: D11101B99001
        additionalData2:
          type: string
          description: |
            This field contains any additional, non‑mandatory information returned in the transaction response. The data included is dependent on issuer, acquirer, or network configuration and may provide supplemental details beyond the required authorization elements. Examples can include advisory messages, enhanced risk or authentication indicators, issuer‑specific flags, or network-provided informational fields. Although not required for completing the transaction, this optional data may support operational reporting, reconciliation, analytics, or downstream processing.
          example: "60905"
        appInterchangeProfile:
          type: string
          description: |
            Field 138 is carried in VSDC transactions and provides a series of indicators that reflect the specific functions supported by the chip card account, for example, whether cardholder verification is supported.This field maps to Field 55, Tag 82—Application Interchange Profile.
          example: 11FF
        availableUsage:
          type: string
          description: |
            This field specifies the amount of credit currently available on the cardholder’s account at the time of the transaction. It reflects the remaining credit limit after accounting for posted transactions, pending authorizations, fees, adjustments, and any issuer‑defined holds. The available credit value is used to determine whether the transaction can be approved and supports issuer authorization decisions, risk controls, and post‑transaction reconciliation.
          example: "72968.00"
        avsOptionCode:
          type: string
          description: |
            Address Verification Service (AVS) Request indicates that verification of the cardholder billing address is requested in the authorization message.
          example: "51"
        avsPostalCode:
          type: string
          description: |
            Identifies the cardholder postal code and street address that is used for certain types of verification.
          example: "337131520"
        cardAcceptorCity:
          type: string
          description: |
            Indicates the city where the call originated.
          example: ROGERSVILLE
        cardAcceptorName:
          type: string
          description: |
            Indicates the name of the establishment where the transaction was acquired.
          example: 'Pax Technology '
        cardAcceptorTermId:
          type: string
          description: |
            Identifies a terminal at the card acceptor location of acquiring institutions or merchant POS systems. The terminal ID should be printed on all transaction receipts in ATM and POS transactions where the terminal is capable of generating customer receipts.
        cardSequenceNumber:
          type: string
          description: |
            This field represents the Card Sequence Number, a value used to distinguish multiple physical cards issued under the same Primary Account Number (PAN). It identifies which specific card—among replacement, renewed, additional, or supplementary cards—was used for the transaction. The sequence number helps issuers track individual card instances, manage lifecycle events, support fraud investigations, and ensure accurate authorization and account‑level processing when several cards share the same PAN.
          example: "01"
        cvcResultCode:
          type: string
          description: |
            This field specifies the result code of the Card Verification Code (CVC) check performed during the authorization process. It indicates whether the CVC value provided by the cardholder or captured during the transaction matched the value stored by the issuer. The CVC result helps the issuer and network assess authentication validity, detect potential fraud, and determine whether the transaction should be approved, declined, or subjected to additional risk controls. The result codes may represent outcomes such as match, no match, not processed, or value missing.
        cvvCVVtwo:
          type: string
          description: |
            The CVV2/CVC2 value that is printed on the signature panel of Visa and Mastercard plastics. This value is made available for issuers that want to validate the CVV2/CVC2 value themselves. The value will only be passed to an issuer if provided by the acquirer.  Provided transactions in which the debit card is not present.
        fraudDecision:
          type: string
          description: |
            This field specifies the fraud‑risk decision returned by the third‑party fraud detection service integrated into the authorization workflow. The decision reflects the external system’s assessment of the transaction based on behavioral analytics, device intelligence, historical patterns, and real‑time risk models. Typical outcomes may include approve, decline, challenge, review, or other issuer‑configured decision codes. The returned decision assists the issuer in applying appropriate authorization logic, risk controls, and downstream monitoring for potential fraudulent activity.
        originalResponseCode:
          type: string
          description: |
            Original response code from the original transaction. For an instance, when V.I.P. encounters a duplicate transaction, this field contains the field 39 response code from the original transaction.
        pinVerified:
          type: string
          description: |
            This field indicates whether the cardholder’s PIN was verified on the client platform during the transaction. It identifies if PIN validation occurred locally—such as within the terminal, ATM, or client‑side security module—rather than being performed by the issuer host. The value helps determine the method of cardholder authentication used and supports issuer risk assessment, authorization decisions, and EMV compliance checks.
        posCode:
          type: string
          description: "Identifies the Point of Service   condition code. It describes the condition under which the transaction took place at POS. \n"
        posMode:
          type: string
          description: |
            Numeric codes to indicate the method by which the PAN was entered into the interchange system and to indicate the POS terminal PIN entry capabilities.
          example: ""
        referenceNumber:
          type: string
          description: |
            This field contains the unique reference number assigned to the transaction by the acquiring institution, processor, or network. It serves as an identifier used to track, retrieve, and reconcile the transaction across authorization, clearing, settlement, and dispute processes. The reference number ensures consistent linkage of the transaction throughout its lifecycle and supports operational inquiries, audit activities, and customer service investigations.
        reversalreason:
          type: string
          description: |
            This field specifies the reason a previously initiated transaction is being reversed. It identifies the underlying cause—such as technical failures, timeouts, duplicate requests, customer cancellation, merchant errors, or issuer‑initiated corrections—that prevented the original transaction from completing successfully. The reversal reason helps acquirers, networks, and issuers apply the correct processing rules, ensure accurate reconciliation, and maintain consistency between authorization and settlement records.
        riskCodeOne:
          type: string
          description: |
            Field 62.22, positions 1-2 is a Visa private-use field that contains additional Advanced Authorization online risk assessment information to assist issuers in the authorization decision-making process. The condition codes provide descriptive information for high-risk assessments.These positions may contain a Compromised Account Risk Condition Code (CARCC) related to a high-risk even in the Compromised Account Management System (CAMS).
        riskReasonCodeOne:
          type: string
          description: |
            Field 62.21, position 3 is.an alphanumeric combination that will act as a key to explain the risk score model.
        riskScore:
          type: string
          description: |
            Field 62.21, positions 1-2 is a Visa private-use field that contains online risk assessment information from Advanced Authorization. This information assists issuers in the authorization decision-making process.This value indicates the degree of risk associated with a transaction. This two-byte transaction risk score is represented by a numeric value from 01–99.
        settlementAmount:
          type: string
          description: "This field specifies the total amount paid to the merchant for the transaction. It represents the final transaction amount submitted by the merchant for authorization, clearing, and settlement purposes."
          example: "1100.00"
          x-encrypted: "N"
        settlementConversionRate:
          type: string
          description: "This field specifies the currency conversion rate applied to the settlement amount during transaction processing. It reflects the rate used to convert the transaction from the purchase currency to the settlement currency and is used for clearing, settlement, and reconciliation purposes across issuer, acquirer, and network systems.”"
          example: "808464432"
        tagCode:
          type: string
          description: "This field indicates whether the merchant’s payment terminal is enabled to support a specific program or service. It reflects the terminal’s capability to participate in designated processing features, network services, or value‑added programs. The value helps determine eligibility and routing behavior during transaction processing."
          example: 120W00203000
        tagData:
          type: string
          description: "This field identifies the Electronic Commerce Indicator (ECI) associated with the transaction, representing the level of security applied during the online purchase and the extent of cardholder authentication performed. The value helps determine the authentication method used, the risk level of the transaction, and the appropriate processing or liability shift rules applied by the network."
          example: "910"
        tranAmtOriginal:
          type: string
          description: "This field specifies the original amount of funds requested by the cardholder in the transaction currency (U.S. Dollars). The value represents the total transaction amount, including any cashback and surcharge fees assessed at the time of purchase or withdrawal. It does not include International Service Assessment (ISA) or Cross‑Border Assessment (CCA) fees, which are applied separately by the network or issuer."
          example: "111.96"
        tranFeeAmount:
          type: string
          description: "This field specifies the fee amount charged on the transaction in addition to the base purchase or withdrawal amount. It represents any applicable service fees, convenience fees, or processing charges assessed at the point of transaction. The value is used for accurate calculation, reconciliation, and reporting of total transaction costs."
          example: "20.00"
        transmissionDateTime:
          type: string
          description: |
            Date and Time when transaction was created. Applies to debit and credit cards.
          format: date-time
        declinedTransactionDetails:
          $ref: "#/components/schemas/DeclinedTransactionDetailsV3"
        pendingTransactionDetails:
          $ref: "#/components/schemas/PendingTransactionDetailsV3"
        postedTransactionDetails:
          $ref: "#/components/schemas/PostedTransactionDetailsV3"
    PendingTransactionDetailsV3:
      type: object
      properties:
        authorizationCode:
          type: string
          description: |
            This field contains the authorization approval code returned by the issuer for the transaction. It represents the system‑generated alphanumeric code confirming that the transaction was approved and is used for reconciliation, dispute handling, and audit tracking. This field is applicable to debit card transactions.
          example: "121052"
        declinedReasonCode:
          type: string
          description: "This field specifies the reason code returned when a transaction is declined. It provides a standardized system‑generated code that identifies the specific cause of the decline and is used for issuer decisioning, operational analysis, dispute research, and customer communication. This field is applicable to debit card transactions. \n"
          example: "0"
        enteredExpirationDate:
          type: string
          description: |
            EThis field captures the expiration date entered during the transaction. It represents the month and year (MM/YY) provided by the cardholder or terminal to validate the card’s validity period during authorization. This field is applicable to debit card transactions.
          example: 22/12
        expandedReasonCode:
          type: string
          description: |
            This field provides the expanded reason code associated with a declined or exception transaction. It delivers a more detailed classification of the decline cause beyond the primary reason code, supporting precise issuer analysis, dispute handling, reconciliation, and audit reporting. This field is applicable to debit card transactions.
          example: "99999"
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: |
            This field specifies the Merchant Category Code (MCC) associated with the transaction. The MCC is a nationally recognized four‑digit code used to classify the type of business, product, or service offered by the card acceptor. It helps determine transaction category, routing rules, reporting classifications, and compliance requirements. This field is applicable to debit card transactions.
          format: numeric
          example: "6011"
        merchantNumber:
          type: string
          description: |
            This field identifies the merchant where the transaction originated. It provides the merchant name or identifier associated with the card‑accepting location and is used for transaction routing, reconciliation, reporting, and customer communication. This field is applicable to debit card transactions.
          example: "443011000000018"
        originalAuthAdjustmentAmount:
          type: string
          description: "This field specifies the adjustment amount applied to the original authorized amount. It represents the difference between the amount initially authorized and the final transaction amount submitted for posting. For example, if an authorization was approved for 100 and the transaction is completed for 60, the adjustment amount is 40. This adjustment is used for settlement accuracy, reconciliation, and audit tracking. This field is applicable to debit card transactions. \n"
          example: "40.00"
        posEntryModeCode:
          type: string
          description: |-
            This field specifies the Point of Sale (POS) entry mode code used during the transaction. The POS entry mode indicates how the card information was captured at the terminal—for example, via chip, magnetic stripe, contactless tap, manual key entry, or fallback methods. It is used for authorization decisioning, risk evaluation, fraud monitoring, and reporting. This field is applicable to debit card transactions. Valid codes for Mastercard- 00 - Entry mode unknown 01 - Manual input; no terminal 02 - Magnetic stripe reader input 03 - Entry via bar code reader For Discover, this code represents the bar code/payment code. 04 - Entry via optical character recognition (OCR) 05 - Entry via chip 06 - Key-entered input 07 - PAN auto-entry via contactless M/Chip 09 - PAN entry via electronic commerce, including remote chip 79 - Chip card at a chip-capable terminal was unable to process transaction using data on the chip or magnetic stripe; entry was manual 80 - Chip card at a chip-capable terminal was unable to process transactions using data on the chip; terminal defaulted to magnetic stripe read 81 - Entry via electronic commerce, including chip 90 - Automatic entry via magnetic stripe; full track data has been read without alteration or truncation 91 - PAN auto-entry via contactless magnetic stripe S - Electronic commerce, no security, channel encrypted, or SET without cardholder certificate T - Electronic commerce, SET with cardholder certificate
            Valid codes for Visa- 00 - Terminal not used 01 - Key-entered input 02 - Magnetic stripe read; track 2 when known or when the terminal makes no distinction between track 1 and track 2 03 - Entry via bar code read 04 - Entry via optical character recognition (OCR) 05 - Integrated circuit card read; CVV or ICVV data reliable 06 - Track 1 read 07 - Proximity payment originating using VSDC chip data rules 10 - Credential on file 84 - MICR reader 90 - Complete magnetic stripe read and transmitted (CVV) 91 - Proximity payment originating using magnetic stripe data rules 95 - Integrated circuit card read; CVV or ICVV data unreliable This code is used to indicate the magnetic stripe image may be unreliable and that accurate CVV or iCVV processing may not be possible. 96 - Stored value from pre-registered checkout service blank - Not specified
          example: "01"
        transactionAccountNumber:
          maxLength: 16
          type: string
          description: |
            This field specifies the card number associated with the transaction and may vary based on the transaction type. For authorization transactions, it reflects the card number used at the time of authorization. For posted transactions, it represents the account number or card number tied to the final settled entry. In the case of credit card transactions, this value may differ from the authorization card reference due to issuer or network processing rules. This field is applicable to both debit and credit card transactions, with credit‑specific variations noted above.
          example: "123456789"
        transactionCode:
          type: string
          description: "This field represents the code associated with a particular transaction. It provides a system‑assigned identifier used to classify, track, and reference the transaction throughout authorization, posting, reconciliation, and reporting processes. This field is applicable to debit card transactions.  \n"
          example: "255"
        transactionDescription:
          type: string
          description: |
            This field provides a descriptive summary of the transaction. It offers a human‑readable explanation of the transaction type or purpose and supports reporting, reconciliation, customer communication, and audit review. This field is applicable to debit card transactions.
          example: MERCHANT ACCOUNT
    TransactionDetailsV3:
      type: object
      properties:
        acquiringId:
          maxLength: 11
          minLength: 5
          type: string
          description: "This field specifies the Acquiring Institution Identification Code, which uniquely identifies the acquiring institution or merchant bank responsible for processing the transaction. The valid length ranges vary by network- MasterCard requires 5 to 11 digits, while Visa requires 6 to 11 digits. Applies to both Debit and Credit cards."
          example: "10111111119"
        applicationTranCounter:
          type: string
          description: |
            This field contains a count of the transactions performed within the card application. The count is incremented by one each time a transaction is initiated.
            Multiple authorization requests for the same transaction will have the same ATC; for example, when online PIN fails and the next authorization represents a different PIN try for the same transaction, the ATC will be the same. For reversals and advices, the ATC is the value from the original message.
            This field maps to Field 55, Tag 9F36—Applicaton Transaction Counter. Applies to both Debit and Credit cards.
          example: "01"
        cardAcceptorIdCode:
          type: string
          description: "This field specifies the identification number assigned to the establishment where the transaction was acquired. It uniquely identifies the merchant location for processing, settlement, and reporting purposes."
          example: "123456"
        cardEntryMode:
          type: string
          description: |
            Indicates if card was keyed in (manual entry) or swiped/machine read. Applies to both Debit and Credit cards.
          example: Swiped/Machine read
        cavvResult:
          type: string
          description: |
            Indicates the Cardholder Authentication Verification Value (CAVV) results code that identifies the outcome of CAVV validation. The value in field also indicates who performed the authentication, either Visa or the issuer, and the classification of the transaction.
          example: 5F2D4A8B9C0E112233445566778899AABBCCDDEE
        cvResult:
          type: string
          description: |
            Card verification result. Identifies the card magnetic strip verification. Applies to both Debit and Credit cards.
          example: Failed
        cvvResult:
          type: string
          description: "This field specifies the outcome of the Card Verification Value (CVV) validation, indicating whether the CVV provided during the transaction matched the issuer’s records. It is used to confirm card authenticity and support fraud‑prevention checks during authorization."
          example: "false"
        enfactNearTimeScore:
          type: string
          description: |
            EnFact Near Time/Case Management Score. EnFact predictive model score assigned to the transaction after authorization.
          example: "150"
        enfactRealTimeDecision:
          type: string
          description: "EnFact authorization recommendation based on an EnFact fraud rule assigned during authorization.  \n- A - Approve  \n- D - Deny  \n- T - Timed Out  \n- E - Error  \n- U - Falcon Server Unavailable  \n- R - Deny - Retain Card  \n- X - Engin to Falcon Timeout  \n- S - Stop Sending to Falcon           \n"
          example: A
        enfactRealTimeScore:
          type: string
          description: |
            The real time score associated with a transaction during authorization.
          example: "150"
        enfactRecommendation:
          type: string
          description: |
            Identifies if the EnFact rules denied the transaction.Applies to both Debit and Credit cards.
          example: approve
        expirationDate:
          type: string
          description: "Expiration Date specifies the month and year after which an issuer designates a cardholder’s card to be “expired.” \n"
          example: ""
        messageReasonCode:
          type: string
          description: |
            Code explaining the reason for an online acquirer advice, reversal, or partial reversal.
          example: ""
        networkScore:
          type: string
          description: " This field specifies the network score assigned to the transaction by the participating payment network. The score reflects the network’s risk assessment and is used to support authorization decisions, fraud monitoring, and downstream case management. Possible network sources include: Visa, Mastercard, Pulse, and STAR. Applies to both Debit and Credit cards."
          example: Visa
        ruleManagerRecommendation:
          type: string
          description: |-
            This field provides the transaction recommendation generated by RuleManager and returned to the authorization platform. The recommendation reflects the outcome of RuleManager’s evaluation based on applied fraud rules and system conditions. Possible values include-
            C – Continue D – Deny E – Error O – Offline for Maintenance P – Pass R – Deny and Retain T – Timeout
            This recommendation assists the authorization platform in determining the appropriate action for the transaction during real‑time processing.
          example: C-Continue
        ruleManagerRuleName:
          type: string
          description: |
            Mastercard expert monitoring system score or Visa advanced authorization score.Applies to both Debit and Credit cards.
          example: GlobalRule
        settlementCurrencyCode:
          type: string
          description: "This field specifies the currency code associated with the settlement amount. It identifies the currency in which the transaction is settled between the issuer, acquirer, and payment network, and is used for clearing, settlement, and reconciliation processes."
          example: "840"
        stateCode:
          type: string
          description: |
            Originating Center State Postal Code
          example: ""
        systemAuditNumber:
          type: string
          description: |
            Number a message initiator assigns to uniquely identify a transaction.
          example: ""
        terminalCountryCode:
          type: string
          description: |
            This field is carried in VISA SMART DEBIT SMART CREDIT (VSDC) transactions and identifies the country where the merchant terminal is located. A leading zero is required to pad the first unused half-byte of this field. The zero is filler and is not part of the code.This field maps to Field 55, Tag 9F1A—Terminal Country Code.
        transactionBlockerResult:
          type: string
          description: "Identifies how the transaction was handled by TranBlocker.  \n- 0 Not Checked  \n- 1 Timeout  \n- 2 Successful  \n- 3 Denote and Continue  \n- 4 Deny  \n- 5 Retain \n"
          example: '0 Not Checked '
        debitOnly:
          $ref: "#/components/schemas/DebitOnlyTransactionDetailV3"
        creditOnly:
          $ref: "#/components/schemas/CreditOnlyTransactionDetailV3"
    TransactionSummaryV4:
      type: object
      properties:
        authorizationCode:
          maxLength: 6
          minLength: 2
          type: string
          description: |
            This field contains the authorization approval code generated for transactions that have been successfully approved. It serves as a unique identifier for the approval and is used for transaction validation and reference in subsequent processing steps. This field applies to both debit and credit cards.
          example: "000000"
        responseCode:
          type: string
          description: "This field contains the authorization response code indicating whether the transaction was approved or denied. It is used to identify the outcome of the authorization request and assist in subsequent processing, reconciliation, and issuer decisioning. This field applies to both debit and credit cards. Some of the common codes are as below. For detailed list please refer ISO8583 document.\nCodes and Values: \n\n0  Approved / Completed successfully\n5  Do not honor\n12  Invalid transaction\n14  Invalid card number\n51  Insufficient funds\n54  Expired card\n91  Issuer or switch inoperative\n96  System malfunction\n"
        responseCodeDescription:
          type: string
          description: |
            This field provides the descriptive text corresponding to the authorization response code. It explains the meaning of the response returned by the issuer or network, helping to identify the reason for an approval, denial, or other authorization outcome. This field applies to both debit and credit cards.
          example: APPROVED - NO BALANCES
        responseDetails:
          type: string
          description: |
            his field provides details regarding the response returned for the transaction. It captures the outcome generated during transaction processing, including approval, decline, or any additional status information supplied by the issuer, network, or processing system. The value supports accurate interpretation of processing results and assists with reconciliation, reporting, and troubleshooting.This field applies to both debit and credit cards.
          example: 96-M Error processing PIN
        status:
          type: string
          description: |
            This field indicates the current state of the transaction within the processing lifecycle. It reflects whether the transaction has been initiated, authorized, declined, completed, reversed, or is pending further action. The value helps downstream systems determine the appropriate operational flow, reconciliation steps, and handling logic.
          example: 64-PI LOST
        tranCode:
          type: string
          description: |
            This field identifies the specific transaction being performed, including the action taken and the movement of funds between accounts. It provides the operation type along with the associated From‑account and To‑account details, enabling accurate interpretation of the transaction flow for processing, posting, and audit purposes..
          example: "253"
        transactionId:
          type: string
          description: |
            This field represents the unique system‑generated identifier associated with the record. It is used to track, reference, and retrieve the specific card record within internal systems for processing and audit purposes. This field applies to debit cards only. It is combination of lifecyclekey, active key and DUID.
          example: "{\"lifeCycleKey\":\"12323301232312331\",\"activeKey\":\"0210\",\"duID\":\"11348539120200526\"}"
        transactionStatus:
          type: string
          description: |
            This field indicates the current status of the transaction. It reflects the processing outcome or state assigned by the issuer, network, or system—such as approved, declined, reversed, pending, or completed. The value enables accurate tracking, reconciliation, and reporting of transaction activity throughout its lifecycle. Applies to debit and credit cards.
          example: APPROVED
        transactionType:
          type: string
          description: |
            "This field specifies the type of transaction being performed. It identifies the nature of the cardholder activity—such as purchase, withdrawal, deposit, transfer, payment, balance inquiry, or adjustment—and is used to determine the appropriate processing rules, posting logic, and reporting treatment associated with the transaction.
            Valid values:
            27  LOAD TO PREPAID CARD
            02  PROGRAM DEBIT
            22  PROGRAM CREDIT
            01  WITHDRAWAL
            11  CASH CHECK
            12  DEPOSIT WITH CASHBACK
            17  MONEY TRANSFER DISPENSE
            18  MONEY TRANSFER INITIATE
            20  DEPOSIT
            25  MESSAGE TO BANK
            28  MONEY TRANSFER REFUND
            30  BALANCE INQUIRY
            31  PIN SELECT
            37  STATEMENT PRINT
            38  MEMBER VERIFICATION
            39  ACCOUNT INQUIRY
            40  TRANSFER
            42  PAYMENT ELECTRONIC
            43  PAYMENT ENCLOSED
            44  PAYMENT TO MERCHANT
            45  REFUND FROM MERCHANT
            99  SPECIAL PURCHASE
            10  MT FUNDING
            26  MT CREDIT
            Applies to debit and credit cards."
          example: WITHDRAWAL
        transactionDescription:
          type: string
          description: |
            Description of the transaction. Applies to both debit and credit cards.
          example: MERCHANT ACCOUNT
        acquirerRefNum:
          maxLength: 23
          type: string
          description: This field contains the Acquirer Reference Number (ARN) assigned by the payment network based on information provided by the acquirer. It is primarily used for network-level corrections and transaction tracking. The ARN ensures accurate identification of transactions within the network. This field applies specifically to debit cards.
          example: "1055556060"
        amtCharged:
          type: string
          description: |
            This field contains the transaction amount associated with specific processing scenarios. For
            forced authorization (120) or a forced post-clearing transaction (220), it represents the
            transaction amount. In the case of a partially approved transaction, this is the approved amount.
            The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees.
            For a preauthorization response (110) or an authorization response (210), the amount displayed
            reflects the balance returned in the response, which may be either the ledger balance or the
            available balance. During a partial reversal, Amount 2 indicates the new amount that replaces the
            amount displayed in Amount 1. This field applies specifically to debit cards.
          example: "1299.00"
        eciMastercard:
          maxLength: 35
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI), which provides information about the security level and authentication method used for an electronic commerce transaction. For Debit Mastercard® transactions, the ECI indicates whether the transaction was authenticated and the level of security applied during processing. This field applies specifically to debit cards.  \nPossible Positions 1 and 2 values  \n- 21  -  Channel encryption; cardholder certificate not used  \n- 22  -  Masterpass-generated transaction  \n- 24  -  Digital Secure Remote Payment (DSRP) transaction  \n- 91  -  No security protocol; cardholder certificate not used.  \nPossible Position 3 values  \n- 0  -  Universal cardholder authentication field (UCAF) data collection – Is not supported by the merchant an Identity Check merchant has chosen not to undertake Identity Check on this transaction or identity Check failed authentication and merchant desires to proceed with transaction  \n- 1  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains an attempts AAV  \n- 2  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains a fully authenticated AAV)  \n- 3  -  UCAF data collection is supported by the merchant and UCAF (Mastercard assigned static AAV) must be present  \n- 4  -  Merchant has chosen to share authentication data within authorization; UCAF collection not supported  \n- 5  -  Reserved for future use  \n- 6  -  Merchant Risk-Based Decisioning  \n- 7  -  Partial Shipment or recurring payment; liability depends on the original UCAF values provided and matching with the original transaction  \n"
          example: "3"
        eciVisa:
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI) for Visa transactions, which provides information about the security level and authentication method used during an electronic commerce Visa Check transaction. The ECI helps determine whether the transaction was authenticated and the level of security applied. This field applies specifically to debit cards.  \nPosition 4 - Mail/Phone/Electronic Commerce and Payment Indicator  \n- Space - POS Customer Present (POS Check Service Only)  \n- 1 - Single transaction of a mail/phone order  \n- 2 - Recurring transaction  \n- 3 - Installment payment  \n- 4 - Unknown classification/Other mail order  \n- 5 - Secure electronic commerce transaction  \n- 6 - Non-authenticated security transaction at a 3-D Secure-capable merchant, and merchant attempted to authenticate the cardholder using 3-D Secure  \n- 7 - Non-authenticated security transaction  \n- 8 - Non-secure transaction  \n"
          example: "3"
        expirationDateMismatch:
          type: boolean
          description: |
            This field indicates whether an expiration date mismatch exists between the provided card details and the issuer’s records. It is used for validation during transaction processing to ensure card data accuracy. This field applies specifically to debit cards.
          example: false
        journalDateTime:
          type: string
          description: |
            This field provides the system‑generated timestamp recorded at the time of transaction processing. The value is expressed in Eastern Time (ET) and represents the precise date and time at which the system logged the event. It is used for audit tracking, reconciliation, and sequencing of transaction activity across systems.
          format: date-time
          example: 2023-07-20T13:38:53Z
        effectiveDate:
          type: string
          description: |
            This field contains the date when the transaction became effective. It represents the official effective date for the transaction and is used for settlement and reporting purposes. The value should accurately reflect the date the transaction was finalized. Applies to credit cards only.
          format: date
          example: 2025-07-07
        industryTransactionIdentifier:
          type: string
          description: "Identifier of the transaction assigned by Visa, American Express, or Discover Network For Visa transactions, the identifier means that the approved transaction meets Custom Payment Service (CPS) requirements. Applies to credit only for Pending, Posted and Declined transactions."
          example: "123456789007894"
        issuerTraceNumber:
          type: string
          description: "TFiserv-assigned identifier of a transaction associated with an authorization. Applies to credit only for Pending, Posted and Declined transactions."
        memberNumber:
          type: string
          description: |
            Unique number associated with each member of the card. Based on the card prefix setup. Editable when adding a record.
            If the member number is not passed, defaults to 0 (zero).
            Applies to debit cards only.
          example: "0"
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: "This field specifies the Merchant Category Code (MCC) associated with the transaction. The MCC is a nationally recognized four‑digit code used to classify the type of business, product, or service offered by the card acceptor. It helps determine transaction category, routing rules, reporting classifications, and compliance requirements. \n"
          format: numeric
          example: "6011"
        merchantCity:
          maxLength: 16
          type: string
          description: |
            This field contains the Regulation E location details, specifically the city and state where the terminal involved in the transaction is located. It is used for compliance and reporting purposes under Regulation E requirements. Applies to debit cards only.
          example: Newark
        merchantName:
          maxLength: 25
          type: string
          description: |
            This field contains the name of the merchant associated with the transaction. It is used for identifying the card acceptor during processing, reporting, and reconciliation. Applies to debit cards only.
          example: Store1
        merchantState:
          maxLength: 3
          minLength: 2
          type: string
          description: "This field contains the state where the merchant associated with the transaction is located. It is used for identifying the merchant’s geographic location for processing, reporting, and compliance purposes.  \nAL Alabama | AK Alaska | AS American Samoa (US Territory) | AZ Arizona | AR Arkansas  \nCA California | CO Colorado | CT Connecticut | DE Delaware | DC District of Columbia  \nFM Federated States of Micronesia (US Territory) | FSM Federated States of Micronesia (US Territory)  \nFL Florida | GA Georgia | GU Guam (US Territory) | GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada | NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina | SD South Dakota | TN Tennessee | TX Texas | UT Utah  \nVT Vermont | VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin | WY Wyoming . Applies to debit cards only. \n"
          example: NJ
        merchantCountry:
          type: string
          description: |
            Country where the merchant is located. Applies to both debit and credit cards
          example: USA
        merchantPostalCode:
          type: string
          description: |
            Postal Code of the merchant location. Applies to both debit and credit cards
          example: "12345"
        messageType:
          maxLength: 4
          type: string
          description: "This field contains the combination of the transaction message type code and its corresponding description. It is used to identify and interpret the nature of the transaction message during processing and reporting. Applies to debit cards only.  \n- 100- Pre-Auth Request  \n- 102- Pre-Auth Reversal  \n- 110- Preauthorization  \n- 120- Pre-Auth Stand In  \n- 121- Pre-Auth Adv Repeat  \n- 130- Auth Advice Resp  \n- 200- Request  \n- 202- Auth Reversal  \n- 210- Auth/Completion  \n- 220- Forced Completion  \n- 221- Advice Repeat  \n- 230- Advice Response  \n- 320- Batch Upload  \n- 330- Batch Upload Resp  \n- 420- Reversal  \n- 421- Advice Rev Repeat  \n- 430- Reversal Response  \n- 500- Batch Settl Request  \n- 510- Batch Settl Resp  \n- 800- Network Mgmt Req  \n- 810- Network Mgmt Resp  \n- 820- Network Mgmt Advice  \n"
          example: 420- Reversal
        network:
          type: string
          description: |
            This field identifies the payment network responsible for routing the transaction from the merchant to the financial institution (FI). It indicates which network carried the authorization message during transaction processing and is used for network-specific reporting, reconciliation, and fee assessment.Applies to debit and credit cards both.
          example: 655100 - Mastercard Credit - Affiliate Member
        messageId:
          type: string
          description: "This field specifies the ISO message type identifier associated with the transaction. It represents the ISO 8583 message class and function—for example, authorization request, advice, or reversal—and is used by payment networks and issuer systems to route, interpret, and process the transaction correctly. Applies to credit cards   \\n\""
          example: "9926"
        pinTransaction:
          type: boolean
          description: |
            This field indicates whether a Personal Identification Number (PIN) was used to authenticate the transaction. Valid values are “Yes” or “No,” specifying the presence or absence of PIN-based verification. Applies to debit cards only.
          example: true
        posDataInputCapability:
          maxLength: 1
          type: string
          description: "This field indicates the capability of the terminal to manually enter the card number and expiration date into the system. It reflects whether the terminal supports key‑entry functionality as part of the card data capture process. This field applies specifically to debit cards. Valid values are- 0  Unknown / Not specified 1  Manual entry only 2  Magnetic stripe read 3  Manual + Magnetic stripe 4  Chip (ICC) capable 5  Manual + Chip 6  Magnetic stripe + Chip 7  Manual + Magnetic stripe + Chip 8  Contactless capable 9  All capabilities (Manual, Magstripe, Chip, Contactless) Some APIs (like CyberSource or Fiserv) use a two-digit numeric or bit-mapped representation to indicate multiple capabilities."
          example: "2"
        posDataInputMode:
          type: string
          description: |
            This field indicates the method used to capture card information at the terminal. It identifies how the card data—such as card number and expiration date—was entered, whether through swipe, dip, tap, manual key entry, or another input method supported by the terminal. This field applies specifically to debit cards.
            Valid values:
              00  Unspecified
              01  Manual
              02  Swipe
              03  Barcode
              04  OCR
              05  Chip
              06  Key Entered
              07  Contactless Chip
              81  Credential on file / e-commerce transaction
              90  Contactless Magstripe
              Applies to debit cards only.
          example: 2 - Swipe
        preAuthAmt:
          type: string
          description: |
            This field contains the transaction amount returned in specific processing scenarios. For a preauthorization response (110) or an authorization response (210), it represents the amount associated with the response. In the case of a partially approved transaction, this value reflects the amount that was approved. For a denied transaction, it contains the originally requested amount. The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees. For a forced post preauthorization (120) or a forced post clearing transaction (220), the clearing amount shown in Amount 2 is duplicated in Amount 1. During a reversal, Amount 1 represents the amount to be reversed. Applies to debit cards only.
          example: "1.00"
        retrievalRefNumber:
          maxLength: 12
          type: string
          description: |
            This field contains the reference number supplied and retained by the message originator. It serves as an identifier used to track or correlate the transaction throughout processing. The value may be up to 12 characters in length.
          format: numeric
          example: "518813000031"
        subResponseCode:
          type: string
          description: |
            This field contains an optional one‑character value that provides additional detail for specific denial codes. It is case‑sensitive, and its meaning varies based on the combination of the authorization response code and the response sub‑code. This field is used to further refine the reason for a denial when applicable. Applies to debit cards only.
          example: M
        systemRecordId:
          type: string
          description: "This field contains the unique system-generated identifier associated with the record. It may include lifecycle key, duID, or active key values that support internal tracking and state management of the card record."
          example: 377761184|12080251120230113|0120
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field contains the identifier for the terminal where the transaction was performed. It is used to uniquely distinguish the originating terminal for processing, tracking, and audit purposes. Applies to debit cards only.
          format: alphanumeric
          example: VMDIEOS1
        transactionAmount:
          type: string
          description: |
            Amount on a particular transaction. Valid format is 0.00. Applies to debit and credit cards.
          example: "1299.00"
        transactionDateTime:
          type: string
          description: |
            This field captures the date and time at which the transaction was created. It records the precise timestamp used for transaction logging, auditing, and reporting. Applies to debit and credit cards.
          format: date-time
          example: 2025-07-07T22:35:49Z
        unmatchedCompletionFlag:
          type: boolean
          description: |
            This field indicates whether the transaction is marked with an unmatched completion flag, used to identify transactions where the completion record does not correspond to a previously authorized transaction. Applies to debit cards only.
          example: false
    DebitOnlyTransactionDetailV4:
      type: object
      properties:
        acqPostDate:
          type: string
          description: "This field specifies the date on which the acquirer posted the transaction. For interchange transactions, the value depends on the settlement process- If Card Services performs settlement, the field reflects the actual acquirer posting date. If Card Services does not perform settlement, the field reflects the network settlement date.  \n"
          example: 2024-12-23
        atcResult:
          type: string
          description: "Application Transaction Counter Result. Indicates if the ATC passed or failed authentication or was not processed or checked. \n"
          example: PASSED
        avsResult:
          type: string
          description: "Address verification service result.Applies to debit cards only. \nValid Values-\nA  Address matches, ZIP/postal code does not\nB  Street address matches, postal code in wrong format\nC  Street address and postal code in wrong format\nD  Street address and postal code match (international issuer)\nE  Error response for Merchant Category Code\nF  Cardholder name incorrect, address matches\nG  Card issued by a non-US issuer that does not participate in AVS\nI  Address information not verified by international issuer\nM  Street address and postal code match (international issuer)\nN  No match on address or ZIP/postal code\nO  Cardholder name and billing address match\nP  Postal code matches, street address not verified due to incompatible formats\nR  Retry – system timed out or unavailable\nS  Service not supported by issuer\nU  Address information is unavailable\nW  Nine-digit ZIP code matches, address does not\nX  Exact AVS match – address and nine-digit ZIP code match\nY  Address and five-digit ZIP code match\nZ  Five-digit ZIP code matches, address does not\n"
          example: A
        camResult:
          type: string
          description: "Card Authentication Method Result. Indicates if the application request cryptogram (ARQC) passed or failed authentication, or was not processed or checked."
          example: "04"
        cardCountry:
          type: string
          description: |
            This field identifies the country in which the card issuer is located. It represents the issuer’s geographic origin and is used for regulatory, routing, and reporting purposes.
          example: USA
        cardCounty:
          type: string
          description: |
            This field specifies the county in which the card issuer is located. It identifies the issuer’s local geographic jurisdiction and may be used for regulatory, compliance, or region‑specific reporting purposes.
          example: "000"
        cardholderAddress:
          type: string
          description: |
            This field contains the address information supplied for Address Verification Service (AVS) checks. It is used to validate the cardholder’s billing address during transaction processing. This field applies to debit cards only.
          example: '12345    1010 Kharadi Pune   '
        cardLogo:
          maxLength: 4
          type: string
          description: |
            Represents the card issuer’s 4‑character alphanumeric client identifier. This field uniquely identifies the issuing institution within card‑processing systems and is used for routing, processing, and institution‑level configuration.
          example: ABCD
        cashbackAmount:
          type: string
          description: |
            Represents the amount of cash returned to the cardholder during a transaction. This field identifies the cash‑back portion provided as part of a purchase or withdrawal transaction, supporting accurate posting, reconciliation, and reporting of cash‑back activity.
          example: "0.00"
        cvrResult:
          type: string
          description: |
            Represents the Card Verification Result (CVR) provided by the EMV chip during the transaction request. This field contains EMV‑generated cryptographic and risk‑assessment indicators used to validate the authenticity of the card, assess transaction conditions, and support authorization decisioning.
          example: "2"
        cvrResultStat:
          type: string
          description: |
            Represents the Card Verification Results outcome, indicating whether the CVR passed authentication, failed authentication, or was not processed or checked. This field reflects the EMV validation result returned during the transaction and supports authorization decisioning, fraud detection, and risk assessment.
          example: PASS
        cvv2Cvc2Result:
          type: string
          description: "Represents the result of verifying the Card Verification Value (CVV2) or Card Validation Code (CVC2) taken from the card’s signature panel. This field indicates whether the CV2 authentication passed, failed, or returned another applicable verification status, supporting fraud‑prevention, card‑not‑present validation, and authorization decisioning."
          example: "false"
        depositType:
          type: string
          description: |
            Indicates the type of deposit made—whether it is a check deposit, cash deposit, or a mixed deposit containing both. This field identifies the composition of the deposit to support accurate processing, posting, and reporting of deposit transactions.
          example: Cash
        eCommerce:
          type: string
          description: |
            Indicates if the transaction was eCommerce.
          example: ""
        emvApplicationID:
          type: string
          description: |
            EMV application identifier. EMV application ID (AID) is used to uniquely identify each EMV application that a terminal supports. Every application identifier has an associated card scheme and parameters relating to how the application needs to be processed. A terminal may contain any number of such applications.
          example: A0000000031010
        emvCard:
          type: string
          description: |
            Indicates if the card used in the transaction is EMV. Possible values Yes or No.
          example: "Yes"
        emvCardSequence:
          type: string
          description: |
            Distinguishes among separate cards having the same PAN. Issuers may encode chip cards with Card Sequence Numbers. Acquirers with chip-reading capability may pass this information encoded on the chip.
        emvFallback:
          type: boolean
          description: |
            Indicates if the transaction is EMV fallback. Possible values Yes or No.
          example: true
        emvTerminal:
          type: boolean
          description: |
            Indicates if the terminal is EMV capable. Possible values Yes or No.
          example: true
        emvTransaction:
          type: boolean
          description: |
            Indicates if it is an EMV transaction. Possible values Yes or No.
          example: true
        entryMode:
          type: string
          description: |
            Method used to input the information from the card to the terminal.
          example: 2 - Swipe
        fromAccount:
          type: string
          description: |
            Number of the account impacted by a cardholder transaction.
        fromAccountType:
          type: string
          description: |
            Type of the account impacted by a cardholder transaction.
          example: Checking
        international:
          type: boolean
          description: |
            Indicates if the transaction was international.
          example: false
        locAmt1:
          type: string
          description: |
            Local amount 1. Amount 1 field in the acquirer's currency. Contains the same value as Amount 1 if the acquirer's currency is U.S.
          example: ""
        locAmt2:
          type: string
          description: |
            Local amount 2. Amount 2 field in the acquirer's currency. Contains the same value as Amount 2 if the acquirer's currency is U.S.
          example: ""
        merchantAdviceCode:
          type: string
          description: |
            Merchant advice code
          example: ""
        merchantCountry:
          type: string
          description: |
            Country where the merchant is located.
          example: USA
        merchantId:
          type: string
          description: |
            Merchant identification number where the transaction originated.
        mobileDenial:
          type: string
          description: |
            Indicates the control policy selected by the cardholder through CardValet/CardHub which denied the transaction.
          example: ""
        mvv:
          type: string
          description: |
            Identifies merchants that qualify for preferred interchange rates on POS transactions. If not present, standard interchange rates apply to the transaction. Assigned by Interlink and Visa.
          example: ""
        offline:
          type: string
          description: |
            Offline EMV processing indicates the card and terminal authorized a transaction without the transaction being routed to the host for processing
            Card Services EMV solution does not presently support offline processing capabilities so this field will display No. For cards not issued by Fiserv, this may display Yes.
            Values
            Y = Offline EMV transaction
            N = Online EMV transaction
        pinPresent:
          type: string
          description: "Personal identification number present. Indicates if PIN was used or not, and whether the transaction routed through a standard PIN’d network or a typical Signature network.\n- 0 = Undetermined\n- 1 = Signature Network with PIN \n- 2 = Signature Network without PIN \n- 3 = Debit Network without PIN\n- 4 = Debit Network with PIN\n"
        pointOfService:
          type: string
          description: "Indicates the type of device used to acquire the transaction or the purpose of the transaction.  \n- 002 - ON-PREMISE  \n- 004 - ELECTRONIC CASH REGISTER  \n- 006 - PRE-AUTHORIZED REQUEST  \n- 007 - PRE-AUTHORIZED REQUEST-NO PIN  \n- 014 - GENERIC  \n- 051 - VERIFICATION OF FUNDS  \n- 054 - GAS PUMP  \n- 062 - OFF-PREMISE  \n- 064 - SCRIP DISPENSE  \n- 072 - RETAIL  \n- 074 - ADMINISTRATIVE  \n- 081 - PAYIT OR BANKIT TRANSACTION (ITP)  \n- 086 - PIN, NO TRACK2  \n- 087 - MERCHANT AUTHORIZED TRANSACTION  \n- 088 - PAPER CAPTURE  \n- 089 - TRACK READ (PAN AND EXP), NO PIN  \n- 090 - NO PIN, NO TRACK2  \n- 091 - NO PIN, TRACK2  \n- 092 - INTERNATIONAL  \n- 094 - SHARED BRANCH STAND ALONE  \n- 096 - SHARED BRANCH FRANCHISE  \n- 097 - SHARED BRANCH OUTLET  \n"
          example: 002 - ON-PREMISE
        posDataCode:
          type: string
          description: |
            12-digit code indicating specific conditions present at the time of the transaction at the POS identifying terminal capability, terminal environment, and security data.
          example: ""
        posEntryMode:
          type: string
          description: |
            Point of Sale (POS) entry mode
        productType:
          type: string
          description: |
            Product Type - ATM or POS.
        recurringPaymentInd:
          type: string
          description: |
            Mastercard expert monitoring system score or Visa advanced authorization score.
          example: ""
        reversalCode:
          type: string
          description: |
            The reason for a reversal.
          example: 00 - NON REVERSAL
        secureEci:
          type: string
          description: "Electronic commerce indicator (ECI) provides network information regarding the security level and authentication method used for an electronic commerce transaction.  \n"
        sequenceNumber:
          type: string
          description: |
            Chronological numeric identifier for the transaction, assigned by the terminal. Applies to debit cards only.
          example: "000031"
        surchargeAmount:
          type: string
          description: |
            Amount of the ATM-level surcharge assessed by the terminal owner for the transaction.
        surchargeReservalAmount:
          type: string
          description: |
            Surcharge amount to settlement of the original nonreversal transaction.
        terminalLogo:
          type: string
          description: |
            Client identifier of terminal owner.
          example: ""
        terminalPinCapable:
          type: string
          description: |
            Indicates the ability of the terminal to accept PIN.
          example: "No"
        terminalState:
          type: string
          description: "Terminal State. \n"
        terminalStreet:
          type: string
          description: |
            Street address where the terminal is located.
          example: PARAGON APPLICAT
        toAccount:
          type: string
          description: "Number of the account impacted by a cardholder transaction. \n"
          example: "0000000000000000000"
        toAccountType:
          type: string
          description: |
            Type of the account impacted by a cardholder transaction.
          example: Checking
        tokenRequestorId:
          type: string
          description: |
            Wallet details. Possible values Apple pay - Google Pay - Samsung pay - Fitbit Pay - Garmin pay.
          example: ""
        tokenTransaction:
          type: string
          description: |
            Token Transaction. A tokenized payment transaction uses a token PAN that is an alternate 13- to 19-digit value provisioned for the real or true PAN. The real PAN is the card number assigned by the FI. For token provisioning transactions, this field is not applicable and the value is always N.
          example: "No"
        tokenType:
          type: string
          description: "Token Requestor Id. \n"
        transactionNetAmount:
          type: string
          description: |
            Requested amount presented to the FI, or the amount approved if partially approved, regardless of the.
          example: "20.00"
        transactionSource:
          type: string
          description: "Transacrion Source \n"
        tvrResult:
          type: string
          description: |
            Terminal Verification Result. TVR status provided by the terminal on the transaction request.
          example: ""
        tvrResultStat:
          type: string
          description: |
            Terminal Verification Results Status Result. Indicates if the TVR passed or failed authentication or was not processed or checked.
          example: ""
    CreditOnlyTransactionDetailV4:
      type: object
      properties:
        acquiringCountryCode:
          type: string
          description: "Code of the country where the acquiring institution is located. \n"
        additionalData1:
          type: string
          description: |
            Any optional data received on the response.
          example: ""
        additionalData2:
          type: string
          description: |
            Any optional data received on the response.
          example: ""
        appInterchangeProfile:
          type: string
          description: |
            Field 138 is carried in VSDC transactions and provides a series of indicators that reflect the specific functions supported by the chip card account, for example, whether cardholder verification is supported.This field maps to Field 55, Tag 82—Application Interchange Profile.
        availableUsage:
          type: string
          description: |
            Amount of available credit on the account.
          example: ""
        avsOptionCode:
          type: string
          description: |
            Address Verification Service (AVS) Request indicates that verification of the cardholder billing address is requested in the authorization message.
          example: ""
        avsPostalCode:
          type: string
          description: |
            Identifies the cardholder postal code and street address that is used for certain types of verification.
          example: ""
        cardAcceptorCity:
          type: string
          description: |
            Indicates the city where the call originated.
        cardAcceptorName:
          type: string
          description: |
            Indicates the name of the establishment where the transaction was acquired.
          example: ""
        cardAcceptorTermId:
          type: string
          description: |
            Identifies a terminal at the card acceptor location of acquiring institutions or merchant POS systems. The terminal ID should be printed on all transaction receipts in ATM and POS transactions where the terminal is capable of generating customer receipts.
        cardSequenceNumber:
          type: string
          description: |
            Card Sequence Number distinguishes among separate cards having the same PAN.
          example: ""
        cvcResultCode:
          type: string
          description: |
            The result code of CVC (Card Verification Code).
        cvvCVVtwo:
          type: string
          description: |
            The CVV2/CVC2 value that is printed on the signature panel of Visa and Mastercard plastics. This value is made available for issuers that want to validate the CVV2/CVC2 value themselves. The value will only be passed to an issuer if provided by the acquirer.  Provided transactions in which the debit card is not present.
        fraudDecision:
          type: string
          description: |
            Decision returned by the third-party fraud interface
        originalResponseCode:
          type: string
          description: |
            Original response code from the original transaction. For an instance, when V.I.P. encounters a duplicate transaction, this field contains the field 39 response code from the original transaction.
        pinVerified:
          type: string
          description: |
            Indicates if PIN verification took place on the client platform.
        posCode:
          type: string
          description: "Identifies the Point of Service   condition code. It describes the condition under which the transaction took place at POS. \n"
        posMode:
          type: string
          description: |
            Numeric codes to indicate the method by which the PAN was entered into the interchange system and to indicate the POS terminal PIN entry capabilities.
          example: ""
        referenceNumber:
          type: string
          description: |
            Reference number assigned to the transaction.
        reversalreason:
          type: string
          description: |
            Reason for reversal transaction.
        riskCodeOne:
          type: string
          description: |
            Field 62.22, positions 1-2 is a Visa private-use field that contains additional Advanced Authorization online risk assessment information to assist issuers in the authorization decision-making process. The condition codes provide descriptive information for high-risk assessments.These positions may contain a Compromised Account Risk Condition Code (CARCC) related to a high-risk even in the Compromised Account Management System (CAMS).
        riskReasonCodeOne:
          type: string
          description: |
            Field 62.21, position 3 is.an alphanumeric combination that will act as a key to explain the risk score model.
        riskScore:
          type: string
          description: |
            Field 62.21, positions 1-2 is a Visa private-use field that contains online risk assessment information from Advanced Authorization. This information assists issuers in the authorization decision-making process.This value indicates the degree of risk associated with a transaction. This two-byte transaction risk score is represented by a numeric value from 01–99.
        settlementAmount:
          type: string
          description: |
            Amount paid to merchant.
          example: "1100.00"
          x-encrypted: "N"
        settlementConversionRate:
          type: string
          description: |
            Conversion Rate applied on settlement amount.
        tagCode:
          type: string
          description: |
            Indicates whether the merchant terminal supports a specific program or service.
        tagData:
          type: string
          description: |
            Identifies the electronic commerce indicators representing the security level and cardholder authentication associated with the transaction.
        tranAmtOriginal:
          type: string
          description: "Original amount of funds requested by the cardholder in the transaction currency (US Dollars). This amount includes cashback and surcharge fees and is exclusive of ISA and CCA fees. \n"
        tranFeeAmount:
          type: string
          description: |
            Fee amount charged on transaction.
          example: "20.00"
        transmissionDateTime:
          type: string
          description: |
            Date and Time when transaction was created. Applies to debit and credit cards.
          format: date-time
        declinedTransactionDetails:
          $ref: "#/components/schemas/DeclinedTransactionDetailsV4"
        pendingTransactionDetails:
          $ref: "#/components/schemas/PendingTransactionDetailsV4"
        postedTransactionDetails:
          $ref: "#/components/schemas/PostedTransactionDetailsV4"
    PendingTransactionDetailsV4:
      type: object
      properties:
        authorizationCode:
          type: string
          description: |
            This field contains the authorization approval code returned by the issuer for the transaction. It represents the system‑generated alphanumeric code confirming that the transaction was approved and is used for reconciliation, dispute handling, and audit tracking. This field is applicable to debit card transactions.
          example: "121052"
        declinedReasonCode:
          type: string
          description: "This field specifies the reason code returned when a transaction is declined. It provides a standardized system‑generated code that identifies the specific cause of the decline and is used for issuer decisioning, operational analysis, dispute research, and customer communication. This field is applicable to debit card transactions. \n"
          example: "0"
        enteredExpirationDate:
          type: string
          description: |
            EThis field captures the expiration date entered during the transaction. It represents the month and year (MM/YY) provided by the cardholder or terminal to validate the card’s validity period during authorization. This field is applicable to debit card transactions.
          example: 22/12
        expandedReasonCode:
          type: string
          description: |
            This field provides the expanded reason code associated with a declined or exception transaction. It delivers a more detailed classification of the decline cause beyond the primary reason code, supporting precise issuer analysis, dispute handling, reconciliation, and audit reporting. This field is applicable to debit card transactions.
          example: "99999"
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: |
            This field specifies the Merchant Category Code (MCC) associated with the transaction. The MCC is a nationally recognized four‑digit code used to classify the type of business, product, or service offered by the card acceptor. It helps determine transaction category, routing rules, reporting classifications, and compliance requirements. This field is applicable to debit card transactions.
          format: numeric
          example: "6011"
        merchantNumber:
          type: string
          description: |
            This field identifies the merchant where the transaction originated. It provides the merchant name or identifier associated with the card‑accepting location and is used for transaction routing, reconciliation, reporting, and customer communication. This field is applicable to debit card transactions.
          example: "443011000000018"
        originalAuthAdjustmentAmount:
          type: string
          description: "This field specifies the adjustment amount applied to the original authorized amount. It represents the difference between the amount initially authorized and the final transaction amount submitted for posting. For example, if an authorization was approved for 100 and the transaction is completed for 60, the adjustment amount is 40. This adjustment is used for settlement accuracy, reconciliation, and audit tracking. This field is applicable to debit card transactions. \n"
          example: "40.00"
        posEntryModeCode:
          type: string
          description: |-
            This field specifies the Point of Sale (POS) entry mode code used during the transaction. The POS entry mode indicates how the card information was captured at the terminal—for example, via chip, magnetic stripe, contactless tap, manual key entry, or fallback methods. It is used for authorization decisioning, risk evaluation, fraud monitoring, and reporting. This field is applicable to debit card transactions. Valid codes for Mastercard- 00 - Entry mode unknown 01 - Manual input; no terminal 02 - Magnetic stripe reader input 03 - Entry via bar code reader For Discover, this code represents the bar code/payment code. 04 - Entry via optical character recognition (OCR) 05 - Entry via chip 06 - Key-entered input 07 - PAN auto-entry via contactless M/Chip 09 - PAN entry via electronic commerce, including remote chip 79 - Chip card at a chip-capable terminal was unable to process transaction using data on the chip or magnetic stripe; entry was manual 80 - Chip card at a chip-capable terminal was unable to process transactions using data on the chip; terminal defaulted to magnetic stripe read 81 - Entry via electronic commerce, including chip 90 - Automatic entry via magnetic stripe; full track data has been read without alteration or truncation 91 - PAN auto-entry via contactless magnetic stripe S - Electronic commerce, no security, channel encrypted, or SET without cardholder certificate T - Electronic commerce, SET with cardholder certificate
            Valid codes for Visa- 00 - Terminal not used 01 - Key-entered input 02 - Magnetic stripe read; track 2 when known or when the terminal makes no distinction between track 1 and track 2 03 - Entry via bar code read 04 - Entry via optical character recognition (OCR) 05 - Integrated circuit card read; CVV or ICVV data reliable 06 - Track 1 read 07 - Proximity payment originating using VSDC chip data rules 10 - Credential on file 84 - MICR reader 90 - Complete magnetic stripe read and transmitted (CVV) 91 - Proximity payment originating using magnetic stripe data rules 95 - Integrated circuit card read; CVV or ICVV data unreliable This code is used to indicate the magnetic stripe image may be unreliable and that accurate CVV or iCVV processing may not be possible. 96 - Stored value from pre-registered checkout service blank - Not specified
          example: "01"
        transactionAccountNumber:
          maxLength: 16
          type: string
          description: |
            This field specifies the card number associated with the transaction and may vary based on the transaction type. For authorization transactions, it reflects the card number used at the time of authorization. For posted transactions, it represents the account number or card number tied to the final settled entry. In the case of credit card transactions, this value may differ from the authorization card reference due to issuer or network processing rules. This field is applicable to both debit and credit card transactions, with credit‑specific variations noted above.
          example: "123456789"
        transactionCode:
          type: string
          description: "This field represents the code associated with a particular transaction. It provides a system‑assigned identifier used to classify, track, and reference the transaction throughout authorization, posting, reconciliation, and reporting processes. This field is applicable to debit card transactions.  \n"
          example: "255"
        transactionDescription:
          type: string
          description: |
            This field provides a descriptive summary of the transaction. It offers a human‑readable explanation of the transaction type or purpose and supports reporting, reconciliation, customer communication, and audit review. This field is applicable to debit card transactions.
          example: BALANCE TRANSFER CASH
    TransactionDetailsV4:
      type: object
      properties:
        authorizationCode:
          maxLength: 6
          minLength: 2
          type: string
          description: |
            This field contains the authorization approval code generated for transactions that have been successfully approved. It serves as a unique identifier for the approval and is used for transaction validation and reference in subsequent processing steps. This field applies to both debit and credit cards.
          example: "000000"
        responseCode:
          type: string
          description: |
            Authorization response approval or denial code.  Applies to debit and credit cards.
          example: "000"
        responseCodeDescription:
          type: string
          description: |
            This field provide description for response code. Applies to debit and credit cards.
          example: APPROVED - NO BALANCES
        responseDetails:
          type: string
          description: |
            his field provides details regarding the response returned for the transaction. It captures the outcome generated during transaction processing, including approval, decline, or any additional status information supplied by the issuer, network, or processing system. The value supports accurate interpretation of processing results and assists with reconciliation, reporting, and troubleshooting. Applies to both credit and debit cards.
          example: 96-M Error processing PIN
        status:
          type: string
          description: |
            This field indicates the current state of the transaction within the processing lifecycle. It reflects whether the transaction has been initiated, authorized, declined, completed, reversed, or is pending further action. The value helps downstream systems determine the appropriate operational flow, reconciliation steps, and handling logic.
          example: 64-PI LOST
        tranCode:
          type: string
          description: |
            This field identifies the specific transaction being performed, including the action taken and the movement of funds between accounts. It provides the operation type along with the associated From‑account and To‑account details, enabling accurate interpretation of the transaction flow for processing, posting, and audit purposes.
          example: "253"
        transactionId:
          type: string
          description: |
            This field represents the unique system‑generated identifier associated with the record. It is used to track, reference, and retrieve the specific card record within internal systems for processing and audit purposes. This field applies to debit cards only. It is combination of lifecyclekey, active key and DUID.
          example: "{\"lifeCycleKey\":\"12323301232312331\",\"activeKey\":\"0210\",\"duID\":\"11348539120200526\"}"
        transactionStatus:
          type: string
          description: |
            This field indicates the current status of the transaction. It reflects the processing outcome or state assigned by the issuer, network, or system—such as approved, declined, reversed, pending, or completed. The value enables accurate tracking, reconciliation, and reporting of transaction activity throughout its lifecycle. Applies to debit and credit cards.
          example: APPROVED
        transactionType:
          type: string
          description: |
            This field specifies the type of transaction being performed. It identifies the nature of the cardholder activity—such as purchase, withdrawal, deposit, transfer, payment, balance inquiry, or adjustment—and is used to determine the appropriate processing rules, posting logic, and reporting treatment associated with the transaction.
            Valid values:
            27  LOAD TO PREPAID CARD
            02  PROGRAM DEBIT
            22  PROGRAM CREDIT
            01  WITHDRAWAL
            11  CASH CHECK
            12  DEPOSIT WITH CASHBACK
            17  MONEY TRANSFER DISPENSE
            18  MONEY TRANSFER INITIATE
            20  DEPOSIT
            25  MESSAGE TO BANK
            28  MONEY TRANSFER REFUND
            30  BALANCE INQUIRY
            31  PIN SELECT
            37  STATEMENT PRINT
            38  MEMBER VERIFICATION
            39  ACCOUNT INQUIRY
            40  TRANSFER
            42  PAYMENT ELECTRONIC
            43  PAYMENT ENCLOSED
            44  PAYMENT TO MERCHANT
            45  REFUND FROM MERCHANT
            99  SPECIAL PURCHASE
            10  MT FUNDING
            26  MT CREDIT
            Applies to debit and credit cards.
          example: WITHDRAWAL
        acquirerRefNum:
          maxLength: 23
          type: string
          description: This field contains the Acquirer Reference Number (ARN) assigned by the payment network based on information provided by the acquirer. It is primarily used for network-level corrections and transaction tracking. The ARN ensures accurate identification of transactions within the network. This field applies specifically to debit cards.
          example: "1055556060"
        amtCharged:
          type: string
          description: |
            This field contains the transaction amount associated with specific processing scenarios. For
            forced authorization (120) or a forced post-clearing transaction (220), it represents the
            transaction amount. In the case of a partially approved transaction, this is the approved amount.
            The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees.
            For a preauthorization response (110) or an authorization response (210), the amount displayed
            reflects the balance returned in the response, which may be either the ledger balance or the
            available balance. During a partial reversal, Amount 2 indicates the new amount that replaces the
            amount displayed in Amount 1. This field applies specifically to debit cards.
          example: "1299.00"
        eciMastercard:
          maxLength: 35
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI), which provides information about the security level and authentication method used for an electronic commerce transaction. For Debit Mastercard® transactions, the ECI indicates whether the transaction was authenticated and the level of security applied during processing. This field applies specifically to debit cards.  \nPossible Positions 1 and 2 values  \n- 21  -  Channel encryption; cardholder certificate not used  \n- 22  -  Masterpass-generated transaction  \n- 24  -  Digital Secure Remote Payment (DSRP) transaction  \n- 91  -  No security protocol; cardholder certificate not used.  \nPossible Position 3 values  \n- 0  -  Universal cardholder authentication field (UCAF) data collection – Is not supported by the merchant an Identity Check merchant has chosen not to undertake Identity Check on this transaction or identity Check failed authentication and merchant desires to proceed with transaction  \n- 1  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains an attempts AAV  \n- 2  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains a fully authenticated AAV)  \n- 3  -  UCAF data collection is supported by the merchant and UCAF (Mastercard assigned static AAV) must be present  \n- 4  -  Merchant has chosen to share authentication data within authorization; UCAF collection not supported  \n- 5  -  Reserved for future use  \n- 6  -  Merchant Risk-Based Decisioning  \n- 7  -  Partial Shipment or recurring payment; liability depends on the original UCAF values provided and matching with the original transaction  \n"
          example: "3"
        eciVisa:
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI) for Visa transactions, which provides information about the security level and authentication method used during an electronic commerce Visa Check transaction. The ECI helps determine whether the transaction was authenticated and the level of security applied. This field applies specifically to debit cards.  \nPosition 4 - Mail/Phone/Electronic Commerce and Payment Indicator  \n- Space - POS Customer Present (POS Check Service Only)  \n- 1 - Single transaction of a mail/phone order  \n- 2 - Recurring transaction  \n- 3 - Installment payment  \n- 4 - Unknown classification/Other mail order  \n- 5 - Secure electronic commerce transaction  \n- 6 - Non-authenticated security transaction at a 3-D Secure-capable merchant, and merchant attempted to authenticate the cardholder using 3-D Secure  \n- 7 - Non-authenticated security transaction  \n- 8 - Non-secure transaction  \n"
          example: "3"
        expirationDateMismatch:
          type: boolean
          description: |
            This field indicates whether an expiration date mismatch exists between the provided card details and the issuer’s records. It is used for validation during transaction processing to ensure card data accuracy. This field applies specifically to debit cards.
          example: false
        journalDateTime:
          type: string
          description: |
            This field provides the system‑generated timestamp recorded at the time of transaction processing. The value is expressed in Eastern Time (ET) and represents the precise date and time at which the system logged the event. It is used for audit tracking, reconciliation, and sequencing of transaction activity across systems.
          format: date-time
          example: 2023-07-20T13:38:53Z
        effectiveDate:
          type: string
          description: |
            This field contains the date when the transaction became effective. It represents the official effective date for the transaction and is used for settlement and reporting purposes. The value should accurately reflect the date the transaction was finalized. Applies to credit cards only.
          format: date
          example: 2025-07-07
        memberNumber:
          type: string
          description: |
            Unique number associated with each member of the card. Based on the card prefix setup. Editable when adding a record.
            If the member number is not passed, defaults to 0 (zero).
            Applies to debit cards only.
          example: "0"
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: |
            This field specifies the Merchant Category Code (MCC) associated with the transaction. The MCC is a nationally recognized four‑digit code used to classify the type of business, product, or service offered by the card acceptor. It helps determine transaction category, routing rules, reporting classifications, and compliance requirements. Applies to both debit and credit cards.
          format: numeric
          example: "6011"
        merchantCity:
          maxLength: 16
          type: string
          description: |
            This field contains the Regulation E location details, specifically the city and state where the terminal involved in the transaction is located. It is used for compliance and reporting purposes under Regulation E requirements. Applies to debit cards only.
          example: Newark
        merchantName:
          maxLength: 25
          type: string
          description: |
            This field contains the name of the merchant associated with the transaction. It is used for identifying the card acceptor during processing, reporting, and reconciliation. Applies to debit cards only.
          example: Store1
        merchantState:
          maxLength: 3
          minLength: 2
          type: string
          description: "This field contains the state where the merchant associated with the transaction is located. It is used for identifying the merchant’s geographic location for processing, reporting, and compliance purposes.  \nAL Alabama | AK Alaska | AS American Samoa (US Territory) | AZ Arizona | AR Arkansas  \nCA California | CO Colorado | CT Connecticut | DE Delaware | DC District of Columbia  \nFM Federated States of Micronesia (US Territory) | FSM Federated States of Micronesia (US Territory)  \nFL Florida | GA Georgia | GU Guam (US Territory) | GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada | NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina | SD South Dakota | TN Tennessee | TX Texas | UT Utah  \nVT Vermont | VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin | WY Wyoming . Applies to debit cards only. \n"
          example: NJ
        merchantCountry:
          type: string
          description: |
            Country where the merchant is located. Applies to both debit and credit cards
          example: USA
        merchantPostalCode:
          type: string
          description: |
            Postal Code of the merchant location. Applies to both debit and credit cards
          example: "12345"
        messageType:
          maxLength: 4
          type: string
          description: "This field contains the combination of the transaction message type code and its corresponding description. It is used to identify and interpret the nature of the transaction message during processing and reporting. Applies to debit cards only.  \n- 100- Pre-Auth Request  \n- 102- Pre-Auth Reversal  \n- 110- Preauthorization  \n- 120- Pre-Auth Stand In  \n- 121- Pre-Auth Adv Repeat  \n- 130- Auth Advice Resp  \n- 200- Request  \n- 202- Auth Reversal  \n- 210- Auth/Completion  \n- 220- Forced Completion  \n- 221- Advice Repeat  \n- 230- Advice Response  \n- 320- Batch Upload  \n- 330- Batch Upload Resp  \n- 420- Reversal  \n- 421- Advice Rev Repeat  \n- 430- Reversal Response  \n- 500- Batch Settl Request  \n- 510- Batch Settl Resp  \n- 800- Network Mgmt Req  \n- 810- Network Mgmt Resp  \n- 820- Network Mgmt Advice  \n"
          example: 420- Reversal
        network:
          type: string
          description: |
            This field identifies the payment network responsible for routing the transaction from the merchant to the financial institution (FI). It indicates which network carried the authorization message during transaction processing and is used for network-specific reporting, reconciliation, and fee assessment.Applies to debit and credit cards both.
          example: 655100 - Mastercard Credit - Affiliate Member
        messageId:
          type: string
          description: "This field specifies the ISO message type identifier associated with the transaction. It represents the ISO 8583 message class and function—for example, authorization request, advice, or reversal—and is used by payment networks and issuer systems to route, interpret, and process the transaction correctly."
          example: "9906"
        pinTransaction:
          type: string
          description: |
            This field indicates whether a Personal Identification Number (PIN) was used to authenticate the transaction. Valid values are “Yes” or “No,” specifying the presence or absence of PIN-based verification.
          example: 1 - Yes
        posDataInputCapability:
          maxLength: 1
          type: string
          description: "This field indicates the capability of the terminal to manually enter the card number and expiration date into the system. It reflects whether the terminal supports key‑entry functionality as part of the card data capture process. This field applies specifically to debit cards. Valid values are- 0  Unknown / Not specified 1  Manual entry only 2  Magnetic stripe read 3  Manual + Magnetic stripe 4  Chip (ICC) capable 5  Manual + Chip 6  Magnetic stripe + Chip 7  Manual + Magnetic stripe + Chip 8  Contactless capable 9  All capabilities (Manual, Magstripe, Chip, Contactless) Some APIs (like CyberSource or Fiserv) use a two-digit numeric or bit-mapped representation to indicate multiple capabilities. Applies to debit cards only."
          example: "2"
        posDataInputMode:
          type: string
          description: |
            This field indicates the method used to capture card information at the terminal. It identifies how the card data—such as card number and expiration date—was entered, whether through swipe, dip, tap, manual key entry, or another input method supported by the terminal. This field applies specifically to debit cards.
            Valid values:
              00  Unspecified
              01  Manual
              02  Swipe
              03  Barcode
              04  OCR
              05  Chip
              06  Key Entered
              07  Contactless Chip
              81  Credential on file / e-commerce transaction
              90  Contactless Magstripe
              Applies to debit cards only.
          example: 2 - Swipe
        preAuthAmt:
          type: string
          description: |
            This field contains the transaction amount returned in specific processing scenarios. For a preauthorization response (110) or an authorization response (210), it represents the amount associated with the response. In the case of a partially approved transaction, this value reflects the amount that was approved. For a denied transaction, it contains the originally requested amount. The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees. For a forced post preauthorization (120) or a forced post clearing transaction (220), the clearing amount shown in Amount 2 is duplicated in Amount 1. During a reversal, Amount 1 represents the amount to be reversed. Applies to debit cards only.
          example: "1.00"
        retrievalRefNumber:
          maxLength: 12
          type: string
          description: |
            This field contains the reference number supplied and retained by the message originator. It serves as an identifier used to track or correlate the transaction throughout processing. The value may be up to 12 characters in length.
          format: numeric
          example: "518813000031"
        subResponseCode:
          type: string
          description: |
            This field contains an optional one‑character value that provides additional detail for specific denial codes. It is case‑sensitive, and its meaning varies based on the combination of the authorization response code and the response sub‑code. This field is used to further refine the reason for a denial when applicable. Applies to debit cards only.
          example: M
        systemRecordId:
          type: string
          description: "This field contains the unique system-generated identifier associated with the record. It may include lifecycle key, duID, or active key values that support internal tracking and state management of the card record."
          example: 377761184|12080251120230113|0120
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field contains the identifier for the terminal where the transaction was performed. It is used to uniquely distinguish the originating terminal for processing, tracking, and audit purposes. Applies to debit cards only.
          format: alphanumeric
          example: VMDIEOS1
        transactionAmount:
          type: string
          description: |
            Amount on a particular transaction. Valid format is 0.00. Applies to debit and credit cards.
          example: "1299.00"
        transactionDateTime:
          type: string
          description: |
            This field captures the date and time at which the transaction was created. It records the precise timestamp used for transaction logging, auditing, and reporting. Applies to debit and credit cards.
          format: date-time
          example: 2025-07-07T22:35:49Z
        unmatchedCompletionFlag:
          type: boolean
          description: |
            This field indicates whether the transaction is marked with an unmatched completion flag, used to identify transactions where the completion record does not correspond to a previously authorized transaction. Applies to debit cards only.
          example: false
        acquiringId:
          maxLength: 11
          minLength: 5
          type: string
          description: "This field specifies the Acquiring Institution Identification Code, which uniquely identifies the acquiring institution or merchant bank responsible for processing the transaction. The valid length ranges vary by network- MasterCard requires 5 to 11 digits, while Visa requires 6 to 11 digits. Applies to both Debit and Credit cards."
          example: "10111111119"
        applicationTranCounter:
          type: string
          description: |
            This field contains a count of the transactions performed within the card application. The count is incremented by one each time a transaction is initiated.
            Multiple authorization requests for the same transaction will have the same ATC; for example, when online PIN fails and the next authorization represents a different PIN try for the same transaction, the ATC will be the same. For reversals and advices, the ATC is the value from the original message.
            This field maps to Field 55, Tag 9F36—Applicaton Transaction Counter. Applies to both Debit and Credit cards.
          example: "01"
        cardAcceptorIdCode:
          type: string
          description: "This field specifies the identification number assigned to the establishment where the transaction was acquired. It uniquely identifies the merchant location for processing, settlement, and reporting purposes. Applies to both Debit and Credit cards."
          example: "123450678901234"
        cardEntryMode:
          type: string
          description: |
            Indicates if card was keyed in (manual entry) or swiped/machine read. Applies to both Debit and Credit cards.
          example: Swiped/Machine read
        cavvResult:
          type: string
          description: |
            Indicates the Cardholder Authentication Verification Value (CAVV) results code that identifies the outcome of CAVV validation. The value in field also indicates who performed the authentication, either Visa or the issuer, and the classification of the transaction. Applies to both Debit and Credit cards.
          example: 5F2D4A8B9C0E112233445566778899AABBCCDDEE
        cvResult:
          type: string
          description: |
            Card verification result. Identifies the card magnetic strip verification. Applies to both Debit and Credit cards.
          example: Failed
        cvvResult:
          type: string
          description: "This field specifies the outcome of the Card Verification Value (CVV) validation, indicating whether the CVV provided during the transaction matched the issuer’s records. It is used to confirm card authenticity and support fraud‑prevention checks during authorization. Applies to both Debit and Credit cards."
          example: NP
        enfactNearTimeScore:
          type: string
          description: |
            EnFact Near Time/Case Management Score. EnFact predictive model score assigned to the transaction after authorization. Applies to both Debit and Credit cards.
          example: "150"
        enfactRealTimeDecision:
          type: string
          description: "EnFact authorization recommendation based on an EnFact fraud rule assigned during authorization.  \n- A - Approve  \n- D - Deny  \n- T - Timed Out  \n- E - Error  \n- U - Falcon Server Unavailable  \n- R - Deny - Retain Card  \n- X - Engin to Falcon Timeout  \n- S - Stop Sending to Falcon . Applies to both Debit and Credit cards.          \n"
          example: A
        enfactRealTimeScore:
          type: string
          description: |
            The real time score associated with a transaction during authorization. Applies to both Debit and Credit cards.
          example: "150"
        enfactRecommendation:
          type: string
          description: |
            Identifies if the EnFact rules denied the transaction.Applies to both Debit and Credit cards.
          example: approve
        expirationDate:
          type: string
          description: "Expiration Date specifies the month and year after which an issuer designates a cardholder’s card to be “expired.Applies to both Debit and Credit cards.” \n"
          example: "2609"
        messageReasonCode:
          type: string
          description: |
            Code explaining the reason for an online acquirer advice, reversal, or partial reversal.Applies to both Debit and Credit cards.
          example: "420"
        networkScore:
          type: string
          description: " This field specifies the network score assigned to the transaction by the participating payment network. The score reflects the network’s risk assessment and is used to support authorization decisions, fraud monitoring, and downstream case management. Possible network sources include: Visa, Mastercard, Pulse, and STAR.  Applies to both Debit and Credit cards."
          example: Visa
        ruleManagerRecommendation:
          type: string
          description: |-
            This field provides the transaction recommendation generated by RuleManager and returned to the authorization platform. The recommendation reflects the outcome of RuleManager’s evaluation based on applied fraud rules and system conditions. Possible values include-
            C – Continue D – Deny E – Error O – Offline for Maintenance P – Pass R – Deny and Retain T – Timeout
            This recommendation assists the authorization platform in determining the appropriate action for the transaction during real‑time processing.
          example: C
        ruleManagerRuleName:
          type: string
          description: |
            Mastercard expert monitoring system score or Visa advanced authorization score.Applies to both Debit and Credit cards.
          example: GlobalRule
        settlementCurrencyCode:
          type: string
          description: "This field specifies the currency code associated with the settlement amount. It identifies the currency in which the transaction is settled between the issuer, acquirer, and payment network, and is used for clearing, settlement, and reconciliation processes. Applies to both Debit and Credit cards."
          example: "840"
        stateCode:
          type: string
          description: |
            Originating Center State Postal Code.Applies to both Debit and Credit cards.
          example: NJ
        systemAuditNumber:
          type: string
          description: |
            Number a message initiator assigns to uniquely identify a transaction.Applies to both Debit and Credit cards.
          example: "4565"
        terminalCountryCode:
          type: string
          description: |
            This field is carried in VISA SMART DEBIT SMART CREDIT (VSDC) transactions and identifies the country where the merchant terminal is located. A leading zero is required to pad the first unused half-byte of this field. The zero is filler and is not part of the code.This field maps to Field 55, Tag 9F1A—Terminal Country Code. Applies to both Debit and Credit cards.
          example: USA
        transactionBlockerResult:
          type: string
          description: "Identifies how the transaction was handled by TranBlocker.Applies to both Debit and Credit cards.  \n- 0 Not Checked  \n- 1 Timeout  \n- 2 Successful  \n- 3 Denote and Continue  \n- 4 Deny  \n- 5 Retain \n"
          example: '0 Not Checked '
        acqPostDate:
          type: string
          description: "This field specifies the date on which the acquirer posted the transaction. For interchange transactions, the value depends on the settlement process- If Card Services performs settlement, the field reflects the actual acquirer posting date. If Card Services does not perform settlement, the field reflects the network settlement date.  \n"
          example: 23-JUN-20
        atcResult:
          type: string
          description: "Application Transaction Counter Result. Indicates if the ATC passed or failed authentication or was not processed or checked.Applies to debit cards only \n"
          example: PASSED
        avsResult:
          type: string
          description: "Address verification service result.Applies to debit cards only. \nValid Values-\nA  Address matches, ZIP/postal code does not\nB  Street address matches, postal code in wrong format\nC  Street address and postal code in wrong format\nD  Street address and postal code match (international issuer)\nE  Error response for Merchant Category Code\nF  Cardholder name incorrect, address matches\nG  Card issued by a non-US issuer that does not participate in AVS\nI  Address information not verified by international issuer\nM  Street address and postal code match (international issuer)\nN  No match on address or ZIP/postal code\nO  Cardholder name and billing address match\nP  Postal code matches, street address not verified due to incompatible formats\nR  Retry – system timed out or unavailable\nS  Service not supported by issuer\nU  Address information is unavailable\nW  Nine-digit ZIP code matches, address does not\nX  Exact AVS match – address and nine-digit ZIP code match\nY  Address and five-digit ZIP code match\nZ  Five-digit ZIP code matches, address does not\n"
          example: A
        camResult:
          type: string
          description: "Card Authentication Method Result. Indicates if the application request cryptogram (ARQC) passed or failed authentication, or was not processed or checked. Applies to debit cards only \n"
          example: "04"
        cardCountryCode:
          type: string
          description: |
            Country location of the card issuer.Applies to debit cards only.
          example: USA
        cardCounty:
          type: string
          description: |
            This field specifies the county in which the card issuer is located. It identifies the issuer’s local geographic jurisdiction and may be used for regulatory, compliance, or region‑specific reporting purposes.Applies to debit cards only.
          example: "000"
        cardholderAddress:
          type: string
          description: |
            This field contains the address information supplied for Address Verification Service (AVS) checks. It is used to validate the cardholder’s billing address during transaction processing. This field applies to debit cards only.
          example: '12345    1010 Kharadi Pune   '
        cardLogo:
          type: string
          description: |
            Card issuer's 4-character alphanumeric client identifier.Applies to debit cards only.
          example: ABCD
        cashbackAmount:
          type: string
          description: |
            This field specifies the amount of cash returned to the cardholder as part of the transaction. It represents the cash‑back portion provided at the point of sale or during a withdrawal and is included separately from the purchase or transaction amount to support accurate posting, reconciliation, and reporting of cash‑back activity.Applies to debit cards only.
          example: "10.00"
        cvrResult:
          type: string
          description: |
            Card Verification Result. CVR provided by the EMV card on the transaction request. Applies to debit cards only.
          example: "2"
        cvrResultStat:
          type: string
          description: |
            Card Verification Results Result. Indicates if the CVR passed or failed authentication, or was not processed or checked. Applies to debit cards only.
          example: NP
        cvv2Cvc2Result:
          type: boolean
          description: "Card verification value (CVV2)/card validation code (CVC2) result. Indicates the result of verifying the CV2 from the card’s signature panel.  Applies to debit cards only.   \n"
          example: false
        depositType:
          type: string
          description: |
            Indicates if the deposit is a check, cash, or mixed deposit. Applies to debit cards only.
          example: Cash
        eCommerce:
          type: boolean
          description: |
            Indicates if the transaction was eCommerce. Applies to debit cards only.
          example: false
        emvApplicationID:
          type: string
          description: |
            EMV application identifier. EMV application ID (AID) is used to uniquely identify each EMV application that a terminal supports. Every application identifier has an associated card scheme and parameters relating to how the application needs to be processed. A terminal may contain any number of such applications. Applies to debit cards only.
          example: 'A0000000031010 '
        emvCard:
          type: boolean
          description: |
            Indicates if the card used in the transaction is EMV. Possible values Yes or No. Applies to debit cards only.
          example: true
        emvCardSequence:
          type: string
          description: |
            Distinguishes among separate cards having the same PAN. Issuers may encode chip cards with Card Sequence Numbers. Acquirers with chip-reading capability may pass this information encoded on the chip.Applies to debit cards only.
          example: "000"
        emvFallback:
          type: boolean
          description: |
            Indicates if the transaction is EMV fallback. Possible values Yes or No. Applies to debit cards only.
          example: true
        emvTerminal:
          type: boolean
          description: |
            Indicates if the terminal is EMV capable. Possible values Yes or No. Applies to debit cards only.
          example: true
        emvTransaction:
          type: boolean
          description: |
            Indicates if it is an EMV transaction. Possible values Yes or No. Applies to debit cards only.
          example: true
        entryMode:
          type: string
          description: |
            Method used to input the information from the card to the terminal.Applies to debit cards only.
          example: 2 - Swipe
        fromAccount:
          type: string
          description: |
            Number of the account impacted by a cardholder transaction. Applies to debit cards only.
          example: XXXXXXXXXX6789
        fromAccountType:
          type: string
          description: |
            Type of the account impacted by a cardholder transaction. Applies to debit cards only.
          example: Checking
        international:
          type: boolean
          description: |
            Indicates if the transaction was international.Applies to debit cards only.
          example: false
        locAmt1:
          type: string
          description: |
            Local amount 1. Amount 1 field in the acquirer's currency. Contains the same value as Amount 1 if the acquirer's currency is U.S. Applies to debit cards only.
          example: "15000.00"
        locAmt2:
          type: string
          description: |
            Local amount 2. Amount 2 field in the acquirer's currency. Contains the same value as Amount 2 if the acquirer's currency is U.S. Applies to debit cards only.
          example: "0.00"
        merchantAdviceCode:
          type: string
          description: |
            Merchant advice code Applies to debit cards only.
            Valid Values-
            01  New account information available – check Account Updater
            02  Try again later
            03  Do not try again
            04  Token requirements not fulfilled
            05  Negotiated value not approved
            21  Payment cancelled
            22  Merchant does not qualify for product code
            24–30  Retry after X hours/days (e.g., 24 = retry after 1 hour, 30 = retry after 10 days)
            40  Non-reloadable prepaid card
            41  Single-use virtual card number
            42  Sanctions score exceeds threshold
          example: "01"
        merchantId:
          type: string
          description: |
            Merchant identification number where the transaction originated. Applies to debit cards only.
          example: "123450678901234"
        mobileDenial:
          type: string
          description: |
            Indicates the control policy selected by the cardholder through CardValet/CardHub which denied the transaction. Applies to debit cards only.
          example: 'Tokenization failure '
        mvv:
          type: string
          description: |
            Identifies merchants that qualify for preferred interchange rates on POS transactions. If not present, standard interchange rates apply to the transaction. Assigned by Interlink and Visa. Applies to debit cards only.
          example: "Yes"
        offline:
          type: boolean
          description: |
            Offline EMV processing indicates the card and terminal authorized a transaction without the transaction being routed to the host for processing
            Card Services EMV solution does not presently support offline processing capabilities so this field will display No. For cards not issued by Fiserv, this may display Yes. Applies to debit cards only.
            Values
            Y = Offline EMV transaction
            N = Online EMV transaction
          example: false
        pinPresent:
          type: string
          description: "Personal identification number present. Indicates if PIN was used or not, and whether the transaction routed through a standard PIN’d network or a typical Signature network.\n- 0 = Undetermined\n- 1 = Signature Network with PIN \n- 2 = Signature Network without PIN \n- 3 = Debit Network without PIN\n- 4 = Debit Network with PIN.Applies to debit cards only.\n"
          example: "1"
        pointOfService:
          type: string
          description: "Indicates the type of device used to acquire the transaction or the purpose of the transaction. Applies to debit cards only.  \n- 002 - ON-PREMISE  \n- 004 - ELECTRONIC CASH REGISTER  \n- 006 - PRE-AUTHORIZED REQUEST  \n- 007 - PRE-AUTHORIZED REQUEST-NO PIN  \n- 014 - GENERIC  \n- 051 - VERIFICATION OF FUNDS  \n- 054 - GAS PUMP  \n- 062 - OFF-PREMISE  \n- 064 - SCRIP DISPENSE  \n- 072 - RETAIL  \n- 074 - ADMINISTRATIVE  \n- 081 - PAYIT OR BANKIT TRANSACTION (ITP)  \n- 086 - PIN, NO TRACK2  \n- 087 - MERCHANT AUTHORIZED TRANSACTION  \n- 088 - PAPER CAPTURE  \n- 089 - TRACK READ (PAN AND EXP), NO PIN  \n- 090 - NO PIN, NO TRACK2  \n- 091 - NO PIN, TRACK2  \n- 092 - INTERNATIONAL  \n- 094 - SHARED BRANCH STAND ALONE  \n- 096 - SHARED BRANCH FRANCHISE  \n- 097 - SHARED BRANCH OUTLET  \n"
          example: 002 - ON-PREMISE
        posDataCode:
          type: string
          description: |
            12-digit code indicating specific conditions present at the time of the transaction at the POS identifying terminal capability, terminal environment, and security data. Applies to debit cards only.
          example: "250000100020"
        posEntryMode:
          type: string
          description: |
            Point of Sale (POS) entry mode.Applies to debit cards only.
          example: "000"
        productType:
          type: string
          description: |
            Product Type - ATM or POS. Applies to debit cards only.
          example: ATM
        recurringPaymentInd:
          type: string
          description: |
            Mastercard expert monitoring system score or Visa advanced authorization score. Applies to debit cards only.
          example: 22120121310C
        reversalCode:
          type: string
          description: |
            The reason for a reversal. Applies to debit cards only.
          example: 00 - NON REVERSAL
        secureEci:
          type: string
          description: "Electronic commerce indicator (ECI) provides network information regarding the security level and authentication method used for an electronic commerce transaction. Applies to debit cards only.  \n"
          example: "00"
        sequenceNumber:
          type: string
          description: |
            Chronological numeric identifier for the transaction, assigned by the terminal. Applies to debit cards only.Applies to debit cards only.
          example: "000031"
        surchargeAmount:
          type: string
          description: |
            Amount of the ATM-level surcharge assessed by the terminal owner for the transaction. Applies to debit cards only.
          example: "0.00"
        surchargeReservalAmount:
          type: string
          description: |
            Surcharge amount to settlement of the original nonreversal transaction. Applies to debit cards only.
          example: "0.00"
        terminalLogo:
          type: string
          description: |
            Client identifier of terminal owner.Applies to debit cards only.
          example: ABCD
        terminalPinCapable:
          type: boolean
          description: |
            Indicates the ability of the terminal to accept PIN.Applies to debit cards only.
          example: false
        terminalState:
          type: string
          description: "Terminal State.Applies to debit cards only. \n"
          example: NJ
        terminalStreet:
          type: string
          description: |
            Street address where the terminal is located. Applies to debit cards only.
          example: NJ
        toAccount:
          type: string
          description: "Number of the account impacted by a cardholder transaction. Applies to debit cards only. \n"
          example: XXXXXXXXXX6789
        toAccountType:
          type: string
          description: |
            Type of the account impacted by a cardholder transaction.Applies to debit cards only.
          example: Checking
        tokenRequestorId:
          type: string
          description: |
            Wallet details. Possible values Apple pay - Google Pay - Samsung pay - Fitbit Pay - Garmin pay. Applies to debit cards only.
          example: Apple pay
        tokenTransaction:
          type: string
          description: |
            Token Transaction. A tokenized payment transaction uses a token PAN that is an alternate 13- to 19-digit value provisioned for the real or true PAN. The real PAN is the card number assigned by the FI. For token provisioning transactions, this field is not applicable and the value is always N. Applies to debit cards only.
          example: "No"
        tokenType:
          type: string
          description: "Token Requestor Id. Applies to debit cards only. \n"
          example: PSP Token
        transactionNetAmount:
          type: string
          description: |
            Requested amount presented to the FI, or the amount approved if partially approved, regardless of the. Applies to debit cards only.
          example: "20.00"
        transactionSource:
          type: string
          description: "Transacrion Source. Applies to debit cards only. \n"
          example: ATM
        tvrResult:
          type: string
          description: |
            Terminal Verification Result. TVR status provided by the terminal on the transaction request.Applies to debit cards only.
          example: "0000000000"
        tvrResultStat:
          type: string
          description: |
            Terminal Verification Results Status Result. Indicates if the TVR passed or failed authentication or was not processed or checked.Applies to debit cards only.
          example: NP
        acquiringCountryCode:
          type: string
          description: "Code of the country where the acquiring institution is located.Applies to credit cards only. \n"
          example: IND
        additionalData1:
          type: string
          description: |
            Any optional data received on the response.Applies to credit cards only.
          example: "150000000001"
        additionalData2:
          type: string
          description: |
            Any optional data received on the response. Applies to credit cards only.
          example: "150000000001"
        appInterchangeProfile:
          type: string
          description: |
            Field 138 is carried in VSDC transactions and provides a series of indicators that reflect the specific functions supported by the chip card account, for example, whether cardholder verification is supported.This field maps to Field 55, Tag 82—Application Interchange Profile. Applies to credit cards only.
          example: "2000"
        availableUsage:
          type: string
          description: |
            Amount of available credit on the account. Applies to credit cards only.
          example: "0000000000"
        avsOptionCode:
          type: string
          description: |
            Address Verification Service (AVS) Request indicates that verification of the cardholder billing address is requested in the authorization message. Applies to credit cards only.
          example: "00"
        avsPostalCode:
          type: string
          description: |
            Identifies the cardholder postal code and street address that is used for certain types of verification. Applies to credit cards only.
          example: "123451114"
        cardAcceptorCity:
          type: string
          description: |
            Indicates the city where the call originated. Applies to credit cards only.
          example: NJ
        cardAcceptorName:
          type: string
          description: |
            Indicates the name of the establishment where the transaction was acquired. Applies to credit cards only.
          example: NJ
        cardAcceptorTermId:
          type: string
          description: |
            Identifies a terminal at the card acceptor location of acquiring institutions or merchant POS systems. The terminal ID should be printed on all transaction receipts in ATM and POS transactions where the terminal is capable of generating customer receipts.Applies to credit cards only.
          example: WD772002
        cardSequenceNumber:
          type: string
          description: |
            Card Sequence Number distinguishes among separate cards having the same PAN. Applies to credit cards only.
          example: "01"
        cvcResultCode:
          type: string
          description: |
            The result code of CVC (Card Verification Code). Applies to credit cards only.
            Valid Values-
            M  CVV2/CVC2 Match – The value provided matches the one on file
            N  CVV2/CVC2 No Match – The value provided does not match
            P  CVV2/CVC2 Not Processed – The check was not performed
            S  CVV2/CVC2 Should be on card but not indicated – Merchant did not provide it
            U  Issuer not certified or unable to verify CVV2/CVC2
            X  No response from CVV2/CVC2 validation service
            0  CVV2/CVC2 service not available
            T  Temporary CVV/CVC used for new card purchase
            E  Invalid length of unpredictable number
            Y  Invalid device support
          example: M
        cvvCVVtwo:
          type: string
          description: |
            The CVV2/CVC2 value that is printed on the signature panel of Visa and Mastercard plastics. This value is made available for issuers that want to validate the CVV2/CVC2 value themselves. The value will only be passed to an issuer if provided by the acquirer.  Provided transactions in which the debit card is not present. Applies to credit cards only.
          example: "123"
        fraudDecision:
          type: string
          description: |
            Decision returned by the third-party fraud interface. Applies to credit cards only.
          example: decline
        industryTransactionIdentifier:
          type: string
          description: "Identifier of the transaction assigned by Visa, American Express, or Discover Network For Visa transactions, the identifier means that the approved transaction meets Custom Payment Service (CPS) requirements. Applies to credit only for Pending, Posted and Declined transactions."
          example: "123456789007894"
        issuerTraceNumber:
          type: string
          description: "TFiserv-assigned identifier of a transaction associated with an authorization. Applies to credit only for Pending, Posted and Declined transactions."
          example: "516305026425153"
        originalResponseCode:
          type: string
          description: |
            Original response code from the original transaction. For an instance, when V.I.P. encounters a duplicate transaction, this field contains the field 39 response code from the original transaction. Applies to credit cards only.
          example: "000"
        pinVerified:
          type: string
          description: |
            Indicates if PIN verification took place on the client platform. Applies to credit cards only.
          example: "Y"
        posCode:
          type: string
          description: "Identifies the Point of Service   condition code. It describes the condition under which the transaction took place at POS.Applies to credit cards only. \n"
          example: "002"
        posMode:
          type: string
          description: |
            Numeric codes to indicate the method by which the PAN was entered into the interchange system and to indicate the POS terminal PIN entry capabilities.Applies to credit cards only.
          example: "000"
        referenceNumber:
          type: string
          description: |
            Reference number assigned to the transaction. Applies to credit cards only.
          example: "109000481050"
        reversalreason:
          type: string
          description: |
            Reason for reversal transaction. Applies to credit cards only.
          example: "2105"
        riskCodeOne:
          type: string
          description: |
            Field 62.22, positions 1-2 is a Visa private-use field that contains additional Advanced Authorization online risk assessment information to assist issuers in the authorization decision-making process. The condition codes provide descriptive information for high-risk assessments.These positions may contain a Compromised Account Risk Condition Code (CARCC) related to a high-risk even in the Compromised Account Management System (CAMS).Applies to credit cards only.
          example: "123456"
        riskReasonCodeOne:
          type: string
          description: |
            Field 62.21, position 3 is.an alphanumeric combination that will act as a key to explain the risk score model. Applies to credit cards only.
          example: "1234"
        riskScore:
          type: string
          description: |
            Field 62.21, positions 1-2 is a Visa private-use field that contains online risk assessment information from Advanced Authorization. This information assists issuers in the authorization decision-making process.This value indicates the degree of risk associated with a transaction. This two-byte transaction risk score is represented by a numeric value from 01–99. Applies to credit cards only.
          example: "99"
        settlementAmount:
          type: string
          description: |
            Amount paid to merchant. Applies to credit cards only.
          example: "1100.00"
          x-encrypted: "N"
        settlementConversionRate:
          type: string
          description: |
            Conversion Rate applied on settlement amount.Applies to credit cards only.
          example: "0"
        tagCode:
          type: string
          description: |
            Indicates whether the merchant terminal supports a specific program or service.Applies to credit cards only.
          example: 52120151310C
        tagData:
          type: string
          description: "Identifies the electronic commerce indicators representing the security level and cardholder authentication associated with the transaction. Applies to credit cards only.\nValid Values-\n00  No authentication attempted or failed  \n01  Authentication attempted via 3DS (stand-in or partial)  \n02  Full 3D Secure authentication successful  \n05  3DS authentication successful (Visa, Amex, etc.)\n06  Exempt from Strong Customer Authentication (SCA)  \n07  Authentication failed or not attempted (SCA exemption used)\n"
          example: "01"
        tranAmtOriginal:
          type: string
          description: "Original amount of funds requested by the cardholder in the transaction currency (US Dollars). This amount includes cashback and surcharge fees and is exclusive of ISA and CCA fees.Applies to credit cards only. \n"
          example: "1533.00"
        tranFeeAmount:
          type: string
          description: |
            Fee amount charged on transaction.Applies to credit cards only.
          example: "20.00"
        transmissionDateTime:
          type: string
          description: |
            Date and Time when transaction was created. Applies to debit and credit cards.
          format: date-time
          example: 2025-07-18T10:35:31.622Z
        authorizationResponseDescription:
          type: string
          description: |
            Description of the authorization response. Applies to credit cards for declined transactions only.
          example: PI CLOSED
        declinedReasonCode:
          type: string
          description: |
            Reason code and description for declined transactions. Applies to credit cards for declined and pending transactions only.
          example: 63 - PI CLOSED
        expandedReasonCode:
          type: string
          description: |
            Code for expanded reason.Applies to credit cards for declined and pending transactions only.
          example: "99999"
        merchantNumber:
          type: string
          description: |
            Identifies the merchant where the transaction originated.Applies to credit cards for declined, pending and posted transactions.
          example: "443011000000018"
        transactionAccountNumber:
          type: string
          description: |
            In case of Credit, this field value differs. This is card used for Auth and account number/card number in case of Posted transactions. Applies to credit cards for declined, pending and posted transactions.
          example: 123456XXXXXX4067
        transactionCode:
          type: string
          description: |
            Specific code provided for each transaction. Applies to credit cards for declined, pending and posted transactions.
          example: "253"
        transactionDescription:
          type: string
          description: |
            Description of the transaction. Applies to credit cards for declined, pending and posted transactions.
          example: MERCHANT ACCOUNT
        enteredExpirationDate:
          type: string
          description: |
            Entered expiration date.Applies to credit cards for pending transactions only.
          format: YYYY-MM
          example: 2022-12
        originalAuthAdjustmentAmount:
          type: string
          description: "Any adjustment done on original authorized amount. For an example, if authorized amount is 100 and transaction amount is 60, 40 is the adjustment amount. Applies to credit cards for posted and pending transactions only. \n"
          example: "40.00"
        posEntryModeCode:
          type: string
          description: "Point of Sale (POS) entry mode code. Applies to credit cards for pending transactions only. \n"
          example: "01"
        cardholderAccountNumber:
          type: string
          description: |
            The cardholderAccountNumber is used as control account number in case of consolidated billing on subordinate account transaction. Applies to credit cards for posted transactions only.
          example: XXXXXXXXXX6789
        detailTransactionIdentifier:
          type: string
          description: "Detail about transaction id. Applies to credit cards for pending transactions only.  \n"
          example: "000000000000000"
        postingDate:
          type: string
          description: "Posting date of the transaction.Applies to credit cards for posted transactions only. \n"
          example: 2021-10-14
        promotionId:
          type: string
          description: |
            Promotion identification. Identifies the promotion to which the transaction was posted.Applies to credit cards for posted transactions only.
          example: "12345678"
    TransactionDetailsV2:
      type: object
      properties:
        acquiringCountryCode:
          maxLength: 3
          minLength: 2
          type: string
          description: "This field specifies the country code of the location where the acquiring institution operates. It identifies the country in which the transaction was acquired for processing, settlement, and reporting purposes."
          example: USA
        acquiringId:
          maxLength: 11
          minLength: 5
          type: string
          description: "This field specifies the Acquiring Institution Identification Code, which uniquely identifies the acquiring institution or merchant bank responsible for processing the transaction. The valid length ranges vary by network- MasterCard requires 5 to 11 digits, while Visa requires 6 to 11 digits."
          example: "11100170"
        additionalData1:
          type: string
          description: "This field contains any optional data returned in the response, providing auxiliary information supplied by the transaction processor or network. This data is not mandatory and may vary depending on the transaction type, network rules, or system configuration."
          example: D11101B99001
        additionalData2:
          type: string
          description: "This field contains optional data returned in the response, providing supplementary information supplied by the transaction processor or network. The content of this field is not mandatory and may vary based on the transaction type, network specifications, or system configuration."
          example: "60905"
        appInterchangeProfile:
          type: string
          description: "This field is included in VSDC transactions and contains a set of indicators that define the capabilities supported by the chip card account, such as whether cardholder verification is enabled. It corresponds to Field-55, Tag-82—Application Interchange Profile (AIP), which outlines the functional characteristics and security features supported by the chip application."
          example: 11FF
        applicationTranCounter:
          type: string
          description: |
            This field contains a count of the transactions performed within the card application. The count is incremented by one each time a transaction is initiated.
            Multiple authorization requests for the same transaction will have the same ATC; for example, when online PIN fails and the next authorization represents a different PIN try for the same transaction, the ATC will be the same. For reversals and advices, the ATC is the value from the original message.
            This field maps to Field 55, Tag 9F36—Applicaton Transaction Counter. Applies to both Debit and Credit cards.
          example: 00AF
        authorizationCode:
          type: string
          description: This field contains the authorization approval code assigned to the transaction. It represents the value returned by the issuer or authorization system to indicate that the transaction has been approved and can proceed with further processing.
          example: "000229"
        availableUsage:
          type: string
          description: "This field specifies the amount of available credit remaining on the account. It reflects the portion of the credit limit that is still unused and can be applied toward new transactions, authorizations, or adjustments."
          example: "72968.00"
        avsAddress:
          type: string
          description: |
            This field contains the address information provided by the cardholder for address verification. It is used as part of the Address Verification Service (AVS) to validate the billing address associated with the card during transaction authorization.
          example: ROGERSVILLE
        avsOptionCode:
          type: string
          description: "This field indicates that an Address Verification Service (AVS) check has been requested as part of the authorization message. When present, it signals that the issuer should verify the cardholder’s billing address information to support fraud prevention and transaction validation."
          example: "51"
        avsPostalCode:
          type: string
          description: "This field identifies the cardholder’s postal code and street address used for specific verification processes. It supports address‑based authentication methods, such as Address Verification Service (AVS), by providing the billing address details required for validation during transaction authorization."
          example: "337131520"
        avsResult:
          type: string
          description: "Address verification service result.Applies to debit cards only. \nValid Values-\nA  Address matches, ZIP/postal code does not\nB  Street address matches, postal code in wrong format\nC  Street address and postal code in wrong format\nD  Street address and postal code match (international issuer)\nE  Error response for Merchant Category Code\nF  Cardholder name incorrect, address matches\nG  Card issued by a non-US issuer that does not participate in AVS\nI  Address information not verified by international issuer\nM  Street address and postal code match (international issuer)\nN  No match on address or ZIP/postal code\nO  Cardholder name and billing address match\nP  Postal code matches, street address not verified due to incompatible formats\nR  Retry – system timed out or unavailable\nS  Service not supported by issuer\nU  Address information is unavailable\nW  Nine-digit ZIP code matches, address does not\nX  Exact AVS match – address and nine-digit ZIP code match\nY  Address and five-digit ZIP code match\nZ  Five-digit ZIP code matches, address does not\n"
          example: A
        cardAcceptorCity:
          type: string
          description: "This field specifies the city from which the call originated. It is used to identify the geographic source of the communication for verification, routing, or reporting purposes."
          example: ROGERSVILLE
        cardAcceptorIdCode:
          type: string
          description: "This field specifies the identification number assigned to the establishment where the transaction was acquired. It uniquely identifies the merchant location for processing, settlement, and reporting purposes."
          example: "123456"
        cardAcceptorName:
          type: string
          description: Indicates the name of the establishment where the transaction was acquired.
          example: Pax Technology I
        cardAcceptorTermId:
          maxLength: 8
          type: string
          description: "This field identifies the terminal located at the card acceptor’s site, such as an acquiring institution’s device or a merchant’s POS system. It uniquely distinguishes the specific terminal where the transaction was initiated and should appear on all customer‑generated transaction receipts for ATM and POS transactions when the terminal supports receipt printing."
          format: alphanumeric
          example: WD644000
        cardSequenceNumber:
          type: string
          description: "This field specifies the Card Sequence Number (CSN), which distinguishes between multiple physical cards issued under the same Primary Account Number (PAN). It uniquely identifies each card instance within the account to support transaction processing, card management, and fraud control."
          example: "1"
        cavvResult:
          type: string
          description: "Indicates the Cardholder Authentication Verification Value (CAVV) results code that identifies the outcome of CAVV validation. The value in field also indicates who performed the authentication, either Visa or the issuer, and the classification of the transaction."
          example: 5F2D4A8B9C0E112233445566778899AABBCCDDEE
        cvcResultCode:
          type: string
          description: "This field contains the result code for the Card Verification Code (CVC) check, indicating the issuer’s validation outcome for the security value printed on the card. It is used to confirm the authenticity of the card during authorization and support fraud‑prevention measures."
          example: "false"
        cvvCVVtwo:
          maxLength: 4
          minLength: 3
          type: string
          description: This field contains the CVV2/CVC2 value printed on the signature panel of Visa and Mastercard cards. It is provided for issuers that choose to perform their own validation of the CVV2/CVC2 security code. This value is included in the authorization message only when supplied by the acquirer and applies to transactions where the debit card is not physically present.
          example: "123"
        cvvResult:
          type: string
          description: "This field specifies the outcome of the Card Verification Value (CVV) validation, indicating whether the CVV provided during the transaction matched the issuer’s records. It is used to confirm card authenticity and support fraud‑prevention checks during authorization."
          example: "false"
        detailTransactionIdentifier:
          type: string
          description: "This field contains the unique identifier assigned to a specific financial transaction. It is generated at the time of processing and is used to track, reference, and reconcile the transaction across systems. The transaction identifier ensures that each transaction can be accurately retrieved for verification, dispute handling, reporting, or auditing purposes."
          example: "000000000000000"
        eCommerce:
          type: string
          description: "This field indicates whether the transaction was performed through an eCommerce channel. It is used to identify card‑not‑present transactions for risk evaluation, fraud monitoring, and reporting purposes. This field applies to all transaction types where online processing is supported."
          example: "true"
        enteredExpirationDate:
          type: string
          description: "This field captures the expiration date that was entered during the transaction. It is used to validate the card’s active status at the time of processing and must be provided in the MM/YY format. This information is typically required for card‑not‑present transactions, such as eCommerce or mail‑order/telephone‑order (MOTO) transactions."
          format: MMYY
          example: "1122"
        entryMode:
          type: string
          description: |
            This field specifies the method used to capture the card information at the terminal. It identifies whether card data was obtained through swiping, dipping, tapping, manual entry, or any other supported input method. This information is used for transaction validation, processing logic, and fraud‑risk assessment.
            Valid values:
            0   Unspecified
            1   Manual
            2   Swipe
            3   Barcode
            4   OCR
            5   Chip
            6   key Entered
            7   Contactless Chip
            9   Contactless Magstripe
          example: 2 - Swipe
        falconScore:
          type: string
          description: This field contains the fraud‑risk score assigned by a third‑party fraud‑detection interface for online authorization requests. The score reflects the assessed likelihood of the transaction being fraudulent and is used by the issuer’s authorization system to support risk evaluation and decisioning.
          example: 878A1
        fraudDecision:
          type: string
          description: "This field captures the decision returned by the third‑party fraud‑detection interface for the transaction. The decision indicates whether the transaction is approved, declined, or requires additional verification based on the fraud‑risk assessment performed during online authorization. It is used by the issuer’s authorization engine to support final decisioning and fraud‑management workflows."
          example: decline
        international:
          type: string
          description: |
            This field indicates whether the transaction was conducted outside the cardholder’s home country. It is used to identify international activity for authorization decisioning, cross‑border processing, and fraud‑risk assessment.
          example: "false"
        merchantCode:
          maxLength: 4
          type: string
          description: "This field indicates the Merchant Category Code (MCC) associated with the transaction. The MCC identifies the type of goods or services provided by the merchant and is used for authorization processing, fraud‑risk assessment, rewards eligibility, and reporting across card networks."
          format: numeric
          example: "6011"
        messageId:
          type: string
          description: "This field specifies the ISO message type identifier associated with the transaction. It represents the ISO 8583 message class and function—for example, authorization request, advice, or reversal—and is used by payment networks and issuer systems to route, interpret, and process the transaction correctly."
          example: "9906"
        messageReasonCode:
          type: string
          description: "This field specifies the reason code provided for an online acquirer advice, reversal, or partial reversal. The code identifies why the original transaction requires adjustment or correction—such as system errors, timeouts, duplicate messages, or merchant‑initiated changes—and is used by issuer and network systems to interpret and process the reversal appropriately."
          example: "2104"
        networkID:
          type: string
          description: |
            This field specifies the payment network to be used for transmitting the transaction message. The selected network determines the applicable program rules and processing guidelines for the transaction.
          example: "0004"
        originalResponseCode:
          type: string
          description: "This field contains the original response code returned for the initial transaction. In cases where the system—such as V.I.P.—identifies a duplicate transaction, this field provides the Field-39 response code from the original message. It is used to support accurate duplicate checking, reconciliation, and issuer decisioning by referencing the outcome of the initial authorization attempt."
          example: "59"
        pinTransaction:
          type: string
          description: |
            This field indicates whether a Personal Identification Number (PIN) was used during the transaction. It is used to identify PIN‑verified transactions for authorization processing, cardholder authentication, and fraud‑risk assessment across supported transaction types.
            Valid values:
            0 - Undetermined
            1 - Signature Network with PIN
            2 - Signature Network without PIN
            3 - Debit Network without PIN
            4 - Debit Network with PIN
          example: 1 - Signature Network with PIN
        pinVerified:
          type: string
          description: "This field indicates whether PIN verification was performed on the client platform. It identifies cases where the PIN was validated locally rather than by the issuer or network, and is used to support authorization decisioning, terminal‑based authentication logic, and fraud‑risk assessment."
          example: "true"
        posCode:
          type: string
          description: "This field identifies the Point‑of‑Service (POS) condition code associated with the transaction. It describes the specific condition under which the transaction occurred at the POS—such as normal processing, fallback, or unusual terminal circumstances—and is used by issuer, acquirer, and network systems to determine applicable processing rules and risk‑evaluation parameters."
          example: 006 - PRE-AUTHORIZED REQUEST
        posMode:
          type: string
          description: "This field contains the numeric codes that specify how the Primary Account Number (PAN) was entered into the interchange system and indicate the POS terminal’s PIN‑entry capabilities. These codes identify whether the PAN was captured through methods such as swipe, chip read, contactless, manual entry, or fallback, and also describe the terminal’s ability to accept and process PIN entry. This information is used for authorization processing, terminal validation, and fraud‑risk assessment."
          example: "801"
        referenceNumber:
          maxLength: 12
          type: string
          description: "This field contains the reference number assigned to the transaction. It serves as a unique identifier used by issuer, acquirer, and merchant systems to track, retrieve, and reconcile the transaction throughout its lifecycle, including authorization, clearing, settlement, and post‑transaction inquiries.”"
          format: numeric
          example: "109000254949"
        reversalreason:
          type: string
          description: "This field specifies the reason for initiating a reversal transaction. It identifies why the original transaction must be voided or corrected—such as system timeouts, duplicate messages, incorrect amounts, or merchant‑initiated errors—and is used by issuer, acquirer, and network systems to process the reversal accurately and apply the appropriate handling rules.”"
          example: "2523"
        riskCodeOne:
          type: string
          description: "This field represents the Visa private‑use data contained in Field-62.22, positions-1–2. It provides additional Advanced Authorization online risk‑assessment information to support issuer decisioning. These positions may include Condition Codes that describe high‑risk assessment indicators and can contain a Compromised Account Risk Condition Code (CARCC) associated with high‑risk events identified through the Compromised Account Management System (CAMS)."
          example: 15C2BT
        riskCodeTwo:
          type: string
          description: "This field represents the Visa private‑use data contained in Field-62.22, positions-3–4. It provides additional Advanced Authorization online risk‑assessment information used to support issuer authorization decisioning. These positions may include Condition Codes associated with high‑risk assessments and can contain a Compromised Event Reference (CER) ID that links the transaction to a high‑risk event reported through the Compromised Account Management System (CAMS)."
          example: 16C3DT
        riskCodeThree:
          type: string
          description: "This field represents the Visa private‑use data contained in Field-62.22, positions-5–6. It provides additional Advanced Authorization online risk‑assessment information designed to assist issuers in the authorization decision‑making process. These positions contain Condition Codes that offer descriptive insight into high‑risk assessments associated with the transaction."
          example: 15C2BT
        riskReasonCodeOne:
          type: string
          description: "This field represents the alphanumeric value contained in Field-62.21, position-3. It serves as a key that corresponds to the risk‑score model used in the authorization decision‑making process. This identifier helps issuers interpret the risk‑assessment logic applied during the transaction and provides a reference for understanding how the associated risk score was derived."
          example: 441LR
        riskReasonCodeTwo:
          type: string
          description: "This field represents the alphanumeric value contained in Field-62.21, position-4. It serves as a key that corresponds to the risk‑score model used during the authorization process. This identifier enables issuers to interpret the specific risk‑assessment model applied to the transaction and understand the basis on which the associated risk score was generated."
          example: 441LR
        riskScore:
          maxLength: 2
          type: string
          description: "This field represents the Visa private‑use data contained in Field-62.21, positions-1–2. It provides the Advanced Authorization online risk‑assessment score used to support issuer decisioning during the authorization process. This two‑byte value reflects the degree of risk associated with the transaction and is expressed as a numeric score from 01 to 99, with higher values indicating elevated risk."
          format: numeric
          example: "87"
        settlementAmount:
          type: string
          description: "This field specifies the total amount paid to the merchant for the transaction. It represents the final transaction amount submitted by the merchant for authorization, clearing, and settlement purposes."
          example: "1100.00"
          x-encrypted: "N"
        settlementConversionRate:
          type: string
          description: "This field specifies the currency conversion rate applied to the settlement amount during transaction processing. It reflects the rate used to convert the transaction from the purchase currency to the settlement currency and is used for clearing, settlement, and reconciliation purposes across issuer, acquirer, and network systems.”"
          example: "808464432"
        settlementCurrencyCode:
          type: string
          description: "This field specifies the currency code associated with the settlement amount. It identifies the currency in which the transaction is settled between the issuer, acquirer, and payment network, and is used for clearing, settlement, and reconciliation processes."
          example: "840"
        stateCode:
          type: string
          description: "This field contains the postal code of the originating center associated with the cardholder’s account or card issuance activity. It represents the ZIP or postal code for the physical location from which the card-related operations or servicing originate. Provide a valid postal code as recognized within the applicable regional addressing standards. This field is specific to debit card processing, where originating center details are required for operational and compliance purposes."
          example: DC
        systemAudit:
          maxLength: 6
          type: string
          description: "This field contains the unique reference number assigned by the message initiator to identify a specific transaction. It ensures traceability across systems by serving as the primary identifier for tracking, reconciliation, and dispute resolution processes. Each transaction must have a distinct value in this field to prevent ambiguity."
          format: numeric
          example: "106308"
        tagCode:
          type: string
          description: "This field indicates whether the merchant’s payment terminal is enabled to support a specific program or service. It reflects the terminal’s capability to participate in designated processing features, network services, or value‑added programs. The value helps determine eligibility and routing behavior during transaction processing."
          example: 120W00203000
        tagData:
          type: string
          description: "This field identifies the Electronic Commerce Indicator (ECI) associated with the transaction, representing the level of security applied during the online purchase and the extent of cardholder authentication performed. The value helps determine the authentication method used, the risk level of the transaction, and the appropriate processing or liability shift rules applied by the network."
          example: "910"
        tagSvcRsn:
          type: string
          description: "This field notifies the issuer of the On‑Behalf Service (OBS) actions performed on the transaction and the corresponding results. It communicates which services were applied during processing and provides outcome details for each service executed. Sub‑element 71 supports up to ten individual On‑Behalf Services, allowing multiple service indicators and results to be reported for a single transaction."
          example: "true"
        terminalCountryCode:
          maxLength: 4
          minLength: 3
          type: string
          description: "This field is included in VSDC (Visa Smart Debit/Credit) transactions and identifies the country in which the merchant terminal is physically located. The value corresponds to the ISO-defined Terminal Country Code and is carried within EMV data. A leading zero must be added to pad the first unused half‑byte, which serves only as a filler and is not part of the actual country code. This field maps to Field 55, Tag 9F1A—Terminal Country Code."
          example: USA
        terminalIndicator:
          type: string
          description: "This field maps to Field 55, Tag 95 — Terminal Verification Results (TVR), which in turn maps to Field 131 — Terminal Verification Results. Field 131 is included in VSDC (Visa Smart Debit/Credit) transactions and contains a series of indicators representing the terminal’s assessment of the transaction. The terminal sets these indicators to record the outcomes of both offline and online processing, including risk checks, card authentication results, and exception conditions. These TVR indicators are made available to clients in both the online authorization message and the clearing transaction, enabling consistent evaluation of terminal‑level decisions across processing stages."
          example: "10011"
        terminalPinCapable:
          type: string
          description: |
            This field indicates whether the merchant terminal is capable of accepting a Personal Identification Number (PIN) during a transaction. It reflects the terminal’s support for PIN entry as part of cardholder verification and is used to determine applicable authentication methods and processing rules.
          example: "No"
        transactionAmtoriginal:
          type: string
          description: "This field specifies the original amount of funds requested by the cardholder in the transaction currency (U.S. Dollars). The value represents the total transaction amount, including any cashback and surcharge fees assessed at the time of purchase or withdrawal. It does not include International Service Assessment (ISA) or Cross‑Border Assessment (CCA) fees, which are applied separately by the network or issuer."
          example: "111.96"
        transactionCurrencyCode:
          type: string
          description: "This field specifies the currency code associated with the transaction amount. The value represents the numeric ISO‑defined currency code identifying the currency in which the transaction was conducted. It is used to interpret the transaction amount accurately and to ensure proper processing, settlement, and reporting across systems."
          example: USA
        transactionfeeAmount:
          type: string
          description: "This field specifies the fee amount charged on the transaction in addition to the base purchase or withdrawal amount. It represents any applicable service fees, convenience fees, or processing charges assessed at the point of transaction. The value is used for accurate calculation, reconciliation, and reporting of total transaction costs."
          example: "20.00"
        terminalState:
          type: string
          description: "This field identifies the U.S. state or regional subdivision in which the merchant terminal is physically located. It represents the terminal’s geographic state code and is used for transaction routing, regulatory compliance, reporting, and settlement processes. The value helps determine jurisdiction‑specific rules and supports accurate recordkeeping for merchant location details."
          example: NJ
        generalDetails:
          $ref: "#/components/schemas/GeneralDetailsV2"
        amountDetails:
          $ref: "#/components/schemas/AmountDetailsV2"
        networkInfo:
          $ref: "#/components/schemas/NetworkInfoV2"
        tokenAndEmvInfo:
          $ref: "#/components/schemas/TokenAndEmvInfoV2"
        riskInfo:
          $ref: "#/components/schemas/RiskInfoV2"
        acquirerInfo:
          $ref: "#/components/schemas/AcquirerInfoV2"
      description: Applies to debit cards only.
    GeneralDetailsV2:
      type: object
      properties:
        depositType:
          type: string
          description: |
            This field indicates the type of deposit submitted by the cardholder, identifying whether the transaction involves a check deposit, a cash deposit, or a mixed deposit containing both. The value is used to determine appropriate processing rules, posting behavior, and reporting requirements based on the deposit type.
          example: Cash
        fromAccount:
          type: string
          description: |
            This field identifies the account number affected by the cardholder’s transaction. It represents the specific account to which the transaction activity—such as a purchase, withdrawal, deposit, or adjustment—is applied. The value enables accurate posting, reconciliation, and reporting by linking the transaction to the correct customer account.
          example: "123456789"
        fromAccountType:
          type: string
          description: |
            This field specifies the type of account affected by the cardholder’s transaction. It identifies whether the impacted account is a checking, savings, credit, loan, or other designated account type. The value ensures correct application of transaction rules, posting logic, settlement behavior, and reporting based on the account category.
          example: Checking
        journalDateTime:
          type: string
          description: |
            This field provides the system‑generated timestamp recorded at the time of transaction processing. The value is expressed in Eastern Time (ET) and represents the precise date and time at which the system logged the event. It is used for audit tracking, reconciliation, and sequencing of transaction activity across systems.
          format: date-time
          example: 2023-07-20T13:38:53Z
        productType:
          type: string
          description: |
            This field identifies the product type associated with the transaction, indicating whether it was performed at an Automated Teller Machine (ATM) or at a Point‑of‑Sale (POS) terminal. The value determines applicable processing rules, transaction handling, and settlement behavior based on the channel through which the transaction was initiated.
          example: ATM
        responseDetails:
          type: string
          description: |
            his field provides details regarding the response returned for the transaction. It captures the outcome generated during transaction processing, including approval, decline, or any additional status information supplied by the issuer, network, or processing system. The value supports accurate interpretation of processing results and assists with reconciliation, reporting, and troubleshooting.
          example: 51-B W/D purchase transfer
        reversalCode:
          type: string
          description: |
            This field specifies the reason a reversal was generated for the transaction. It identifies the underlying condition or event—such as timeout, processing error, customer cancellation, or issuer‑initiated action—that required the original transaction to be reversed. The value enables accurate interpretation of reversal activity and supports reconciliation, dispute handling, and audit tracking.
            Valid values:
            10  HARDWARE MALFUNCTION
            11  RETAIN CARD
            12  INVALID TRANSACTION
            13  INVALID AMOUNT
            14  INVALID CARDHOLDER ACCOUNT NUMBER (NO SUCH NUMBER)
            15  ENTER LESSER AMOUNT (REQUEST REJECTED)
            16  CASHBACK DENIED
            17  CUSTOMER CANCELLATION
            19  RE-ENTER TRANSACTION
            31  FI NOT SUPPORTED BY SWITCH (SENT TO I/P ONLY)
            32  INVALID MERCHANT ID
            33  EXCEEDS TRANSACTION LIMIT FREQUENCY
            34  INVALID RESUBMISSION
            41  LOST CARD - RETAIN
            43  STOLEN CARD - RETAIN
            50  INSUFFICIENT FUNDS (AVAILABLE BALANCE)
            51  INSUFFICIENT FUNDS (NO BALANCE AVAILABLE)
            52  INVALID ACCOUNT (NO SUCH ACCOUNT)
            54  EXPIRED ACCOUNT
            55  INCORRECT PIN
            56  PIN SANITY ERROR
            57  TRANSACTION NOT PERMITTED TO CARDHOLDER
            58  TRANSACTION NOT PERMITTED TO ATM
