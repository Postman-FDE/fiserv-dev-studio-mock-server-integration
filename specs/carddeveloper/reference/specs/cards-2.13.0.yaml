          maxLength: 5
          type: string
          description: |
            If supported by the institution, field supports card collection stock ID number assigned by card vendor to the type of plastic used in card production. This field overrides the default stock ID defined for the card class. The field has format of 3 digits proceeded by PM. This field is applicable for non-EMV Debit program only. Max length is 5.
          format: alphanumeric
          example: PM001
        rushType:
          type: string
          description: |
            Only for Order or Card Add maintenance. Controls Rush Order processing for card and PIN orders.
          example: NONE
          enum:
          - NONE
          - REGULAR
          - OVERNIGHT
        orderType:
          type: string
          description: Ordering options for the primary cardholder.
          example: CARD
          enum:
          - NONE
          - CARD
          - PIN
          - CARD_AND_PIN
        nameSuffix:
          maxLength: 6
          type: string
          description: Cardholder suffix associated with the name.
          example: MD
    DebitAssociatedAccountAddCardResponseV2:
      title: Account
      type: object
      properties:
        accountNumber:
          maxLength: 20
          type: string
          description: "Identifies the account associated with the cardholder. This value links the card to the correct customer account for processing, authorization, and reporting purposes."
          example: "987654321"
        accountType:
          type: string
          description: "Specifies the type of account associated with the cardholder. This value identifies the category of the underlying financial account and is used for processing, routing, and reporting. Supported values include- - SAVINGS - CHECKING - CREDIT - IRA - NOW - MONEY_MARKET - CREDIT_LINE - INSTALLMENT_LOAN - MORTGAGE_LOAN"
          example: CHECKING
        accountDescription:
          type: string
          description: "Provides a descriptive label for the account. This value offers additional contextual information about the account and may be used for display, identification, or reporting purposes."
          example: Main account
        primaryAccount:
          type: string
          description: "Indicates whether the account is designated as the primary account. Accepted values are Y (Yes) and N (No), and this flag is used to determine the account’s priority and role within the customer’s relationship profile."
          example: "Y"
        accountStatus:
          type: string
          description: "Indicates the current status of the account. This value reflects the account’s operational state and is used to determine how the account should be processed, accessed, or reported within the system."
          example: ACTIVE
          enum:
          - ACTIVE
          - CLOSED
          - RESTRICTED
          - INACTIVE
    NewCardTemplateRequest:
      title: NewCardTemplateRequest
      type: object
      properties:
        cardClass:
          type: string
          description: |
            Displays the description and 5-character alphanumeric identifier for the card class selected for the new card. Indicates a client-defined group of cardholders with common characteristics, such as card type (ADMIN), card stock, image cards or withdrawal limits.
          example: AAA00
        priorCardNumber:
          maxLength: 19
          type: string
          description: |
            Populated only when the current card number is replacing one that is no longer used. Some examples are when card numbers are reissued due to fraud and an issuer reissues card numbers under a new BIN.
          example: "4000100020003000"
        priorNonTransToken:
          type: string
          description: A 16 to 19 digit Non-transactional token generated and associated with each card number.
          example: WUPIL5DQTZGM3000
        memberNumber:
          type: string
          description: |
            Unique number associated with each member of the card. Based on the card prefix setup. If the member number is not passed, defaults to 0 (zero).  Applies to debit cards only.
          example: "0"
        accountNumber:
          type: string
          description: Identifies account of the cardholder.
          example: "123456789"
        cardType:
          type: string
          description: Indicates the type of card associated with this card class.
          example: DEBIT
          enum:
          - CREDIT
          - DEBIT
          - CREDIT_GATEWAY
      description: "Used to generate the template to add a card. The request must include one of the fields - cardClass, or priorCardNumber or accountNumber or priorNonTransToken."
    NewCardTemplateRequestV2:
      title: NewCardTemplateRequest
      type: object
      properties:
        debitOnly:
          $ref: "#/components/schemas/DebitOnlyTemplateRequestV2"
        creditOnly:
          $ref: "#/components/schemas/CreditOnlyTemplateRequestV2"
      description: "Used to generate the template to add a card. The request must include one of the fields - cardClass, or cardNumber or accountNumber or nonTransToken."
    NewCardTemplateResponse:
      title: NewCardTemplateResponse
      type: object
      properties:
        cardNumber:
          type: string
          description: |
            Unique number assigned to each cardholder record. Either cardNumber or nonTransToken must be included in the request. If both are included, only cardNumber will be used. Maximum length 19 digits.
          example: 400010xxxxxx3000
        nonTransToken:
          type: string
          description: |
            Non-transactional token associated with a card. Non-transactional token associated with a card.
            Either cardNumber or nonTransToken must be included in the request. If both are included, only cardNumber is used. Length can be between 16 and 19.
          example: WUPIL5DQTZGM3000
        cardType:
          type: string
          description: Indicates the type of card associated with this card class.
          example: DEBIT
          enum:
          - CREDIT
          - DEBIT
          - CREDIT_GATEWAY
        expirationDate:
          type: string
          description: Month and year the card record is set to expire.
          format: MM/YY
          example: 10/23
        emvCard:
          type: string
          description: |
            EMV chip card.
            Values are -
            - CONTACT — Card issued as a Contact EMV chip card.
            - CONTACTLESS — Card issued as a Contactless EMV chip card.
            - false - Card is a magstripe-only card and cannot perform an EMV transaction.
          enum:
          - CONTACT
          - CONTACTLESS
          - "false"
        debitOnly:
          $ref: "#/components/schemas/DebitOnlyTemplateResponse"
        creditOnly:
          $ref: "#/components/schemas/CreditOnlyTemplateResponse"
    NewCardTemplateResponseV2:
      title: NewCardTemplateResponse
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field returns the 16–19 digit Primary Account Number (PAN) associated with the cardholder’s account. It confirms which card was used in the activation request and can be used to validate the success of the operation or for downstream processing such as audit logging or cardholder notification. If both cardNumber and nonTransToken were submitted, cardNumber takes precedence.
          format: alphanumeric
          example: 400020XXXXXX4000
        cardType:
          type: string
          description: "Indicates the type of card associated with the specified card class. This value defines the classification of the card for processing, fulfillment, and lifecycle management within the system."
          example: DEBIT
          enum:
          - CREDIT
          - DEBIT
          - CREDIT-GATEWAY
        cardGeneratorIndicator:
          type: string
          description: |
            Indicates the card generator type for the given card. Possible values are
              - M - Manual Entry
              - S - System Generated - Sequential
              - R - System Generated - Random
              - H - Hybrid - Sequential
              - Q - Hybrid - Random
          example: S
        nonTransTokenFlag:
          type: boolean
          description: "If true, this flag instructs the system to generate and return a non-transactional token for the provided PAN. It indicates whether the request is from a tokenized client and supports downstream systems that rely on token-based card identification instead of the actual PAN."
          example: true
        tspUpdateFlag:
          type: boolean
          description: Indicates whether the cardholder participates in Token Service Provider (TSP) programs. This value specifies the cardholder’s eligibility or enrollment status for tokenization services used in digital wallets and secure payment channels.
          example: true
        debitOnly:
          $ref: "#/components/schemas/DebitOnlyTemplateResponseV2"
        creditOnly:
          $ref: "#/components/schemas/CreditOnlyTemplateResponseV2"
    CreditCardholderAddressTemplateResponse:
      title: Address
      type: object
      properties:
        isFormattedAddress:
          type: boolean
          description: "Indicates if address is an US address or international address. Valid values are true and false. If no value passed, then the default value is false."
          example: false
        addressLine1:
          type: string
          description: Line 1 of address.
          example: 123 Any Street
        addressLine2:
          type: string
          description: Line 2 of address.
          example: Apt 100
        addressLine3:
          type: string
          description: Line 3 of address.
          example: LAKE VIEW
        addressLine4:
          type: string
          description: Line 4 of address.
          example: AVENUE
        city:
          type: string
          description: Name of city.
          example: Newark
        country:
          type: string
          description: Country code for Address.
          example: US
        state:
          type: string
          description: "Name of state. For credit, state values are applicable only for USA."
          example: New Jersey
        zipCode:
          type: string
          description: ZIP code for Address.
          example: "12345"
        addressType:
          type: string
          description: "The type of address. Following are the valid values - \nType 'BILLING' is applicable for any of the cardholders (primary, secondary and authorized).\nTypes 'PLASTIC', 'STATEMENT', and 'LETTER' apply only to the primary cardholder.\n"
          example: PLASTIC
          enum:
          - PLASTIC
          - BILLING
          - STATEMENT
          - LETTERS
        categoryCode:
          type: string
          description: "Defines if the address is temporary, permanent or repeating."
          example: TEMPORARY
          enum:
          - TEMPORARY
          - PERMANENT
          - REPEATING
        beginDate:
          type: string
          description: "The date from which the address is valid. Mainly used when categoryCode - Permanent, Temporary or Repeating."
          format: date
