          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
