      - cardClass
      - cardStatus
      type: object
      properties:
        cardStatus:
          type: string
          description: |-
            This field specifies the current lifecycle status of the card at the portfolio or plastic level. It helps determine how the card is managed across systems, including activation, usage, restrictions, and deactivation. Supported values include-
            - ACTIVE – Card is active and available for use - CAPTURE – Card is captured and no longer usable - DEACTIVATE – Card is deactivated and cannot be used - ISSUED – Card has been issued but not yet activated - RESTRICTED – Card has limited functionality due to restrictions
            Note- This field is applicable only for debit cards.
          example: ACTIVE
          enum:
          - ACTIVE
          - CAPTURE
          - DEACTIVATE
          - ISSUED
          - RESTRICTED
        statusReasonCode:
          type: string
          description: |
            This field specifies the reason for the current status of the selected card. It is required when updating the card status to CAPTURE or DEACTIVATE. Supported values include:

              NONE – No specific reason provided
              CLOSED – Account or card is closed
              CUSTOMER_REQUEST – Status change requested by the customer
              LOST – Card reported as lost
              STOLEN – Card reported as stolen
              ABUSED – Card misused or abused
              DAMAGED – Card is physically damaged
              REVOKED – Card revoked by the issuer

            Note: All reason codes are applicable only when the status is updated to CAPTURE or DEACTIVATE. Use NONE for all other status updates.
          example: NONE
          enum:
          - NONE
          - CLOSED
          - CUSTOMER_REQUEST
          - LOST
          - STOLEN
          - ABUSED
          - DAMAGED
          - REVOKED
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing."
          example: "0"
          default: "0"
        expirationDate:
          type: string
          description: |
            This field specifies the expiration date of the card in MM/YY format. It indicates when the card is set to expire and is used for card validity checks, renewal processes, and account maintenance activities.
            Note: This field applies only to debit cards.
          format: MM/YY
          example: 10/23
        cardClass:
          type: string
          description: |
            This field specifies the institution-defined card class or product code for the new card. It includes a 5-character alphanumeric identifier and description that represent a client-defined group of cardholders sharing common characteristics, such as card type (e.g., ADMIN), card stock, image preferences, or transaction limits. This classification helps determine card behavior and applicable features.
            Note: This field applies only to debit cards.
          format: alphanumeric
          example: AAA00
        memberSinceDate:
          type: string
          description: |
            Month and year when the card record was added. This date may or may not correspond to the open date of the card record. If not provided, the value will default to current the month and year.
          format: MM/YY
          example: 09/23
        branch:
          maxLength: 4
          type: string
          description: Unique number FI/institution assigns to identify a specific branch. The default value is 0000.
          example: "0000"
          default: "0000"
        reissuePerCardClass:
          type: boolean
          description: Indicates if the expiration date of card will be rolled over to the next expiration date after month end and a new card will be reissued. The value depends on the card setup.
          example: true
        updaterServiceOptOut:
          type: boolean
          description: "Applicable when cardbase participates in the Account Updater Service (AUS) that allows Fiserv to send payment account data to Mastercard and Visa, in compliance with network requirements for issuers. \nIf the cardbase does not participate in AUS, the fields can be blank. Opting out of AUS ensures Fiserv does not send future card number updates to Mastercard or Visa; it does not delete any information previously sent to merchants.\nThe fields are populated when your institution submits information through the Remote Card Maintenance (RCM) batch file record or it is manually entered in the CM system.\n"
          example: false
        companyId:
          maxLength: 8
          minLength: 8
          type: string
          description: "Identifier of the company , Applicable for debit Business cards"
          example: "12345678"
        companyRole:
          type: string
          description: "Role of the cardholder in the company , applicable for debit Business cards. \nValid values \n- O  -  Owner\n- E  -  Employer "
          example: O
        debitPINInfo:
          $ref: "#/components/schemas/DebitPINInfoV2"
        debitPriorCardInfo:
          $ref: "#/components/schemas/DebitPriorCardInfoV2"
        debitCardholderAddressPrimary:
          $ref: "#/components/schemas/DebitCardholderPrimaryAddressRequestV2"
        debitCardholderAddressAlternate:
          $ref: "#/components/schemas/DebitCardholderAlternateAddressRequestV2"
        debitCardholderName:
          $ref: "#/components/schemas/DebitCardholderNameV2"
        debitContactInfo:
          $ref: "#/components/schemas/DebitContactInfoV2"
        debitAssociatedAccounts:
          type: array
          items:
            $ref: "#/components/schemas/DebitAssociatedAccountV2"
