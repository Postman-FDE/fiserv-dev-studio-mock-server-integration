    CardActivationUpdateResponse:
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field returns the 16–19 digit Primary Account Number (PAN) associated with the cardholder’s account. It confirms which card was used in the activation request and can be used to validate the success of the operation or for downstream processing such as audit logging or cardholder notification. If both cardNumber and nonTransToken were submitted, cardNumber takes precedence.
          format: alphanumeric
          example: 400010XXXXXX3000
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: WUPIL5DQTZGM3000
        cardType:
          type: string
          description: "This field specifies the product type of the card being added. Supported values            include- - CREDIT – Credit card - DEBIT – Debit card This value determines the type of card associated with the card class and may influence downstream processing, eligibility rules, and feature availability."
          example: DEBIT
          enum:
          - CREDIT
          - DEBIT
        activationRequiredByDate:
          type: string
          description: This field contains the date by which the card must be activated. It defines the activation deadline after which the card may become unusable or require additional steps to enable use. The value represents a system‑calculated or policy‑defined activation cutoff date and is returned as part of the activation response to guide timely customer action. This field is applicable to debit cards only.
          format: date
          example: 2022-12-31
        availableForUseDate:
          type: string
          description: This field contains the date on which the card becomes available for use by the cardholder. It indicates when transactions can begin to be performed using the card after issuance or activation-related processing. The value represents the earliest allowable usage date as determined by system rules and business policies. This field is applicable to debit cards only.
          format: date
          example: 2021-07-26
        cardActivationDate:
          type: string
          description: "This field contains the date on which the card was successfully activated. It indicates the point at which the card transitioned from an inactive to an active state and became eligible for use. If this field is not populated, it signifies that the card has not yet been activated."
          format: date
          example: 2021-09-21
        cardActivationStatus:
          type: string
          description: "This field indicates the current activation status of the card. It reflects the card’s activation state at the time the response is generated, such as whether the card is active, inactive, or pending activation. The value helps consumers determine whether the card is eligible for use or requires activation‑related action."
          example: NOT_ACTIVATED
          enum:
          - NOT_ACTIVATED
          - ACTIVATED
          - ACTVN_BEFORE_AVAILABLE_DATE
          - CARD_RECORD_NOT_FOUND
          - CARD_LOST_OR_STOLEN
          - CARD_CLOSED
          - NO_ACTIVATION_REQUIRED
          - ACTIVATION_REQUIRED
          - EXP_DATE_NOT_MATCH
          - ALREADY_ACTIVATED
          - ATTEMPT_AFTER_DEADLINE
          - MAX_ATTEMPTS_EXCEEDED
          - CALLER_ID_INVALID
          - ACTIVATION_CODE_INVALID
          - PIN_CHECK_NOT_PERFORMED
          - INVALID_ACTIVATION_METHOD
          - IVR_AUTH_FAILED
        lastActivationAttemptDate:
          type: string
          description: "This field contains the date on which the cardholder most recently attempted to activate the card. It reflects the latest activation attempt regardless of whether the attempt was successful or unsuccessful. The value helps identify recent activation activity and can be used for troubleshooting, auditing, or determining next steps in the activation process."
          format: date
          example: 2021-09-21
        activationMethod:
          type: string
          description: "This field indicates the method by which the card was activated. It captures the channel or mechanism used to complete the activation process, such as self‑service, customer support, or automated workflows. The value helps identify how activation was performed and supports reporting, auditing, and activation experience analysis."
          example: FIRST_PIN_ID
          enum:
          - FIRST_PIN_ID
          - VRU_ACTIVATION
          - VRU_CALLER_ID
          - VRU_CODE_AND_CALLER_ID
          - OPERATOR_ACTIVATE
          - VRU_ATTEMPT
          - CARD_NOT_ACTIVATED
        numberOfAttempts:
          type: string
          description: This field indicates the total number of activation attempts that have been made since the last reset. It tracks how many times the cardholder or system has tried to activate the card within the current activation window. The value is used to monitor repeated activation attempts and enforce activation‑related limits or controls as defined by business rules. This field is applicable to debit cards only.
          format: numeric
          example: "4"
        verificationCallerID:
          maxLength: 16
          type: string
          description: "This field contains the voice response unit (VRU) verification caller identifier associated with the card. It represents the phone number—such as home, work, or mobile—of the primary cardholder that is used for identity verification during voice‑based activation or authentication processes. The value helps validate the caller’s identity when activation or verification is performed through automated voice response channels."
          format: numeric
          example: "9789456123"
      description: Elements with null values in the response are not displayed.
