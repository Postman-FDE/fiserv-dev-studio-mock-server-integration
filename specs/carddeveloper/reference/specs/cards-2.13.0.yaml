        expirationDate:
          type: string
          description: |
            This field specifies the date on which the card expires. For instant issue, it represents the new expiration date of the card. If not provided in the request, the system defaults the value based on the card class configuration:

            - If the reissue month of the card class is less than 49, the expiration date equals the current month plus the reissue month.
            - If the reissue month of the card class is greater than 49, the expiration date equals the current month plus the reissue month.
            - If the reissue month of the card class equals 49, the expiration date defaults to 12/49.

            The value should follow the system-defined date format, typically MM/YY.
          format: MM/YY
          example: 10/28
