          enum:
          - BLOCKED_FROM_AUTHORIZATION
          - NOT_ACTIVE
          - LOST_OR_STOLEN
          - FRAUD_DETECTED
          - NORMAL
        statusReasonCode:
          type: string
          description: Indicates the reason code associated with the card’s current status. This value provides additional context for the status and is used to explain or justify any status changes applied to the card.
          example: NORMAL
          enum:
          - LOST_BLOCK_BY_ENFACT
          - FRAUD
          - CLOSED_BY_CUSTOMER
          - REVOKED
          - CLOSED_BY_FI
          - TEMP_BLOCK_BY_FI
          - TEMP_BLOCK_BY_ENFACT
          - TEMP_BLOCK_AGENT
          - DECEASED
          - NORMAL
        expirationDate:
          type: string
          description: |
            Specifies the month and year when the card record is set to expire. This value defines the card’s validity period and is used for authorization, renewal, and lifecycle management processes.
          format: MM/YY
          example: 10/23
        association:
          type: string
          description: "Specifies the type of association applicable to the card, account, or customer relationship. This value identifies how entities are linked within the system and is used to determine the nature and purpose of the association for processing and reporting."
          example: PRIMARY
          enum:
          - PRIMARY
          - SECONDARY
          - AUTHORIZED_USER
        customerRoleTypeCode:
          type: string
          description: "Indicates the role type code assigned to the customer, identifying their relationship to the account. Supported values include- - 01 – Primary - 02 – Secondary - 03 – Authorized User"
          example: "02"
        cardStock:
          type: string
          description: "Identifies the stock or material batch used to produce the physical plastic card. This value supports tracking of card production materials for inventory management, manufacturing control, and audit purposes."
          example: "00"
        producePlasticIdentifier:
          type: string
          description: Indicates whether a new plastic card was generated as a replacement when the original card was reported as Lost or Stolen. This value helps track reissuance activity and supports card lifecycle management processes.
          example: "Y"
        creditCardholderAddress:
          $ref: "#/components/schemas/AddCardResponseCreditCardholderAddressRequestV2"
        creditCardholderName:
          $ref: "#/components/schemas/AddCardResponseCreditCardholderNameV2"
        creditContactInfo:
          $ref: "#/components/schemas/AddCardResponseCreditContactInfoV2"
        creditAssociatedAccounts:
          $ref: "#/components/schemas/AddCardResponseCreditAssociatedAccountV2"
    DebitPINInfoAddCardResponseV2:
      type: object
