            This field contains the Primary Account Number (PAN) assigned to the cardholder record, uniquely identifying the cardholder’s card account. It may include up to 19 digits and is returned as part of the response to indicate the card associated with the requested operation or search result. The value represents the card number maintained on record for the cardholder.
          format: alphanumeric
          example: 400020XXXXXX4000
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: piUVBJKZGfks4000
        transactionCode:
          maxLength: 3
          type: string
          description: "Retrieves the orders associated with a particular card. Each order record includes a transaction code that identifies the specific type of transaction linked to that order, supporting comprehensive order‑history lookup, transaction categorization, and operational processing."
          example: "200"
        cardPlasticsCount:
          type: string
