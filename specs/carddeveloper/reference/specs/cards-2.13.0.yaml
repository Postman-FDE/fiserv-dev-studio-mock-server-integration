    CustomDailylimitsV2:
      type: object
      properties:
        limitType:
          type: string
          description: Indicates whether the limits applied to the card are inherited from the card class or have been individually overridden. This field helps determine whether the card is using system‑defined default limit values or custom limits assigned specifically to the cardholder’s account.
          example: OVERRIDE
          enum:
          - OVERRIDE
          - CARD_CLASS
        aggregateOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents the offline withdrawal limits applicable at ATMs and POS terminals. These limits define the maximum amount that can be withdrawn or authorized when the card is used in an offline environment, such as when network connectivity is unavailable. They ensure continued card usability while maintaining risk controls."
          example: "500"
        aggregateTotalAmount:
          maxLength: 6
          type: string
          description: "Combined total, Online and offline withdrawal limits at ATM and POS.  \nDaily Limit Combined number of transaction attempts allowed at the ATM and POS.  \nVelocity Support (Maximum number of transactions allowed during the lifespan of the PAN)  \n"
          example: "2500"
        atmOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents the offline withdrawal limits applicable when the card is used at an ATM. This limit defines the maximum amount that can be withdrawn in situations where the ATM is unable to connect online, ensuring controlled card usage while maintaining operability in offline environments."
          example: "300"
        atmTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the online and offline withdrawal limits applicable when the card is used at an ATM. These limits define the maximum withdrawal amounts allowed both when the ATM is connected to the network (online) and when it is operating without network connectivity (offline). Together, they ensure controlled and consistent withdrawal capabilities across different ATM processing modes."
          example: "600"
        cashAdvanceOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents offline cash‑advance activity performed at an ATM. This field captures cash‑advance transactions that occur when the ATM is unable to connect online, ensuring traceability and enforcing offline transaction limits while maintaining card usability in limited‑connectivity scenarios."
          example: "0"
        cashAdvanceTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the online and offline cash‑advance activity performed at an ATM. This field captures cash‑advance transactions completed when the ATM is connected to the network (online) as well as when operating without network connectivity (offline). It supports accurate tracking, limit enforcement, and risk management across both transaction modes."
          example: "0"
        cashEquivOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents offline transaction activity involving non‑cash instruments or alternative financial media, such as travelers cheques. This field captures transactions processed when the terminal is operating without network connectivity, ensuring accurate tracking and enforcement of offline limits for these specialized transaction types."
          example: "2"
        cashEquivTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the online and offline transaction activity involving non‑cash instruments or alternative financial media, such as travelers cheques. This field captures transactions processed when the terminal is connected to the network (online) as well as when operating without network connectivity (offline). It supports accurate activity tracking, limit enforcement, and risk‑management processes across both processing modes."
          example: "10"
        customerNPOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents offline transaction activity performed without the card physically present, such as internet‑based or e‑commerce transactions. This field captures card‑not‑present (CNP) transactions processed when the terminal or system is operating without network connectivity, enabling accurate tracking and enforcement of offline usage limits for these transaction types."
          example: "500"
        customerNPTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the online and offline transaction activity performed without the card physically present, such as internet or other e‑commerce transactions. This field captures card‑not‑present (CNP) activity processed both when the system is connected to the network (online) and when operating without connectivity (offline). It supports accurate tracking, limit enforcement, and risk‑management controls across both processing modes for CNP transactions."
          example: "1500"
        dayOfDepositAvailabilityTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the amount of same‑day deposited funds that are available for use. This field indicates the portion of a deposit that becomes accessible on the same business day, supporting balance calculations, withdrawal decisions, and funds‑availability processing."
          example: "0"
        mtCreditDlyCntOffline:
          maxLength: 4
          type: string
          description: Represents the daily count limit for money transfer (MT) credit transactions that a cardholder can perform offline during a processing day. This field defines the maximum number of MT credit operations allowed when the system is not connected online and supports enforcement of offline transaction‑velocity controls.
          example: "0"
        mtCreditDlyCntTotal:
          maxLength: 4
          type: string
          description: "Represents the daily count limit for money transfer (MT) credit transactions that a cardholder can perform during a processing day, both online and offline. This field defines the maximum number of MT credit transactions permitted across all connectivity modes, ensuring consistent enforcement of transaction‑velocity controls."
          example: "0"
        mtCreditDlyOfflineAmount:
          maxLength: 4
          type: string
          description: "Represents the maximum total dollar amount of money transfer (MT) credit transactions that a cardholder can perform offline during a single processing day. This field enforces the offline daily monetary limit for MT credit activity, supporting risk management and ensuring compliance with transaction‑velocity and offline‑processing controls."
          example: "0"
        mtCreditDlyTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the maximum total dollar amount of money transfer (MT) credit transactions that a cardholder can perform during a single processing day across both online and offline modes. This field defines the combined daily monetary limit for MT credit activity, ensuring consistent enforcement of spending controls and supporting risk‑management processes regardless of connectivity."
          example: "0"
        mtCreditPerTranOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents the maximum dollar amount permitted for a money transfer (MT) credit transaction during offline processing. This field defines the monetary limit that applies when the system is unable to connect online, ensuring controlled MT credit activity and enforcing offline‑specific risk and velocity constraints."
          example: "0"
        mtCreditPerTranTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the maximum dollar amount permitted for a money transfer (MT) credit transaction during both online and offline processing. This field defines the monetary limit applied regardless of network connectivity, ensuring consistent control of MT credit activity and supporting risk‑management and velocity‑control processes across all transaction modes."
          example: "0"
        mtFundingAmtPerTranOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents the maximum dollar amount allowed per money transfer (MT) funding transaction during offline processing. This field applies to Money Transfer Funding and P2P limits and defines the per‑transaction monetary cap enforced when the system is operating without network connectivity, supporting offline risk controls and transaction‑velocity management."
          example: "0"
        mtFundingAmtPerTranTotalAmount:
          maxLength: 6
          type: string
          description: Represents the maximum dollar amount allowed per money transfer (MT) funding transaction. This field applies to Money Transfer Funding and P2P limits and defines the per‑transaction monetary cap used for validating and controlling individual funding transactions.
          example: "0"
        mtFundingDlyCntOffline:
          maxLength: 4
          type: string
          description: "Represents the maximum number of money transfer (MT) funding transactions that a cardholder can perform during daily offline processing. This field defines the daily offline transaction‑count limit for MT funding activity, supporting enforcement of velocity controls and risk‑management policies when the system is not connected online."
          example: "0"
        mtFundingDlyCntTotal:
          maxLength: 4
          type: string
          description: "Represents the maximum number of money transfer (MT) funding transactions a cardholder is permitted to perform during a single processing day in offline mode. This field enforces the daily offline transaction‑count limit for MT funding activity, supporting velocity control and risk‑management processes when network connectivity is unavailable."
          example: "0"
        mtFundingDlyOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents the total dollar amount of money transfer (MT) funding transactions a cardholder is permitted to perform during a single processing day in offline mode. This field enforces the daily offline monetary limit for MT funding activity, supporting risk‑management and velocity‑control processes when network connectivity is unavailable."
          example: "0"
        mtFundingDlyTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the total dollar amount of money transfer (MT) funding transactions a cardholder is permitted to perform during a single processing day across both online and offline modes. This field defines the combined daily monetary limit for MT funding activity, ensuring consistent enforcement of spending controls and supporting risk‑management and velocity‑control processes regardless of network connectivity."
          example: "0"
        posOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents the offline withdrawal limits applicable at a point‑of‑sale (POS) terminal. This field defines the maximum amount that can be withdrawn when a POS device processes the transaction offline, ensuring controlled usage and enforcing risk‑management rules in environments without real‑time network connectivity."
          example: "500"
        posTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the online and offline withdrawal limits applicable at a point‑of‑sale (POS) terminal. This field defines the maximum withdrawal amounts allowed when the POS device is connected to the network (online) as well as when it processes transactions without network connectivity (offline). These limits ensure consistent control, risk management, and enforcement of withdrawal rules across all POS processing modes."
          example: "2500"
        signatureDebitPOSOfflineAmount:
          maxLength: 6
          type: string
          description: "Represents the daily POS limit for purchase transactions that require a signature. This field defines the maximum total purchase amount allowed at point‑of‑sale terminals for signature‑authorized transactions within a single processing day, supporting spending control, risk management, and transaction‑velocity enforcement."
          example: "0"
        signatureDebitPOSTotalAmount:
          maxLength: 6
          type: string
          description: "Represents the daily POS limit for purchase transactions that require a signature. This field specifies the maximum total purchase amount permitted at point‑of‑sale terminals for signature‑authorized transactions within a single processing day, supporting spending control, transaction‑velocity management, and risk‑mitigation processes."
          example: "0"
