          example: "1005550001"
        textAddress:
          maxLength: 10
          type: string
          description: Cardholder's phone number to receive text messages/announcements.
          example: "1005550001"
        dateOfBirth:
          type: string
          description: "Represents the date of birth of the cardholder. This value is used for identity verification, eligibility checks, and compliance validations, and must be provided in a valid date format as required by the system."
          format: date
          example: 1990-08-24
        expiryDate:
          type: string
          description: "Represents the expiration date of the card. This field indicates the month and year through which the card remains valid and is required for authorization, validation, and card‑replacement processes."
          format: MM/YY
          example: 10/23
        emailAddress:
          type: string
          description: "Represents the email address associated with the cardholder. This field is used for communication, notifications, and account‑related correspondence and must contain a valid email format."
          example: jdoe@example.com
