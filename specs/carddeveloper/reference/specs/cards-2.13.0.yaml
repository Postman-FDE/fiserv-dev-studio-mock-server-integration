    CardholderSearchRequest:
      title: CardholderSearchRequest
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        lastName:
          type: string
          description: Last name of the customer.
          example: Smith
        ssnOrTaxId:
          type: string
          description: Full SSN or Tax ID of a cardholder. Pass exactly 9 digits for this field. Allow hyphen as a special character.
          example: "123005678"
        accNumber:
          type: string
          description: Account Number
          example: "123456789"
        phone:
          type: string
          description: Mobile phone number or home phone number or work phone number.
          example: "1005550001"
        emailAddress:
          type: string
          description: Email address.
          example: alexsmith@example.com
        dateOfBirth:
          type: string
          description: Date of Birth of the cardholder. Format of date of birth is MM/DD/YY. This is a secondary/additional search field can be combined with other primary or secondary fields to further narrow down search results.
          example: 07/02/89
          default: ""
        postalCode:
          type: string
          description: ZIP Code.
          example: "12345"
        lastFourCardNumber:
          type: string
          description: Last four digits of the card number.
          example: "4000"
        lastFourAccNumber:
          type: string
          description: Last four digits of the Account number.
          example: "6789"
        lastFourSsnOrTaxId:
          type: string
          description: The last four digits of the ssn/taxid number. Applies to debit cards only.
          example: "5678"
      description: "This operation requires at least one exact match search criteria, using these fields - cardNumber, accountNumber, ssnOrTaxId, emailAddress, lastName or phone. Along with the exact match fields, there are other optional parameters which can be passed in combination with exact match fields, to further refine the search criteria."
    CardholderSearchRequestV2:
      title: CardholderSearchRequest
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: piUVBJKZGfks3000
        responseFormat:
          type: string
          description: |-
            Specifies the format in which the Card Number and/or Non‑transactional Token will be returned in the response. This field controls whether the API includes masked, clear, or tokenized values for the cardholder’s account information. Valid values include-
            - MASKED_CARD_ONLY – Returns only the masked card number. - FULL_CARD_ONLY – Returns the full (clear) card number. - TOKEN_ONLY – Returns only the non‑transactional token. - MASKED_CARD_AND_TOKEN – Returns both the masked card number and the non‑transactional token. - FULL_CARD_AND_TOKEN – Returns both the full (clear) card number and the non‑transactional token.
            This setting ensures the response adheres to security, tokenization, and data‑visibility requirements based on the consuming system’s needs.
          example: MASKED_CARD_ONLY
          enum:
          - MASKED_CARD_ONLY
          - FULL_CARD_ONLY
          - TOKEN_ONLY
          - MASKED_CARD_AND_TOKEN
          - FULL_CARD_AND_TOKEN
        lastName:
          type: string
          description: Represents the last name of the customer. This field captures the customer’s family name or surname as part of their personal identification details.
          example: Doe
        taxIdOrSsn:
          type: string
          description: |
            Indicates the customer’s Social Security Number (SSN) or Tax Identification Number (Tax ID), depending on the type of identifier provided. The maximum length is 9 digits for an SSN and 20 characters for a Tax ID. Accepted formats follow the patterns outlined in the request examples. This field is used to uniquely identify the customer for verification, regulatory, and compliance purposes.
          example: "123005678"
        accountNumber:
          type: string
          description: "Identifies the account associated with the cardholder. This field links the cardholder to their corresponding account record for processing, validation, and retrieval of account‑level information."
          example: "123456789"
        phone:
          type: string
          description: "Represents the cardholder’s contact phone number, which may be a mobile, home, or work phone. This field stores the primary telephone information used for communication, verification, and notification purposes."
          example: "0005550000"
        emailAddress:
          type: string
          description: "Represents the email address of the cardholder. This field is used for communication, notifications, and account‑related correspondence, and must contain a valid email format."
          format: email
          example: jdoe@example.com
        dateOfBirth:
          type: string
          description: "Represents the cardholder’s date of birth. This field is used for identity verification, eligibility checks, and regulatory compliance, and must contain a valid date in the supported format."
          format: date
          example: 1990-08-24
        zipCode:
          type: string
          description: "Represents the ZIP code associated with the cardholder’s address. This field is used for address validation, geographic identification, and correspondence purposes."
          example: "12345"
        lastFourCardNumber:
          maxLength: 4
          type: string
          description: "Represents the last four digits of the card number. This value is commonly used for partial card identification and for displaying card information in a secure, masked format."
          example: "4000"
        lastFourAccountNumber:
          maxLength: 4
          type: string
          description: Represents the last four digits of the account number. This value is used for partial account identification and provides a secure way to reference the account without exposing the full number.
          example: "6789"
        lastFourTaxIdOrSsn:
          maxLength: 4
          type: string
          description: Represents the last four digits of the cardholder’s SSN or Tax Identification Number. This field applies only to debit cards and is used for partial identification and verification without exposing the full sensitive number.
          example: "5678"
      description: "This operation requires at least one exact match search criteria, using these fields - cardNumber, nonTransToken, accountNumber, ssnOrTaxId, emailAddress, lastName or phone. Along with the exact match fields, there are other optional parameters which can be passed in combination with exact match fields, to further refine the search criteria."
