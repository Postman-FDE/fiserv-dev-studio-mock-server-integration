          - NONE
          - CARD
          - PIN
          - CARD_AND_PIN
        rushType:
          type: string
          description: |
            This field specifies the delivery method for sending the physical card (plastic) to the cardholder. It determines whether the card should be shipped using standard delivery or expedited options, based on the urgency and service level requested.
          example: NONE
          enum:
          - NONE
          - REGULAR
          - OVERNIGHT
        processedDate:
          type: string
          description: "Represents the date on which the order was processed. This field provides an audit reference for tracking order lifecycle events, supporting status verification, fulfillment monitoring, and operational reporting."
          format: date
          example: 2022-08-03
        orderId:
          type: string
          description: "Represents the unique record key associated with the card order. This field applies only to debit cards and serves as the primary identifier for referencing, tracking, and managing the specific debit card order within the system."
          example: "436"
        orderDate:
          type: string
          description: "Represents the date on which the order was placed. This field records when the order was originally submitted, serving as a reference point for tracking the order lifecycle, fulfillment timelines, and audit requirements."
          format: date
          example: 2022-09-09
        orderReason:
          type: string
          description: "Represents the reason the order was placed. This field identifies the purpose or trigger for creating the order—such as card issuance, reissue, replacement, upgrade, or other operational requirements—and supports workflow tracking, reporting, and audit processes."
          example: NEW
          enum:
          - NEW
          - REPLACEMENT
          - ADDITIONAL
        orderedBy:
