        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field returns the 16–19 digit Primary Account Number (PAN) associated with the cardholder’s account. It confirms which card was used in the activation request and can be used to validate the success of the operation or for downstream processing such as audit logging or cardholder notification. If both cardNumber and nonTransToken were submitted, cardNumber takes precedence.
          format: alphanumeric
          example: 400020XXXXXX4000
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: piUVBJKZGfks4000
        cardType:
          type: string
          description: "Indicates the type of card associated with the specified card class. This value defines the classification of the card for processing, fulfillment, and lifecycle management within the system."
          example: DEBIT
          enum:
          - CREDIT
          - DEBIT
        emvCard:
          type: string
          description: "Indicates the EMV capability type of the card. Supported values include-\n- CONTACT — Card is issued as a Contact EMV chip card. - CONTACTLESS — Card is issued as a Contactless EMV chip card. - false — Card is magstripe‑only and cannot perform EMV transactions.\nThis value determines the card’s chip functionality and how it will behave during transaction processing \n"
          enum:
          - CONTACT
          - CONTACTLESS
          - "false"
        debitOnly:
          $ref: "#/components/schemas/DebitOnlyAddResponseV2"
        creditOnly:
          $ref: "#/components/schemas/CreditOnlyAddResponseV2"
