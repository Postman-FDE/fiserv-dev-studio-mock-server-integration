    AtmPreferences:
      type: object
      properties:
        preferredLanguageCode:
          type: string
          description: The ATM language preference.
          enum:
          - NONE
          - ENGLISH
          - SPANISH
        preferredAmount:
          type: number
          description: Preferred ATM fast cash amount. Amount must be in increments of 20.
          example: 240
        preferredAccount:
          type: string
          description: ATM fast cash withdrawal account preference.
          enum:
          - NONE
          - CHECKING
          - SAVINGS
        preferredReceiptOption:
          type: string
          description: ATM fast cash withdrawal receipt preference option.
          enum:
          - NONE
          - ALWAYS
          - ASK_ME
          - NEVER
        terminalOwnerId:
          type: string
          description: Indicates the ATM Terminal ID or UserID that updated the ATM preferences.
          example: USER01
        sourceType:
          type: string
          description: Source of update. An "A" indicates updated at ATM; "C" indicates update by user.
          example: A
          enum:
          - A
          - C
        action:
          type: string
          description: Action taken to add or update the ATM preferences. ATM preferences can only be added at the ATM.
          example: UPDATE
          enum:
          - ADD
          - UPDATE
        actionDateTime:
          type: string
          description: Date and time the cardholder ATM preferences were added or updated.
          format: date-time
        updatedBy:
          type: string
          description: ATM Terminal ID or UserID that last added or updated the ATM preferences.
          example: USER01
    AtmPreferencesV3:
      type: object
      properties:
        languageCode:
          type: string
          description: Specifies the customer’s preferred language for ATM interactions. Used to determine the language displayed on the ATM screen during transactions.
          example: ENGLISH
          enum:
          - NONE
          - ENGLISH
          - SPANISH
        amount:
          type: number
          description: Specifies the customer’s preferred withdrawal amount for the ATM Fast Cash option. This value is used to pre‑select the withdrawal amount during ATM transactions.
          example: 240
        accountType:
          type: string
          description: Identifies the customer’s preferred withdrawal account for ATM Fast Cash transactions. This account will be automatically selected when the customer uses the Fast Cash option at an ATM.
          example: CHECKING
          enum:
          - NONE
          - CHECKING
          - SAVINGS
        receiptOption:
          type: string
          description: "Indicates the customer’s preferred receipt option for ATM Fast Cash withdrawals. Determines whether a receipt is printed, suppressed, or delivered through another available method during Fast Cash transactions."
          example: ASK_ME
          enum:
          - NONE
          - ALWAYS
          - ASK_ME
          - NEVER
        terminalOwnerId:
          type: string
          description: "Indicates the ATM Terminal ID or User ID responsible for updating the ATM preferences. This value identifies the source of the update—either a physical ATM terminal or an authenticated user performing the action. It is used for audit tracking, change history, and operational traceability."
          example: USER01
        sourceType:
          type: string
          description: "Specifies the source of the update to the ATM preferences. A value of “A” indicates that the update was performed at an ATM terminal, while “C” indicates that the update was made by a user. This field is used for audit and traceability to determine where and how the change originated."
          example: A
          enum:
          - A
          - C
        action:
          type: string
          description: Indicates the action performed to add or update the ATM preferences. ATM preferences can only be added directly at an ATM terminal; subsequent updates may occur based on user or system‑initiated changes. This field helps identify the type of modification applied and supports audit and change‑tracking processes.
          example: UPDATE
          enum:
          - ADD
          - UPDATE
        actionDateTime:
          type: string
          description: Represents the date and time when the cardholder’s ATM preferences were added or last updated. This timestamp provides an audit trail for tracking when the preferences were initially created or subsequently modified.
          format: date-time
          example: 2014-10-02T15:01:23.045Z
        updatedBy:
          type: string
          description: "Identifies the ATM Terminal ID or User ID that most recently added or updated the cardholder’s ATM preferences. This field captures the source of the latest change and supports audit, tracking, and operational traceability."
          example: USER01
