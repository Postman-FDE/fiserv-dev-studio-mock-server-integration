          type: string
          description: |
            This field contains the Primary Account Number (PAN) assigned to the cardholder record, uniquely identifying the cardholder’s card account. It may include up to 19 digits and is returned as part of the response to indicate the card associated with the requested operation or search result. The value represents the card number maintained on record for the cardholder.
          format: alphanumeric
          example: 400020XXXXXX4000
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: piUVBJKZGfks4000
        orderId:
          type: string
          description: "Represents the unique record key associated with the card order. This field applies only to debit cards and serves as the primary identifier for referencing, tracking, and managing the specific debit card order within the system."
          example: "436"
        action:
          type: string
          description: Action to be performed. The two possible actions are Update order or Cancel order. Update is applicable only for Debit. Cancel is applicable for both debit and Credit. No default.
          example: UPDATE
    OrderRequestV2:
      title: OrderRequest
      required:
      - action
      - orderId
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: piUVBJKZGfks3000
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing."
          format: numeric
          example: "0"
          default: "0"
        action:
          type: string
          description: Action to be performed. The two possible actions are Update order or Cancel order. Update is applicable only for Debit. Cancel is applicable for both debit and Credit. No default.
          example: UPDATE
          enum:
          - UPDATE
          - CANCEL
        rushType:
          type: string
          description: |
            This field specifies the delivery method for sending the physical card (plastic) to the cardholder. It determines whether the card should be shipped using standard delivery or expedited options, based on the urgency and service level requested.
          example: NONE
          enum:
          - NONE
          - REGULAR
          - OVERNIGHT
        orderType:
          type: string
          description: |
            This field specifies the ordering option for displaying the primary cardholder’s name on the card. The default order is based on the card class setup; however, the order type can be modified as needed. This ensures flexibility in how the cardholder’s name appears on the card.
          example: CARD
          enum:
          - NONE
          - CARD
          - PIN
          - CARD_AND_PIN
