    Tcpa:
      type: object
      properties:
        tcpaType:
          type: string
          description: "Indicates the Telephone Consumer Protection Act (TCPA) type.  \n- ENFACT - Fraud monitoring system which is used for identifying suspicious activities on credit and debit cards.  \n- STEPUP - Authentication system in which an OTP is sent to the cardholder's available contact information.  \n"
          enum:
          - ENFACT
          - STEPUP
        mediaType:
          type: string
          description: Media through which user can be contacted.
          example: VOICE
          enum:
          - VOICE
          - TEXT
        revoked:
          type: boolean
          description: Status of TCPA media type.
          example: true
        lastUpdatedDateTime:
          type: string
          description: TCPA last updated date. Optional. Applies to debit and credit cards.
          format: date-time
        lastUpdatedBy:
          maxLength: 25
          type: string
          description: Last updated by. Optional. Applies to debit and credit cards.
          example: Jesse Doe
    TcpaV3:
      type: object
      properties:
        tcpaType:
          type: string
          description: "Indicates the Telephone Consumer Protection Act (TCPA) type. Possible values  \nENFACT - Fraud monitoring system which is used for identifying suspicious activities on credit and debit cards.  \nSTEPUP - Authentication system in which an OTP is sent to the cardholder's available contact information.  \n"
          example: ENFACT
          enum:
          - ENFACT
          - STEPUP
        mediaType:
          type: string
          description: Media through which user can be contacted.
          example: VOICE
          enum:
          - VOICE
          - TEXT
        revoked:
          type: boolean
          description: Status of TCPA media type.
          example: true
        lastUpdatedDateTime:
          type: string
          description: TCPA last updated date. Optional. Applies to debit and credit cards.
          format: date-time
        lastUpdatedBy:
          maxLength: 25
          type: string
          description: Last updated by. Optional. Applies to debit and credit cards.
          example: Jesse Doe
    TcpaV4:
      type: object
      properties:
        tcpaType:
          type: string
          description: "Indicates the Telephone Consumer Protection Act (TCPA) type. Possible values  \nENFACT - Fraud monitoring system which is used for identifying suspicious activities on credit and debit cards.  \nSTEPUP - Authentication system in which an OTP is sent to the cardholder's available contact information.  \n"
          example: ENFACT
          enum:
          - ENFACT
          - STEPUP
        mediaType:
          type: string
          description: "Indicates the preferred communication channel through which the cardholder can be contacted. This value identifies the medium used for outreach, notifications, or support interactions."
          example: VOICE
          enum:
          - VOICE
          - TEXT
        revoked:
          type: boolean
          description: "Indicates the current status of the selected TCPA media type. This value specifies whether the communication channel is permitted, restricted, or otherwise controlled based on TCPA compliance requirements."
          example: true
        lastUpdatedDateTime:
          type: string
          description: Indicates the most recent date on which the TCPA media type was updated. This optional field applies to both debit and credit cards and is used to track the latest modifications for TCPA compliance and communication preferences.
          format: date-time
          example: 2022-09-26T15:50:45Z
        lastUpdatedBy:
          maxLength: 25
          type: string
          description: Indicates the user or system identifier that last updated the TCPA information. This optional field applies to both debit and credit cards and is used for audit tracking and compliance reporting.
          example: Jesse Doe
    SearchTransactionRequest:
      required:
      - cardNumber
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        memberNumber:
          type: string
          description: "The Member number is associated with the card. If not passed, defaults to ALL. Transaction summary ia returned as an array for all member numbers when defaulted to All."
          example: "0"
        filterCriteria:
          type: array
          items:
            $ref: "#/components/schemas/FilterCriteria"
