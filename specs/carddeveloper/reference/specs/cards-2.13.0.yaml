          example: "443011000000018"
        referenceNumber:
          type: string
          description: "This field specifies the reference number assigned to the transaction. It provides a unique identifier generated by the issuer, network, or acquiring system to facilitate transaction tracking, reconciliation, customer inquiries, and audit review. This field is applicable to debit card transactions.  \n"
          example: "443011000000018"
        transactionAccountNumber:
          type: string
          description: |
            This field specifies the card number associated with the transaction and may vary based on the transaction type. For authorization transactions, it reflects the card number used during the authorization request. For posted transactions, it represents the account number or card number tied to the finalized transaction record. In the case of credit card transactions, this value may differ due to issuer or network‑specific processing rules. This field applies to both debit and credit transactions, with credit‑specific variations noted above.
          example: "443011000000018"
        transactionCode:
          type: string
          description: "This field represents the specific code assigned to each transaction. It serves as a system‑generated identifier used to classify, track, and reference the transaction across authorization, posting, reconciliation, and reporting processes. This field is applicable to debit card transactions.  \n"
          example: "255"
        transactionDescription:
          type: string
          description: |
            This field provides a descriptive summary of the transaction. It offers a human‑readable explanation of the transaction type, purpose, or activity to support reporting, reconciliation, customer communication, and audit review. This field
          example: OVERLIMIT FEE REFUND
      description: Tag applies to credit cards only.
    TerminalTransactionRequest:
      type: object
      properties:
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field contains the identifier for the terminal where the transaction was performed. It is used to uniquely distinguish the originating terminal for processing, tracking, and audit purposes.
          format: alphanumeric
          example: VMDIEOS1
          x-encrypted: "N"
        filterCriteria:
          type: array
          items:
            $ref: "#/components/schemas/TerminalTransactionFilterCriteria"
    TerminalTransactionFilterCriteria:
      type: object
      properties:
        filterBy:
          type: string
          description: "Type of filter to be applied to narrow down terminal transactions search. One or many filter combinations are allowed.  \n- MERCHANT_NAME - Merchant Name.  \n- AMOUNT_FROM - Minimum amount user wish to choose. Valid format is 0.00.  \n- AMOUNT_TO - Maximum amount user wish to choose. Valid format is 0.00.  \n- FROM_DATETIME - Start date and time user wish to choose. Valid Format is \"yyyy-MM-dd'T'HH:mm:ssZ\".  \n- TO_DATETIME - Ending date user wish to choose. Valid format is \"yyyy-MM-dd'T'HH:mm:ssZ\".  \n- STATUS - Status of Transaction for debit. For debit transactions valid status are APPROVED, DECLINED and REVERSED.  \n- TRANSACTION_TYPE - Describes the type of transaction done on card.For values refer field name transactionType.  \n- MESSAGE_TYPE - Message based on activity done on the transaction. Applies to Debit only. For values refer field name MessageType.  \n- CARDNUMBER - Card number on which transaction is done.  \n- TERMINALFILOGO - The Terminal FI Logo.  \n- CARDFILOGO - The Card FI Logo.  \n- SYSTEM_RECORD_ID - The ID that uniquely identifies the transaction. Mapped to the lifecycle key.  \n- SEQUENCE_NUMBER - Chronological numeric identifier for the transaction.  \n- RETRIEVAL_REF_NUMBER - Transaction identifier typically assigned by the acquirer or transaction originator.\n"
          example: MERCHANT_NAME
          enum:
          - MERCHANT_NAME
          - AMOUNT_FROM
          - AMOUNT_TO
          - FROM_DATETIME
          - TO_DATETIME
          - STATUS
          - TRANSACTION_CODE
          - MESSAGE_TYPE
          - CARDNUMBER
          - TERMINALFILOGO
          - CARDFILOGO
          - SYSTEM_RECORD_ID
          - SEQUENCE_NUMBER
          - RETRIEVAL_REF_NUMBER
        filterValue:
          type: string
          description: filterBy value by which transactions are filtered.
          example: Store1
    TerminalTransactionsResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TerminalTransaction"
        warningInfo:
          $ref: "#/components/schemas/Warning"
    TerminalTransaction:
      type: object
      properties:
        systemRecordId:
          type: string
          description: "This field contains the unique system-generated identifier associated with the record. It may include lifecycle key, duID, or active key values that support internal tracking and state management of the card record."
          example: 377761184|12080251120230113|0120
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          example: 400010XXXXXX3000
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing."
          example: "0"
          default: "0"
        sequenceNumber:
          type: string
          description: |
            This field represents a chronological numeric identifier assigned by the terminal to each transaction. It is used to uniquely sequence transactions in the order they were initiated, supporting reconciliation, traceability, and audit processes across the transaction lifecycle.
          example: "000009"
        retrievalRefNumber:
          maxLength: 12
          type: string
          description: |
            This field contains the reference number supplied and retained by the message originator. It serves as an identifier used to track or correlate the transaction throughout processing. The value may be up to 12 characters in length.Applies to debit cards only.
          format: numeric
          example: "080000100003"
        subResponseCode:
          type: string
          description: |
            This field contains an optional one‑character value that provides additional detail for specific denial codes. It is case‑sensitive, and its meaning varies based on the combination of the authorization response code and the response sub‑code. This field is used to further refine the reason for a denial when applicable.This field is applicable only for Debit.
        subResponseCodeDescription:
          type: string
          description: This field provide description for sub response code.Response sub codes are an optional 1-character field further defining specific denial codes that are only applicable on certain response codes; they are case-sensitive and meanings vary based on response and response sub code combination.This field is applicable only for Debit.
        preAuthAmt:
          type: string
          description: |
            This field contains the transaction amount returned in specific processing scenarios. For a preauthorization response (110) or an authorization response (210), it represents the amount associated with the response. In the case of a partially approved transaction, this value reflects the amount that was approved. For a denied transaction, it contains the originally requested amount. The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees. For a forced post preauthorization (120) or a forced post clearing transaction (220), the clearing amount shown in Amount 2 is duplicated in Amount 1. During a reversal, Amount 1 represents the amount to be reversed.
          example: "1299.00"
        amtCharged:
          type: string
          description: |
            This field contains the transaction amount associated with specific processing scenarios. For
            forced authorization (120) or a forced post-clearing transaction (220), it represents the
            transaction amount. In the case of a partially approved transaction, this is the approved amount.
            The amount includes applicable surcharges but excludes switch, cardholder, and interchange fees.
            For a preauthorization response (110) or an authorization response (210), the amount displayed
            reflects the balance returned in the response, which may be either the ledger balance or the
            available balance. During a partial reversal, Amount 2 indicates the new amount that replaces the
            amount displayed in Amount 1. This field applies specifically to debit cards.
          example: "1299.00"
        authorizationCode:
          type: string
          description: Authorization approval code for the transaction. It is generated for approved transactions only.
          example: "050821"
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field contains the identifier for the terminal where the transaction was performed. It is used to uniquely distinguish the originating terminal for processing, tracking, and audit purposes.
          format: alphanumeric
          example: VMDIEOS1
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: |
            This field specifies the Merchant Category Code (MCC) associated with the transaction. The MCC is a nationally recognized four‑digit code used to classify the type of business, product, or service offered by the card acceptor. It helps determine transaction category, routing rules, reporting classifications, and compliance requirements.
          format: numeric
          example: "6011"
        merchantCity:
          maxLength: 16
          type: string
          description: |
            This field contains the Regulation E location details, specifically the city and state where the terminal involved in the transaction is located. It is used for compliance and reporting purposes under Regulation E requirements. This field applies to both debit and credit cards.
          example: New Jersey
        merchantState:
          maxLength: 3
          minLength: 2
          type: string
          description: "This field contains the state where the merchant associated with the transaction is located. It is used for identifying the merchant’s geographic location for processing, reporting, and compliance purposes. \nAL Alabama | AK Alaska | AS American Samoa (US Territory) | AZ Arizona | AR Arkansas  \nCA California | CO Colorado | CT Connecticut | DE Delaware | DC District of Columbia  \nFM Federated States of Micronesia (US Territory) | FSM Federated States of Micronesia (US Territory)  \nFL Florida | GA Georgia | GU Guam (US Territory) | GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada | NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina | SD South Dakota | TN Tennessee | TX Texas | UT Utah  \nVT Vermont | VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin | WY Wyoming  \n"
          example: NJ
        eciMastercard:
          maxLength: 35
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI), which provides information about the security level and authentication method used for an electronic commerce transaction. For Debit Mastercard® transactions, the ECI indicates whether the transaction was authenticated and the level of security applied during processing. This field applies specifically to debit cards.  \nPossible Positions 1 and 2 values  \n- 21  -  Channel encryption; cardholder certificate not used  \n- 22  -  Masterpass-generated transaction  \n- 24  -  Digital Secure Remote Payment (DSRP) transaction  \n- 91  -  No security protocol; cardholder certificate not used.  \nPossible Position 3 values  \n- 0  -  Universal cardholder authentication field (UCAF) data collection – Is not supported by the merchant an Identity Check merchant has chosen not to undertake Identity Check on this transaction or identity Check failed authentication and merchant desires to proceed with transaction  \n- 1  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains an attempts AAV  \n- 2  -  UCAF data collection is supported by the merchant and UCAF data must be present (transaction contains a fully authenticated AAV)  \n- 3  -  UCAF data collection is supported by the merchant and UCAF (Mastercard assigned static AAV) must be present  \n- 4  -  Merchant has chosen to share authentication data within authorization; UCAF collection not supported  \n- 5  -  Reserved for future use  \n- 6  -  Merchant Risk-Based Decisioning  \n- 7  -  Partial Shipment or recurring payment; liability depends on the original UCAF values provided and matching with the original transaction  \n"
          example: "3"
        eciVisa:
          type: string
          description: "This field contains the Electronic Commerce Indicator (ECI) for Visa transactions, which provides information about the security level and authentication method used during an electronic commerce Visa Check transaction. The ECI helps determine whether the transaction was authenticated and the level of security applied. This field applies specifically to debit cards.  \nPosition 4 - Mail/Phone/Electronic Commerce and Payment Indicator  \n- Space - POS Customer Present (POS Check Service Only)  \n- 1 - Single transaction of a mail/phone order  \n- 2 - Recurring transaction  \n- 3 - Installment payment  \n- 4 - Unknown classification/Other mail order  \n- 5 - Secure electronic commerce transaction  \n- 6 - Non-authenticated security transaction at a 3-D Secure-capable merchant, and merchant attempted to authenticate the cardholder using 3-D Secure  \n- 7 - Non-authenticated security transaction  \n- 8 - Non-secure transaction  \n"
          example: "3"
        pinTransaction:
          type: string
          description: "This field indicates whether a Personal Identification Number (PIN) was used to authenticate the transaction. Valid values are “Yes” or “No,” specifying the presence or absence of PIN-based verification."
          example: 1 - Yes
        networkID:
          type: string
          description: |
            This field specifies the payment network to be used for transmitting the transaction message. The selected network determines the applicable program rules and processing guidelines for the transaction.'
        acquirerRefNum:
          maxLength: 23
          type: string
          description: This field contains the Acquirer Reference Number (ARN) assigned by the payment network based on information provided by the acquirer. It is primarily used for network-level corrections and transaction tracking. The ARN ensures accurate identification of transactions within the network. This field applies specifically to debit cards.
        posDataInputCapability:
          maxLength: 1
          type: string
          description: "This field indicates the capability of the terminal to manually enter the card number and expiration date into the system. It reflects whether the terminal supports key‑entry functionality as part of the card data capture process. This field applies specifically to debit cards. Valid values are- 0  Unknown / Not specified 1  Manual entry only 2  Magnetic stripe read 3  Manual + Magnetic stripe 4  Chip (ICC) capable 5  Manual + Chip 6  Magnetic stripe + Chip 7  Manual + Magnetic stripe + Chip 8  Contactless capable 9  All capabilities (Manual, Magstripe, Chip, Contactless) Some APIs (like CyberSource or Fiserv) use a two-digit numeric or bit-mapped representation to indicate multiple capabilities."
        posDataInputMode:
          type: string
          description: |
            This field indicates the method used to capture card information at the terminal. It identifies how the card data—such as card number and expiration date—was entered, whether through swipe, dip, tap, manual key entry, or another input method supported by the terminal. This field applies specifically to debit cards.
            Valid values:
              00  Unspecified
              01  Manual
              02  Swipe
              03  Barcode
              04  OCR
              05  Chip
              06  Key Entered
              07  Contactless Chip
              81  Credential on file / e-commerce transaction
              90  Contactless Magstripe
        unmatchedCompletionFlag:
          type: string
          description: |
            This field indicates whether the transaction is marked with an unmatched completion flag, used to identify transactions where the completion record does not correspond to a previously authorized transaction.
          example: "N"
        expirationDateMismatch:
          type: string
          description: |
            This field indicates whether an expiration date mismatch exists between the provided card details and the issuer’s records. It is used for validation during transaction processing to ensure card data accuracy. This field applies specifically to debit cards.
          example: "N"
        transactionDateTime:
          type: string
          description: |
            This field captures the date and time at which the transaction was created. It records the precise timestamp used for transaction logging, auditing, and reporting.
          format: date-time
          example: 2021-10-15T17:13:14Z
        merchantName:
          maxLength: 25
          type: string
          description: |
            This field contains the name of the merchant associated with the transaction. It is used for identifying the card acceptor during processing, reporting, and reconciliation.
          example: Store1
        transactionAmount:
          type: string
          description: Amount on a particular transaction. Valid format is 0.00.
          example: "1299.00"
        transactionType:
          type: string
          description: "Indicates the type of transaction that was made on the card. It is interlinked with transaction code.  \nValid values for Debit are - \n- Withdrawal\n- Debit\n- Money Transfer Funding\n- Check Cashing\n- Deposit Cash Back\n- Money Transfer Dispense\n- Money Transfer Initiate\n- Deposit\n- Credit\n- Message\n- Money Transfer Credit\n- Loan to Prepaid\n- Money Transfer Refund\n- Balance Inquiry\n- PIN Select\n- Statement Print\n- Member Verification\n- Account Inquiry\n- Transfer\n- Payment\n- Payment Enclosed\n- Payment to Merchant\n- Refund from Merchant\n- Third Party Bill Payment Return\n- Special Purchase  \nValid Values for Credit when transaction status is Posted -   \n- Sale\n- Cash Advance\n- Return\n- Merchandise Sale Reversal\n- Cash Advance Reversal\n- Return Reversal\n- Merchandise Sale Amount Adjustment\n- Cash Advance Amount Adjustment\n- Return Amount Adjustment\n- Payment\n- Payment Reversal\n- Payment Amount Adjustment\n- Specific Credit Amount Adjustment\n- Cash Advance Item Charge Refund\n- Late Charge Refund\n- Merchandise Finance Charge Refund\n- Cash Advance Finance Charge Refund\n- Backdated Payment Adjustment\n- Merchandise Item Charge Refund\n- Overlimit Charge Refund\n- Credit Life Insurance Fee Refund\n- Backdate Cash Advance and Sales Adjustment\n- Small Balance Charge-off\n- Charge Off Total Account\n- Charge Off Cash Advance Interest\n- Charge Off Billed Late Charges\n- Charge Off Merchandise Interest and Service Charges\n- Charge Off Credit Life Insurance\n- Charge Off All Finance Charges\n- Charge Off All Current Cash Advance Interest\n- Charge Off All Current Merchandise Interest\n- Charge Off Cycle-to-Date Late Charges\n- Charge Off Billed Cash Advance Item Charges Charge Off Billed Merchandise Item Charges\n- Charge Off Billed Overlimit Fees \n- Charge Off Cycle-to-Date Cash Advance Item Charges\n- Charge Off Cycle-to-Date Merchandise Item Charges\n- Charge Off Cycle-to-Date Overlimit Fees\n- Account Transfer\n- Finance Charge (item charge)\n- Reserved for restricted use\n- Reserved for restricted use\n- Late Charge\n- Credit Life Insurance Charge\n- Cash Advance Finance Charge\n- Merchandise Finance Charge\n- Overlimit Account Message\n- Reserved for restricted use\n- Account Level Processing Strategy Change Message\n- Reserved for restricted use\n- Account Balance Details for MULTRAN Accounts\n- Backdated Cash Advance Finance Charge\n- Backdated Payment Interest Adjustment\n- Cash Advance Item Charge\n- Merchandise Item Charge\n- Overlimit Charge\n- Interest Earned or Credit Interest\n- Service Charge or Statement Charge\n- Cash Advance Item Charge\n- Fee or Finance Charge Rebate\n- Backdated Payment or Cash Advance Adjustment\n- Skip Payment Certificate Message\n- Retail Special Details\n- Airline Itinerary\n- Special Details\n- First Data use only\nBelow transaction types are for the transaction status Pending or Declined for Credit -  \n- Authorization adjustment\n- Activation code notification message for token provisioning via step-up authentication processing\n- Check authorization approved\n- Preauthorization request approved\n- Account status inquiry service or payment account status inquiry\n- Cash advance authorization approved\n- Cash advance authorization declined\n- Cash advance authorization approved by expansion\n- Override declined cash advance\n- Cash advance authorization approved by positive identification\n- Cash referral\n- Cash advance authorization approved by name\n- Cash advance authorization manually declined\n- Duplicate authorization\n- Cash authorization approved without issuer contact\n- Check authorization declined\n- Merchandise authorization approved without issuer contact\n- Preauthorization request denied\n- Balance inquiry approved\n- Issuer’s adjustment\n- Reserved for restricted use\n- Check system error - declined\n- Return posted check\n- Merchandise authorization approved\n- In-store return\n- Merchandise authorization declined\n- Merchandise authorization approved by expansion\n- Right-time payment\n- Override declined merchandise authorization\n- Merchandise authorization approved by positive identification\n- Right-time pay/reversal\n- Merchandise referral\n- Merchandise authorization approved by name\n- Merchandise authorization manually declined\n- Permanent authorization request\n- Pay unposted check\n- Visa and Mastercard person-to-person payment transaction reversal\n- Visa and Mastercard person-to-person payment transaction decline\n- Permanent authorization adjustment\n- Merchandise return adjustment\n- Merchandise return declined\n- Merchandise return approved\n- Merchandise return adjustment declined\n- Return unposted check\n- Account status check via a token provisioning request resulted in an approved response\n- Token provision decision\n- Token maintenance, such as activation, deactivation, suspension, exception, or replacement\n- Token has been granted, linked to the cardholder account, and provisioned\n- Private label ETC return posted at the time of return\n- Manual override cash advance authorization\n- Manual override merchandise authorization  \n"
          example: WITHDRAWAL
        messageType:
          maxLength: 4
          type: string
          description: "This field contains the combination of the transaction message type code and its corresponding description. It is used to identify and interpret the nature of the transaction message during processing and reporting.  \nFor the valid codes below are the values  \n- 100 - Pre-Auth Request  \n- 102 - Pre-Auth Reversal  \n- 110 - Preauthorization  \n- 120 - Pre-Auth Stand In  \n- 121 - Pre-Auth Adv Repeat  \n- 130 - Auth Advice Resp  \n- 200 - Request  \n- 202 - Auth Reversal  \n- 210 - Auth/Completion  \n- 220 - Forced Completion  \n- 221 - Advice Repeat  \n- 230 - Advice Response  \n- 320 - Batch Upload  \n- 330 - Batch Upload Resp  \n- 420 - Reversal  \n- 421 - Advice Rev Repeat  \n- 430 - Reversal Response  \n- 500 - Batch Settl Request  \n- 510 - Batch Settl Resp  \n- 800 - Network Mgmt Req  \n- 810 - Network Mgmt Resp  \n- 820 - Network Mgmt Advice  \n"
          example: 210 - Auth/Completion
        transactionStatus:
          type: string
          description: |
            This field indicates the current status of the transaction. It reflects the processing outcome or state assigned by the issuer, network, or system—such as approved, declined, reversed, pending, or completed. The value enables accurate tracking, reconciliation, and reporting of transaction activity throughout its lifecycle.
          example: DECLINED
        responseCode:
          type: string
          description: "This field represents the authorization response code returned by the issuer or processing system, indicating whether the transaction has been approved or denied. For approved transactions, the code typically contains an approval identifier used for posting, reconciliation, and dispute handling. For denied transactions, it contains a decline or error code specifying the reason the authorization request could not be accepted. The authorization response code guides the terminal, acquirer, and network in determining the next steps for transaction completion or customer messaging."
          example: "003"
        responseCodeDescription:
          type: string
          description: "TThis field provides the descriptive meaning associated with the response code returned in the transaction outcome. It translates the authorization or processing response code into a human‑readable explanation, indicating whether the transaction was approved, declined, or encountered a specific error or condition. The response code description supports clearer messaging for terminals, customer receipts, operational teams, and reconciliation processes by explaining the reason behind the issuer’s or network’s decision."
          example: APPROVED - WITH BALANCES
        terminalFILogo:
          type: string
          description: "This field identifies the financial institution (FI) logo associated with the terminal where the transaction was performed. It represents the branding or institution identifier configured by the terminal owner or acquirer to display the FI’s name, logo, or brand mark on the terminal screen, receipts, or other customer-facing outputs. The Terminal FI Logo helps ensure proper branding, customer recognition, and compliance with network or acquirer requirements for terminal presentation and messaging."
          example: ABCD
        cardFILogo:
          type: string
          description: "This field identifies the financial institution (FI) logo associated with the card used in the transaction. It represents the issuer’s branding—such as the bank name, logo, or brand mark—linked to the cardholder’s account. The Card FI Logo is used for display on digital channels, receipts, account statements, or customer‑facing interfaces to ensure correct issuer identification, branding consistency, and compliance with network requirements for card‑level presentation."
          example: ABCD
        terminalPinCapable:
          type: string
          description: "This field indicates whether the terminal is capable of accepting a Personal Identification Number (PIN) entry from the cardholder. It reflects the terminal’s PIN‑entry capabilities—such as support for online PIN, offline PIN, both, or no PIN entry at all. This information is used during the authorization process to determine the appropriate cardholder verification method and to ensure compliance with network rules, risk management requirements, and EMV processing standards."
          example: "No"
        merchantCountry:
          type: string
          description: "This field specifies the country in which the terminal is physically installed. It identifies the terminal’s geographic location based on the acquirer’s or terminal owner’s registered address and is typically represented using an ISO‑standard country code. This information is used for transaction routing, applying regional rules and surcharge requirements, supporting regulatory reporting, and enabling issuer risk evaluation based on the terminal’s jurisdiction."
          example: USA
    AcquirerInfo:
      type: object
      properties:
        merchantName:
          maxLength: 25
          type: string
          description: |
            This field contains the name of the merchant associated with the transaction. It is used for identifying the card acceptor during processing, reporting, and reconciliation.
        merchantId:
          type: string
          description: Merchant identification number where the transaction originated.
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field contains the identifier for the terminal where the transaction was performed. It is used to uniquely distinguish the originating terminal for processing, tracking, and audit purposes.
          format: alphanumeric
        terminalStreet:
          type: string
          description: Street address where the terminal is located.
        terminalCityAndState:
          type: string
          description: "Terminal City and State  \nAL Alabama | AK Alaska | AS American Samoa (US Territory) | AZ Arizona | AR Arkansas  \nCA California | CO Colorado | CT Connecticut | DE Delaware | DC District of Columbia  \nFM Federated States of Micronesia (US Territory) | FSM Federated States of Micronesia (US Territory)  \nFL Florida | GA Georgia | GU Guam (US Territory) | GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada | NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina | SD South Dakota | TN Tennessee | TX Texas | UT Utah  \nVT Vermont | VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin | WY Wyoming  \n"
          example: NY
        merchantCountry:
          type: string
          description: Country where the merchant is located.
          example: USA
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: "This field specifies the Merchant Category Code (MCC) associated with the transaction. The MCC is a nationally recognized four‑digit code used to classify the type of business, product, or service offered by the card acceptor. It helps determine transaction category, routing rules, reporting classifications, and compliance requirements. \n"
          format: numeric
          example: "6011"
        pointOfService:
          type: string
          description: "Indicates the type of device used to acquire the transaction or the purpose of the transaction.  \n- 002 - ON-PREMISE  \n- 004 - ELECTRONIC CASH REGISTER  \n- 006 - PRE-AUTHORIZED REQUEST  \n- 007 - PRE-AUTHORIZED REQUEST-NO PIN  \n- 014 - GENERIC  \n- 051 - VERIFICATION OF FUNDS  \n- 054 - GAS PUMP  \n- 062 - OFF-PREMISE  \n- 064 - SCRIP DISPENSE  \n- 072 - RETAIL  \n- 074 - ADMINISTRATIVE  \n- 081 - PAYIT OR BANKIT TRANSACTION (ITP)  \n- 086 - PIN, NO TRACK2  \n- 087 - MERCHANT AUTHORIZED TRANSACTION  \n- 088 - PAPER CAPTURE  \n- 089 - TRACK READ (PAN AND EXP), NO PIN  \n- 090 - NO PIN, NO TRACK2  \n- 091 - NO PIN, TRACK2  \n- 092 - INTERNATIONAL  \n- 094 - SHARED BRANCH STAND ALONE  \n- 096 - SHARED BRANCH FRANCHISE  \n- 097 - SHARED BRANCH OUTLET  \n"
      example: 002 - ON-PREMISE
    AcquirerInfoV2:
      type: object
      properties:
        merchantCategoryCode:
          maxLength: 4
          type: string
          description: |
            TThis field identifies the type of merchant acquiring the transaction. It indicates the merchant category or acquisition channel responsible for submitting the transaction for processing. This information is used for routing, reporting, interchange qualification, and applying merchant‑specific rules or risk controls.
          format: numeric
          example: "5541"
        merchantCountry:
          maxLength: 3
          type: string
          description: |
            This field specifies the country in which the merchant is physically located. It identifies the merchant’s geographic location for authorization decisioning, fraud‑risk assessment, cross‑border determination, and regulatory or compliance reporting.
          example: USA
        merchantId:
          type: string
          description: "This field specifies the merchant identification number (MID) associated with the merchant where the transaction originated. The MID uniquely identifies the merchant within the acquiring network and is used for routing, settlement, reporting, fraud monitoring, and merchant‑level analysis.    \n"
          example: PARAGON APPLICAT
        merchantName:
          maxLength: 25
          type: string
          description: |
            This field contains the name of the merchant associated with the transaction. It is used for identifying the card acceptor during processing, reporting, and reconciliation.
          example: PARAGON APPLICATION
        pointOfService:
          type: string
          description: "This field identifies the merchant that acquired the POS transaction. It specifies the acquiring merchant entity responsible for submitting the point‑of‑sale transaction into the payment network. This information is used for routing, settlement, merchant‑level reporting, and fraud or compliance monitoring.  \n- 002 - ON-PREMISE  \n- 004 - ELECTRONIC CASH REGISTER  \n- 006 - PRE-AUTHORIZED REQUEST  \n- 007 - PRE-AUTHORIZED REQUEST-NO PIN  \n- 014 - GENERIC  \n- 051 - VERIFICATION OF FUNDS  \n- 054 - GAS PUMP  \n- 062 - OFF-PREMISE  \n- 064 - SCRIP DISPENSE  \n- 072 - RETAIL  \n- 074 - ADMINISTRATIVE  \n- 081 - PAYIT OR BANKIT TRANSACTION (ITP)  \n- 086 - PIN, NO TRACK2  \n- 087 - MERCHANT AUTHORIZED TRANSACTION  \n- 088 - PAPER CAPTURE  \n- 089 - TRACK READ (PAN AND EXP), NO PIN  \n- 090 - NO PIN, NO TRACK2  \n- 091 - NO PIN, TRACK2  \n- 092 - INTERNATIONAL  \n- 094 - SHARED BRANCH STAND ALONE  \n- 096 - SHARED BRANCH FRANCHISE  \n- 097 - SHARED BRANCH OUTLET  \n"
          example: 002 - ON-PREMISE
        terminalCityAndState:
          type: string
          description: "This field captures the city and state associated with the terminal where the transaction occurred. It is used to identify the physical location of the acquiring terminal for audit, authorization, and reporting purposes. The value should include both the city and the state in a clear, standardized format. This field is applicable to debit card transactions. \nAL Alabama | AK Alaska | AS American Samoa (US Territory) | AZ Arizona | AR Arkansas  \nCA California | CO Colorado | CT Connecticut | DE Delaware | DC District of Columbia  \nFM Federated States of Micronesia (US Territory) | FSM Federated States of Micronesia (US Territory)  \nFL Florida | GA Georgia | GU Guam (US Territory) | GUM Guam (US Territory) | HI Hawaii  \nID Idaho | IL Illinois | IN Indiana | IA Iowa | KS Kansas | KY Kentucky  \nLA Louisiana | ME Maine | MH Marshall Islands (US Territory) | MHL Marshall Islands (US Territory)  \nMD Maryland | MA Massachusetts | MI Michigan | MN Minnesota | MS Mississippi  \nMO Missouri | MT Montana | NE Nebraska | NV Nevada | NH New Hampshire | NJ New Jersey  \nNM New Mexico | NY New York | NC North Carolina | ND North Dakota  \nMP Northern Mariana Islands (US Territory) | MNP Northern Mariana Islands (US Territory)  \nOH Ohio | OK Oklahoma | OR Oregon | PW Palau (US Territory) | PLW Palau (US Territory)  \nPA Pennsylvania | PR Puerto Rico (US Territory) | PRL Puerto Rico (US Territory) | RI Rhode Island  \nSC South Carolina | SD South Dakota | TN Tennessee | TX Texas | UT Utah  \nVT Vermont | VA Virginia | VI Virgin Islands (US Territory) | VIR Virgin Islands (US Territory)  \nWA Washington | WV West Virginia | WI Wisconsin | WY Wyoming  \n"
          example: NY
        terminalId:
          maxLength: 8
          type: string
          description: |
            This field identifies the specific terminal where the transaction was performed. It provides a unique identifier assigned to the acquiring terminal and is used for transaction routing, audit tracking, and device-level reporting. This field is applicable to debit card transactions.
          format: aplhanumeric
          example: PREPINND
        terminalStreet:
          type: string
          description: |
            This field specifies the street address of the terminal where the transaction was performed. It provides the physical location of the acquiring terminal for compliance, audit documentation, and transaction‑level reporting. This field is applicable to debit card transactions.
          example: PARAGON APPLICAT
    RiskInfo:
      type: object
      properties:
        enfactNearTimeScore:
          type: string
          description: |
            EnFact Near Time/Case Management Score. EnFact predictive model score assigned to the transaction after authorization.
          example: "150"
        enfactRealTimeDecision:
          type: string
          description: "EnFact authorization recommendation based on an EnFact fraud rule assigned during authorization.  \n- A - Approve  \n- D - Deny  \n- T - Timed Out  \n- E - Error  \n- U - Falcon Server Unavailable  \n- R - Deny - Retain Card  \n- X - Engin to Falcon Timeout  \n- S - Stop Sending to Falcon           \n"
          example: A
        enfactRealTimeScore:
          type: string
          description: The real time score associated with a transaction during authorization.
          example: "05"
        enfactRecommendation:
          type: string
          description: |
            Identifies if the EnFact rules denied the transaction.Applies to both Debit and Credit cards.
          example: approve
        networkScore:
          type: string
          description: " This field specifies the network score assigned to the transaction by the participating payment network. The score reflects the network’s risk assessment and is used to support authorization decisions, fraud monitoring, and downstream case management. Possible network sources include: Visa, Mastercard, Pulse, and STAR. "
          example: VISA
        ruleManagerRecommendation:
          type: string
          description: |-
            This field provides the transaction recommendation generated by RuleManager and returned to the authorization platform. The recommendation reflects the outcome of RuleManager’s evaluation based on applied fraud rules and system conditions. Possible values include-
            C – Continue D – Deny E – Error O – Offline for Maintenance P – Pass R – Deny and Retain T – Timeout
            This recommendation assists the authorization platform in determining the appropriate action for the transaction during real‑time processing.
          example: C-Continue
        transactionBlockerResult:
          type: string
          description: "Identifies how the transaction was handled by TranBlocker.  \n- 0 Not Checked  \n- 1 Timeout  \n- 2 Successful  \n- 3 Denote and Continue  \n- 4 Deny  \n- 5 Retain\n"
    RiskInfoV2:
      type: object
      properties:
        enfactNearTimeScore:
          type: string
          description: "This field specifies the EnFact Near Time/Case Management Score assigned to the transaction after authorization. The score is generated by the EnFact predictive fraud‑detection model and reflects the system’s assessment of the transaction’s risk level. It is used to support real‑time monitoring, case creation, and downstream fraud analysis."
          example: "05"
        enfactRealTimeDecision:
          type: string
          description: |-
            This field provides the EnFact authorization recommendation assigned to the transaction during the authorization process. The recommendation is generated based on EnFact fraud‑rule evaluation and indicates the action suggested by the fraud‑detection engine. Possible values include-
            A – Approve D – Deny T – Timed Out E – Error U – Falcon Server Unavailable R – Deny – Retain Card X – Engine to Falcon Timeout S – Stop Sending to Falcon
            This recommendation helps issuers and fraud‑monitoring systems determine appropriate next steps for transaction handling and risk management.
          example: A - Approve
        enfactRealTimeScore:
          type: string
          description: "This field represents the real‑time fraud‑risk score assigned to the transaction during the authorization process. The score is generated by the fraud‑detection engine based on transaction attributes, cardholder behavior, and predictive risk models. It provides immediate insight into the likelihood of fraud and supports authorization decisions, case creation, and downstream fraud monitoring activities."
          example: "05"
        enfactRecommendation:
          type: string
          description: "This field indicates whether the EnFact fraud‑rule engine denied the transaction during authorization. A value of Yes signifies that the transaction was declined based on EnFact rule evaluation, while No indicates that no rule‑based denial occurred. This information supports fraud monitoring, issuer decisioning, and downstream case management."
          example: "0000"
        networkScore:
          type: string
          description: " This field specifies the network score assigned to the transaction by the participating payment network. The score reflects the network’s risk assessment and is used to support authorization decisions, fraud monitoring, and downstream case management. Possible network sources include: Visa, Mastercard, Pulse, and STAR. "
          example: Visa
        ruleManagerRecommendation:
          type: string
          description: |-
            This field provides the transaction recommendation generated by RuleManager and returned to the authorization platform. The recommendation reflects the outcome of RuleManager’s evaluation based on applied fraud rules and system conditions. Possible values include-
            C – Continue D – Deny E – Error O – Offline for Maintenance P – Pass R – Deny and Retain T – Timeout
            This recommendation assists the authorization platform in determining the appropriate action for the transaction during real‑time processing.
          example: C - Continue
        transactionBlockerResult:
          type: string
          description: |-
            This field indicates how the transaction was evaluated and handled by TranBlocker during the authorization process. The value reflects the outcome of TranBlocker’s rule assessment and system response. Possible values include-
            0 – Not Checked 1 – Timeout 2 – Successful 3 – Denote and Continue 4 – Deny 5 – Retain
            This information is used to support fraud screening, issuer decisioning, and downstream monitoring of blocked or flagged transactions.
          example: 0 - Not Checked
        transactionSource:
          type: string
          description: |
            This field identifies the source from which the transaction originated. It indicates the channel, system, or platform that initiated or submitted the transaction for processing. This information is used for routing, audit tracing, reporting, and determining transaction‑handling rules based on the originating source.
          example: 0 - ATM
    TokenAndEmvInfo:
      type: object
      properties:
        tokenTransaction:
          type: string
          description: "Token Transaction. A tokenized payment transaction uses a token PAN that is an alternate 13- to 19-digit value provisioned for the real or true PAN. The real PAN is the card number assigned by the FI. For token provisioning transactions, this field is not applicable and the value is always N."
        wallet:
          type: string
          description: Wallet details. Possible values Apple pay - Google Pay - Samsung pay - Fitbit Pay - Garmin pay.
        emvTransaction:
          type: string
          description: Indicates if it is an EMV transaction. Possible values Yes or No.
        emvCard:
          type: string
          description: Indicates if the card used in the transaction is EMV. Possible values Yes or No.
        emvTerminal:
          type: string
          description: Indicates if the terminal is EMV capable. Possible values Yes or No.
        emvFallback:
          type: string
          description: Indicates if the transaction is EMV fallback. Possible values Yes or No.
    TokenAndEmvInfoV2:
      type: object
      properties:
        emvCard:
          type: string
          description: |
            This field indicates whether the card used in the transaction is an EMV‑enabled chip card. It identifies the presence of chip‑based processing and can take the values Yes or No. This information supports transaction risk assessment, routing decisions, and compliance reporting.
          example: "Yes"
        emvFallback:
          type: string
          description: |
            This field indicates whether the transaction was processed as an EMV fallback, meaning the chip could not be read and the transaction reverted to a magnetic‑stripe workflow. It can take the values Yes or No. This information is used for risk assessment, fraud monitoring, and compliance reporting.
          example: "false"
        emvTerminal:
          type: string
          description: |
            This field indicates whether the terminal used for the transaction is EMV‑capable, meaning it supports chip‑based processing. It can take the values Yes or No. This information helps determine the terminal’s security capabilities and is used for risk evaluation, routing decisions, and compliance reporting.
          example: "Yes"
        emvTransaction:
          type: string
          description: |
            This field indicates whether the transaction was processed using EMV chip technology. It can take the values Yes or No. This information reflects the method of card authentication used at the point of interaction and supports risk management, compliance reporting, and transaction routing decisions.
          example: "Yes"
        tokenRequestorId:
          type: string
          description: |
            This field identifies the Token Requestor ID associated with a tokenized payment transaction. The Token Requestor ID is a unique identifier assigned to the entity—such as a digital wallet provider, merchant, or device manufacturer—that requests the creation of a payment token. It is used to determine wallet type, apply token domain restrictions, support risk decisions, and manage token lifecycle activities within the tokenization ecosystem.
          example: "50120834693"
        tokenTransaction:
          type: string
          description: |
            This field indicates whether the transaction is a tokenized payment transaction. A tokenized transaction uses a token PAN—an alternate 13‑ to 19‑digit value provisioned to replace the real PAN assigned by the financial institution (FI). Token PANs help secure cardholder data during digital or mobile wallet transactions. For token provisioning transactions, this field is not applicable and the value is always N.
          format: alphanumeric
          example: "No"
        tokenType:
          type: string
          description: "This field specifies the Token Requestor ID associated with a tokenized transaction. The Token Requestor ID uniquely identifies the entity—such as a digital wallet provider, merchant, or device manufacturer—that requested issuance of the payment token. It is used to determine wallet type, token domain controls, risk parameters, and routing behavior within the tokenization ecosystem. \n"
          example: "03"
        wallet:
          type: string
          description: |
            This field specifies the digital wallet used to complete the transaction. It identifies the tokenized payment instrument presented by the cardholder and is used for wallet‑specific processing, routing, and reporting. Possible values include: Apple Pay, Google Pay, Samsung Pay, Fitbit Pay, and Garmin Pay.
          example: Apple Pay
    NetworkInfo:
      type: object
      properties:
        network:
          type: string
          description: |
            This field identifies the payment network responsible for routing the transaction from the merchant to the financial institution (FI). It indicates which network carried the authorization message during transaction processing and is used for network-specific reporting, reconciliation, and fee assessment.
        secureEci:
          type: string
          description: Electronic commerce indicator (ECI) provides network information regarding the security level and authentication method used for an electronic commerce transaction.
        authorizationCode:
          type: string
          description: Authorization approval code for the transaction.
        sequenceNumber:
          type: string
          description: "Chronological numeric identifier for the transaction, assigned by the terminal."
    NetworkInfoV2:
      type: object
      properties:
        authorizationCode:
          maxLength: 6
          type: string
          description: |
            This field contains the authorization approval code returned by the financial institution (FI) for the transaction. It serves as a unique reference confirming that the transaction has been authorized and may be required for subsequent actions such as reversals, adjustments, or settlements.
          format: numeric
          example: "000227"
        network:
          type: string
          description: |
            This field identifies the payment network responsible for routing the transaction from the merchant to the financial institution (FI). It indicates which network carried the authorization message during transaction processing and is used for network-specific reporting, reconciliation, and fee assessment.
          example: 655100 - Mastercard Credit - Affiliate Member
        secureEci:
          type: string
          description: |
            This field specifies the Electronic Commerce Indicator (ECI), which provides information from the payment network regarding the security level and authentication method applied during an e‑commerce transaction. It reflects whether the transaction was authenticated, attempted, or processed without authentication, and is used by networks and issuers for risk scoring, authorization decisions, and interchange qualification.
          example: 02 - 3-D Secure authentication attempt no resp
        sequenceNumber:
          type: string
          description: |
            This field represents a chronological numeric identifier assigned by the terminal to each transaction. It is used to uniquely sequence transactions in the order they were initiated, supporting reconciliation, traceability, and audit processes across the transaction lifecycle.
          example: "001668"
    AmountDetails:
      type: object
      properties:
        transactionNetAmount:
          type: string
          description: "Requested amount presented to the FI, or the amount approved if partially approved, regardless of the."
        cashbackAmount:
          type: string
          description: |
            This field specifies the amount of cash returned to the cardholder as part of the transaction. It represents the cash‑back portion provided at the point of sale or during a withdrawal and is included separately from the purchase or transaction amount to support accurate posting, reconciliation, and reporting of cash‑back activity.
          example: "0.00"
        surchargeAmount:
          type: string
          description: Amount of the ATM-level surcharge assessed by the terminal owner for the transaction.
        surchargeReservalAmount:
          type: string
          description: Surcharge amount to settlement of the original nonreversal transaction.
    AmountDetailsV2:
      type: object
      properties:
        cashbackAmount:
          type: string
          description: |
            This field specifies the amount of cash returned to the cardholder as part of the transaction. It represents the cash‑back portion provided at the point of sale or during a withdrawal and is included separately from the purchase or transaction amount to support accurate posting, reconciliation, and reporting of cash‑back activity.
          example: "0.00"
        surchargeAmount:
          type: string
          description: "This field specifies the amount of the ATM‑level surcharge assessed by the terminal owner for the transaction. The surcharge represents an additional fee charged directly by the ATM operator and is included separately from the withdrawal amount to support accurate posting, reconciliation, and reporting of surcharge activity."
          example: "0.00"
        surchargeReservalAmount:
          type: string
          description: "This field specifies the surcharge amount associated with the settlement of the original non-reversal transaction. It represents the additional fee applied during settlement and is included only for transactions that incur a surcharge. \n"
          example: "0.00"
        transactionNetAmount:
          type: string
          description: |
            This field represents the total amount presented to the financial institution (FI) for authorization. If the transaction receives a partial approval, this field reflects the amount that was ultimately approved. It captures the final requested or approved amount regardless of subsequent adjustments.
          example: "20.00"
    GeneralDetails:
      type: object
      properties:
        journalDateTime:
          type: string
          description: |
            This field provides the system‑generated timestamp recorded at the time of transaction processing. The value is expressed in Eastern Time (ET) and represents the precise date and time at which the system logged the event. It is used for audit tracking, reconciliation, and sequencing of transaction activity across systems.
          format: date-time
          example: 2023-07-20T13:38:53Z
        responseDetails:
          type: string
          description: Details about response received for transaction.
        reversalCode:
          type: string
          description: The reason for a reversal.
        transactionProcessingCode:
          type: string
          description: "Indicates the specific transaction (action taken), the From account, and the To account."
        toAccountType:
          type: string
          description: Type of the account impacted by a cardholder transaction.
          example: Savings
        toAccount:
          type: string
          description: Number of the account impacted by a cardholder transaction.
        fromAccountType:
          type: string
          description: Type of the account impacted by a cardholder transaction.
          example: Checking
        fromAccount:
          type: string
          description: Number of the account impacted by a cardholder transaction.
        productType:
          type: string
          description: Product Type - ATM or POS.
        depositType:
          type: string
          description: "Indicates if the deposit is a check, cash, or mixed deposit."
        subResponseCode:
          type: string
          description: |
            This field contains an optional one‑character value that provides additional detail for specific denial codes. It is case‑sensitive, and its meaning varies based on the combination of the authorization response code and the response sub‑code. This field is used to further refine the reason for a denial when applicable.
        transactionStatus:
          type: string
          description: |
            This field indicates the current status of the transaction. It reflects the processing outcome or state assigned by the issuer, network, or system—such as approved, declined, reversed, pending, or completed. The value enables accurate tracking, reconciliation, and reporting of transaction activity throughout its lifecycle.
        transactionType:
          type: string
          description: |
            This field specifies the type of transaction being performed. It identifies the nature of the cardholder activity—such as purchase, withdrawal, deposit, transfer, payment, balance inquiry, or adjustment—and is used to determine the appropriate processing rules, posting logic, and reporting treatment associated with the transaction.
            Valid values:
            27  LOAD TO PREPAID CARD
            02  PROGRAM DEBIT
            22  PROGRAM CREDIT
            01  WITHDRAWAL
            11  CASH CHECK
            12  DEPOSIT WITH CASHBACK
            17  MONEY TRANSFER DISPENSE
            18  MONEY TRANSFER INITIATE
            20  DEPOSIT
            25  MESSAGE TO BANK
            28  MONEY TRANSFER REFUND
            30  BALANCE INQUIRY
            31  PIN SELECT
            37  STATEMENT PRINT
            38  MEMBER VERIFICATION
            39  ACCOUNT INQUIRY
            40  TRANSFER
            42  PAYMENT ELECTRONIC
            43  PAYMENT ENCLOSED
            44  PAYMENT TO MERCHANT
            45  REFUND FROM MERCHANT
            99  SPECIAL PURCHASE
            10  MT FUNDING
            26  MT CREDIT
    UpdateCardStatusRequest:
      title: CardStatusUpdateRequest
      required:
      - cardNumber
      - cardStatus
      - statusReasonCode
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        memberNumber:
          type: string
          description: "Member number associated with the selected cardholder. If not specified, defaults to 0."
          example: "0"
        cardStatus:
          type: string
          description: "Status of card.  \nValues for Debit -  \n- ACTIVE  \n- CAPTURE  \n- DEACTIVATE  \n- ISSUED  \n- RESTRICTED  \nValues for Credit -  \n- BLOCKED_FROM_AUTHORIZATION  \n- FRAUD_DETECTED\n- LOST_OR_STOLEN\n- NORMAL  \n- NOT_ACTIVE  \nRefer to statusReasonCode field description for updating the status.\n"
          example: CAPTURE
          enum:
          - ACTIVE
          - CAPTURE
          - DEACTIVATE
          - ISSUED
          - RESTRICTED
          - BLOCKED_FROM_AUTHORIZATION
          - NOT_ACTIVE
          - LOST_OR_STOLEN
          - FRAUD_DETECTED
          - NORMAL
        statusReasonCode:
          type: string
          description: "Indicates the reason code associated to the card status.  \nOne of the statusReasonCode is required when updating the status to CAPTURE or DEACTIVATE.\nAll the reason codes are applicable when updating the status to CAPTURE or DEACTIVATE.\nKeep this field as NONE when updating to any other statuses.\nValues for Debit -  \n- ABUSED  \n- CLOSED  \n- CUSTOMER_REQUEST  \n- DAMAGED  \n- LOST   \n- REVOKED  \n- STOLEN  \nValues For Credit - \n- CLOSED_BY_FI  \n- CLOSED_BY_CUSTOMER  \n- DECEASED  \n- LOST  \n- REVOKED  \n- STOLEN  \n- TEMP_BLOCK_BY_FI  \n- TEMP_BLOCK_AGENT\n"
          example: LOST
          enum:
          - LOST_BLOCK_BY_ENFACT
          - FRAUD
          - CLOSED_BY_CUSTOMER
          - REVOKED
          - CLOSED_BY_FI
          - TEMP_BLOCK_BY_FI
          - APPLIED_BY_IDV
          - TEMP_BLOCK_BY_ENFACT
          - TEMP_BLOCK_AGENT
          - DECEASED
          - NORMAL
          - NONE
          - CLOSED
          - CUSTOMER_REQUEST
          - LOST
          - STOLEN
          - ABUSED
          - DAMAGED
        fraudActivity:
          type: string
          description: Indicates if it is required to open a fraud dispute claim. This is an optional field and is applicable only when status is to be updated to LOST_OR_STOLEN for Credit.
          example: POSSIBLE_FRAUD
          enum:
          - NONE_SUSPECTED
          - POSSIBLE_FRAUD
        securityMemo:
          maxLength: 220
          type: string
          description: Details on the fraud dispute to be claimed. Required when fraudActivity is POSSIBLE_FRAUD. Applicable only when status is LOST_OR_STOLEN for Credit.
    UpdateCardStatusRequestV2:
      title: CardStatusUpdateRequest
      required:
      - cardStatus
      - statusReasonCode
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: piUVBJKZGfks4000
        responseFormat:
          type: string
          description: "This field determines the format in which the card number and/or non-transactional token will be returned in the response. It is used to specify how sensitive data should be presented, such as masked, encrypted, or in plain format, based on system or client requirements.  \nValues are -\n- MASKED_CARD_ONLY - Masked Card.\n- FULL_CARD_ONLY - Clear Card.\n- TOKEN_ONLY - Non-transactional token only.\n- MASKED_CARD_AND_TOKEN - Both Masked Card and Non-transactional token.\n- FULL_CARD_AND_TOKEN - Both Clear Card and Non-transactional token.\n"
          example: MASKED_CARD_ONLY
          default: MASKED_CARD_ONLY
          enum:
          - MASKED_CARD_ONLY
          - FULL_CARD_ONLY
          - TOKEN_ONLY
          - MASKED_CARD_AND_TOKEN
          - FULL_CARD_AND_TOKEN
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing."
          format: numeric
          example: "0"
          default: "0"
        cardStatus:
          type: string
          description: "This field represents the current operational status of the card. It indicates whether the card is active, inactive, blocked, expired, or in any other defined state within the system. The value helps determine the card’s eligibility for transactions and other card-related operations.  \nValues for Debit -  \n- ACTIVE  \n- CAPTURE  \n- DEACTIVATE  \n- ISSUED  \n- RESTRICTED  \nValues for Credit -\n- BLOCKED_FROM_AUTHORIZATION  \n- FRAUD_DETECTED  \n- LOST_OR_STOLEN  \n- NORMAL  \n- NOT_ACTIVE  \nRefer to statusReasonCode field description for updating the status.\n"
          example: CAPTURE
          enum:
          - ACTIVE
          - CAPTURE
          - DEACTIVATE
          - ISSUED
          - RESTRICTED
          - BLOCKED_FROM_AUTHORIZATION
          - NOT_ACTIVE
          - LOST_OR_STOLEN
          - FRAUD_DETECTED
          - NORMAL
        statusReasonCode:
          type: string
          description: "This field specifies the reason code associated with the current status of the card. It is used to provide additional context for the card’s operational state, such as activation, suspension, or closure. The value corresponds to predefined system codes that explain why the card is in its present status..  \nOne of the statusReasonCode is required when updating the status to CAPTURE or DEACTIVATE.\nAll the reason codes are applicable when updating the status to CAPTURE or DEACTIVATE.\nKeep this field as NONE when updating to any other statuses.\nValues for Debit -  \n- ABUSED  \n- CLOSED  \n- CUSTOMER_REQUEST  \n- DAMAGED  \n- LOST   \n- REVOKED  \n- STOLEN  \nValues For Credit - \n- CLOSED_BY_FI  \n- CLOSED_BY_CUSTOMER  \n- DECEASED  \n- LOST  \n- REVOKED  \n- STOLEN  \n- TEMP_BLOCK_BY_FI  \n- TEMP_BLOCK_AGENT\n"
          example: LOST
          enum:
          - LOST_BLOCK_BY_ENFACT
          - FRAUD
          - CLOSED_BY_CUSTOMER
          - REVOKED
          - CLOSED_BY_FI
          - TEMP_BLOCK_BY_FI
          - APPLIED_BY_IDV
          - TEMP_BLOCK_BY_ENFACT
          - TEMP_BLOCK_AGENT
          - DECEASED
          - NORMAL
          - NONE
          - CLOSED
          - CUSTOMER_REQUEST
          - LOST
          - STOLEN
          - ABUSED
          - DAMAGED
        fraudActivity:
          type: string
          description: This optional field indicates whether a fraud dispute claim should be initiated. It is applicable only when the card status is being updated to LOST_OR_STOLEN for credit cards. The value helps determine if additional fraud-related actions need to be triggered during the status update process.
          example: POSSIBLE_FRAUD
          enum:
          - NONE_SUSPECTED
          - POSSIBLE_FRAUD
        securityMemo:
          maxLength: 220
          type: string
          description: This field contains detailed information regarding the fraud dispute claim. It is required when fraudActivity is set to POSSIBLE_FRAUD and is applicable only when the card status is updated to LOST_OR_STOLEN for credit cards. The value should provide sufficient details to support the fraud investigation process.
          example: Cardholder claims that it's not an authorized transaction.
    SearchCardStatusRequest:
      title: CardStatusSearchRequest
