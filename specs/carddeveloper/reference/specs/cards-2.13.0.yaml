    NewCardRequest:
      title: NewCardRequest
      required:
      - cardType
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        nonTransTokenFlag:
          type: boolean
          description: Flag indicates the request is from a tokenized client or not.
          example: true
        responseFormat:
          type: string
          description: |
            Determines the format of Card number and/or Non-transactional token in the response.
            Values are -
            - MASKED_CARD_ONLY - Masked Card
            - FULL_CARD_ONLY - Clear Card
            - TOKEN_ONLY - Non-transactional token only
            - MASKED_CARD_AND_TOKEN - Both Masked Card and Non-transactional token
            - FULL_CARD_AND_TOKEN - Both Clear Card and Non-transactional token
          example: MASKED_CARD_ONLY
          enum:
          - MASKED_CARD_ONLY
          - FULL_CARD_ONLY
          - TOKEN_ONLY
          - MASKED_CARD_AND_TOKEN
          - FULL_CARD_AND_TOKEN
        cardType:
          type: string
          description: Indicates the type of card associated with this card class.
          example: DEBIT
          enum:
          - CREDIT
          - DEBIT
        expirationDate:
          type: string
          description: |
            Month and year the card record is set to expire.
          format: MM/YY
          example: 10/23
        emvCard:
          type: string
          description: "EMV chip card.\nValues are - \n- CONTACT — Card issued as a Contact EMV chip card.\n- CONTACTLESS — Card issued as a Contactless EMV chip card.\n- false - Card is a magstripe-only card and cannot perform an EMV transaction. \n"
          enum:
          - CONTACT
          - CONTACTLESS
          - "false"
        debitOnly:
          $ref: "#/components/schemas/DebitOnly"
        creditOnly:
          $ref: "#/components/schemas/CreditOnly"
    NewCardRequestV2:
      title: NewCardRequest
      required:
      - cardType
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field contains the Primary Account Number (PAN) assigned to the cardholder record, uniquely identifying the cardholder’s card account. It must be provided in the request when identifying the card by number and may contain up to 19 digits. Either cardNumber or nonTransToken must be included in the request; if both are provided, cardNumber takes precedence and will be used for processing.
          format: numeric
          example: "4000100020003000"
        nonTransTokenFlag:
          type: boolean
          description: "If true, this flag instructs the system to generate and return a non-transactional token for the provided PAN. It indicates whether the request is from a tokenized client and supports downstream systems that rely on token-based card identification instead of the actual PAN."
          example: true
        responseFormat:
          type: string
          description: "This field specifies how the card number (PAN) and/or non-transactional token should appear in the response. Supported values include:\n  - MASKED_CARD_ONLY – Returns masked card number\n  - FULL_CARD_ONLY – Returns full card number\n  - TOKEN_ONLY – Returns non-transactional token only\n  - MASKED_CARD_AND_TOKEN – Returns both masked card and token\n  - FULL_CARD_AND_TOKEN – Returns both full card and token\n  \n  Note: MASKED_CARD_ONLY, TOKEN_ONLY, MASKED_CARD_AND_TOKEN, and FULL_CARD_AND_TOKEN are valid only for debit cards.\n"
          example: MASKED_CARD_ONLY
          enum:
          - MASKED_CARD_ONLY
          - FULL_CARD_ONLY
          - TOKEN_ONLY
          - MASKED_CARD_AND_TOKEN
          - FULL_CARD_AND_TOKEN
        cardType:
          type: string
          description: "This field specifies the product type of the card being added. Supported values            include- - CREDIT – Credit card - DEBIT – Debit card This value determines the type of card associated with the card class and may influence downstream processing, eligibility rules, and feature availability."
          example: DEBIT
          enum:
          - CREDIT
          - DEBIT
        debitOnly:
          $ref: "#/components/schemas/DebitOnlyV2"
        creditOnly:
          $ref: "#/components/schemas/CreditOnlyV2"
