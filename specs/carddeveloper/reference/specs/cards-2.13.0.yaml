        additionalEmbossLine:
          maxLength: 26
          type: string
          description: "This field contains additional embossed text, such as a corporation name, that appears on the card below the cardholder’s name. Its display depends on your institution’s configuration and may or may not be supported. This field is typically used for personalization or branding purposes."
