    CustomVelocityLimits:
      type: object
      properties:
        aggMaxCardUsage:
          maxLength: 4
          type: string
          description: Maximum number of times a card can be used for a specific transaction type within the specified time. Applies to debit cards only.
          example: "20"
        aggTimeInterval:
          maxLength: 5
          type: string
          description: Number of hours used to track maximum card usage for a specific transaction type. Applies to debit cards only.
          example: "610"
        atmMaxCardUsage:
          maxLength: 4
          type: string
          description: Maximum number of ATM transactions allowed within a certain period of time. Applies to debit cards only.
          example: "20"
        posMaxCardUsage:
          maxLength: 4
          type: string
          description: Maximum number of POS transactions allowed within a certain period of time. Applies to debit cards only.
          example: "4"
        cashEquivMaxCardUsage:
          maxLength: 4
          type: string
          description: Maximum number of Cash Equivalent transactions allowed within a certain period of time. Applies to debit cards only.
          example: "4"
        atmTimeInterval:
          maxLength: 5
          type: string
          description: Number of hours used to track maximum card usage for ATM transaction type. Applies to debit cards only.
          example: "610"
        posTimeInterval:
          maxLength: 5
          type: string
          description: Number of hours used to track maximum card usage for POS transaction type. Applies to debit cards only.
          example: "610"
        cashEquivTimeInterval:
          maxLength: 5
          type: string
          description: Number of hours used to track maximum card usage for Cash Equivalent transaction type. Applies to debit cards only.
          example: "610"
    CustomVelocityLimitsV2:
      type: object
      properties:
        aggMaxCardUsage:
          maxLength: 4
          type: string
          description: "Represents the maximum number of times a card can be used for a specific transaction type within a defined time period. This field enforces transaction‑velocity controls by limiting the frequency of a particular transaction type, supporting fraud prevention, risk management, and usage monitoring."
          example: "0"
        aggTimeInterval:
          maxLength: 5
          type: string
          description: "Represents the number of hours used as the evaluation window for tracking the maximum allowed card usage for a specific transaction type. This field defines the time‑based velocity‑control period within which transaction counts are monitored to enforce usage limits, prevent excessive activity, and support fraud‑prevention measures."
          example: 00:00
        atmMaxCardUsage:
          maxLength: 4
          type: string
          description: "Represents the maximum number of ATM transactions allowed within a defined time period. This field enforces transaction‑velocity limits by restricting how frequently a card may be used at ATMs during the specified interval, supporting fraud prevention, risk management, and controlled card usage."
          example: "0"
        atmTimeInterval:
          maxLength: 5
          type: string
          description: "Represents the number of hours used as the evaluation window for monitoring the maximum permitted card usage for ATM transactions. This field defines the time‑based velocity‑control period during which ATM transaction counts are tracked to enforce usage limits, support fraud‑prevention measures, and maintain controlled card activity."
          example: 00:00
        cashEquivMaxCardUsage:
          maxLength: 4
          type: string
          description: "Represents the maximum number of Cash Equivalent transactions allowed within a defined time period. This field enforces velocity controls by limiting the frequency of transactions involving cash‑equivalent instruments—such as money orders or travelers cheques—during the specified interval, supporting fraud prevention, risk management, and controlled usage."
          example: "0"
        cashEquivTimeInterval:
          maxLength: 5
          type: string
          description: "Represents the number of hours used as the evaluation window for monitoring the maximum permitted card usage for Cash Equivalent transactions. This field defines the time‑based velocity‑control period during which Cash Equivalent transaction counts are tracked to enforce usage limits, support fraud‑prevention measures, and maintain controlled card activity."
          example: 00:00
        posMaxCardUsage:
          maxLength: 4
          type: string
          description: "Represents the maximum number of POS transactions allowed within a defined time period. This field enforces transaction‑velocity controls by limiting how frequently a card may be used at point‑of‑sale terminals during the specified interval, supporting fraud prevention, risk management, and controlled card usage."
          example: "0"
        posTimeInterval:
          maxLength: 5
          type: string
          description: "Represents the number of hours used as the evaluation window for monitoring the maximum permitted card usage for POS transactions. This field defines the time‑based velocity‑control period during which POS transaction counts are tracked to enforce usage limits, support fraud‑prevention measures, and maintain controlled card activity."
          example: 00:00
