    DebitOnlyAddResponseV2:
      type: object
      properties:
        cardStatus:
          type: string
          description: |-
            Indicates the current status of the selected card. Supported values include-
            - ACTIVE – Card is active and available for use. - CAPTURE – Card is flagged for capture and should no longer be used. - DEACTIVATE – Card has been deactivated and is no longer valid for transactions. - ISSUED – Card has been produced and issued but may not yet be activated. - RESTRICTED – Card usage is limited based on predefined restrictions.
            This value helps determine how the card should be processed and whether it is eligible for transactions or updates.
          example: ACTIVE
          enum:
          - ACTIVE
          - CAPTURE
          - DEACTIVATE
          - ISSUED
          - RESTRICTED
        statusReasonCode:
          type: string
          description: |-
            Indicates the reason code associated with the card status. A statusReasonCode is required when updating the card status to CAPTURE or DEACTIVATE, and any of the listed reason codes may be used for these two statuses. For all other status updates, this field must be set to NONE. Supported values are as follows:** Debit Reason Codes- ABUSED CLOSED CUSTOMER_REQUEST DAMAGED LOST REVOKED STOLEN
            Credit Reason Codes- CLOSED_BY_FI CLOSED_BY_CUSTOMER DECEASED LOST REVOKED STOLEN TEMP_BLOCK_BY_FI TEMP_BLOCK_AGENT
            This value provides the justification for status changes and ensures proper card lifecycle processing and audit compliance.
          example: NONE
          enum:
          - LOST_BLOCK_BY_ENFACT
          - FRAUD
          - CLOSED_BY_CUSTOMER
          - REVOKED
          - CLOSED_BY_FI
          - TEMP_BLOCK_BY_FI
          - APPLIED_BY_IDV
          - TEMP_BLOCK_BY_ENFACT
          - TEMP_BLOCK_AGENT
          - DECEASED
          - NORMAL
          - NONE
          - CLOSED
          - CUSTOMER_REQUEST
          - LOST
          - STOLEN
          - ABUSED
          - DAMAGED
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing."
          format: numeric
          example: "0"
          default: "0"
        expirationDate:
          type: string
          description: |
            Specifies the month and year when the card record is set to expire. This value defines the card’s validity period and is used for authorization, renewal, and lifecycle management processes.
          format: MM/YY
          example: 10/23
        cardClass:
          type: string
          description: |
            This field specifies the institution-defined card class or product code for the new card. It includes a 5-character alphanumeric identifier and description that represent a client-defined group of cardholders sharing common characteristics, such as card type (e.g., ADMIN), card stock, image preferences, or transaction limits. This classification helps determine card behavior and applicable features.
            Note- This field applies only to debit cards.
          format: alphanumeric
          example: AAA00
        memberSinceDate:
          type: string
          description: |
            Specifies the month and year when the card record was added to the system. This value represents the creation timestamp of the card record and may differ from the actual open date associated with the card.
          format: MM/YY
          example: 09/23
        branch:
          maxLength: 4
          type: string
          description: |
            Represents the unique branch identifier assigned by the financial institution (FI) to distinguish a specific branch. If no value is provided, the system defaults this field to 0000.
          example: "0000"
          default: "0"
        reissuePerCardClass:
          type: boolean
          description: Indicates whether a new card should be reissued based on the rules defined for the associated card class. This value determines if reissuance is permitted or required as part of the card’s lifecycle and processing logic.
          example: true
        updaterServiceOptOut:
          type: boolean
          description: "Applicable when cardbase participates in the Account Updater Service (AUS) that allows Fiserv to send payment account data to Mastercard and Visa, in compliance with network requirements for issuers. \nIf the cardbase does not participate in AUS, the fields can be blank. Opting out of AUS ensures Fiserv does not send future card number updates to Mastercard or Visa; it does not delete any information previously sent to merchants.\nThe fields are populated when your institution submits information through the Remote Card Maintenance (RCM) batch file record or it is manually entered in the CM system.\n"
          example: false
        companyId:
          maxLength: 8
          type: string
          description: "Identifies the company associated with the cardholder or account. This value serves as the unique company identifier used for processing, reporting, and organizational mapping within the system."
          example: "12345678"
        companyRole:
          type: string
          description: 'Indicates the role of the cardholder within the company. This field is required when a companyId is provided in the request. Supported values include- - O – Owner - E – Employer This value helps determine the cardholder’s association and authority level within the company structure. '
          example: O
        debitPINInfo:
          $ref: "#/components/schemas/DebitPINInfoAddCardResponseV2"
        debitPriorCardInfo:
          $ref: "#/components/schemas/DebitPriorCardInfoAddCardResponseV2"
        debitCardholderAddressPrimary:
          $ref: "#/components/schemas/DebitCardholderPrimaryAddressAddCardResponseV2"
        debitCardholderAddressAlternate:
          $ref: "#/components/schemas/DebitCardholderAlternateAddressAddCardResponseV2"
        debitCardholderName:
          $ref: "#/components/schemas/DebitCardholderNameAddResponseV2"
        debitContactInfo:
          $ref: "#/components/schemas/AddCardResponseDebitContactInfoV2"
        debitAssociatedAccounts:
          type: array
          items:
            $ref: "#/components/schemas/DebitAssociatedAccountAddCardResponseV2"
    CreditOnlyAddResponseV2:
      type: object
      properties:
        plasticsCount:
          maxLength: 2
          type: string
          description: Specifies the total number of cards to be issued as part of the request. This value determines how many physical or virtual cards will be generated during the issuance process.
          example: "00"
        cardStatus:
          type: string
          description: "Indicates the current status of the card. Any update to this status must be accompanied by a corresponding statusReasonCode value, which provides the justification for the change."
