          description: |-
            Specifies the Personal Identification Number (PIN) to be set for the given card number. The PIN must contain only numeric characters and adhere to the following rules.
            - No repetitive characters three times in a row (e.g., 111X, X333, 1111, 2222). - No sequential characters in ascending or descending order (e.g., 0123, 1234, 2345, 6543, 3210). This field is mandatory for PIN setup and must comply with institution security policies.
          example: "2938"
