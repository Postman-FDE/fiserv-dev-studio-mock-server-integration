    AuditSearchRequest:
      title: AuditSearchRequest
      required:
      - fromDateTime
      - toDateTime
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field contains the non‑transactional token associated with the card, used as an alternative identifier to the card number. It allows the cardholder record to be referenced without exposing the Primary Account Number (PAN) and may contain between 16 and 19 characters. Either cardNumber or nonTransToken must be included in the request; if both are provided, cardNumber takes precedence and will be used for processing.
          format: alphanumeric
          example: piUVBJKZGfks4000
        memberNumber:
          type: string
          description: |
            Unique number associated with each member of the card. Based on the card prefix setup. If the member number is not passed, defaults to 0 (zero).  Applies to debit cards only.
          format: numeric
          example: "0"
          default: "0"
        fromDateTime:
          type: string
          description: "This field specifies the start date and time from which the search results should be returned. It is used to refine the search by limiting results to records created or updated on or after the provided date‑time value. When supplied, this parameter works in combination with other search criteria to narrow the result set and improve query precision."
          format: date-time
          example: 2021-07-20T07:00:00Z
        toDateTime:
          type: string
          description: "This field specifies the end date and time up to which search results should be returned. It is used to refine the search by limiting results to records created or updated on or before the provided date‑time value. When used in conjunction with fromDateTime, the date‑time range must not exceed a duration of six months."
          format: date-time
          example: 2021-08-20T07:00:00Z
    AuditSearchResponse:
      title: AuditSearchResponse
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field contains the Primary Account Number (PAN) assigned to the cardholder record, uniquely identifying the cardholder’s card account. It may include up to 19 digits and is returned as part of the response to indicate the card associated with the requested operation or search result. The value represents the card number maintained on record for the cardholder.
          format: alphanumeric
          example: 400020XXXXXX4000
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field contains the non‑transactional token associated with the card, used as an alternative identifier to the card number. It allows the cardholder record to be referenced without exposing the Primary Account Number (PAN) and may contain between 16 and 19 characters. Either cardNumber or nonTransToken must be included in the request; if both are provided, cardNumber takes precedence and will be used for processing.
          format: alphanumeric
          example: piUVBJKZGfks4000
        memberNumber:
          type: string
          description: |
            Unique number associated with each member of the card. Based on the card prefix setup. If the member number is not passed, defaults to 0 (zero).  Applies to debit cards only.
          format: numeric
          example: "0"
          default: "0"
        auditLogSearch:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogSearch"
    AuditLogSearch:
      title: AuditLogSearch
      type: object
      properties:
        auditLogDateTime:
          type: string
          description: "This field contains the date and time at which the audit log record was created. It indicates when the corresponding action or event was recorded for auditing and tracking purposes. The value helps support traceability, monitoring, and compliance by providing the exact timestamp of the logged activity."
          format: date-time
          example: 2021-07-20T08:00:00Z
        auditLogSource:
          type: string
          description: "This field identifies the source from which the audit log record originated. It indicates the system, application, or component that generated or reported the audited event. The value helps provide context for the logged activity and supports traceability, monitoring, and audit analysis across multiple sources."
          example: ATM
        auditLogAction:
          type: string
          description: "This field identifies the action that was performed on the cardholder record and resulted in the creation of the audit log entry. It represents the specific operation executed, such as creation, update or delete. The value provides insight into what activity occurred and supports traceability, compliance review, and audit analysis."
          example: UPDATE
          enum:
          - ADD
          - UPDATE
          - DELETE
        recordType:
          type: string
          description: "The modified record name, followed by the internal file type.\nValues are -     \n- Card Details (MLAI)  \n- Card Details (DAF)  \n- Card Details (MLCM)  \n- Activation/PIN IVR (MLAC)  \n- Card/PIN Orders (MLCO)  \n- Names (MLNA)  \n- RuleManager (EXM)  \n- STEP UP (STUP)  \n-  TCPA  \n"
          example: Card Details (DAF).
        auditLogId:
          type: string
          description: "This field identifies the user ID of the person who performed the action that resulted in the audit log entry. It represents the authenticated user or system user associated with the recorded operation on the cardholder record. The value supports accountability, traceability, and audit review by linking the action to its originating user."
          example: Alex
    AuditDetailsRequest:
      title: AuditDetailsRequest
      required:
      - auditLogAction
      - auditLogDateTime
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field contains the Primary Account Number (PAN) assigned to the cardholder record, uniquely identifying the cardholder’s card account. It must be provided in the request when identifying the card by number and may contain up to 19 digits. Either cardNumber or nonTransToken must be included in the request; if both are provided, cardNumber takes precedence and will be used for processing.
          format: alphanumeric
          example: piUVBJKZGfks4000
        memberNumber:
          type: string
          description: |
            Unique number associated with each member of the card. Based on the card prefix setup. If the member number is not passed, defaults to 0 (zero).  Applies to debit cards only.
          format: numeric
          example: "0"
          default: "0"
        auditLogDateTime:
          type: string
          description: "This field contains the date and time at which the audit log record was created. It indicates when the corresponding action or event was recorded for auditing and tracking purposes. The value helps support traceability, monitoring, and compliance by providing the exact timestamp of the logged activity."
          format: date-time
          example: 2021-07-20T08:00:00Z
        auditLogAction:
          type: string
          description: Cause of the audit log record.
          example: UPDATE
          enum:
          - ADD
          - UPDATE
          - DELETE
    AuditDetailsResponse:
      title: AuditDetailsResponse
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field contains the Primary Account Number (PAN) assigned to the cardholder record, uniquely identifying the cardholder’s card account. It may include up to 19 digits and is returned as part of the response to indicate the card associated with the requested operation or search result. The value represents the card number maintained on record for the cardholder.
          format: alphanumeric
          example: 400020XXXXXX4000
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field contains the non‑transactional token associated with the card, used as an alternative identifier to the card number. It allows the cardholder record to be referenced without exposing the Primary Account Number (PAN) and may contain between 16 and 19 characters. Either cardNumber or nonTransToken must be included in the request; if both are provided, cardNumber takes precedence and will be used for processing.
          format: alphanumeric
          example: piUVBJKZGfks4000
        memberNumber:
          type: string
          description: |
            Unique number associated with each member of the card. Based on the card prefix setup. If the member number is not passed, defaults to 0 (zero).  Applies to debit cards only.
          format: numeric
          example: "0"
          default: "0"
        auditRecordDetails:
          type: array
          items:
            $ref: "#/components/schemas/AuditRecordDetails"
    AuditRecordDetails:
      title: AuditRecordDetails
      type: object
      properties:
        fieldName:
          type: string
          description: This field identifies the name of the field that was modified as a result of the update action recorded in the audit log. It specifies the exact attribute of the cardholder record that experienced a change. The value helps provide granular insight into what data element was affected and supports detailed audit review and change tracking.
          example: Account Type
        before:
          type: string
          description: This field contains the value of the field prior to the action being performed on the cardholder record. It represents the state of the data element before the recorded update or modification occurred. The value supports audit traceability by enabling comparison between the previous and updated values of the field.
          example: Checking
        after:
          type: string
          description: "This field contains the value of the field after the action was performed on the cardholder record. It represents the updated state of the data element resulting from the recorded update or modification. The value enables comparison with the previous state to support audit traceability, change validation, and compliance review."
          example: Savings
