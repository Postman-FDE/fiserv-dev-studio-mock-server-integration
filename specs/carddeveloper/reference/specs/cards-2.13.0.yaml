    CompromisedcardDebitDetails:
      type: object
      properties:
        eftRiskAlertNumber:
          type: string
          description: "This field displays the risk alert number assigned to the financial institution (FI) when Card Services receives MasterCard alerts as the sponsor and forwards those alerts to Fiserv clients. It is shown to EPOC users for reference and tracking purposes. If there is no valid number associated with the record, this field will be returned as blank."
          example: "62800"
        dateLastMaintainance:
          type: string
          description: "This field contains the date on which the most recent maintenance action was performed on the card. It represents the timestamp of the last update or change applied to the cardholder record, such as status modification, reissue, or other administrative actions. The value supports audit tracking and helps determine when the card was last maintained."
          format: date-time
    CompromisedcardCreditDetails:
      type: object
      properties:
        system:
          maxLength: 4
          type: string
          description: This field specifies the system associated with the account or cardholder. It is used to identify the originating or linked system for processing the request and maintaining correlation with the cardholder’s account details.
          example: "0000"
        principal:
          maxLength: 4
          type: string
          description: This field specifies the principal entity associated with the account or cardholder. It is used to identify the primary party or object that correlates with the cardholder’s account for processing and validation purposes.
          example: "0000"
        agent:
          maxLength: 4
          type: string
          description: This field identifies the agent associated with the account or cardholder. It is used to specify the intermediary or entity responsible for managing or facilitating actions related to the cardholder’s account within the system.
          example: "0000"
        cardStatus:
          type: string
          description: The status of the card.
          example: L–Lost/Stolen
        accountStatus:
          type: string
          description: "This field indicates the current status of the account. It reflects whether the account is active, inactive, suspended, or in any other defined state within the system. The value helps determine the account’s eligibility for transactions and related operations."
          example: A–Authorization prohibited
        previousAction:
          type: string
          description: "This field indicates the most recent action taken on the card. If no action has been performed, the value will display NO ACTION TAKEN. It helps track the card’s operational history and provides clarity on whether any prior updates or changes have occurred."
          example: NO ACTION TAKEN
        dateLastMaintainance:
          type: string
          description: This field represents the date when the most recent maintenance action was performed on the card. It is used to track the last update or operational change applied to the card. The value should follow the system-defined date format and accurately reflect the latest maintenance event.
          format: date
          example: 2021-07-20
        expiryDate:
          type: string
          description: "This field specifies the date on which the card becomes invalid for use. It is used to determine the card’s validity period and should follow the system-defined date format, typically MM/YY. After this date, the card cannot be used for transactions and must be renewed or replaced."
          format: YYYY-MM-DD
          example: 2025-07-20
        cardStatusReasonCode:
          minLength: 2
          type: string
          description: "This field provides the reason code associated with the current status of the card. It is used to indicate why the card is in its present state, such as activation, suspension, or closure. The value corresponds to predefined system codes that help in interpreting the card’s status change. For an external status of C (closed), the following status reason codes indicate that the System closed the account for the listed reason. Status reason codes- 85 - Closed due to your Adaptive Control overlimit strategy 86 - Closed due to your Adaptive Control delinquent strategy 87 - Closed due to your Adaptive Control reissue strategy 90 - Closed due to your setting in the delinquency action code parameters in the Delinquency Processing section (DO DC DP) of the Product Control File 91 - An old account closed after an account transfer due to your settings in the Automatic Close Days After Transfer and Status Reason Code Overlay Switch parameters in the Account Maintenance section (AO CH AM) of the Product Control File 92 - Closed in the reissue process due to your setting in the delinquent and overlimit parameters in the Eligibility section (RE CR EL) of the Product Control File 93 - Closed in the reissue process due to your settings in the Reissue Terms parameter in the Eligibility section (RE CR EL) of the Product Control File and the Ratification Level parameter in the Debit Ratification section (AO AC DR) of the Product Control File 94 - Closed in the reissue process due to your settings in the Include/ exclude States and Reissue States parameters in the Eligibility section (RE CR EL) of the Product Control File 95 - Closed in the reissue process due to an external status other than A or blank 96 - Closed in the reissue process due to your setting in the Inactive Option parameter in the Reissue Options section (RE OP RO) of the Product Control File 97 - Closed by consumer For an external status of Z (charged off), the following status reason codes indicate that the charge-off is for the listed reason. Status reason codes- 68 - Legally paid in full for less than the full balance 88 - Fraud 89 - Bankrupt 99 - Abandoned"
          example: 88–Fraud
        compromisedDate:
          type: string
          description: This field represents the date when the card was reported as lost or stolen. It is used to record the compromise event and should follow the system-defined date format. This information helps in managing card security and initiating appropriate actions such as blocking or replacing the card.
          format: YYYY-MM-DD
          example: 2021-07-20
        account:
          maxLength: 16
          minLength: 16
          type: string
          description: This field contains the cardholder’s account number linked to the card. It uniquely identifies the account associated with the cardholder for processing transactions and account-related operations. The value should follow the system-defined format and remain consistent with the account details maintained in the system.
          example: "1451550129"
        transferredAccount:
          maxLength: 16
          minLength: 16
          type: string
          description: "This field indicates whether the cardholder’s account has been transferred to another entity or system. It serves as an account transfer indicator, helping identify if ownership or servicing responsibilities have changed. The value is typically a boolean or predefined system code representing the transfer status."
          example: "Yes"
        transferredCard:
          type: string
          description: "This field indicates whether the card has been transferred to another entity or system. It serves as a card transfer indicator, helping identify if ownership or servicing responsibilities for the card have changed. The value is typically a boolean or a predefined system code representing the transfer status."
          example: "Yes"
    Association:
      title: Association
      type: object
      properties:
        accountNumber:
          maxLength: 20
          minLength: 1
          type: string
          description: Identifies account of the cardholder.
          example: "123456789"
        accountType:
          type: string
          description: Identifies the account type of the account number.
          example: CHECKING
          enum:
          - CHECKING
          - SAVINGS
          - CREDIT_CARD
          - MONEY_MARKET
          - NOW
          - IRA
          - CREDIT_LINE
          - INSTALLMENT_LOAN
          - MORTGAGE_LOAN
        accountDescription:
          type: string
          description: Description of the account.
          example: Main
        accountStatus:
          type: string
          description: Status of the account.
          example: ACTIVE
          enum:
          - ACTIVE
          - CLOSED
          - INACTIVE
        primaryAccount:
          type: string
          description: "Identifies if the account is Primary or not. At least one primary account is required for each cardholder record. You can establish a primary account for each of the following account types — Checking, Savings, Credit Card, NOW, Money Market, and Credit Line."
          example: "YES"
          enum:
          - "YES"
          - "NO"
          - NOT_APPLICABLE
        restrictedTransactions:
          type: string
          description: "Indicates if the account is restricted to transactions that change the account to a positive balance.  \nPossible values are -  \n- NO_RESTRICTIONS — All transactions allowed  \n- BALANCE_INQUIRY_DEPOSIT_AND_TRANSFER_TO — Transactions allowed include balance inquiries, deposits and transfers to the account'\n"
          example: NO_RESTRICTIONS
          enum:
          - NO_RESTRICTIONS
          - BALANCE_INQUIRY_DEPOSIT_AND_TRANSFER_TO
          - NOT_APPLICABLE
        transactionsAllowed:
          $ref: "#/components/schemas/TransactionsAllowed"
    AssociationV2:
      title: Association
      required:
      - accountNumber
      - accountStatus
      - accountType
      type: object
      properties:
        accountNumber:
          maxLength: 20
          type: string
          description: Specifies the account number associated with the cardholder’s account. This field uniquely identifies the underlying financial account linked to the card and must follow the institution’s account numbering format. Applies to all card types.
          example: "123456789"
        accountType:
          type: string
          description: "Specifies the type of account associated with the provided account number, such as checking, savings, or credit. This field is required to correctly identify the nature of the account and must follow the institution’s predefined account type codes.\nValues are - \n- CHECKING - Account that allows you to deposit and withdraw funds.\n- SAVINGS - Account that allows you to earn interest on the money you deposit.\n- CREDIT_CARD - Type of payment card that allows you to borrow money to make purchases.\n- MONEY_MARKET - Account that typically pays a higher interest rate than a traditional savings account, in exchange for requiring a higher minimum balance.\n- NOW - Type of interest-bearing bank account that allow the account holder to write checks or make withdrawals on demand.\n- IRA -Type of investment account that allows you to save for retirement while potentially receiving tax benefits.\n- CREDIT_LINE -Type of loan that allows you to borrow money up to a certain limit, but you only pay interest on the amount you borrow.\n- INSTALLMENT_LOAN -  Type of loan that is repaid in regular, fixed payments over a set period of time, usually with interest.\n- MORTGAGE_LOAN - Type of loan that is used to finance the purchase of a home or other real estate.\n"
          example: CHECKING
          enum:
          - CHECKING
          - SAVINGS
          - CREDIT_CARD
          - MONEY_MARKET
          - NOW
          - IRA
          - CREDIT_LINE
          - INSTALLMENT_LOAN
          - MORTGAGE_LOAN
        accountDescription:
          maxLength: 10
          type: string
          description: Provides a descriptive label or name for the account associated with the cardholder. This field is used for display and reference purposes and should reflect the account’s designation as defined by the institution.
          example: Main
        accountStatus:
          type: string
          description: "Indicates the current status of the account associated with the cardholder, such as active, inactive, closed, or suspended. This field is returned in the response for informational purposes and must align with the institution’s predefined status codes."
          example: ACTIVE
          enum:
          - ACTIVE
          - CLOSED
          - INACTIVE
        primaryAccount:
          type: string
          description: "Indicates whether the account is designated as the primary account for the cardholder. At least one primary account is required for each cardholder record. A primary account can be established for any of the following account types: CHECKING, SAVINGS, CREDIT_CARD, NOW, MONEY_MARKET, and CREDIT_LINE. \n"
          example: "YES"
          default: "NO"
          enum:
          - "YES"
          - "NO"
          - NOT_APPLICABLE
        restrictedTransactions:
          type: string
          description: |
            Indicates whether the account is restricted to transactions that result in a positive balance. When enabled, only transactions that maintain or restore the account to a positive balance are permitted. Applies to all account types where such restrictions are enforced.
            Values are -
            - NO_RESTRICTIONS - All transactions allowed.
            - BALANCE_INQUIRY_DEPOSIT_AND_TRANSFER_TO - Transactions allowed include balance inquiries, deposits and transfers to the account.
          example: NO_RESTRICTIONS
          enum:
          - NO_RESTRICTIONS
          - BALANCE_INQUIRY_DEPOSIT_AND_TRANSFER_TO
          - NOT_APPLICABLE
        transactionsAllowed:
          $ref: "#/components/schemas/TransactionsAllowedV2"
