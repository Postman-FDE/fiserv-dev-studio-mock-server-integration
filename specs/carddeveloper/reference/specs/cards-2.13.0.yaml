          example: NONE
          enum:
          - NONE
          - INSTANT_ISSUANCE
          - RUSH_PLASTIC
        orderStatus:
          type: string
          description: "Represents the current status of the order. This field indicates the stage or condition of the order within the processing lifecycle, supporting tracking, fulfillment updates, and operational decision‑making."
          enum:
          - ACTIVE
          - PROCESSED
          - CANCELLED
        rushIND:
          type: string
          description: "Indicates whether a rush order has been placed. This field identifies if expedited processing or priority handling is required for the order, supporting fulfillment workflows and special‑processing instructions."
          enum:
          - "Y"
          - "N"
        orderType:
          type: string
          description: |
            This field specifies the ordering option for displaying the primary cardholder’s name on the card. The default order is based on the card class setup; however, the order type can be modified as needed. This ensures flexibility in how the cardholder’s name appears on the card.
          example: CARD
