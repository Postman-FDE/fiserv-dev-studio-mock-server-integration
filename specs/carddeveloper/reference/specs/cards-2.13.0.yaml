    CompromisedCardRequest:
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing."
          example: "0"
          default: "0"
        networkAlert:
          maxLength: 20
          type: string
          description: "Use the network alert number that Mastercard, Visa or the cardholder sends to view compromised cards."
          format: Alphanumeric
          example: CompCard1234
        fromDate:
          type: string
          description: Narrow the search criteria by entering the file receive date for the compromised card.
          format: date-time
          example: 2021-07-20T07:00:00Z
        toDate:
          type: string
          description: The date the system receives the network alert file from the source.
          format: date-time
          example: 2021-08-20T07:00:00Z
        pageLimit:
          maximum: 250
          minimum: 1
          type: integer
          description: The number of entries returned per page.
          example: 50
          default: 250
        pageOffset:
          minimum: 1
          type: integer
          description: "The page to be returned. Note: The starting record of the response will be the pagelimit multiplied by the pageoffset."
          example: 1
          default: 1
    CompromisedCardResponse:
      type: object
