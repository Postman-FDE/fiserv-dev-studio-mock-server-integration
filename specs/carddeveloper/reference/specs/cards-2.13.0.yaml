            This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing.
          format: numeric
          example: "0"
          default: "0"
        logo:
          maxLength: 4
          type: string
