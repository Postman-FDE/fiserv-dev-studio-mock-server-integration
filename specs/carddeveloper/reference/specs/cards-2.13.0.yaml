components:
  schemas:
    PartialCardStockAndExpirationResponse:
      type: object
      properties:
        warningInfo:
          $ref: "#/components/schemas/WarningUpdateDetail"
    CardStockAndExpirationUpdateRequest:
      required:
      - cardNumber
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        expirationDate:
          type: string
          description: "This field contains the date on which the card is set to expire. It indicates the validity end date of the card and is used for card validity checks, renewal processing, and ongoing account maintenance activities. Either expirationDate or cardStock must be included in the request to determine card issuance or validity; both fields may be provided when applicable."
          format: YYYY-MM-DD
          example: 2023-09-09
        cardStock:
          type: string
          description: This field contains the code that identifies the type of plastic stock used by the financial institution (FI) for card generation. It specifies the physical card stock configuration to be applied during card issuance and is used to support card production and fulfillment processes. Either expirationDate or cardStock must be included in the request; both fields may be provided when applicable.
          example: "04"
    AccountSearchRequest:
      title: AccountSearchRequest
      required:
      - cardNumber
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000100020003000"
        memberNumber:
          type: string
          description: "Member Number associated with the card. If the member number is not passed, defaults to 0."
          format: numeric
          example: "0"
    AccountSearchRequestV2:
      title: AccountSearchRequest
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The Primary Account Number (PAN) is a 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. If both cardNumber (PAN) and nonTransToken are present, the system prioritizes cardNumber.
          format: numeric
          example: "4000200030004000"
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: piUVBJKZGfks4000
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing."
          example: "0"
          default: "0"
    AccountSearchResponse:
      title: AccountSearchResponse
      type: object
      properties:
        cardNumber:
          type: string
          description: Card number of primary cardholder.
          example: 400010xxxxxx4000
        memberNumber:
          type: string
          description: "Member Number associated with the card. If the member number is not passed, defaults to 0."
          example: "0"
        associations:
          type: array
          items:
            $ref: "#/components/schemas/Associations"
    AccountSearchResponseV2:
      title: AccountSearchResponse
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            This field returns the 16–19 digit Primary Account Number (PAN) associated with the cardholder’s account. It confirms which card was used in the activation request and can be used to validate the success of the operation or for downstream processing such as audit logging or cardholder notification. If both cardNumber and nonTransToken were submitted, cardNumber takes precedence.
          format: alphanumeric
          example: 400020XXXXXX4000
        nonTransToken:
          maxLength: 19
          minLength: 16
          type: string
          description: |
            The nonTransToken is a unique identifier linked to the cardholder’s account, typically ranging from 16 to 19 characters in length. It acts as an alternative to the cardNumber (PAN) when initiating card activation. Either cardNumber or nonTransToken must be included in the activation request—but if both are provided, cardNumber takes precedence.
              Note: Enrollment in the Data Defense Tokenization product is required to use nonTransToken.
          format: alphanumeric
          example: WUPIL5DQTZGM4000
        memberNumber:
          maxLength: 1
          minLength: 1
          type: string
          description: "This field contains the member identifier associated with the card, derived from the card prefix configuration. It applies only to debit cards. If the field is not provided in the request, the system defaults the value to 0. This identifier helps distinguish between multiple cardholders linked to the same account and supports accurate routing of activation logic and cardholder-specific processing."
          example: "0"
          default: "0"
        associations:
          type: array
          items:
            $ref: "#/components/schemas/AccountSearchDetailsV2"
    Associations:
      title: AccountSearchDetails
      type: object
      properties:
        accountNumber:
          type: string
          description: Identifies account of the cardholder.
          example: "123456789"
        accountType:
          type: string
          description: Identifies the account type of the account number.
          example: CHECKING
          enum:
          - CHECKING
          - SAVINGS
          - CREDIT_CARD
          - MONEY_MARKET
          - NOW
          - IRA
          - CREDIT_LINE
          - INSTALLMENT_LOAN
          - MORTGAGE_LOAN
        accountDescription:
          type: string
          description: Description of the account.
          example: Main
        accountStatus:
          type: string
          description: Status of the account.
          example: ACTIVE
          enum:
          - ACTIVE
          - CLOSED
          - INACTIVE
        primaryAccount:
          type: string
          description: "Identifies if the account is primary or not. At least one primary account is required for each cardholder record. You can establish a primary account for each of the following account types — Checking, Savings, Credit Card, NOW, Money Market, and Credit Line."
          example: "YES"
          enum:
          - "YES"
          - "NO"
          - NOT_APPLICABLE
        restrictedTransactions:
          type: string
          description: "Indicates if the account is restricted to transactions that change the account to a positive balance. P\nValues are -  \nNO_RESTRICTIONS — All transactions allowed  \nBALANCE_INQUIRY_DEPOSIT_AND_TRANSFER_TO — Transactions allowed include balance inquiries, deposits and transfers to the account.\n"
          example: NO_RESTRICTIONS
          enum:
          - NO_RESTRICTIONS
          - BALANCE_INQUIRY_DEPOSIT_AND_TRANSFER_TO
          - NOT_APPLICABLE
        transactionsAllowed:
          $ref: "#/components/schemas/TransactionsAllowed"
    AccountSearchDetailsV2:
      title: AccountSearchDetails
      type: object
      properties:
        accountNumber:
          maxLength: 20
          type: string
          description: Specifies the account number associated with the cardholder’s account. This field uniquely identifies the underlying financial account linked to the card and must follow the institution’s account numbering format. Applies to all card types.
          example: "123456789"
        accountType:
          type: string
          description: "Specifies the type of account associated with the provided account number, such as checking, savings, or credit. This field is required to correctly identify the nature of the account and must follow the institution’s predefined account type codes.\nValues are - \n- CHECKING - Account that allows you to deposit and withdraw funds.\n- SAVINGS - Account that allows you to earn interest on the money you deposit.\n- CREDIT_CARD - Type of payment card that allows you to borrow money to make purchases.\n- MONEY_MARKET - Account that typically pays a higher interest rate than a traditional savings account, in exchange for requiring a higher minimum balance.\n- NOW - Type of interest-bearing bank account that allow the account holder to write checks or make withdrawals on demand.\n- IRA -Type of investment account that allows you to save for retirement while potentially receiving tax benefits.\n- CREDIT_LINE -Type of loan that allows you to borrow money up to a certain limit, but you only pay interest on the amount you borrow.\n- INSTALLMENT_LOAN -  Type of loan that is repaid in regular, fixed payments over a set period of time, usually with interest.\n- MORTGAGE_LOAN - Type of loan that is used to finance the purchase of a home or other real estate.\n"
          example: CHECKING
          enum:
          - CHECKING
          - SAVINGS
          - CREDIT_CARD
          - MONEY_MARKET
          - NOW
          - IRA
          - CREDIT_LINE
          - INSTALLMENT_LOAN
          - MORTGAGE_LOAN
        accountDescription:
          maxLength: 10
          type: string
          description: Provides a descriptive label or name for the account associated with the cardholder. This field is used for display and reference purposes and should reflect the account’s designation as defined by the institution.
          example: Main
        accountStatus:
          type: string
          description: "Indicates the current status of the account associated with the cardholder, such as active, inactive, closed, or suspended. This field is returned in the response for informational purposes and must align with the institution’s predefined status codes."
          example: ACTIVE
          enum:
          - ACTIVE
          - CLOSED
          - INACTIVE
        primaryAccount:
          type: string
          description: "Indicates whether the account is designated as the primary account for the cardholder. At least one primary account is required for each cardholder record. A primary account can be established for any of the following account types: CHECKING, SAVINGS, CREDIT_CARD, NOW, MONEY_MARKET, and CREDIT_LINE. \n"
          example: "YES"
          default: "NO"
          enum:
          - "YES"
          - "NO"
          - NOT_APPLICABLE
        restrictedTransactions:
          type: string
          description: |
            Indicates whether the account is restricted to transactions that result in a positive balance. When enabled, only transactions that maintain or restore the account to a positive balance are permitted. Applies to all account types where such restrictions are enforced.
            Values are -
            - NO_RESTRICTIONS - All transactions allowed.
            - BALANCE_INQUIRY_DEPOSIT_AND_TRANSFER_TO - Transactions allowed include balance inquiries, deposits and transfers to the account.
          example: NO_RESTRICTIONS
          enum:
          - NO_RESTRICTIONS
          - BALANCE_INQUIRY_DEPOSIT_AND_TRANSFER_TO
          - NOT_APPLICABLE
        transactionsAllowed:
          $ref: "#/components/schemas/TransactionsAllowedSearchV2"
    TransactionsAllowed:
      title: TransactionsAllowed
      type: object
      properties:
        balanceInquiries:
          type: boolean
          description: Transactions allowed for balance inquiries.
          example: true
        deposits:
          type: boolean
          description: Transactions allowed for deposits.
          example: true
        paymentFrom:
          type: boolean
          description: Transactions allowed for outgoing payment.
          example: true
        paymentTo:
          type: boolean
          description: Transactions allowed for incoming payment.
          example: true
        posPurchasesReturns:
          type: boolean
          description: Transactions allowed for POS purchases returns.
          example: true
        transferFrom:
          type: boolean
          description: Transactions allowed for Transfer From.
          example: true
        transferTo:
          type: boolean
          description: Transactions allowed for Transfer To.
          example: true
        withdrawalsCashAdvance:
          type: boolean
          description: Transactions allowed for Withdrawals and Cash Advance.
          example: true
      description: Allowed transactions a cardholder can perform for the selected account.
    TransactionsAllowedSearchV2:
      title: TransactionsAllowed
      type: object
      properties:
        balanceInquiries:
          type: boolean
          description: "Indicates whether transactions for balance inquiries are allowed on the account. When enabled, the cardholder can perform inquiries to check the current account balance without initiating a financial transaction. Applies to all account types where inquiry functionality is supported."
          example: true
        deposits:
          type: boolean
          description: "Indicates whether deposit transactions are allowed on the account. When enabled, the cardholder can perform transactions that add funds to the account. Applies to all account types where deposit functionality is supported."
          example: true
        paymentFrom:
          type: boolean
          description: "Indicates whether outgoing payment transactions are allowed from the account. When enabled, the cardholder can initiate payments to external entities or other accounts. Applies to all account types where outgoing payment functionality is supported."
          example: true
        paymentTo:
          type: boolean
          description: "Indicates whether incoming payment transactions are allowed to the account. When enabled, the cardholder can receive payments or credits from external sources or other accounts. Applies to all account types where incoming payment functionality is supported.."
          example: true
        posPurchasesReturns:
          type: boolean
          description: "Indicates whether transactions for point-of-sale (POS) purchase returns are allowed on the account. When enabled, the cardholder can process return transactions at POS terminals to reverse previous purchases. Applies to all account types where POS return functionality is supported.."
          example: true
        transferFrom:
          type: boolean
          description: "Indicates whether transactions to transfer funds from the account are allowed. When enabled, the cardholder can initiate fund transfers from this account to another account within the institution or to an external account. Applies to all account types where outgoing transfer functionality is supported."
          example: true
        transferTo:
          type: boolean
          description: "Indicates whether transactions to transfer funds into the account are allowed. When enabled, the cardholder can receive funds from another account within the institution or from an external account. Applies to all account types where incoming transfer functionality is supported."
          example: true
        withdrawalsCashAdvance:
          type: boolean
          description: "Indicates whether transactions for cash withdrawals and cash advances are allowed on the account. When enabled, the cardholder can withdraw funds from ATMs or request cash advances at financial institutions. Applies to all account types where withdrawal and cash advance functionality is supported."
          example: true
