    AddCardResponseCreditCardholderAddressRequestV2:
      title: Address
      required:
      - addressLine1
      - addressLine2
      - addressType
      - city
      - country
      - state
      - zipCode
      type: object
      properties:
        isFormattedAddress:
          type: boolean
          description: "Indicates whether the address is a U.S. address or an international address. Accepted values are true and false. If no value is provided in the request, the system defaults this field to false."
          example: false
          default: false
        addressLine1:
          maxLength: 33
          type: string
          description: "This field contains the first line of the cardholder’s primary mailing address. It typically includes elements such as building number, street name, or apartment details. It is used to accurately identify the cardholder’s residence for verification, communication, and compliance purposes."
          example: 123 Any Street
        addressLine2:
          maxLength: 33
          type: string
          description: "This field provides additional address information for the cardholder’s primary mailing address. It is used when the first address line is insufficient and may contain details such as apartment numbers, building names, floor identifiers, or other location-specific qualifiers that support accurate delivery and verification."
          example: Apt 100
        addressLine3:
          maxLength: 33
          type: string
          description: "Represents the third line of the cardholder’s address. This field is optional and may be used for additional location details such as building names, landmarks, or other extended address information.."
          example: LAKE VIEW
        addressLine4:
          maxLength: 33
          type: string
          description: "Represents the fourth line of the cardholder’s address. This optional field can be used for any additional address details that do not fit into the standard address lines, such as extended location information or special delivery instructions."
          example: AVENUE
        city:
          maxLength: 21
          type: string
          description: "This field specifies the city associated with the cardholder’s primary mailing address. It is used to accurately identify the geographic location of the residence for validation, communication, and compliance purposes."
          example: Newark
        countryCode:
          maxLength: 3
          type: string
          description: "This field specifies the country associated with the cardholder’s primary mailing address. It is used to identify the correct national jurisdiction for verification, regulatory compliance, and delivery‑related processing."
          example: USA
        stateCode:
          maxLength: 2
          type: string
          description: This field specifies the U.S. state code associated with the cardholder’s primary mailing address. It is required when the address is located within the United States and should contain the standard two‑letter state abbreviation.
          example: NJ
        zipCode:
          maxLength: 9
          minLength: 5
          type: string
          description: |
            Zip code of the given location. This field is mandatory if the country is USA.
            - For USA- This must be a zip code of 5 or 9 numeric digits.
            - For Non-USA country code- This field is optional (can be blank).It can be populated with up to 15 alpha numeric characters (- is allowed).
          example: "12345"
        addressType:
          type: string
          description: |
            Specifies the type of address associated with the cardholder. Supported types include-
            - BILLING – Applicable to any cardholder (Primary, Secondary, or Authorized User). - PLASTIC, STATEMENT, and LETTER – Applicable only to the Primary cardholder.
            This value determines how the address is used for card issuance, communication, and correspondence.
          example: PLASTIC
          enum:
          - PLASTIC
          - BILLING
          - STATEMENT
          - LETTERS
        categoryCode:
          type: string
          description: "Indicates whether the address is classified as temporary, permanent, or repeating. This value defines the intended duration or usage pattern of the address and helps determine how it is managed within the system for communication and processing purposes."
          example: TEMPORARY
          enum:
          - TEMPORARY
          - PERMANENT
          - REPEATING
        beginDate:
          type: string
          description: "Indicates the date from which the address becomes valid. This field is primarily used when the address categoryCode is Permanent, Temporary, or Repeating, and helps determine the effective start date for address usage in processing and communication workflows."
          format: date
          example: 2021-08-03
        endDate:
          type: string
          description: "Indicates the date until which the address remains valid. This field is primarily used when the address categoryCode is Temporary or Repeating. For Permanent addresses, the system automatically assigns a default endDate value."
          format: date
          example: 2022-08-03
