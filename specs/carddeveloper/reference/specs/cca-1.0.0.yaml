openapi: 3.0.0
info:
  title: CCA
  description: "The Card Control and Alerts API offers functions to control payment cards from mobile devices or other channels including, registering a card, setting card policies, and retrieving a registered card list.(all time zones are in UTC)"
  version: 1.0.0-Sep-2025
servers:
- url: https://swaggerhub.onefiserv.net/virts/DEV_STUDIO_LATEST/CCA/1.0.0-Sep-2025
  description: SwaggerHub API Auto Mocking
security:
- BearerAuth: []
tags:
- name: CCA
  description: Card Control and Alerts for Debit and Credit cards.
paths:
  /v1/cards/preload:
    post:
      tags:
      - CCA
      description: This API retrieves a one or a list of cards and its details for the requested accounts . Applicable for Debit and Credit .
      operationId: getCardsListV1
      requestBody:
        description: cardListRequest
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardsListRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardsListResponse"
        "400":
          description: Invalid Request
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "401":
          description: Unauthorized access
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "403":
          description: Forbidden
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "404":
          description: Not Found
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "405":
          description: Method Not Allowed
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "406":
          description: Unacceptable
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "415":
          description: Unsupported Media Type
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "422":
          description: Unprocessable Entity
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "429":
          description: Too Many Requests
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxErrorV2"
        "500":
          description: Internal Server Error
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                type: object
                example:
                  errorResponse:
                    code: 500-01
                    message: internal server error
                    developerInfo:
                      developerMessage: internal server error
                      moreInfo: There was a problem handling your request. Please try again. If the problem persists please contact Support
                      messageid: 25557-84290371-1
      x-child-product-name: Card Controls & Alerts
      x-group-name: Details
      x-proxy-name: Get cards list v1
components:
  schemas:
    CardsListRequest:
      required:
      - accountList
      - binList
      - fiToken
      type: object
      properties:
        fiToken:
          type: string
          description: FI Token is unique ID associated to each client by Card hub. FI Setup from mConsole.
          example: "12345678"
        subscriberReferenceId:
          type: string
          description: Unique ID provided to user when user completes the registration on CardHub app.
          example: subRefId-1234-abcd
        accountList:
          type: array
          description: List of accounts can contain either Debit and Credit type. Maximum 20 accounts can be provided in the list.
          items:
            $ref: "#/components/schemas/AccountListDetails"
        binList:
          type: array
          description: List of BINs to be provided. Maximum 50 bins can be provided in one request.
          items:
            $ref: "#/components/schemas/BinListDetails"
    AccountListDetails:
      title: AccountListDetails
      type: object
      properties:
        accountNumber:
          maxLength: 20
          type: string
          description: Identifies account of the cardholder.
          example: "123456789"
        accountType:
          type: string
          description: "Identifies the account type of the account number. CHK=Checking, SAV=Saving, CC=Credit Card"
          example: CHK
          enum:
          - CHK
          - SAV
          - CC
    BinListDetails:
      title: BinListDetails
      type: object
      properties:
        bin:
          maxLength: 12
          minLength: 6
          type: string
          description: Prefix of the Card.
          example: "123456"
        clientId:
          maxLength: 8
          minLength: 4
          type: string
          description: Client ID of the card. It supports only numeric digits.
          example: "12345678"
    CardsListResponse:
      type: object
      properties:
        fiToken:
          type: string
          description: FI Token is unique ID associated to each client by Card hub. It would echo the value of the request.
          example: "12345678"
        subscriberReferenceId:
          type: string
          description: Unique ID provided to user when user completes the registration on CardHub app.It would echo the value of the request.
          example: subRefId-1234-abcd
        cardsList:
          type: array
          items:
            $ref: "#/components/schemas/cardsListDetails"
    cardsListDetails:
      type: object
      properties:
        cardNumber:
          type: string
          description: Card number between 16 to 19 digits.
          example: "4000200030004000"
        cardExpiry:
          type: string
          description: Date on which the card expires.
          format: MM/YY
          example: 10/23
        cardholderName:
          maxLength: 26
          type: string
          description: Name of the cardholder.
          example: JOHN DOE
        bin:
          maxLength: 12
          minLength: 6
          type: string
          description: Prefix of the card number.
          example: "123456"
        cardStatus:
          type: string
          description: "Status of card. Valid values for Debit - ACTIVE, CAPTURE, DEACTIVATE, ISSUED and RESTRICTED. Valid values for Credit - BLOCKED_FROM_AUTHORIZATION, NOT_ACTIVE, LOST_OR_STOLEN, FRAUD_DETECTED, NORMAL."
          example: ACTIVE
          enum:
          - ACTIVE
          - CAPTURE
          - DEACTIVATE
          - ISSUED
          - RESTRICTED
          - BLOCKED_FROM_AUTHORIZATION
          - NOT_ACTIVE
          - LOST_OR_STOLEN
          - FRAUD_DETECTED
          - NORMAL
        cardActivationStatus:
          type: string
          description: Activation status of a card.
          example: NOT_ACTIVATED
          enum:
          - NOT_ACTIVATED
          - ACTIVATED
          - ACTVN_BEFORE_AVAILABLE_DATE
          - CARD_RECORD_NOT_FOUND
          - CARD_LOST_OR_STOLEN
          - CARD_CLOSED
          - NO_ACTIVATION_REQUIRED
          - ACTIVATION_REQUIRED
          - EXP_DATE_NOT_MATCH
          - ALREADY_ACTIVATED
          - ATTEMPT_AFTER_DEADLINE
          - MAX_ATTEMPTS_EXCEEDED
          - CALLER_ID_INVALID
          - ACTIVATION_CODE_INVALID
          - PIN_CHECK_NOT_PERFORMED
          - INVALID_ACTIVATION_METHOD
          - IVR_AUTH_FAILED
