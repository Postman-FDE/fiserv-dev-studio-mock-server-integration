      type: object
      properties:
        offerSearchParameters:
          $ref: '#/components/schemas/OfferSearchResponse_offerSearchParameters'
    OfferDetailRequest:
      required:
      - cardNumber
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: "This field contains the 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. It is used across the card’s lifecycle, including enrollment, activation, and transaction processing. In the context of rewards, it helps associate eligible transactions with the correct card for earning and redeeming benefits. The value is sensitive and should be handled securely."
          format: numeric
          example: "4000200030004000"
    OfferDetailResponse:
      type: object
      properties:
        offerId:
          maxLength: 10
          minLength: 1
          type: string
          description: "This field holds a unique identifier for a specific offer. It helps track, retrieve, and manage offers across different systems and user interactions. The value is important for linking user actions, such as activation or redemption, to the correct offer. It remains consistent throughout the offer’s lifecycle."
          format: numeric
          example: "103557"
        offerValue:
          type: string
          description: "This field represents the numeric value associated with an offer, such as a discount amount, cashback percentage, or reward points. It helps quantify the benefit a user receives when redeeming the offer. The value is important for displaying offer details and comparing promotions. It may vary based on offer type and merchant configuration."
          example: "10"
        offerValueDescription:
          type: string
          description: This field contains a brief summary of the value or benefit provided by the offer. It may be left empty if a more detailed offer description is already present. The value helps users quickly understand what the offer provides and why it’s relevant.
          example: Bonus Earned
        offerTermsAndConditions:
          type: string
          description: "This field contains the terms and conditions that apply to an offer. It helps users understand the rules, limitations, and eligibility criteria before using the offer. The value supports transparency and ensures proper usage of promotions."
          example: "<p>Offer valid through 03-31-2026. This offer cannot be combined with any other offer, coupon code(s), or promotion, unless available through this site. Offers are subject to change. Rewards are earned based on the net price of eligible goods and services purchased when using your enrolled bank card to make a qualifying purchase at participating US retailers. Rewards are earned based on the net price of eligible goods and services, excluding tax, shipping and handling, or any special services. Offer not valid on purchases of certain restricted consumer electronic products, charity/promotional items, gift cards, and on quantities of five or more of the same product purchased by resellers for the sole purchase of re-sale. Rewards are added to your account within 30 days of purchase or 30 days after travel completion, when applicable. Any return, exchange, or other adjustment of your qualifying purchase may result in your purchase being ineligible for rewards and any rewards already earned may be deducted from your account. Rewards will not be earned on purchases made with third-party partners where the customer is leaving the uChoose Rewards<sup><small>&reg;</small></sup> website. Purchases made with Google Wallet, Apple Pay, Samsung Pay, or PayPal may not be eligible for rewards. Other restrictions may apply.</p>"
        offerExpirationDate:
          type: string
          description: This field indicates the date and time when an offer will no longer be valid. The value is formatted in UTC to ensure consistency across systems. It helps manage offer availability and informs users about the time left to redeem the offer. This field is important for scheduling and filtering active promotions.
          format: YYYY-MM-DD
          example: 2026-04-01
        categories:
          type: array
          description: The list of categories that apply to the current offer.
          items:
            $ref: "#/components/schemas/Category"
        shopType:
          type: array
          items:
            type: string
            description: "This field indicates the type of shopping experience associated with an offer, such as online or in-store. It helps categorize offers and tailor them to user preferences or merchant capabilities. The value supports filtering and segmentation of offers. It is important for ensuring relevant offer presentation.."
            example: ONLINE
            default: IN_STORE
            enum:
            - ONLINE
            - IN_STORE
            - BOTH
        merchantPartnerName:
          type: string
          description: "This field contains the name or keyword used to identify a merchant partner. It helps match offers to merchants based on partial or full name inputs. The value is used for display, filtering, and offer targeting purposes."
          example: Zenni Optical
        merchantOfferDescription:
          type: string
          description: This field provides a user-friendly version of the offer description that includes the merchant’s name. It helps personalize the offer and make it more recognizable to users. The value supports display in promotional content and improves engagement.
          example: Offer is valid on your next online purchase of $60 or more during the offer validity period. Additional terms may apply. Limited to one-time use. Offer expires 03-31-2026.
        merchantNameOfferDescription:
          type: string
          description: This field provides a user-friendly version of the offer description that includes the merchant’s name. It helps personalize the offer and make it more recognizable to users. The value supports display in promotional content and improves clarity and engagement in offer listings.
          example: Earn 5 Points per dollar at Rock Me Makeup on purchases of $50 or more.
        merchantOfferExternalUrl:
          type: string
          description: This field provides a link to the offer on the merchant’s website. It helps users view more details or complete a transaction directly with the merchant. The value supports seamless navigation and enhances the user experience.
          example: https://www.zennioptical.com/
        merchantLogoFileNameUrl:
          type: string
          description: This field contains the URL or filename of the merchant’s logo used for display purposes. It helps visually identify the merchant associated with an offer. The value supports branding and improves user recognition in offer listings.
          example: https://images.affinitysolutions.com/common/images/zenni_90x50_144b.png
        activated:
          type: boolean
          description: This field shows whether the user has already activated a specific offer. It applies only to offers that require activation. The value helps personalize the user experience by showing active or inactive offers. It is useful for tracking user interactions and offer status.
          example: false
          default: false
        requiresActivation:
          type: boolean
          description: This field indicates whether an offer needs to be activated by the user before it can be used. It helps filter offers based on activation requirements and user readiness. The value is important for managing user engagement and offer eligibility.
          example: false
          default: false
        partnerId:
          type: string
          description: "This field contains a unique identifier for the merchant partner associated with an offer. It helps link offers to the correct partner for tracking, display, and reporting purposes. The value remains consistent across systems and is important for managing partner-specific promotions. It supports accurate retrieval and organization of offers by merchant."
          example: "111039"
        shortMerchantOffer:
          type: string
          description: "This field contains a brief version of the offer text, designed to appear alongside the merchant logo in list views. It helps present the offer in a compact and readable format. The value supports quick scanning and improves visual consistency in offer displays."
          example: 10 Points per $1
        threshold:
          maxLength: 11
          type: string
          description: This field provides minimum spend required to qualify for offer
          format: decimal
          example: "60.00"
        ratecap:
          maxLength: 11
          type: string
          description: Maximum reward cap if applicable.
          format: decimal
          example: "0.00"
        resoneTime:
          type: boolean
          description: "Indicates single-use offer (t = true, single use)"
          example: true
        expirationDaysLeft:
          maxLength: 10
          type: integer
          description: Number of days until the offer expires
          example: 6
        impression:
          maxLength: 350
          type: string
          description: URL for tracking impressions and user interactions.
          example: https://hits.afssn.com/impressions?sid=40XxfCUgb983837&xid=417300&source=all_retailers&token=PCHszVMCkCfPLMuO5eeC4R4Qw5H5wL0CnoCwD8AU6SADa%2F5TiKtfQkq%2B%2Barfps7xS4p6ftf%2BykCdE64F%2F5fzYA%3D%3D&sig=9a5181f6f07863afebe411b6bb5e5c9c4c92cf6e77c20c9c1eb2ba1bfd894124
        locationCount:
          type: string
