      tags:
      - View Offer
      description: "Activate an offer, makes a loyalty member eligible to receive the rewards provided by the requested offer.\n        <br><br>\n        For more information go to <a href=\"/product/CardDeveloper/docs/resources.md/#rewards\" title=\"Click to open\">Resources.</a>"
