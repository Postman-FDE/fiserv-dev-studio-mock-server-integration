          example: "999"
        alphaIndex:
          type: string
          description: This field captures the first character of the merchant’s name. It is used to organize and filter merchants alphabetically in offer listings. The value supports quick navigation and improves user experience in sorted views.
          example: z
        spend:
          type: string
          description: This field shows the average dollar amount spent on a merchant’s offer over the past month. Higher values may indicate popular or trending offers. The value helps prioritize offers based on user engagement and spending behavior.
          example: "67737"
        clickTrend:
          type: string
          description: This field reflects the average click rate for a merchant’s offer over the last three months. Offers with higher click trends may be considered more popular or engaging. The value helps highlight offers that attract more user interest.
          example: "0"
        fundingCategory:
          type: string
          description: "This field indicates the campaign or funding source associated with an offer. It helps classify offers based on how they are sponsored or supported. The value is useful for reporting, filtering, and managing offer groups. It supports internal tracking and campaign segmentation."
