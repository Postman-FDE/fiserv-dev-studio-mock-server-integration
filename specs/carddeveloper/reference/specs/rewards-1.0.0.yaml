        bonusEarned:
          type: boolean
          description: This field indicates whether the loyalty member has earned a bonus associated with the offer. It helps track user eligibility and reward status. The value supports personalized experiences and is useful for displaying earned benefits in user-facing views.
          example: false
        requiresActivation:
          type: boolean
          description: This field indicates whether an offer needs to be activated by the user before it can be used. It helps filter offers based on activation requirements and user readiness. The value is important for managing user engagement and offer eligibility.
          example: false
        activated:
          type: boolean
          description: This field shows whether the user has already activated a specific offer. It applies only to offers that require activation. The value helps personalize the user experience by showing active or inactive offers. It is useful for tracking user interactions and offer status.
          example: true
        expirationDaysLeft:
          maxLength: 10
          minLength: 1
          type: string
          description: Number of days until the offer expires
          format: numeric
          example: "157"
        offerExpirationDate:
          type: string
          description: This field indicates the date and time when an offer will no longer be valid. The value is formatted in UTC to ensure consistency across systems. It helps manage offer availability and informs users about the time left to redeem the offer. This field is important for scheduling and filtering active promotions.
          format: YYYY-MM-DD
          example: 2022-09-23
        impression:
          maxLength: 350
          minLength: 1
          type: string
          description: URL for tracking impressions and user interactions
          example: https://hits.afssn.com/impressions?...
        shopType:
          type: array
          items:
            type: string
            description: "This field indicates the type of shopping experience associated with an offer, such as online or in-store. It helps categorize offers and tailor them to user preferences or merchant capabilities. The value supports filtering and segmentation of offers. It is important for ensuring relevant offer presentation."
            example: IN_STORE
            default: IN_STORE
            enum:
            - ONLINE
            - IN_STORE
    OfferSearchResponse_offerSearchParameters:
      type: object
      properties:
        totalPages:
          type: string
          description: This field indicates the total number of pages available in the response for a given request. It helps users understand how many pages of data they can navigate through. The value supports pagination and improves the browsing experience by setting expectations for result volume.
          example: "33"
        totalMatches:
          type: string
          description: This field indicates the total number of matches available in the response for a given request. It helps users understand how many matches are available for offers. It will be available for featured offers only.
          example: "801"
        offers:
          type: array
          items:
            $ref: "#/components/schemas/Offers"
  parameters:
    userIdParam:
      name: userId
      in: header
      description: User who is making this request. This is optional, if passed will be used for granular level auditing.
      required: false
      style: simple
      explode: false
      schema:
        type: string
      example: FDSCARD
    authorizationParam:
      name: Authorization
      in: header
      description: "Retrieve an access token through the Access Token API. Access token is required in every request. To view documentation on access token <a className='text-app-action-blue' href='/product/CardDeveloper/docs/?path=docs/gettingstarted/access-tokens.md' title='Click to open'>click here.</a> Tokens expire after 15 minutes. Provide the value as follows in the header. Authorization: Bearer <Access Token Value>"
      required: true
      style: simple
      explode: false
      schema:
        type: string
      example: Bearer USlfM8dilzKZPcuGGP3BfVLd7Snk
    clientIdParam:
      name: x-fapi-financial-id
      in: header
      description: Required. Provide 8 digit integer client id
      required: true
      style: simple
      explode: false
      schema:
        type: string
      example: "12345678"
  headers:
    interactionId:
      description: unique transaction ID created for each request for tracking purposes
      style: simple
      explode: false
      schema:
        type: string
        example: 95ad42fb-afd1-2121-b794-3ed29342ks42
  securitySchemes:
    BearerAuth:
      type: http
      description: Enter 'Bearer ' followed by the access token.
