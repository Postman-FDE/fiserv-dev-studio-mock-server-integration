    ActivateOfferRequest:
      required:
      - cardNumber
      - offerId
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: "This field contains the 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. It is used across the card’s lifecycle, including enrollment, activation, and transaction processing. In the context of rewards, it helps associate eligible transactions with the correct card for earning and redeeming benefits. The value is sensitive and should be handled securely."
          format: numeric
          example: "4000200030004000"
        offerId:
          maxLength: 10
          minLength: 1
          type: string
          description: "This field holds a unique identifier for a specific offer. It helps track, retrieve, and manage offers across different systems and user interactions. The value is important for linking user actions, such as activation or redemption, to the correct offer. It remains consistent throughout the offer’s lifecycle."
          format: numeric
          example: "103557"
    Category:
      type: object
      properties:
        categoryId:
          type: string
          description: "This field holds a unique identifier for the category an offer belongs to, such as dining, travel, or retail. It helps organize and group offers for easier browsing and filtering. The value supports categorization and improves relevance in offer presentation. It remains consistent across offer types."
          example: "8389"
        categoryDescription:
          type: string
          description: "This field provides a short explanation of the category an offer belongs to, such as dining, travel, or retail. It helps users understand the type of offers grouped under that category. The value supports better navigation and improves clarity in offer presentation."
          example: "Apparel, Accessories & Shoes"
    OfferSearchRequest:
      required:
      - cardNumber
      type: object
      properties:
        cardNumber:
          maxLength: 19
          minLength: 16
          type: string
          description: "This field contains the 16–19 digit number printed on a card that uniquely identifies the cardholder’s account. It is used across the card’s lifecycle, including enrollment, activation, and transaction processing. In the context of rewards, it helps associate eligible transactions with the correct card for earning and redeeming benefits. The value is sensitive and should be handled securely."
          format: numeric
          example: "4000200030004000"
        offerId:
          maxLength: 10
          minLength: 1
          type: string
          description: "This field holds a unique identifier for a specific offer. It helps track, retrieve, and manage offers across different systems and user interactions. The value is important for linking user actions, such as activation or redemption, to the correct offer. It remains consistent throughout the offer’s lifecycle."
          example: "103557"
        merchantPartnerName:
          type: string
          description: "This field contains the name or keyword used to identify a merchant partner. It helps match offers to merchants based on partial or full name inputs. The value is used for display, filtering, and offer targeting purposes."
          example: The 1St Lady Boutique OR Boutique
        shopType:
          type: string
          description: "This field indicates the type of shopping experience associated with an offer, such as online or in-store. It helps categorize offers and tailor them to user preferences or merchant capabilities. The value supports filtering and segmentation of offers. It is important for ensuring relevant offer presentation."
          example: IN_STORE
          default: IN_STORE
          enum:
          - ONLINE
          - IN_STORE
        searchScope:
          type: string
          description: This field defines the geographical or locale-based scope within which an offer is valid or searchable. It helps narrow down offers based on user location or regional availability. The value supports localization and relevance in offer discovery. It is useful for tailoring experiences to specific markets.
          example: LOCAL
          default: LOCAL
          enum:
          - NATIONAL
          - LOCAL
          - ONLINE
        requiresActivation:
          type: boolean
          description: This field indicates whether an offer needs to be activated by the user before it can be used. It helps filter offers based on activation requirements and user readiness. The value is important for managing user engagement and offer eligibility.
          example: false
          default: false
        activated:
          type: boolean
          description: This field shows whether the user has already activated a specific offer. It applies only to offers that require activation. The value helps personalize the user experience by showing active or inactive offers. It is useful for tracking user interactions and offer status.
          example: true
          default: false
        categoryId:
          type: string
          description: "This field holds a unique identifier for the category an offer belongs to, such as dining, travel, or retail. It helps organize and group offers for easier browsing and filtering. The value supports categorization and improves relevance in offer presentation. It remains consistent across offer types."
          example: "38460"
        partnerId:
          type: string
          description: "This field contains a unique identifier for the merchant partner associated with an offer. It helps link offers to the correct partner for tracking, display, and reporting purposes. The value remains consistent across systems and is important for managing partner-specific promotions. It supports accurate retrieval and organization of offers by merchant."
          example: "39203"
        keyword:
          type: string
          description: This field contains a word or phrase used to search for relevant offers. It helps match user input with available promotions or merchant names. The value supports flexible filtering and improves the accuracy of search results. It is commonly used in offer discovery and personalization.
          example: shoe
        letter:
          maxLength: 1
          type: string
          description: This field holds the first letter or number of an offer name. It is used to organize offers alphabetically and support pagination or filtering. The value helps users browse offers more easily by grouping them based on starting characters. It is useful in sorted or indexed views.
          example: S
        startRange:
          type: string
          description: This field defines the lower boundary of a range used to retrieve offers. It helps control the number and order of offers returned in a response. The value is typically used in combination with endRange to manage pagination or filtering. It supports efficient data handling in offer queries.
          example: "3"
        endRange:
          type: string
          description: This field defines the upper boundary of a range used to retrieve offers. It works with startRange to limit and organize the results returned. The value helps manage pagination and ensures only relevant offers are included. It supports better performance and user experience in offer browsing.
          example: "5"
        fundingCategory:
          type: string
          description: "This field indicates the campaign or funding source associated with an offer. It helps classify offers based on how they are sponsored or supported. The value is useful for reporting, filtering, and managing offer groups. It supports internal tracking and campaign segmentation."
          example: FEATURED
          default: NONE
          enum:
          - NONE
          - FEATURED
          - SELECT
          - SPOTLIGHT
        radius:
          type: integer
          description: "This field specifies the distance, in miles, within which in-store offers should be included. It helps narrow down offers based on proximity to a location. The value supports location-based filtering and improves relevance for users searching nearby deals. It is commonly used in geo-targeted offer queries."
          example: 50
          default: 25
        zipCode:
          maxLength: 5
          minLength: 5
          type: string
          description: This field contains the postal code used to find in-store offers in a specific area. It helps filter offers based on geographic location. The value supports regional targeting and improves the accuracy of location-based searches. It is useful for users looking for nearby deals.
          example: "38018"
        city:
          type: string
          description: This field holds the name of the city where in-store offers are available. It helps filter and display offers based on user location or merchant presence. The value supports geographic relevance and improves targeting. It is commonly used in location-based offer queries.
          example: Cordova
        state:
          maxLength: 2
          minLength: 2
          type: string
          description: This field contains the name or abbreviation of the state where in-store offers are available. It helps narrow down offers based on regional availability. The value supports location filtering and improves relevance for users in specific areas. It is used in conjunction with other location fields.
          example: TN
        latitude:
          type: number
          description: This field holds the latitude coordinate used to find nearby in-store offers. It helps define a central point for location-based filtering. The value supports geo-targeting and improves the accuracy of offer results. It is typically used with longitude and radius. Latitude and Longitude both are required for location-based search.
          example: 35.144207
        longitude:
          type: number
          description: This field contains the longitude coordinate used to locate nearby in-store offers. It works with latitude to define a specific location for filtering. The value supports geographic targeting and helps return relevant offers based on proximity. It is essential for map-based or location-aware queries. Latitude and Longitude both are required for location-based search.
          example: -89.795442
        storesPerPage:
          type: string
          description: This field defines how many store records should be returned in a single page of results. It helps control the volume of data shown to users at once. The value supports pagination and improves performance and usability in store listings.
          example: "999"
        storePageCount:
          type: string
          description: "This field indicates the current page number in the store results, based on the total number of stores and the storesPerPage value. It helps navigate through multiple pages of store data. The value is useful for managing pagination and ensuring consistent user experience."
          example: "5"
          default: "1000"
        sortOrder:
          type: string
          description: "This field specifies the direction in which results should be sorted, such as ascending or descending. It helps organize offer or store data based on user preferences or system defaults. The value supports consistent and predictable sorting behavior."
          example: ASC
          default: DESC
          enum:
          - ASC
          - DESC
        sort:
          type: string
          description: "This field defines which attribute the results should be sorted by, such as offer name or merchant name. Only one field can be used for sorting at a time. The value helps customize the order of results to improve relevance and usability."
          example: NONE
          default: NONE
          enum:
          - NONE
          - RANK
          - MERCHANT_PARTNER_NAME
          - OFFER
          - OFFER_EXPIRATION_DATE
          - DATE_CREATED
          - SPEND
          - CLICK_TREND
        geoFilter:
          type: boolean
          description: "This field indicates whether to apply location-based filtering to the results. When set to true, only offers or stores near a specified location are included. The value helps personalize results based on physical proximity and user location."
          example: true
          default: true
        matchType:
          type: string
          description: "This field controls how search keywords are matched with merchant names or offer titles. When set to multi_match, only exact matches are returned; otherwise, partial matches are allowed. The value helps refine search results for better accuracy or broader discovery."
          example: SINGLE_MATCH
          enum:
          - MULTI_MATCH
          - SINGLE_MATCH
        offerRecordsPerPage:
          type: string
          description: This field defines how many offer records should be returned in a single page of results. It helps manage the volume of data shown to users and supports efficient pagination. The value improves performance and user experience in offer browsing.
          example: "15"
          default: "25"
        pageCount:
          type: string
          description: This field indicates the current page number in the offer results. It helps users navigate through multiple pages of offers. The value works with offerRecordsPerPage to support smooth and organized browsing.
          example: "1"
          default: "1"
