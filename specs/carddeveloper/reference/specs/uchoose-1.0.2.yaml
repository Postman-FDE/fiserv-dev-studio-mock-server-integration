        description: Required. Enter the client id.
        required: true
        style: simple
        explode: false
        schema:
          maxLength: 8
          minLength: 1
          pattern: ^[0-9]*$
          type: string
      - name: x-fapi-interaction-id
        in: header
        description: Enter the transaction/correlation id
        required: false
        style: simple
        explode: false
        schema:
          maxLength: 40
          minLength: 15
          pattern: ^[^-][a-zA-Z0-9-][^-]$
          type: string
