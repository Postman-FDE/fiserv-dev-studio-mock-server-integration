components:
  schemas:
    GetSSORequest:
      required:
      - client
      - rewardsKeyInfo
      type: object
      properties:
        client:
          $ref: '#/components/schemas/Client'
        rewardsKeyInfo:
          $ref: '#/components/schemas/rewardsKeyInfo'
        email:
          type: string
          description: Optional. If an email address is not provided in the initial request, cardholders will be required to manually enter an email the first time they access the Rewards website.
          example: sandbox.app@fiserv.com
    GetSSOResponse:
      type: object
      properties:
        destURL:
          type: string
          description: If an email address is not provided in the initial request, the URL example above prompts the participant to enter an email. If an email address was provided, a different URL is generated to enable navigation directly to the Rewards page.
          example: '"https://uat.uchooserewards.com/members/ssoredirect.php?sid=21XXPqWyH842807&amp;xmembid=32398882&amp;redoip=y"'
    Client:
      required:
      - applicationName
      - auditId
      - id
      - vendorName
      type: object
      properties:
        id:
          type: string
          description: Client organization Identifier
          example: "11122203"
        applicationName:
          type: string
          description: Client application identifier
          example: CM
        vendorName:
          type: string
          description: Client vendor identifier
          example: ITI
        auditId:
          maxLength: 13
          type: string
          description: 'AuditID identifies the entity on whose behalf the request is made.  This value often identifies a user.   '
          example: "123456"
    addPointsRequest:
      required:
      - addPoints
      - client
      - rewardsKeyInfo
      type: object
      properties:
        client:
          $ref: '#/components/schemas/Client'
        rewardsKeyInfo:
          $ref: '#/components/schemas/rewardsKeyInfo'
        addPoints:
          $ref: '#/components/schemas/addPoints'
    addPoints:
      required:
      - description
      type: object
      properties:
        points:
          type: integer
          description: The number of points to be given to the user. If points field is empty, system will consider as adding 0 points.
          example: 19
        description:
          type: string
          description: Text to be added to the comment stored with the score.
          example: Add
        vest:
          type: boolean
          description: If True, the points are vested and immediately available for redemption. False is default, if nothing is passed in this field.
          example: true
    addPointsResponse:
      required:
      - pointsInfo
      - scoreId
      type: object
      properties:
        pointsInfo:
          $ref: '#/components/schemas/pointsInfo'
        scoreId:
          type: integer
          description: Reference number for the score created as a result of this service call.
          example: 603205187
        Client:
          $ref: '#/components/schemas/addPointsResponse_Client'
    rewardsKeyInfo:
      required:
      - useMultiAuth
      type: object
      properties:
        cardNumber:
          maxLength: 22
          type: string
          description: The participant  card number. NOTE - Enter either card number, account number, or both.
          example: "4447489111111119"
        accountNumber:
          maxLength: 22
          type: string
          description: The primary Rewards account number. NOTE - Enter either account number, card number or both.
          example: "3445454545"
        useMultiAuth:
          type: boolean
          description: If true, the total points will include all multi-authed accounts.
          example: false
    GetPointRequest:
      required:
      - client
      - rewardsKeyInfo
      type: object
      properties:
        client:
          $ref: '#/components/schemas/Client'
        rewardsKeyInfo:
          $ref: '#/components/schemas/rewardsKeyInfo'
    GetPointResponse:
      type: object
      properties:
        pointsInfo:
          $ref: '#/components/schemas/pointsInfo'
    pointsInfo:
      type: object
      properties:
        pointsToDate:
          type: integer
          description: Total points earned to date.
          example: 0
        availablePoints:
          type: integer
          description: Total points not redeemed. Includes both vested and unvested points.
          example: 0
        vestedPoints:
          type: integer
          description: Points that can be redeemed.
          example: 0
        ccName:
          type: string
          description: Name on the card
          example: A1
        ccType:
          type: string
          description: Credit card issuer
          example: MASTERCARD
        ccStatus:
          type: boolean
          description: Reward earning status for the card (actively earning points or not).
          example: true
        earnStart:
          type: string
          description: The earliest date that the card can earn rewards.
          format: yyyy-mm-dd
          example: 2017-10-19T00:00:00.000+0000
        earnEnd:
          type: string
          description: The last date that the card can earn rewards.
          format: yyyy-mm-dd
          example: 2050-12-31T00:00:00.000+0000
    redeemPointsRequest:
      required:
      - client
      - redeemPoints
      - rewardsKeyInfo
      type: object
      properties:
        client:
          $ref: '#/components/schemas/Client'
        rewardsKeyInfo:
          $ref: '#/components/schemas/rewardsKeyInfo'
        redeemPoints:
          $ref: '#/components/schemas/redeemPoints'
    redeemPoints:
      required:
      - description
      - points
      - reference
      type: object
      properties:
        points:
          type: integer
          description: The number of points to be deducted from the card.
          example: 19
        description:
          type: string
          description: Text to be added to the comment stored with the burn.
          example: b
        reference:
          type: string
          description: A reference ID to be stored with the burn.
          example: B
    redeemPointsResponse:
      required:
      - pointsInfo
      - redeemID
      type: object
      properties:
        pointsInfo:
          $ref: '#/components/schemas/pointsInfo'
        redeemID:
          type: integer
          description: The unique ID of the redemption.
          example: 78901
    addPointsResponse_Client:
      required:
      - applicationName
      - auditId
      - id
      - vendorName
      type: object
      properties:
        id:
          type: string
          description: Client organization Identifier
          example: "11122203"
        applicationName:
          type: string
          description: Client application identifier
          example: CM
        vendorName:
          type: string
          description: Client vendor identifier
          example: ITI
        auditId:
          maxLength: 13
          type: string
          description: 'AuditID identifies the entity on whose behalf the request is made.  This value often identifies a user.   '
          example: Saint Michael
      example: "11122203"
  securitySchemes:
    BearerToken:
      type: apiKey
      description: Enter 'Bearer ' followed by the access token.
      name: Authorization
      in: header
