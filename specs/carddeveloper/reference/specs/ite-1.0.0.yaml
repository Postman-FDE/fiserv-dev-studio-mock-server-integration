  description: "This API provides an enriched transactions with additional data attributes, including **merchant names**, **location**, **merchant logos**, **categories**, **transaction type** and **merchant contact information**."
paths:
  /v1/transactions/enrichment:
    post:
      tags:
      - Transaction Enrichment
      description: This API provides enriched transaction for both Credit and Debit transaction.
      operationId: enrichTransaction
      parameters:
      - name: Authorization
        in: header
        description: "Retrieve an access token through the Access Token API. Access token is required in every request. To view documentation on access token <a href=\"../docs/?path=docs/gettingstarted/access-tokens.md\" title=\"Click to open\">click here.</a> Tokens expire after 15 minutes. Provide the value as follows in the header. Authorization:: Bearer <Access Token Value>"
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: Bearer USlfM8dilzKZPcuGGP3BfVLd7Snk
      - name: userId
        in: header
        description: Optional. User on behalf of whom the request is being made. userId must be alphanumeric.
        required: false
        style: simple
        explode: false
        schema:
          type: string
        example: johndoe
      - name: x-fapi-financial-id
        in: header
        description: Required. Provide 8 digit client id
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: 12345678
      - name: deploymentToken
        in: header
        description: Required. DeploymentToken provided by Fiserv Implementation Specialists.
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: INTCSAUTH1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionEnrichmentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionEnrichmentResponse"
        "400":
          description: Invalid Request
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "401":
          description: Unauthorized access
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "403":
          description: Forbidden
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "404":
          description: Not Found
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "405":
          description: Method Not Allowed
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "406":
          description: Unacceptable
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "415":
          description: Unsupported Media Type
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "422":
          description: Unprocessable Entity
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "429":
          description: Too Many Requests
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "500":
          description: Internal Server Error
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                type: object
                example:
                  errorResponse:
                    code: 500-01
                    message: internal server error
                    developerInfo:
                      developerMessage: internal server error
                      moreInfo: There was a problem handling your request.  Please try again.  If the problem persists please contact Fiserv ETSD at 888-243-2543 (you unique messageID included below)
                      messageid: 25557-84290371-1
      deprecated: false
      x-child-product-name: Accounts
      x-proxy-name: Get account transactions v1
      x-group-name: Account Transaction
  /v2/transactions/enrichment:
    post:
      tags:
      - Transaction Enrichment
      description: "Users can retrieve either SUMMARY (default) or DETAIL records when performing a transaction search. The SUMMARY view provides a limited set of fields, while the DETAIL view includes all available fields. For Debit transactions, up to 250 records can be fetched. For Credit transactions, users can retrieve up to 750 records—comprising 250 each of pending, posted, and declined transactions. Additionally, enriched fields are available for both summary and detail views. "
      operationId: enrichTransactionv2
      parameters:
      - name: Authorization
        in: header
        description: "Retrieve an access token through the Access Token API. Access token is required in every request. To view documentation on access token <a href=\"../docs/?path=docs/gettingstarted/access-tokens.md\" title=\"Click to open\">click here.</a> Tokens expire after 15 minutes. Provide the value as follows in the header. Authorization:: Bearer <Access Token Value>"
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: Bearer USlfM8dilzKZPcuGGP3BfVLd7Snk
      - name: userId
        in: header
        description: Optional. User on behalf of whom the request is being made. userId must be alphanumeric.
        required: false
        style: simple
        explode: false
        schema:
          type: string
        example: johndoe
      - name: x-fapi-financial-id
        in: header
        description: Required. Provide 8 digit client id
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: 12345678
      - name: filter
        in: query
        description: "User can retrieve SUMMARY or DETAIL records for transaction search. Default value is SUMMARY. DETAIL includes all the transaction search fields. SUMMARY includes only a subset of search fields. \n"
        required: true
        style: form
        explode: true
        schema:
          type: string
        example: summary
      - name: pageOffset
        in: query
        description: The starting point in the result set
        required: false
        style: form
        explode: true
        schema:
          type: string
        example: "2"
      - name: pageLimit
        in: query
        description: The number of records to be returned. the maximum value for page limit is 25.
        required: false
        style: form
        explode: true
        schema:
          type: string
        example: "25"
      requestBody:
        description: searchTransactionRequest
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchTransactionRequestV2"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchTransactionsResponseV2"
        "206":
          description: Partial Content Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchTransactionsPartialResponseV2"
        "400":
          description: Invalid Request
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "401":
          description: Unauthorized access
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "403":
          description: Forbidden
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "404":
          description: Not Found
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "405":
          description: Method Not Allowed
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "406":
          description: Unacceptable
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "415":
          description: Unsupported Media Type
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "422":
          description: Unprocessable Entity
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "429":
          description: Too Many Requests
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/4xxError"
        "500":
          description: Internal Server Error
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/interactionId"
          content:
            application/json:
              schema:
                type: object
                example:
                  errorResponse:
                    code: 500-01
                    message: internal server error
                    developerInfo:
                      developerMessage: internal server error
                      moreInfo: There was a problem handling your request. Please try again. If the problem persists please contact Support
                      messageid: 25557-84290371-1
      deprecated: false
      x-child-product-name: Cards
      x-group-name: Transaction
      x-proxy-name: Get transactions v3
components:
  schemas:
    TransactionEnrichmentRequest:
      required:
      - transactionDescription
      type: object
      properties:
        transactionDescription:
          type: string
          description: Merchant name (ISO Field 48 or 43) or transaction description. Allowed length is 200 ytes.
          example: BILL PAY WellsFargo HomeE MOBILE XXXXXXX6091998 ON 03-01
        extendedFields:
          $ref: "#/components/schemas/ExtendedFields"
    ExtendedFields:
      type: object
      properties:
        mccCode:
          type: string
          description: Merchant category code
          example: "6011"
        merchantCity:
          type: string
          description: City in which merchant is located
          example: NJ
        merchantState:
          type: string
          description: State in which merchant is located
          example: NJ
        merchantPostalCode:
          type: string
          description: Postal code for the merchant’s location
          example: "12345"
        acquirerId:
          type: string
          description: Acquirer ID
          example: "12345678"
        merchantId:
          type: string
          description: Merchant ID
          example: "12345678"
        terminalId:
          type: string
          description: Terminal ID
          example: "12345678"
        tokenRequestorId:
          type: string
          description: Token requestor ID
          example: "12345"
        userId:
          type: string
          description: "ID used to uniquely identify the user or card, must be tokenized without any PAI/PII"
          example: TEST
        transactionId:
          type: string
          description: ID used to uniquely identify the transaction
          example: "12345678912"
        transactionAmount:
          type: string
          description: Amount of the transaction
          example: "1.00"
        transactionCurrency:
          type: string
          description: Transaction currency code (ISO 4217)
          example: US Dollers
        transactionTime:
          type: string
          description: Time at which the transaction occurred
          example: US
        transactionStatus:
          type: string
          description: "Pending; Posted; Denied; Reversal card, ach, billpay, zelle, rtp, p2p, others."
          example: Posted
        accountTransactionType:
          type: string
          description: "For billpay transactions, set accountTransactionType = billpay;"
          example: Billpay
        transactionType:
          type: string
          description: In-store; eCommerce; ATM; Recurring; MOTO; Others
          example: In-store
        responseCode:
          type: string
          description: Response code (ISO 8583 Field 39)
          example: "00"
        posEntryMode:
          type: string
          description: ISO 8583 Field 22. Required if transaction type is not available
          example: "20"
    TransactionEnrichmentResponse:
      type: object
      properties:
        enrichmentStatus:
          type: string
          description: MERCHANT_AND_STORE_RESOLVED ; MERCHANT_RESOLVED; MERCHANT_NAME_CLEANSED; MERCHANT_CATEGORIZED; UN_ENRICHED.
          example: MERCHANT_AND_STORE_RESOLVED
        enrichedMerchantName:
          type: string
          description: "Enriched merchant name if store resolved, return the corresponding merchant name;  if merchant resolved, return the merchant name;  if standard merchant name is available under either of the circumstances, return the standard merchant name."
          example: Wells Fargo
        enrichedTransactionDescription:
          type: string
          description: Enriched transaction description
          example: Wells Fargo Home Equity
        transactionCategory:
          type: string
          description: Merchant Category
          example: Transfers & Adjustments
        transactionSubCategory:
          type: string
          description: Merchant Sub-category
          example: Other Transfers & Adjustments
        additionalMerchantDescription:
          type: string
          description: Additional merchant category description (e.g. 3rd party category descriptions; MCC descriptions)
          example: ATM Cash Deposit Wells Fargo Bank
        logoUrl:
          type: string
          description: Merchant’s logo URL
          example: https://djar1aebo4jz2.cloudfront.net/logo/5d11cffd-d5da-4aa6-8c6b-590abcf36247.png
        enrichedMerchantAddress:
          type: string
          description: Enriched Merchant’s street address.
          example: 4580 Jimmy Lee Smith Pkwy
        enrichedMerchantCity:
          type: string
          description: Enriched Merchant’s city
          example: Hiram
        enrichedMerchantState:
          type: string
          description: Enriched Merchant’s state
          example: GA
        enrichedMerchantPostalCode:
          type: string
          description: Enriched Merchant’s postal code
          example: "30141"
        enrichedMerchantCountry:
          type: string
          description: Enriched Merchant’s country
          example: US
        enrichedMerchantLatitude:
          type: string
          description: Enriched Merchant’s latitude
          example: "33.890003"
        enrichedMerchantLongitude:
          type: string
          description: Enriched Merchant’s longitude
          example: "-84.75211"
        enrichedMerchantLocationType:
          type: string
          description: Type of Enriched Merchant’s location (STORE; TERMINAL_CENTROID)
          example: STORE
        phone:
          type: string
          description: Merchant’s phone number.
          example: "18008693557"
        url:
          type: string
          description: "If standard merchant url is available under either of the circumstances, return the standard merchant url."
          example: https://www.1234orthok.com
        hours:
          type: array
          description: Merchant’s hours of operation. Time range should be 00:00 to 23:59.
          items:
            $ref: "#/components/schemas/Hours"
        transactionType:
          type: string
          description: "cp(in-store transactions), cnp(online, ecommerce), atm"
          example: cnp
        accountTransactionType:
          type: string
          description: "Card, Billpay, ATM, Transfer, ACH, Zelle, etc"
          example: Card
        paymentServiceProvider:
          type: string
          description: Payment Service Provider
          example: Digital River
    Hours:
      type: object
      properties:
        monday:
          $ref: "#/components/schemas/DayHours"
        tuesday:
          $ref: "#/components/schemas/DayHours"
        wednesday:
          $ref: "#/components/schemas/DayHours"
        thursday:
          $ref: "#/components/schemas/DayHours"
        friday:
          $ref: "#/components/schemas/DayHours"
        saturday:
          $ref: "#/components/schemas/DayHours"
        sunday:
          $ref: "#/components/schemas/DayHours"
      additionalProperties: false
    DayHours:
      type: array
      items:
        maxItems: 2
        minItems: 2
        type: array
        items:
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          type: string
    TransactionEnrichmentResponseV2:
      type: object
      properties:
        enrichmentStatus:
          type: string
          description: MERCHANT_AND_STORE_RESOLVED ; MERCHANT_RESOLVED; MERCHANT_NAME_CLEANSED; MERCHANT_CATEGORIZED; UN_ENRICHED.
          example: MERCHANT_AND_STORE_RESOLVED
        enrichedMerchantName:
          type: string
          description: "Enriched merchant name if store resolved, return the corresponding merchant name;  if merchant resolved, return the merchant name;  if standard merchant name is available under either of the circumstances, return the standard merchant name."
          example: Wells Fargo
        enrichedTransactionDescription:
          type: string
          description: Enriched transaction description
          example: Wells Fargo Home Equity
        transactionCategory:
          type: string
          description: Merchant Category
          example: Transfers & Adjustments
        transactionSubCategory:
          type: string
          description: Merchant Sub-category
          example: Other Transfers & Adjustments
        additionalMerchantDescription:
          type: string
          description: Additional merchant category description (e.g. 3rd party category descriptions; MCC descriptions)
          example: ATM Cash Deposit Wells Fargo Bank
        logoUrl:
          type: string
          description: Merchant’s logo URL
          example: https://djar1aebo4jz2.cloudfront.net/logo/5d11cffd-d5da-4aa6-8c6b-590abcf36247.png
        enrichedMerchantAddress:
          type: string
          description: Enriched Merchant’s street address.
          example: 4580 Jimmy Lee Smith Pkwy
        enrichedMerchantCity:
          type: string
          description: Enriched Merchant’s city
          example: Hiram
        enrichedMerchantState:
          type: string
          description: Enriched Merchant’s state
          example: GA
        enrichedMerchantPostalCode:
          type: string
          description: Enriched Merchant’s postal code
          example: "30141"
        enrichedMerchantCountry:
          type: string
          description: Enriched Merchant’s country
          example: US
        enrichedMerchantLatitude:
          type: string
          description: Enriched Merchant’s latitude
          example: "33.890003"
        enrichedMerchantLongitude:
          type: string
          description: Enriched Merchant’s longitude
          example: "-84.75211"
        enrichedMerchantLocationType:
          type: string
          description: Type of Enriched Merchant’s location (STORE; TERMINAL_CENTROID)
          example: STORE
        phone:
          type: string
          description: Merchant’s phone number.
          example: "18008693557"
        url:
          type: string
          description: "If standard merchant url is available under either of the circumstances, return the standard merchant url."
          example: https://www.1234orthok.com
        hours:
          type: array
          description: Merchant’s hours of operation. Time range should be 00:00 to 23:59.
          items:
            $ref: "#/components/schemas/Hours"
    SearchTransactionRequestV2:
      type: object
      properties:
        cardNumber:
          type: string
          description: |
            Unique number assigned to each cardholder record. Either cardNumber or nonTransToken must be included in the request. If both are included, only cardNumber will be used. Maximum length 19 digits.
          format: numeric
          example: "4000200030004000"
        nonTransToken:
          type: string
          description: |
            Non-transactional token associated with a card. Non-transactional token associated with a card.
            Either cardNumber or nonTransToken must be included in the request. If both are included, only cardNumber is used. Length can be between 16 and 19.
          format: alphanumeric
          example: piUVBJKZGfks4000
        memberNumber:
          maxLength: 1
          type: string
          description: "The Member number is associated with the card. If not passed, defaults to ALL. Transaction summary ia returned as an array for all member numbers when defaulted to All."
          format: numeric
          example: "0"
        responseFormat:
          type: string
          description: "Determines the format of Card number and/or Non-transactional token in the response.  \nValues are -\n- TOKEN_ONLY - Non-transactional token only.\n- MASKED_DETAILS_AND_TOKEN - Both Masked Details and Non-transactional token.\n- UNMASKED_DETAILS_AND_TOKEN - Both Clear details and Non-transactional token.\n"
          example: MASKED_DETAILS_AND_TOKEN
          default: MASKED_DETAILS_AND_TOKEN
          enum:
          - TOKEN_ONLY
          - MASKED_DETAILS_AND_TOKEN
          - UNMASKED_DETAILS_AND_TOKEN
        enrichTransaction:
          type: string
          description: This flag determines whether enriched transaction data should be included.
          format: boolean
          example: "true"
        filterCriteria:
          type: array
          items:
            $ref: "#/components/schemas/FilterCriteria"
    FilterCriteria:
      type: object
      properties:
        filterBy:
          type: string
          description: "Filter applied to transactions search. One or many filter combinations are allowed. Applies to debit and credit cards.  \n- MERCHANT_NAME - Merchant Name.  \n- AMOUNT_FROM - Minimum amount. Valid format is 0.00. \n- AMOUNT_TO - Maximum amount. Valid format is 0.00.  \n- FROM_DATE - Start date. Valid Format is YYYY-MM-DD.  \n- TO_DATE - End date. Valid format is YYYY-MM-DD.  \n- STATUS - For debit transactions valid status are APPROVED, REVERSED and DECLINED. For credit transactions valid status are  POSTED/DECLINED/PENDING/APPROVED/REVERSED.  \n- TRANSACTION_CODE - Describes the type of transaction done on card. For values refer field transactionType.  \n- MESSAGE_TYPE - Message based on activity done on the transaction. For values refer field MessageType.  Applies only to debit cards.  \n- SYSTEM_RECORD_ID - The ID that uniquely identifies the transaction. Mapped to the lifecycle key.  \n- SEQUENCE_NUMBER - Chronological numeric identifier for the transaction.  \n- RETRIEVAL_REF_NUMBER - Transaction identifier typically assigned by the acquirer or transaction originator.  \n"
          example: MERCHANT_NAME
          enum:
          - MERCHANT_NAME
          - AMOUNT_FROM
          - AMOUNT_TO
          - FROM_DATE
          - TO_DATE
          - STATUS
          - TRANSACTION_CODE
          - MESSAGE_TYPE
          - SYSTEM_RECORD_ID
          - SEQUENCE_NUMBER
          - RETRIEVAL_REF_NUMBER
        filterValue:
          type: string
          description: "Values for selected filters. If the filterBy field is set to MERCHANT_NAME, this field contains the name of the merchant, such as 'ExampleCo'. See filterBy field for more information."
          example: Store1
    SearchTransactionsResponseV2:
      type: object
      properties:
        totalTransactionCount:
          type: integer
          description: Total number of transactions for the provided request information.
          example: 250
        transactionCountPerPage:
          type: integer
          description: Total number of transactions per page for the provided request information.
          example: 25
          default: 25
        cardNumber:
          type: string
          description: |
            Unique number assigned to each cardholder record. Either cardNumber or nonTransToken must be included in the request. If both are included, only cardNumber will be used. Maximum length 19 digits.
          format: alphanumeric
          example: 400020XXXXXX4000
        nonTransToken:
          type: string
          description: |
            Non-transactional token associated with a card. Non-transactional token associated with a card.
            Either cardNumber or nonTransToken must be included in the request. If both are included, only cardNumber is used. Length can be between 16 and 19.
          format: alphanumeric
          example: piUVBJKZGfks4000
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionV2"
    TransactionV2:
      type: object
      properties:
        transactionSummary:
          $ref: "#/components/schemas/TransactionSummaryV2"
        transactionDetails:
          $ref: "#/components/schemas/TransactionDetailsV2"
        enrichedTransactionDetails:
          $ref: "#/components/schemas/TransactionEnrichmentResponseV2"
    TransactionSummaryV2:
      type: object
      properties:
        authorizationCode:
          type: string
          description: |
            Authorization approval code, generated for approved transactions only. Applies to debit and credit cards.
          example: "000000"
        responseCode:
          type: string
          description: |
            Authorization response approval or denial code.  Applies to debit and credit cards.
          example: "000"
        responseCodeDescription:
          type: string
          description: |
            This field provide description for response code. Applies to debit and credit cards.
          example: APPROVED - NO BALANCES
        responseDetails:
          type: string
          description: |
            Details about response received for transaction. Applies to debit and credit cards.
          example: 96-M Error processing PIN
        status:
          type: string
          description: |
            Status of the transaction.
          example: 64-PI LOST
        tranCode:
