spring.application.name=mock-server-integration
server.port=8080

# MongoDB ------------------------------------------------------------
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/mockserver}
# auto-index-creation is enabled in application-local.properties so unit tests
# don't attempt a live Mongo connection at startup.

# Postman API --------------------------------------------------------
postman.api-key=${POSTMAN_API_KEY:}
postman.base-url=${POSTMAN_BASE_URL:https://api.getpostman.com}
postman.environment-name=${POSTMAN_ENVIRONMENT_NAME:dev}
postman.spec-task.poll-interval-ms=2000
postman.spec-task.timeout-ms=180000

# Local spec source --------------------------------------------------
specs.local.base-dir=${SPECS_LOCAL_BASE_DIR:specs}
